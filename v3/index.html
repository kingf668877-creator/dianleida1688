<script>
// 内置MD5实现（备用，防止CDN加载失败）
(function() {
  function safeAdd(x, y) {
    var lsw = (x & 0xFFFF) + (y & 0xFFFF);
    var msw = (x >> 16) + (y >> 16) + (lsw >> 16);
    return (msw << 16) | (lsw & 0xFFFF);
  }
  function bitRol(num, cnt) {
    return (num << cnt) | (num >>> (32 - cnt));
  }
  function md5cmn(q, a, b, x, s, t) {
    return safeAdd(bitRol(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b);
  }
  function md5ff(a, b, c, d, x, s, t) { return md5cmn((b & c) | ((~b) & d), a, b, x, s, t); }
  function md5gg(a, b, c, d, x, s, t) { return md5cmn((b & d) | (c & (~d)), a, b, x, s, t); }
  function md5hh(a, b, c, d, x, s, t) { return md5cmn(b ^ c ^ d, a, b, x, s, t); }
  function md5ii(a, b, c, d, x, s, t) { return md5cmn(c ^ (b | (~d)), a, b, x, s, t); }
  function coreMD5(x, len) {
    x[len >> 5] |= 0x80 << (len % 32);
    x[(((len + 64) >>> 9) << 4) + 14] = len;
    var a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
    for (var i = 0; i < x.length; i += 16) {
      var olda = a, oldb = b, oldc = c, oldd = d;
      a = md5ff(a, b, c, d, x[i], 7, -680876936);
      d = md5ff(d, a, b, c, x[i+1], 12, -389564586);
      c = md5ff(c, d, a, b, x[i+2], 17, 606105819);
      b = md5ff(b, c, d, a, x[i+3], 22, -1044525330);
      a = md5ff(a, b, c, d, x[i+4], 7, -176418897);
      d = md5ff(d, a, b, c, x[i+5], 12, 1200080426);
      c = md5ff(c, d, a, b, x[i+6], 17, -1473231341);
      b = md5ff(b, c, d, a, x[i+7], 22, -45705983);
      a = md5ff(a, b, c, d, x[i+8], 7, 1770035416);
      d = md5ff(d, a, b, c, x[i+9], 12, -1958414417);
      c = md5ff(c, d, a, b, x[i+10], 17, -42063);
      b = md5ff(b, c, d, a, x[i+11], 22, -1990404162);
      a = md5ff(a, b, c, d, x[i+12], 7, 1804603682);
      d = md5ff(d, a, b, c, x[i+13], 12, -40341101);
      c = md5ff(c, d, a, b, x[i+14], 17, -1502002290);
      b = md5ff(b, c, d, a, x[i+15], 22, 1236535329);
      a = md5gg(a, b, c, d, x[i+1], 5, -165796510);
      d = md5gg(d, a, b, c, x[i+6], 9, -1069501632);
      c = md5gg(c, d, a, b, x[i+11], 14, 643717713);
      b = md5gg(b, c, d, a, x[i], 20, -373897302);
      a = md5gg(a, b, c, d, x[i+5], 5, -701558691);
      d = md5gg(d, a, b, c, x[i+10], 9, 38016083);
      c = md5gg(c, d, a, b, x[i+15], 14, -660478335);
      b = md5gg(b, c, d, a, x[i+4], 20, -405537848);
      a = md5gg(a, b, c, d, x[i+9], 5, 568446438);
      d = md5gg(d, a, b, c, x[i+14], 9, -1019803690);
      c = md5gg(c, d, a, b, x[i+3], 14, -187363961);
      b = md5gg(b, c, d, a, x[i+8], 20, 1163531501);
      a = md5gg(a, b, c, d, x[i+13], 5, -1444681467);
      d = md5gg(d, a, b, c, x[i+2], 9, -51403784);
      c = md5gg(c, d, a, b, x[i+7], 14, 1735328473);
      b = md5gg(b, c, d, a, x[i+12], 20, -1926607734);
      a = md5hh(a, b, c, d, x[i+5], 4, -378558);
      d = md5hh(d, a, b, c, x[i+8], 11, -2022574463);
      c = md5hh(c, d, a, b, x[i+11], 16, 1839030562);
      b = md5hh(b, c, d, a, x[i+14], 23, -35309556);
      a = md5hh(a, b, c, d, x[i+1], 4, -1530992060);
      d = md5hh(d, a, b, c, x[i+4], 11, 1272893353);
      c = md5hh(c, d, a, b, x[i+7], 16, -155497632);
      b = md5hh(b, c, d, a, x[i+10], 23, -1094730640);
      a = md5hh(a, b, c, d, x[i+13], 4, 681279174);
      d = md5hh(d, a, b, c, x[i], 11, -358537222);
      c = md5hh(c, d, a, b, x[i+3], 16, -722521979);
      b = md5hh(b, c, d, a, x[i+6], 23, 76029189);
      a = md5hh(a, b, c, d, x[i+9], 4, -640364487);
      d = md5hh(d, a, b, c, x[i+12], 11, -421815835);
      c = md5hh(c, d, a, b, x[i+15], 16, 530742520);
      b = md5hh(b, c, d, a, x[i+2], 23, -995338651);
      a = md5ii(a, b, c, d, x[i], 6, -198630844);
      d = md5ii(d, a, b, c, x[i+7], 10, 1126891415);
      c = md5ii(c, d, a, b, x[i+14], 15, -1416354905);
      b = md5ii(b, c, d, a, x[i+5], 21, -57434055);
      a = md5ii(a, b, c, d, x[i+12], 6, 1700485571);
      d = md5ii(d, a, b, c, x[i+3], 10, -1894986606);
      c = md5ii(c, d, a, b, x[i+10], 15, -1051523);
      b = md5ii(b, c, d, a, x[i+1], 21, -2054922799);
      a = md5ii(a, b, c, d, x[i+8], 6, 1873313359);
      d = md5ii(d, a, b, c, x[i+15], 10, -30611744);
      c = md5ii(c, d, a, b, x[i+6], 15, -1560198380);
      b = md5ii(b, c, d, a, x[i+13], 21, 1309151649);
      a = md5ii(a, b, c, d, x[i+4], 6, -145523070);
      d = md5ii(d, a, b, c, x[i+11], 10, -1120210379);
      c = md5ii(c, d, a, b, x[i+2], 15, 718787259);
      b = md5ii(b, c, d, a, x[i+9], 21, -343485551);
      a = safeAdd(a, olda); b = safeAdd(b, oldb);
      c = safeAdd(c, oldc); d = safeAdd(d, oldd);
    }
    return [a, b, c, d];
  }
  function md5cycle(x) {
    var k = [], AA, BB, CC, DD;
    x = x.replace(/[\x80-\xFF]/g, function(c) {
      return '%u00' + c.charCodeAt(0).toString(16);
    });
    x = unescape(encodeURIComponent(x));
    for (var i = 0; i < x.length * 8; i += 8)
      k[i >> 5] |= (x.charCodeAt(i / 8) & 0xFF) << (i % 32);
    var res = coreMD5(k, x.length * 8);
    var hex_chr = '0123456789abcdef';
    var str = '';
    for (var j = 0; j < res.length * 4; j++) {
      str += hex_chr.charAt((res[j >> 2] >> ((j % 4) * 8 + 4)) & 0x0F) +
             hex_chr.charAt((res[j >> 2] >> ((j % 4) * 8)) & 0x0F);
    }
    return str;
  }
  window._MD5 = md5cycle;
})();
function getMD5(str) {
  if (typeof CryptoJS !== 'undefined' && CryptoJS.MD5) return CryptoJS.MD5(str).toString();
  return window._MD5(str);
}
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #fff;
  color: #333;
  min-height: 100vh;
}

/* ===== Hero Section ===== */
.hero-section {
  text-align: center;
  padding: 80px 20px 40px;
  position: relative;
  overflow: hidden;
}
.hero-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: radial-gradient(circle, #f0f0f0 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: 0.5;
  pointer-events: none;
}
.hero-title {
  font-size: 42px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
  position: relative;
}
.hero-subtitle {
  font-size: 18px;
  color: #888;
  margin-bottom: 48px;
  position: relative;
}

/* ===== Search Box ===== */
.search-box-container {
  max-width: 880px;
  margin: 0 auto;
  position: relative;
}
.search-box {
  background: #fff;
  border: 1.5px solid #e8e8e8;
  border-radius: 16px;
  padding: 20px 20px 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  transition: border-color 0.3s, box-shadow 0.3s;
  position: relative;
}
.search-box:focus-within {
  border-color: #6366F1;
  box-shadow: 0 4px 32px rgba(99, 102, 241, 0.15);
}
.search-input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 16px;
  color: #333;
  background: transparent;
  resize: none;
  min-height: 60px;
  line-height: 1.6;
  font-family: inherit;
}
.search-input::placeholder { color: #bbb; }
.search-box-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}
.search-box-left { display: flex; gap: 8px; }
.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid #eee;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.icon-btn:hover { background: #f5f5f5; border-color: #ddd; }
.search-box-right { display: flex; align-items: center; gap: 12px; }
.mode-toggle {
  font-size: 13px;
  color: #888;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.search-btn {
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
.search-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ===== Tip Banner ===== */
.tip-banner {
  max-width: 880px;
  margin: 16px auto 0;
  background: linear-gradient(90deg, #D1FAE5 0%, #ECFDF5 50%, #F0FDF4 100%);
  border-radius: 12px;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #065F46;
}
.tip-banner-left { display: flex; align-items: center; gap: 6px; }
.tip-banner-right { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; }

/* 历史搜索词 */
.search-history {
  max-width: 880px;
  margin: 12px auto 0;
  padding: 12px 16px;
  background: #F9FAFB;
  border-radius: 12px;
  border: 1px solid #E5E7EB;
}
.search-history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.search-history-title {
  font-size: 12px;
  color: #6B7280;
  font-weight: 500;
}
.search-history-clear {
  font-size: 12px;
  color: #9CA3AF;
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 6px;
  transition: all 0.2s;
}
.search-history-clear:hover {
  color: #EF4444;
  background: #FEE2E2;
}
.search-history-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.history-tag {
  display: inline-flex;
  align-items: center;
  padding: 5px 14px;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 20px;
  font-size: 13px;
  color: #374151;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.history-tag:hover {
  background: #6366F1;
  border-color: #6366F1;
  color: #fff;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
}

/* ===== Quick Tools ===== */
.quick-tools {
  max-width: 880px;
  margin: 48px auto 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}
.tool-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
}
.tool-item:hover { transform: translateY(-4px); }
.tool-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tool-name { font-size: 13px; color: #555; }
.tool-badge {
  position: absolute;
  top: -4px; right: -8px;
  background: linear-gradient(135deg, #FF6B6B, #FF4757);
  color: #fff;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 8px;
  font-weight: 500;
}

/* ===== Results Section ===== */
.results-section {
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
  display: none;
}
.results-section.active { display: block; }

/* Analysis Steps */
.analysis-card {
  background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}
.analysis-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.analysis-header-icon {
  width: 36px; height: 36px;
  background: #6366F1;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
}
.analysis-header-title { font-size: 18px; font-weight: 600; color: #4C1D95; }
.analysis-header-sub { font-size: 13px; color: #7C3AED; }

.ai-steps { display: flex; flex-direction: column; gap: 10px; }
.ai-step {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.8);
  border-radius: 12px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s ease;
  border-left: 3px solid transparent;
}
.ai-step.show { opacity: 1; transform: translateY(0); }
.ai-step.completed { border-left-color: #6366F1; }
.ai-step-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #EDE9FE;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.ai-step-content { flex: 1; min-width: 0; }
.ai-step-title {
  font-size: 14px;
  font-weight: 600;
  color: #4C1D95;
  margin-bottom: 4px;
}
.ai-step-detail {
  font-size: 13px;
  color: #6D28D9;
  line-height: 1.5;
}
.ai-step-tokens {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.ai-token {
  font-size: 12px;
  padding: 3px 10px;
  background: #fff;
  border-radius: 12px;
  color: #7C3AED;
  border: 1px solid #DDD6FE;
  white-space: nowrap;
}

/* Products */
.products-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.products-title { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.products-count { font-size: 14px; color: #999; font-weight: 400; }
.filter-row { display: flex; align-items: center; gap: 8px; }
.filter-label { font-size: 13px; color: #888; }
.chip-group { display: flex; gap: 6px; }
.chip {
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 16px;
  background: #f5f5f5;
  color: #666;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { background: #eee; }
.chip.active { background: #6366F1; color: #fff; }

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.product-card {
  background: #fff;
  border: 1px solid #f0f0f0;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.product-img-wrap {
  width: 100%;
  height: 200px;
  background: #f5f5f5;
  overflow: hidden;
  position: relative;
}
.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.product-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
}
.product-info { padding: 12px; }
.product-title {
  font-size: 14px;
  color: #333;
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-price {
  font-size: 18px;
  font-weight: 700;
  color: #FF4D4F;
  margin-bottom: 8px;
}
.product-price span { font-size: 12px; font-weight: 400; }
.product-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #999;
}
.product-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-right: 4px;
}
.badge-new { background: #E6F7FF; color: #1890FF; }
.badge-hot { background: #FFF1F0; color: #FF4D4F; }
.badge-top { background: #FCF5E5; color: #D48806; }

/* 分页样式 */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.page-btn {
  padding: 8px 16px;
  border: 1px solid #E5E7EB;
  background: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: #374151;
  transition: all 0.2s;
}
.page-btn:hover:not(:disabled) {
  border-color: #6366F1;
  color: #6366F1;
}
.page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.page-numbers {
  display: flex;
  gap: 4px;
}
.page-num {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: #374151;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.page-num:hover {
  background: #F3F4F6;
}
.page-num.active {
  background: #6366F1;
  color: #fff;
  border-color: #6366F1;
}
.page-num.ellipsis {
  cursor: default;
}
.page-num.ellipsis:hover {
  background: transparent;
}
.page-info {
  font-size: 13px;
  color: #9CA3AF;
  margin-left: 8px;
}
.page-jump {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #6B7280;
  margin-left: 16px;
}
.page-jump input {
  width: 50px;
  height: 32px;
  border: 1px solid #E5E7EB;
  border-radius: 6px;
  text-align: center;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.page-jump input:focus {
  border-color: #6366F1;
}
.page-jump input::-webkit-outer-spin-button,
.page-jump input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.page-jump-btn {
  padding: 6px 12px;
  font-size: 13px;
}

/* Loading */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  margin-left: 8px;
}

function addDebugLog(msg) {

  if (COZE_DEBUG_LOG.length > 50) COZE_DEBUG_LOG.shift();

// 流式解析SSE响应
function parseSSE(response, onMessage, onComplete, onError) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';
  let eventType = null;
  
  function processLine(line) {
    if (line.startsWith('event:')) {
      eventType = line.substring(6).trim();
    } else if (line.startsWith('data:')) {
      const dataStr = line.substring(5).trim();
      if (dataStr === '[DONE]') {
        onComplete && onComplete();
        return;
      }
      try {
        const data = JSON.parse(dataStr);
        onMessage && onMessage(eventType, data);
      } catch (e) {
        // 忽略解析失败的行
      }
    }
  }
  
  function read() {
    reader.read().then(({ done, value }) => {
      if (done) {
        onComplete && onComplete();
        return;
      }
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      
      for (const line of lines) {
        if (line.trim()) {
          processLine(line.trim());
        }
      }
      
      read();
    }).catch(err => {
      onError && onError(err);
    });
  }
  
  read();
}

async function callCozeSearchAnalysis(query, onStreamDelta) {
  if (!USE_COZE_AGENT || !COZE_API_TOKEN || !COZE_BOT_ID) return null;
  
  COZE_DEBUG_LOG = [];
  addDebugLog(`开始分析: "${query}"`);
  
  try {
    const chatBody = JSON.stringify({
      bot_id: COZE_BOT_ID,
      user_id: 'dianleida_web_' + Date.now(),
      stream: true,
      auto_save_history: true,
      additional_messages: [
        { role: 'user', content: query, content_type: 'text' }
      ]
    });
    
    addDebugLog('发起流式对话请求...');
    
    const response = await fetch(COZE_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + COZE_API_TOKEN,
        'Accept': 'text/event-stream'
      },
      body: chatBody
    });
    
    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      throw new Error('HTTP ' + response.status + ': ' + errText.substring(0, 200));
    }
    
    return new Promise((resolve, reject) => {
      let answerContent = '';  // 只保存answer类型的消息
      let hasError = false;
      let errorMsg = '';
      let answerStarted = false;
      
      parseSSE(
        response,
        // onMessage
        (eventType, data) => {
          addDebugLog(`事件: ${eventType}, type: ${data.type || 'unknown'}`);
          
          if (eventType === 'conversation.message.delta') {
            // 只处理answer类型的消息，忽略其他类型（time_capsule_recall, generate_answer_finish等）
            const msgType = data.type || '';
            const content = data.content || '';
            
            if (msgType === 'answer') {
              answerStarted = true;
              answerContent += content;
              if (onStreamDelta) {
                onStreamDelta(content, answerContent);
              }
            } else if (!answerStarted && msgType === '' && content) {
              // 有些情况下type字段可能在其他位置，尝试判断内容是否像JSON
              if (content.trim().startsWith('{') || answerContent.length > 0) {
                answerContent += content;
                if (onStreamDelta) {
                  onStreamDelta(content, answerContent);
                }
              }
            }
          } else if (eventType === 'conversation.message.completed') {
            // 消息完成
            const msgType = data.type || '';
            addDebugLog(`消息完成, type: ${msgType}`);
          } else if (eventType === 'conversation.chat.failed') {
            hasError = true;
            const lastError = data.last_error || {};
            errorMsg = lastError.msg || '未知错误';
            addDebugLog(`对话失败: ${errorMsg}`);
          }
        },
        // onComplete
        () => {
          if (hasError) {
            reject(new Error(errorMsg || '扣子智能体调用失败'));
            return;
          }
          
          addDebugLog(`流式完成，回答内容长度: ${answerContent.length}`);
          
          // 如果answerContent为空，尝试从所有内容中提取
          let contentToParse = answerContent;
          if (!contentToParse || contentToParse.length < 10) {
            addDebugLog('answer内容为空，尝试从完整内容中提取JSON');
            // 这里我们无法获取完整内容了，因为之前过滤了
            // 直接返回失败，让fallback处理
            reject(new Error('未获取到有效的回答内容'));
            return;
          }
          
          // 尝试解析JSON
          try {
            const result = JSON.parse(contentToParse);
            addDebugLog('JSON解析成功');
            resolve(result);
          } catch (e) {
            addDebugLog('直接解析失败，尝试提取第一个完整JSON...');
            
            // 用括号匹配法找第一个完整的JSON对象
            let depth = 0;
            let start = -1;
            let end = -1;
            for (let i = 0; i < contentToParse.length; i++) {
              if (contentToParse[i] === '{') {
                if (depth === 0) start = i;
                depth++;
              } else if (contentToParse[i] === '}') {
                depth--;
                if (depth === 0 && start >= 0) {
                  end = i;
                  break;
                }
              }
            }
            
            if (start >= 0 && end > start) {
              const extracted = contentToParse.substring(start, end + 1);
              try {
                const result = JSON.parse(extracted);
                addDebugLog('提取第一个JSON对象成功，长度: ' + extracted.length);
                resolve(result);
                return;
              } catch (e2) {
                addDebugLog('提取的JSON解析失败: ' + e2.message);
              }
            }
            
            // 如果第一个JSON解析失败，尝试最后一个
            addDebugLog('尝试提取最后一个JSON...');
            let lastStart = -1;
            let lastEnd = -1;
            depth = 0;
            for (let i = contentToParse.length - 1; i >= 0; i--) {
              if (contentToParse[i] === '}') {
                if (depth === 0) lastEnd = i;
                depth++;
              } else if (contentToParse[i] === '{') {
                depth--;
                if (depth === 0 && lastEnd >= 0) {
                  lastStart = i;
                  break;
                }
              }
            }
            
            if (lastStart >= 0 && lastEnd > lastStart) {
              const extracted = contentToParse.substring(lastStart, lastEnd + 1);
              try {
                const result = JSON.parse(extracted);
                addDebugLog('提取最后一个JSON对象成功，长度: ' + extracted.length);
                resolve(result);
                return;
              } catch (e3) {
                addDebugLog('最后一个JSON解析也失败: ' + e3.message);
              }
            }
            
            addDebugLog('所有JSON解析尝试失败，原始内容前300字: ' + contentToParse.substring(0, 300));
            reject(new Error('返回内容不是有效的JSON格式'));
          }
        },
        // onError
        (err) => {
          addDebugLog('流式读取失败: ' + err.message);
          reject(err);
        }
      );
    });
    
  } catch (e) {
    addDebugLog('最终失败: ' + e.message);
    console.warn('[Coze AI] 调用失败:', e.message);
    return null;
  }
}

async function callZhipuSearchAnalysis(query) {

        response_format: { type: 'json_object' }
      }),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!response.ok) throw new Error('API错误 ' + response.status);
    const data = await response.json();
    const content = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
    if (!content) throw new Error('API返回内容为空');
    try { return JSON.parse(content); } catch (e) {
      const m = content.match(/\{[\s\S]*\}/);
      if (m) return JSON.parse(m[0]);
      throw new Error('返回内容不是有效的JSON格式');
    }
  } catch (e) {
    clearTimeout(timeoutId);
    console.warn('[Zhipu AI] 分析失败:', e.message);
    return null;
  }
}

// ===== 简单规则引擎（最后兜底）=====
function ruleBasedAnalysis(query) {
  const bagPatterns = ['包', '袋', '箱'];
  const isBag = bagPatterns.some(p => query.includes(p));
  let mainCategory = '全部分类', subCategory = '';
  let expanded = [query];
  let excluded = [];
  let categoryId = '';
  
  if (isBag) {
    mainCategory = '箱包皮具';
    subCategory = '女士包袋';
    categoryId = '1001';
    expanded = [query + ' 女包', query + ' 箱包', '新款' + query, '时尚' + query];
    excluded = ['材料包', '包装袋', '礼品袋', '工具包', '配件包', '压缩包'];
  }
  
  return {
    intent: '明确找品',
    intentConfidence: 0.7,
    category: { mainCategory, subCategory, categoryId, categoryKeywords: [] },
    coreProduct: query,
    modifiers: { style: [], material: [], crowd: [], scene: [], priceRange: {min:null,max:null}, other: [] },
    expandedKeywords: expanded,
    excludedKeywords: excluded,
    requiredKeywords: [query],
    ambiguity: { hasAmbiguity: isBag, ambiguousTerms: isBag ? ['包'] : [], resolutionStrategy: isBag ? '优先匹配箱包皮具类目' : '' },
    searchStrategy: { primaryQuery: query, secondaryQueries: expanded, filterHints: '' },
    analysisSummary: '基于规则引擎分析，正在匹配相关商品'
  };
}

// ===== 扩展词相关性过滤 =====
function filterRelevantKeywords(expandedKeywords, coreProduct, categoryName) {
  if (!expandedKeywords || expandedKeywords.length === 0) return [];
  
  const core = coreProduct || '';
  const cat = categoryName || '';
  
  // 提取核心产品的关键词（去掉修饰词，保留核心名词）
  let coreNouns = [];
  
  // 常见核心名词模式
  const nounPatterns = [
    /手机壳|手机套|保护壳|保护套/,
    /包|袋|箱/,
    /衣服|服装|外套|t恤|衬衫|裤子|裙子/,
    /鞋|靴/,
    /帽|围巾|手套/,
    /饰品|耳环|项链|手链|戒指/,
    /数码|电子|配件/,
  ];
  
  for (const pattern of nounPatterns) {
    const match = core.match(pattern);
    if (match) {
      coreNouns.push(match[0]);
      break;
    }
  }
  
  // 如果没匹配到，就用整个coreProduct作为核心词
  if (coreNouns.length === 0 && core) {
    coreNouns.push(core);
  }
  
  // 过滤规则：扩展词必须包含至少一个核心名词，或者与类目相关
  const filtered = expandedKeywords.filter(kw => {
    const lowerKw = kw.toLowerCase();
    
    // 必须包含核心产品词的一部分
    let hasCoreWord = false;
    for (const noun of coreNouns) {
      if (lowerKw.includes(noun.toLowerCase())) {
        hasCoreWord = true;
        break;
      }
    }
    
    // 或者包含完整搜索词
    if (!hasCoreWord && core && lowerKw.includes(core.toLowerCase())) {
      hasCoreWord = true;
    }
    
    // 手机壳类特殊过滤：排除手机膜、数据线、充电器等完全不相关的
    if (core.match(/手机壳|手机套|保护壳|保护套/)) {
      const unrelatedPatterns = [/手机膜/, /钢化膜/, /数据线/, /充电器/, /充电线/, /耳机/, /充电宝/];
      for (const p of unrelatedPatterns) {
        if (lowerKw.match(p)) return false;
      }
    }
    
    // 箱包类特殊过滤：排除完全不相关的
    if (core.match(/包|袋/) && cat.match(/箱包|包/)) {
      const unrelatedPatterns = [/书包|背包|钱包|卡包/];
      // 这些是相关的，不过滤
    }
    
    return hasCoreWord;
  });
  
  return filtered.length > 0 ? filtered : expandedKeywords.slice(0, 3);
}

function matchCategory(query) {
  let bestMatch = null;
  let bestMatchLength = 0;
  
  for (const [name, cfg] of Object.entries(CATEGORY_MAP)) {
    for (const kw of cfg.matchKeywords) {
      if (query.includes(kw)) {
        // 取匹配到的最长关键词
        if (kw.length > bestMatchLength) {
          bestMatchLength = kw.length;
          bestMatch = { categoryName: name, levelNames: cfg.levelNames, matchKeywords: cfg.matchKeywords, fallbackKeywords: cfg.fallbackKeywords, matchedKeyword: kw };
        }
      }
    }
  }
  
  return bestMatch;
}

// ===== 根据类目名称获取levelName前缀 =====
function getCategoryLevelNames(categoryName) {
  if (!categoryName) return [];
  const cfg = CATEGORY_MAP[categoryName];
  return cfg ? cfg.levelNames : [];
}

// ===== 处理API返回的商品 =====
function processAPIProducts(items, excludedKeywords, requiredKeywords, coreProduct, categoryLevelNames) {
  const result = [];
  const excluded = (excludedKeywords || []).map(k => k.toLowerCase());
  const required = (requiredKeywords || []).map(k => k.toLowerCase());
  const core = coreProduct ? coreProduct.toLowerCase() : '';
  const levelNames = categoryLevelNames || [];
  
  // 提取核心名词（用于宽松匹配）
  let coreNoun = '';
  const nounPatterns = [
    /手机壳|手机套|保护壳|保护套/,
    /包包|女包|男包|箱包|手提包|双肩包|单肩包|钱包|背包/,
    /包|袋|箱/,
    /t恤|衬衫|外套|裤子|裙子|衣服|服装/,
    /鞋|靴/,
    /饰品|耳环|项链|手链|戒指/,
  ];
  for (const pattern of nounPatterns) {
    const match = core.match(pattern);
    if (match) { coreNoun = match[0]; break; }
  }
  
  // 常见不相关词黑名单
  const blacklistPatterns = [
    /抽纸|纸巾|卫生纸|面巾纸|餐巾纸|卷纸|手帕纸|擦手纸|纸抽/,
    /零食|饼干|糖果|巧克力|坚果|干货|调料|饮料|牛奶/,
    /轴承|齿轮|螺丝|螺母|螺栓|弹簧|密封|阀门|管件|焊条|润滑脂|润滑油|机油|柴油|汽油|燃料|白油/,
    /打包袋|包装袋|包装盒|纸箱|泡沫|气泡膜|材料包|工具包|配件包/,
  ];
  
  for (const item of items) {
    const title = (item.title || '').toLowerCase();
    const levelName = item.levelName || '';
    
    // 排除词过滤
    let skip = false;
    for (const ex of excluded) {
      if (ex.length >= 2 && title.includes(ex)) { skip = true; break; }
    }
    if (skip) continue;
    
    // 黑名单过滤：明显不相关的直接排除
    let inBlacklist = false;
    for (const pattern of blacklistPatterns) {
      if (pattern.test(title)) { inBlacklist = true; break; }
    }
    if (inBlacklist) continue;
    
    // 类目路径匹配（如果指定了类目）
    let categoryMatch = true;
    if (levelNames.length > 0 && levelName) {
      categoryMatch = levelNames.some(ln => levelName.startsWith(ln));
    }
    
    // 必选词优先检查：如果有必选词，必须全部满足
    if (required.length > 0) {
      let allRequiredMatch = true;
      for (const rq of required) {
        if (!rq) continue;
        
        // 单字必选词（如"包"）需要特殊处理，排除量词用法和"包邮"等
        if (rq.length === 1) {
          const charIndex = title.indexOf(rq);
          if (charIndex < 0) {
            allRequiredMatch = false;
            break;
          }
          // 检查是不是量词用法或明显的非名词用法
          const prefixes = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
          const suffixes = ['邮']; // 包邮的"包"不是名词
          
          const isBadMatch = (index) => {
            // 检查前缀（量词）
            if (index > 0) {
              const prevChar = title[index - 1];
              if (prefixes.includes(prevChar) || /\d/.test(prevChar)) return true;
            }
            // 检查后缀（非名词用法）
            if (index < title.length - 1) {
              const nextChar = title[index + 1];
              if (suffixes.includes(nextChar)) return true;
            }
            return false;
          };
          
          // 第一个出现的如果是坏匹配，继续找
          if (isBadMatch(charIndex)) {
            let found = false;
            let searchFrom = charIndex + 1;
            while (searchFrom < title.length) {
              const nextIndex = title.indexOf(rq, searchFrom);
              if (nextIndex < 0) break;
              if (!isBadMatch(nextIndex)) {
                found = true;
                break;
              }
              searchFrom = nextIndex + 1;
            }
            if (!found) {
              allRequiredMatch = false;
              break;
            }
          }
        } else {
          // 多字词直接匹配
          if (!title.includes(rq)) { 
            allRequiredMatch = false; 
            break; 
          }
        }
      }
      if (!allRequiredMatch) continue;
    }
    
    // 核心词匹配检查（必选词已满足时，这里进一步确认相关性）
    let hasCoreMatch = false;
    
    // 1. 完全匹配核心产品词
    if (core && title.includes(core)) {
      hasCoreMatch = true;
    }
    // 2. 匹配核心名词（如"异形包" → 匹配"包"）
    else if (coreNoun && coreNoun.length > 1 && title.includes(coreNoun)) {
      hasCoreMatch = true;
    }
    // 3. 必选词已经全部满足，也算通过（兜底）
    else if (required.length > 0) {
      hasCoreMatch = true;
    }
    
    // 如果指定了类目但类目不匹配，且核心词也不是强匹配，则排除
    if (levelNames.length > 0 && !categoryMatch && !title.includes(core)) {
      continue;
    }
    
    if (!hasCoreMatch) continue;
    
    // 容器类名词检查：如果核心产品是"XX包/袋/箱/盒"，商品标题必须包含容器类名词
    // 且不能是量词用法（一包、两包等）
    const containerWords = ['包', '袋', '箱', '盒', '套', '组'];
    const isContainerProduct = containerWords.some(cw => core.includes(cw));
    if (isContainerProduct) {
      // 检查标题里有没有容器类名词（不是量词用法）
      const measurePrefixes = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
      const nonNounSuffixes = ['邮', '头', '边', '角', '胶', '浆', '裹', '装'];
      
      let hasContainerNoun = false;
      for (const cw of containerWords) {
        let searchFrom = 0;
        while (searchFrom < title.length) {
          const idx = title.indexOf(cw, searchFrom);
          if (idx < 0) break;
          
          // 检查前缀（是否是量词）
          let isMeasure = false;
          if (idx > 0) {
            const prevChar = title[idx - 1];
            if (measurePrefixes.includes(prevChar) || /\d/.test(prevChar)) {
              isMeasure = true;
            }
          }
          // 检查后缀（是否是非名词用法）
          let isNonNoun = false;
          if (idx < title.length - 1) {
            const nextChar = title[idx + 1];
            if (nonNounSuffixes.includes(nextChar)) {
              isNonNoun = true;
            }
          }
          
          if (!isMeasure && !isNonNoun) {
            hasContainerNoun = true;
            break;
          }
          searchFrom = idx + 1;
        }
        if (hasContainerNoun) break;
      }
      
      if (!hasContainerNoun) continue;
    }
    
    // 计算相关性评分（用于排序，不影响是否通过）
    let relevanceScore = 0;
    // 完全匹配核心产品词 +10
    if (core && title.includes(core)) relevanceScore += 10;
    // 包含明确的"XX包"结构（前面不是量词）+5
    if (coreNoun && coreNoun.length === 1) {
      const idx = title.indexOf(coreNoun);
      if (idx > 0) {
        const prevChar = title[idx - 1];
        const measureWords = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
        if (!measureWords.includes(prevChar) && !/\d/.test(prevChar)) {
          relevanceScore += 5;
        }
      }
    } else if (coreNoun && coreNoun.length > 1 && title.includes(coreNoun)) {
      relevanceScore += 5;
    }
    // 类目匹配 +3
    if (categoryMatch) relevanceScore += 3;
    // 销量分（归一化到0-2分）
    const salesScore = Math.min(2, Math.log10((item.saleQuantity || item.orderCount || 0) + 1) / 3);
    relevanceScore += salesScore;
    
    result.push({
      id: String(item.offerId || ''),
      title: item.title || '',
      shop: item.company || '',
      model: item.companyType === 1 ? '生产加工' : item.companyType === 2 ? '经销批发' : '--',
      location: item.city || item.province || '',
      price: item.price || 0,
      sales: item.saleQuantity || item.orderCount || 0,
      img: item.image || '',
      link: 'https://detail.1688.com/offer/' + item.offerId + '.html',
      category: levelName,
      _relevance: relevanceScore,
      _raw: item
    });
  }
  
  // 排序：先按相关性评分降序，再按销量降序
  result.sort((a, b) => {
    const scoreDiff = (b._relevance || 0) - (a._relevance || 0);
    if (Math.abs(scoreDiff) > 0.01) return scoreDiff;
    return (b.sales || 0) - (a.sales || 0);
  });
  
  return result;
}

// ===== 从店雷达API获取商品 =====
async function fetchProductsFromAPI(keyword, aiResult) {
  const allProducts = [];
  const seenIds = new Set();
  const pageSize = 50;
  
  // 类目匹配（用levelName路径过滤，不用categoryId）
  let catConfig = null;
  let categoryLevelNames = [];
  
  if (aiResult && aiResult.category && aiResult.category.mainCategory) {
    const catName = aiResult.category.mainCategory;
    categoryLevelNames = getCategoryLevelNames(catName);
    if (categoryLevelNames.length > 0) {
      catConfig = { categoryName: catName, levelNames: categoryLevelNames };
    }
  }
  if (!catConfig) {
    catConfig = matchCategory(keyword);
    if (catConfig) {
      categoryLevelNames = catConfig.levelNames || [];
    }
  }
  
  // 搜索词策略：主关键词 + AI扩展的关键词（前5个，过滤掉不相关的） + 二级查询词
  const searchQueries = [keyword];
  if (aiResult && aiResult.expandedKeywords && aiResult.expandedKeywords.length > 0) {
    const catName = aiResult.category?.mainCategory || '';
    let filteredExpanded = filterRelevantKeywords(aiResult.expandedKeywords, aiResult.coreProduct || keyword, catName);
    // 如果过滤后剩余词太少（<3个），回退使用原始扩展词（避免搜索词太少导致没结果）
    if (filteredExpanded.length < 3 && aiResult.expandedKeywords.length > filteredExpanded.length) {
      filteredExpanded = aiResult.expandedKeywords.slice(0, 5);
    }
    searchQueries.push(...filteredExpanded.slice(0, 5));
    aiResult.expandedKeywords = filteredExpanded;
  }
  if (aiResult && aiResult.searchStrategy && aiResult.searchStrategy.secondaryQueries) {
    const catName = aiResult.category?.mainCategory || '';
    let filteredSecondary = filterRelevantKeywords(aiResult.searchStrategy.secondaryQueries, aiResult.coreProduct || keyword, catName);
    if (filteredSecondary.length < 2 && aiResult.searchStrategy.secondaryQueries.length > filteredSecondary.length) {
      filteredSecondary = aiResult.searchStrategy.secondaryQueries.slice(0, 3);
    }
    searchQueries.push(...filteredSecondary.slice(0, 3));
  }
  const uniqueQueries = [...new Set(searchQueries)];
  
  // 用顿号拼接所有搜索词，一次性传给API（与选品库关键词搜索一致）
  const combinedKeyword = uniqueQueries.join('、');
  
  try {
    const params = {
      pageSize: 50,
      keyWord: combinedKeyword,
      searchType: '1',
      sortField: 'orderCount30d',
      sortType: 'desc',
      cycle: 30,
      pageIndex: 1
    };
    
    const result = await callDianLeiDaAPI('search', params);
    
    if (result.code === 200 && result.result && result.result.list) {
      const products = processAPIProducts(
        result.result.list,
        aiResult ? aiResult.excludedKeywords : [],
        aiResult ? aiResult.requiredKeywords : [],
        aiResult ? aiResult.coreProduct : keyword,
        categoryLevelNames
      );
      for (const p of products) {
        if (!seenIds.has(p.id)) {
          seenIds.add(p.id);
          allProducts.push(p);
        }
      }
    }
  } catch (e) {
    console.warn('搜索失败:', e.message);
  }
  
  // ===== 兜底策略：如果结果太少，用类目热词或智能体categoryKeywords补充搜索 =====
  if (allProducts.length < 10) {
    let fallbackKeywords = [];
    if (catConfig && catConfig.fallbackKeywords) {
      fallbackKeywords = catConfig.fallbackKeywords;
    } else if (aiResult && aiResult.category && aiResult.category.categoryKeywords && aiResult.category.categoryKeywords.length > 0) {
      // 没有类目配置时，用智能体返回的categoryKeywords做兜底
      fallbackKeywords = aiResult.category.categoryKeywords;
    }
    
    if (fallbackKeywords.length > 0) {
      const combinedFallback = fallbackKeywords.join('、');
      try {
        const params = {
          pageSize: 30,
          keyWord: combinedFallback,
          searchType: '1',
        sortField: 'orderCount30d',
        sortType: 'desc',
        cycle: 30,
        pageIndex: 1
      };
      const result = await callDianLeiDaAPI('search', params);
      if (result.code === 200 && result.result && result.result.list) {
        const products = processAPIProducts(
          result.result.list,
          aiResult ? aiResult.excludedKeywords : [],
          aiResult ? aiResult.requiredKeywords : [],
          aiResult ? aiResult.coreProduct : keyword,
          categoryLevelNames
        );
        for (const p of products) {
          if (!seenIds.has(p.id)) {
            seenIds.add(p.id);
            allProducts.push(p);
          }
        }
      }
    } catch (e) {
      console.warn('兜底搜索失败:', e.message);
    }
    }
  }
  
  return allProducts;
}

let currentResults = [];
let isSearching = false;
let currentPage = 1;
const PAGE_SIZE = 24;

// ===== 搜索历史功能 =====
const HISTORY_KEY = 'dianleida_search_history';
const HISTORY_MAX = 10;

function getSearchHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  } catch(e) { return []; }
}

function saveSearchHistory(keyword) {
  let history = getSearchHistory();
  // 去重：移除已存在的相同词
  history = history.filter(item => item !== keyword);
  // 添加到最前面
  history.unshift(keyword);
  // 最多保留10条
  if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderSearchHistory();
}

function renderSearchHistory() {
  const history = getSearchHistory();
  const container = document.getElementById('search-history');
  const tagsContainer = document.getElementById('search-history-tags');
  if (history.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  tagsContainer.innerHTML = history.map(kw =>
    '<span class="history-tag" onclick="clickHistoryTag(\'' + kw.replace(/'/g, "\\'") + '\')">' + escapeHtml(kw) + '</span>'
  ).join('');
}

function clickHistoryTag(keyword) {
  document.getElementById('search-input').value = keyword;
  doSearch();
}

function clearSearchHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderSearchHistory();
}

// 页面加载时渲染历史

// ===== 添加分析步骤 =====
function addStep(icon, title, detail, tokens) {
  const stepsContainer = document.getElementById('ai-steps');
  const stepEl = document.createElement('div');
  stepEl.className = 'ai-step show completed';
  let tokensHtml = '';
  if (tokens && tokens.length > 0) {
    tokensHtml = '<div class="ai-step-tokens">' + tokens.map(t => '<span class="ai-token">' + escapeHtml(t) + '</span>').join('') + '</div>';
  }
  stepEl.innerHTML = `
    <span class="ai-step-icon">${icon}</span>
    <div class="ai-step-content">
      <div class="ai-step-title">${escapeHtml(title)}</div>
      <div class="ai-step-detail">${escapeHtml(detail)}</div>
      ${tokensHtml}
    </div>`;
  stepsContainer.appendChild(stepEl);
  return stepEl;
}

function addLoadingStep(icon, title) {
  const stepsContainer = document.getElementById('ai-steps');
  const stepEl = document.createElement('div');
  stepEl.className = 'ai-step show';
  stepEl.innerHTML = `
    <span class="ai-step-icon">${icon}</span>
    <div class="ai-step-content">
      <div class="ai-step-title">${escapeHtml(title)} <span class="loading-dots"><span></span><span></span><span></span></span></div>
    </div>`;
  stepsContainer.appendChild(stepEl);
  return stepEl;
}

function updateStep(stepEl, icon, title, detail, tokens) {
  let tokensHtml = '';
  if (tokens && tokens.length > 0) {
    tokensHtml = '<div class="ai-step-tokens">' + tokens.map(t => '<span class="ai-token">' + escapeHtml(t) + '</span>').join('') + '</div>';
  }
  stepEl.className = 'ai-step show completed';
  stepEl.innerHTML = `
    <span class="ai-step-icon">${icon}</span>
    <div class="ai-step-content">
      <div class="ai-step-title">${escapeHtml(title)}</div>
      <div class="ai-step-detail">${escapeHtml(detail)}</div>
      ${tokensHtml}
    </div>`;
}

// ===== 搜索主函数 =====
async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query || isSearching) return;

  isSearching = true;
  const btn = document.getElementById('search-btn');
  btn.disabled = true;

  // 保存搜索历史
  saveSearchHistory(query);

  // 显示结果区域
  const resultsSection = document.getElementById('results-section');
  resultsSection.classList.add('active');
  
  // 重置分析步骤
  document.getElementById('ai-steps').innerHTML = '';
  document.getElementById('analysis-loading').style.display = 'inline-flex';
  document.getElementById('analysis-sub').textContent = '正在启动AI分析引擎...';
  document.getElementById('product-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">正在搜索商品...</div>';
  
  resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // ===== Step 1: AI智能体分析 =====
  const step1 = addLoadingStep('🧠', 'Step 1: AI智能体分析');
  
  let aiResult = null;
  let aiSource = 'none';
  
  // 流式回调：实时更新分析内容
  function onAnalysisDelta(delta, fullText) {
    // 尝试从已有的内容中提取JSON并更新步骤
    try {
      const partial = fullText.substring(0, Math.min(fullText.length, 500));
      updateStep(step1, '🧠', 'Step 1: AI智能体分析中...', 
        '正在生成分析结果... ' + partial.replace(/[{\[\]"\\]/g, '').substring(0, 100) + '...'
      );
    } catch (e) {}
  }
  
  aiResult = await callCozeSearchAnalysis(query, onAnalysisDelta);
  if (aiResult) aiSource = 'coze';
  
  if (!aiResult) {
    aiResult = await callZhipuSearchAnalysis(query);
    if (aiResult) aiSource = 'zhipu';
  }
  
  if (!aiResult) {
    aiResult = ruleBasedAnalysis(query);
    aiSource = 'rule';
  }
  
  const sourceLabel = aiSource === 'coze' ? '扣子AI智能体' : aiSource === 'zhipu' ? '智谱AI大模型' : '规则引擎';
  const intentText = aiResult.intent || '明确找品';
  const catText = aiResult.category ? (aiResult.category.mainCategory + (aiResult.category.subCategory ? ' / ' + aiResult.category.subCategory : '')) : '未识别';
  const summary = aiResult.analysisSummary || '分析完成';
  const confidence = aiResult.intentConfidence ? '（置信度 ' + aiResult.intentConfidence + '）' : '';
  
  updateStep(step1, '✅', 'Step 1: ' + sourceLabel + '意图识别完成', 
    '意图：' + intentText + confidence + ' · 类目：' + catText,
    [sourceLabel, intentText].filter(Boolean)
  );

  // ===== Step 2: 核心词提取 =====
  await new Promise(r => setTimeout(r, 200));
  const coreProduct = aiResult.coreProduct || query;
  const modifiers = aiResult.modifiers || {};
  const allModifiers = [];
  if (modifiers.style) allModifiers.push(...modifiers.style);
  if (modifiers.material) allModifiers.push(...modifiers.material);
  if (modifiers.crowd) allModifiers.push(...modifiers.crowd);
  if (modifiers.scene) allModifiers.push(...modifiers.scene);
  if (modifiers.other) allModifiers.push(...modifiers.other);
  const tokens = allModifiers.length > 0 ? [coreProduct, ...allModifiers] : [coreProduct];
  const requiredKws = aiResult.requiredKeywords || [];
  
  let step2Detail = '核心产品：' + coreProduct;
  if (allModifiers.length > 0) step2Detail += ' · 修饰词：' + allModifiers.join('、');
  if (requiredKws.length > 0) step2Detail += ' · 必含词：' + requiredKws.join('、');
  
  addStep('🎯', 'Step 2: 核心词提取', step2Detail, tokens);

  // ===== Step 3: 关键词扩展与排除 =====
  await new Promise(r => setTimeout(r, 300));
  const expanded = aiResult.expandedKeywords || [];
  const excluded = aiResult.excludedKeywords || [];
  
  let step3Detail = '';
  let step3Tokens = [];
  
  if (expanded.length > 0) {
    step3Detail += '智能扩展 ' + expanded.length + ' 个搜索变体';
    step3Tokens = expanded.slice(0, 8);
  } else {
    step3Detail += '无需额外扩展';
  }
  if (excluded.length > 0) {
    step3Detail += ' · 排除 ' + excluded.length + ' 个不相关词';
  }
  
  addStep('🔗', 'Step 3: 关键词扩展与排除', step3Detail, step3Tokens);
  
  // 展示排除词（如果有的话）
  if (excluded.length > 0) {
    const excludedEl = document.createElement('div');
    excludedEl.style.cssText = 'margin-top:8px;font-size:12px;color:#9CA3AF;';
    excludedEl.innerHTML = '<span style="color:#9CA3AF;">排除词：</span>' + 
      excluded.slice(0, 6).map(k => '<span style="display:inline-block;padding:2px 8px;margin:2px;background:#FEF2F2;color:#EF4444;border-radius:10px;font-size:11px;">' + escapeHtml(k) + '</span>').join('');
    // 添加到最后一个步骤里
    const lastStep = document.getElementById('ai-steps').lastElementChild;
    if (lastStep) {
      const contentEl = lastStep.querySelector('.ai-step-content');
      if (contentEl) contentEl.appendChild(excludedEl);
    }
  }

  // ===== Step 4: 类目预测 =====
  await new Promise(r => setTimeout(r, 250));
  if (aiResult.category && aiResult.category.mainCategory) {
    addStep('📂', 'Step 4: 类目预测', 
      '预测类目：' + aiResult.category.mainCategory + (aiResult.category.subCategory ? ' / ' + aiResult.category.subCategory : '') +
      (aiResult.category.categoryId ? '（ID: ' + aiResult.category.categoryId + '）' : ''),
      aiResult.category.categoryKeywords || []
    );
  } else {
    addStep('📂', 'Step 4: 类目预测', '未匹配到明确类目，将进行全量搜索');
  }

  // ===== Step 5: 歧义检测 =====
  await new Promise(r => setTimeout(r, 250));
  const ambiguity = aiResult.ambiguity || {};
  if (ambiguity.hasAmbiguity && ambiguity.ambiguousTerms && ambiguity.ambiguousTerms.length > 0) {
    addStep('⚠️', 'Step 5: 歧义检测与消歧', 
      '检测到歧义：「' + ambiguity.ambiguousTerms.join('、') + '」→ ' + (ambiguity.resolutionStrategy || '已自动处理'),
      ambiguity.ambiguousTerms
    );
  } else {
    addStep('✅', 'Step 5: 歧义检测', '未检测到歧义词汇，搜索指向明确');
  }

  // ===== Step 6: 搜索策略生成 =====
  await new Promise(r => setTimeout(r, 200));
  const filters = [];
  if (modifiers.priceRange && (modifiers.priceRange.min || modifiers.priceRange.max)) {
    filters.push('价格: ' + (modifiers.priceRange.min || '0') + '-' + (modifiers.priceRange.max || '不限') + '元');
  }
  if (modifiers.material && modifiers.material.length > 0) filters.push('材质: ' + modifiers.material.join('、'));
  if (modifiers.crowd && modifiers.crowd.length > 0) filters.push('人群: ' + modifiers.crowd.join('、'));
  if (modifiers.scene && modifiers.scene.length > 0) filters.push('场景: ' + modifiers.scene.join('、'));
  
  const searchStrategy = aiResult.searchStrategy || {};
  let step6Detail = '';
  if (searchStrategy.filterHints) {
    step6Detail = searchStrategy.filterHints;
  } else if (filters.length > 0) {
    step6Detail = '识别到 ' + filters.length + ' 个筛选条件';
  } else {
    step6Detail = '未指定筛选条件，返回综合排序结果';
  }
  
  addStep('📋', 'Step 6: 搜索策略生成', step6Detail, filters.length > 0 ? filters : (searchStrategy.secondaryQueries || []).slice(0, 4));

  // ===== Step 7: 商品属性分析 =====
  await new Promise(r => setTimeout(r, 200));
  const productAttrs = aiResult.productAttrs || {};
  const attrTags = [];
  let attrDetail = '';
  
  // 兼容新的 tags 键值对结构
  if (productAttrs.tags && Array.isArray(productAttrs.tags)) {
    for (const tag of productAttrs.tags) {
      if (tag.name && tag.values && tag.values.length > 0) {
        const valuesStr = tag.values.join('、');
        attrDetail += (attrDetail ? ' · ' : '') + tag.name + '：' + valuesStr;
        // 跨境属性特殊处理
        if (tag.name === '跨境属性' && tag.targetMarket) {
          attrTags.push('跨境货源');
          attrTags.push('市场:' + tag.targetMarket);
        } else {
          attrTags.push(...tag.values);
        }
      }
    }
  }
  // 兼容旧版结构（如果智能体还没更新提示词）
  if (!productAttrs.tags && productAttrs.style) {
    const oldFields = [
      { key: 'style', label: '款式' },
      { key: 'fabric', label: '面料' },
      { key: 'length', label: '长度' },
      { key: 'collarType', label: '领型' },
      { key: 'sleeveLength', label: '袖长' },
      { key: 'pattern', label: '图案' },
      { key: 'season', label: '季节' },
      { key: 'fitType', label: '版型' },
      { key: 'designElements', label: '设计元素' }
    ];
    for (const field of oldFields) {
      if (productAttrs[field.key] && productAttrs[field.key].length > 0) {
        attrTags.push(...productAttrs[field.key]);
        attrDetail += (attrDetail ? ' · ' : '') + field.label + '：' + productAttrs[field.key].join('、');
      }
    }
    const cb = productAttrs.crossBorder;
    if (cb && cb.isCrossBorder) {
      attrTags.push('跨境货源');
      if (cb.targetMarket) attrTags.push('市场:' + cb.targetMarket);
      attrDetail += (attrDetail ? ' · ' : '') + '跨境：是' + (cb.targetMarket ? '（' + cb.targetMarket + '）' : '');
    }
  }
  
  if (attrDetail) {
    addStep('🏷️', 'Step 7: 商品属性分析', attrDetail, attrTags.slice(0, 8));
  } else {
    addStep('🏷️', 'Step 7: 商品属性分析', '未识别到具体商品属性，将使用通用搜索策略');
  }

  // ===== Step 8: 调用店雷达API获取商品 =====
  const step8 = addLoadingStep('📡', 'Step 8: 实时商品搜索');
  
  let products = [];
  try {
    products = await fetchProductsFromAPI(query, aiResult);
  } catch (e) {
    console.warn('API调用失败:', e.message);
  }
  
  if (products.length > 0) {
    // 构建搜索词展示
    const searchWords = [query];
    if (aiResult && aiResult.expandedKeywords) searchWords.push(...aiResult.expandedKeywords.slice(0, 3));
    const displaySearch = searchWords.join('、');
    updateStep(step8, '✅', 'Step 8: 实时商品搜索完成', 
      '搜索词：' + displaySearch + ' · 从1688实时获取 ' + products.length + ' 条商品数据',
      ['实时API', products.length + '件商品']
    );
  } else {
    updateStep(step8, '⚠️', 'Step 8: 商品搜索', 
      '暂未获取到商品数据，请稍后重试或更换关键词');
  }
  
  // 隐藏顶部loading
  document.getElementById('analysis-loading').style.display = 'none';
  document.getElementById('analysis-sub').textContent = 'AI智能分析完成，已为您精准匹配商品';

  // ===== 渲染商品 =====
  currentResults = products;
  renderProducts(products);
  
  isSearching = false;
  btn.disabled = false;
}

// ===== 渲染商品 =====
function renderProducts(products, page) {
  const total = products?.length || 0;
  document.getElementById('products-count').textContent = total + ' 件';
  const grid = document.getElementById('product-grid');
  const paginationEl = document.getElementById('pagination');
  
  if (!products || products.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">暂无相关商品，请尝试其他关键词</div>';
    paginationEl.style.display = 'none';
    return;
  }
  
  // 分页计算
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (!page) page = 1;
  if (page < 1) page = 1;
  if (page > totalPages) page = totalPages;
  currentPage = page;
  
  const start = (page - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageProducts = products.slice(start, end);
  
  grid.innerHTML = '';
  pageProducts.forEach(p => {
    const card = document.createElement('a');
    card.className = 'product-card';
    card.href = p.link || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    
    let imgHtml = '';
    if (p.img) {
      imgHtml = '<img class="product-img" src="' + escapeHtml(p.img) + '" alt="' + escapeHtml(p.title) + '" onerror="this.parentElement.innerHTML=\'<div class=\\\'product-img-placeholder\\\'>📦</div>\'">';
    } else {
      imgHtml = '<div class="product-img-placeholder">📦</div>';
    }
    
    card.innerHTML = `
      <div class="product-img-wrap">${imgHtml}</div>
      <div class="product-info">
        <div class="product-title">${escapeHtml(p.title)}</div>
        <div class="product-price">¥${p.price} <span>起批</span></div>
        <div class="product-meta">
          <span>销量 ${(p.sales || 0).toLocaleString()}</span>
          <span>${escapeHtml(p.location || '')}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  
  // 渲染分页
  renderPagination(total, totalPages, page);
  
  // 滚动到商品区域顶部
  grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== 渲染分页组件 =====
function renderPagination(total, totalPages, currentPage) {
  const paginationEl = document.getElementById('pagination');
  const pageNumbersEl = document.getElementById('page-numbers');
  const pageInfoEl = document.getElementById('page-info');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  
  if (totalPages <= 1) {
    paginationEl.style.display = 'none';
    return;
  }
  
  paginationEl.style.display = 'flex';
  
  // 上一页按钮
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
  
  // 页码信息
  pageInfoEl.textContent = `共 ${total} 件 · 第 ${currentPage}/${totalPages} 页`;
  
  // 更新跳转输入框的值和最大值
  const jumpInput = document.getElementById('jump-input');
  if (jumpInput) {
    jumpInput.value = currentPage;
    jumpInput.max = totalPages;
  }
  
  // 生成页码
  let pages = [];
  const showPages = 5; // 显示多少个页码
  
  if (totalPages <= showPages + 2) {
    // 页数不多，全部显示
    for (let i = 1; i <= totalPages; i++) {
      pages.push(i);
    }
  } else {
    // 页数多，显示省略号
    if (currentPage <= 3) {
      // 当前页在前面
      pages = [1, 2, 3, 4, '...', totalPages];
    } else if (currentPage >= totalPages - 2) {
      // 当前页在后面
      pages = [1, '...', totalPages - 3, totalPages - 2, totalPages - 1, totalPages];
    } else {
      // 当前页在中间
      pages = [1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages];
    }
  }
  
  pageNumbersEl.innerHTML = '';
  pages.forEach(p => {
    const span = document.createElement('span');
    if (p === '...') {
      span.className = 'page-num ellipsis';
      span.textContent = '...';
    } else {
      span.className = 'page-num' + (p === currentPage ? ' active' : '');
      span.textContent = p;
      span.onclick = () => goToPage(p);
    }
    pageNumbersEl.appendChild(span);
  });
}

// ===== 翻页 =====
function changePage(delta) {
  goToPage(currentPage + delta);
}

function goToPage(page) {
  if (!currentResults || currentResults.length === 0) return;
  renderProducts(currentResults, page);
}

// ===== 跳转到指定页 =====
function jumpToPage() {
  const input = document.getElementById('jump-input');
  if (!input) return;
  const page = parseInt(input.value);
  const totalPages = Math.ceil(currentResults.length / pageSize);
  if (!isNaN(page) && page >= 1 && page <= totalPages) {
    goToPage(page);
  } else {
    input.value = currentPage;
  }
}

// ===== 快捷搜索 =====
function quickSearch(keyword) {
  document.getElementById('search-input').value = keyword;
  doSearch();
}

// ===== 回车搜索 =====
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
});

// ===== 跳转输入框回车跳转 =====
document.addEventListener('DOMContentLoaded', function() {
  const jumpInput = document.getElementById('jump-input');
  if (jumpInput) {
    jumpInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        jumpToPage();
      }
    });
  }
});

// ===== 排序切换 =====
document.getElementById('sort-filter').addEventListener('click', function(e) {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#sort-filter .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  
  const sort = e.target.dataset.sort;
  let sorted = [...currentResults];
  if (sort === 'sales') sorted.sort((a, b) => (b.sales || 0) - (a.sales || 0));
  else if (sort === 'price-low') sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
  else if (sort === 'price-high') sorted.sort((a, b) => (b.price || 0) - (a.price || 0));
  currentResults = sorted;
  renderProducts(sorted, 1);
});
</script>
