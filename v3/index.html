// 内置MD5实现（备用，防止CDN加载失败）
(function() {
  function safeAdd(x, y) {
    var lsw = (x & 0xFFFF) + (y & 0xFFFF);
    var msw = (x >> 16) + (y >> 16) + (lsw >> 16);
    return (msw << 16) | (lsw & 0xFFFF);
  }
  function bitRol(num, cnt) {
    return (num << cnt) | (num >>> (32 - cnt));
  }
  function md5cmn(q, a, b, x, s, t) {
    return safeAdd(bitRol(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b);
  }
  function md5ff(a, b, c, d, x, s, t) { return md5cmn((b & c) | ((~b) & d), a, b, x, s, t); }
  function md5gg(a, b, c, d, x, s, t) { return md5cmn((b & d) | (c & (~d)), a, b, x, s, t); }
  function md5hh(a, b, c, d, x, s, t) { return md5cmn(b ^ c ^ d, a, b, x, s, t); }
  function md5ii(a, b, c, d, x, s, t) { return md5cmn(c ^ (b | (~d)), a, b, x, s, t); }
  function coreMD5(x, len) {
    x[len >> 5] |= 0x80 << (len % 32);
    x[(((len + 64) >>> 9) << 4) + 14] = len;
    var a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
    for (var i = 0; i < x.length; i += 16) {
      var olda = a, oldb = b, oldc = c, oldd = d;
      a = md5ff(a, b, c, d, x[i], 7, -680876936);
      d = md5ff(d, a, b, c, x[i+1], 12, -389564586);
      c = md5ff(c, d, a, b, x[i+2], 17, 606105819);
      b = md5ff(b, c, d, a, x[i+3], 22, -1044525330);
      a = md5ff(a, b, c, d, x[i+4], 7, -176418897);
      d = md5ff(d, a, b, c, x[i+5], 12, 1200080426);
      c = md5ff(c, d, a, b, x[i+6], 17, -1473231341);
      b = md5ff(b, c, d, a, x[i+7], 22, -45705983);
      a = md5ff(a, b, c, d, x[i+8], 7, 1770035416);
      d = md5ff(d, a, b, c, x[i+9], 12, -1958414417);
      c = md5ff(c, d, a, b, x[i+10], 17, -42063);
      b = md5ff(b, c, d, a, x[i+11], 22, -1990404162);
      a = md5ff(a, b, c, d, x[i+12], 7, 1804603682);
      d = md5ff(d, a, b, c, x[i+13], 12, -40341101);
      c = md5ff(c, d, a, b, x[i+14], 17, -1502002290);
      b = md5ff(b, c, d, a, x[i+15], 22, 1236535329);
      a = md5gg(a, b, c, d, x[i+1], 5, -165796510);
      d = md5gg(d, a, b, c, x[i+6], 9, -1069501632);
      c = md5gg(c, d, a, b, x[i+11], 14, 643717713);
      b = md5gg(b, c, d, a, x[i], 20, -373897302);
      a = md5gg(a, b, c, d, x[i+5], 5, -701558691);
      d = md5gg(d, a, b, c, x[i+10], 9, 38016083);
      c = md5gg(c, d, a, b, x[i+15], 14, -660478335);
      b = md5gg(b, c, d, a, x[i+4], 20, -405537848);
      a = md5gg(a, b, c, d, x[i+9], 5, 568446438);
      d = md5gg(d, a, b, c, x[i+14], 9, -1019803690);
      c = md5gg(c, d, a, b, x[i+3], 14, -187363961);
      b = md5gg(b, c, d, a, x[i+8], 20, 1163531501);
      a = md5gg(a, b, c, d, x[i+13], 5, -1444681467);
      d = md5gg(d, a, b, c, x[i+2], 9, -51403784);
      c = md5gg(c, d, a, b, x[i+7], 14, 1735328473);
      b = md5gg(b, c, d, a, x[i+12], 20, -1926607734);
      a = md5hh(a, b, c, d, x[i+5], 4, -378558);
      d = md5hh(d, a, b, c, x[i+8], 11, -2022574463);
      c = md5hh(c, d, a, b, x[i+11], 16, 1839030562);
      b = md5hh(b, c, d, a, x[i+14], 23, -35309556);
      a = md5hh(a, b, c, d, x[i+1], 4, -1530992060);
      d = md5hh(d, a, b, c, x[i+4], 11, 1272893353);
      c = md5hh(c, d, a, b, x[i+7], 16, -155497632);
      b = md5hh(b, c, d, a, x[i+10], 23, -1094730640);
      a = md5hh(a, b, c, d, x[i+13], 4, 681279174);
      d = md5hh(d, a, b, c, x[i], 11, -358537222);
      c = md5hh(c, d, a, b, x[i+3], 16, -722521979);
      b = md5hh(b, c, d, a, x[i+6], 23, 76029189);
      a = md5hh(a, b, c, d, x[i+9], 4, -640364487);
      d = md5hh(d, a, b, c, x[i+12], 11, -421815835);
      c = md5hh(c, d, a, b, x[i+15], 16, 530742520);
      b = md5hh(b, c, d, a, x[i+2], 23, -995338651);
      a = md5ii(a, b, c, d, x[i], 6, -198630844);
      d = md5ii(d, a, b, c, x[i+7], 10, 1126891415);
      c = md5ii(c, d, a, b, x[i+14], 15, -1416354905);
      b = md5ii(b, c, d, a, x[i+5], 21, -57434055);
      a = md5ii(a, b, c, d, x[i+12], 6, 1700485571);
      d = md5ii(d, a, b, c, x[i+3], 10, -1894986606);
      c = md5ii(c, d, a, b, x[i+10], 15, -1051523);
      b = md5ii(b, c, d, a, x[i+1], 21, -2054922799);
      a = md5ii(a, b, c, d, x[i+8], 6, 1873313359);
      d = md5ii(d, a, b, c, x[i+15], 10, -30611744);
      c = md5ii(c, d, a, b, x[i+6], 15, -1560198380);
      b = md5ii(b, c, d, a, x[i+13], 21, 1309151649);
      a = md5ii(a, b, c, d, x[i+4], 6, -145523070);
      d = md5ii(d, a, b, c, x[i+11], 10, -1120210379);
      c = md5ii(c, d, a, b, x[i+2], 15, 718787259);
      b = md5ii(b, c, d, a, x[i+9], 21, -343485551);
      a = safeAdd(a, olda); b = safeAdd(b, oldb);
      c = safeAdd(c, oldc); d = safeAdd(d, oldd);
    }
    return [a, b, c, d];
  }
  function md5cycle(x) {
    var k = [], AA, BB, CC, DD;
    x = x.replace(/[\x80-\xFF]/g, function(c) {
      return '%u00' + c.charCodeAt(0).toString(16);
    });
    x = unescape(encodeURIComponent(x));
    for (var i = 0; i < x.length * 8; i += 8)
      k[i >> 5] |= (x.charCodeAt(i / 8) & 0xFF) << (i % 32);
    var res = coreMD5(k, x.length * 8);
    var hex_chr = '0123456789abcdef';
    var str = '';
    for (var j = 0; j < res.length * 4; j++) {
      str += hex_chr.charAt((res[j >> 2] >> ((j % 4) * 8 + 4)) & 0x0F) +
             hex_chr.charAt((res[j >> 2] >> ((j % 4) * 8)) & 0x0F);
    }
    return str;
  }
  window._MD5 = md5cycle;
})();
function getMD5(str) {
  if (typeof CryptoJS !== 'undefined' && CryptoJS.MD5) return CryptoJS.MD5(str).toString();
  return window._MD5(str);
}
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== 智能拆词函数（前端降级用，智能体没返回时本地计算）=====
function smartTokenize(keyword) {
  if (!keyword) return [];
  const kw = keyword.trim();
  if (kw.length <= 2) return [kw];
  
  // 平台/场景词（这些不是商品词，是修饰属性）
  const platformSceneWords = [
    '跨境电商', '外贸出口', '跨境专供', '出口外贸',
    '跨境', '亚马逊', '外贸', '速卖通', '出口', '独立站',
    'ebay', 'temu', 'shein', 'shopee', 'lazada', 'wish',
    '户外', '厨房', '办公', '家用', '车载', '旅行', '运动', '健身',
    '热销', '爆款', '新款', '新品'
  ];
  
  // 品牌词（这些是品牌名，不是商品词，需要保留为独立词参与AND匹配）
  const brandWords = [
    // 母婴品牌
    'babycare', '全棉时代', '好奇', '帮宝适', '花王', '大王', '尤妮佳',
    '可心柔', '德佑', '十月结晶', '子初', '好孩子', '英氏', '巴拉巴拉',
    '安慕斯', '洁柔', '维达', '清风', '心相印', '舒洁', '棉柔世家',
    // 3C品牌
    '小米', '华为', '苹果', 'apple', '三星', 'oppo', 'vivo', '荣耀',
    '飞利浦', '公牛', '小米', '绿联', '倍思', 'anker', '品胜',
    // 运动品牌
    'nike', '耐克', 'adidas', '阿迪达斯', '李宁', '安踏', '特步', '361',
    // 其他知名品牌
    '无印良品', 'muji', '优衣库', 'uniqlo', '名创优品', 'miniso',
    '迪士尼', 'disney', 'hellokitty', '三丽鸥',
    '星巴克', 'starbucks',
  ].map(w => w.toLowerCase());
  
  // 常见商品后缀词（核心名词）
  const productSuffixes = [
    // 包袋类
    '麻将包', '帆布包', '托特包', '手提包', '单肩包', '双肩包', '斜挎包',
    '零钱包', '手机包', '胸包', '腰包', '钱包', '卡包', '化妆包',
    '公文包', '电脑包', '书包', '背包', '挎包', '拎包',
    '女包', '男包', '包包', '皮包', '布包',
    '包', '袋', '箱', '盒',
    // 3C配件类
    '手机壳', '手机套', '保护壳', '保护套', '手机膜', '钢化膜',
    '充电器', '数据线', '充电线', '充电宝', '耳机', '蓝牙音箱',
    // 服装类
    'T恤', '衬衫', '外套', '裤子', '裙子', '连衣裙', '半身裙',
    '卫衣', '毛衣', '羽绒服', '风衣', '大衣', '夹克',
    '衣服', '服装', '上衣', '下装',
    // 鞋类
    '运动鞋', '高跟鞋', '平底鞋', '凉鞋', '拖鞋', '靴子', '帆布鞋',
    '鞋子', '女鞋', '男鞋', '童鞋',
    // 饰品类
    '耳环', '项链', '手链', '戒指', '手镯', '胸针', '发夹', '发圈',
    '饰品', '首饰',
    // 家居日用
    '杯子', '水杯', '保温杯', '马克杯', '玻璃杯', '塑料杯',
    '枕头', '抱枕', '靠垫', '坐垫', '地毯', '地垫',
    '毛巾', '浴巾', '牙刷', '牙膏', '香皂', '洗衣液',
    // 文具办公
    '笔记本', '本子', '文具', '钢笔', '圆珠笔', '铅笔', '橡皮',
    '文件夹', '文件袋', '订书机', '计算器',
    // 玩具礼品
    '玩具', '公仔', '玩偶', '毛绒玩具', '积木', '拼图',
    '礼品', '礼物', '纪念品',
    // 电工电气
    '插座', '开关', '插头', '插排', '接线板', '断路器', '漏保',
    // 其他
    '袜子', '帽子', '围巾', '手套', '腰带', '领带',
    '伞', '雨伞', '太阳镜', '眼镜', '手表', '钟',
    '厨房用品', '收纳盒', '收纳箱', '整理箱'
  ];
  
  // 常见修饰词前缀
  const modifierPrefixes = [
    // 平台/渠道
    '跨境', '亚马逊', '外贸', '速卖通', '出口', '独立站',
    'ebay', 'temu', 'shein', 'shopee', 'lazada', 'wish',
    // 属性/材质
    '透明', '加厚', '防水', '折叠', '便携', '防摔', '耐磨',
    '透气', '吸汗', '保暖', '清凉', '柔软', '硬壳', '软壳',
    'PVC', '硅胶', '不锈钢', '棉麻', '真皮', '帆布', '尼龙',
    '皮质', '布艺', '塑料', '玻璃', '陶瓷', '木质', '金属',
    // 人群
    '女', '男', '儿童', '宝宝', '成人', '老人', '学生', '女士', '男士',
    '女童', '男童', '婴儿', '幼儿',
    // 款式/风格
    '创意', '复古', '简约', '可爱', '网红', 'ins', '时尚', '百搭',
    '韩版', '日系', '欧美', '国风', '英伦', '法式', '休闲', '商务',
    '运动', '户外', '家用', '办公', '车载', '旅行',
    // 季节
    '夏季', '冬季', '春秋', '四季', '春夏', '秋冬', '春天', '夏天', '秋天', '冬天',
    // 功能/规格
    '86型', '118型', '120型',
    '大容量', '小号', '大号', '中号', '迷你', '超薄', '超大',
    '多功能', '智能', '电动', '手动', '自动', '遥控',
    // 颜色
    '黑色', '白色', '红色', '蓝色', '绿色', '黄色', '粉色', '紫色',
    '透明', '彩色', '纯色', '印花', '渐变'
  ];
  
  const tokens = [];
  let remaining = kw;
  
  // 第零步：先识别品牌词（品牌名要作为独立词保留，参与AND匹配）
  const sortedBrands = [...brandWords].sort((a, b) => b.length - a.length);
  const foundBrandWords = [];
  for (const bw of sortedBrands) {
    const idx = remaining.toLowerCase().indexOf(bw);
    if (idx >= 0) {
      foundBrandWords.push(remaining.substring(idx, idx + bw.length));
      remaining = remaining.substring(0, idx) + remaining.substring(idx + bw.length);
    }
  }
  
  // 第一步：先去掉平台/场景词（这些是修饰，不是核心商品词）
  const sortedPlatform = [...platformSceneWords].sort((a, b) => b.length - a.length);
  const foundPlatformWords = [];
  for (const pw of sortedPlatform) {
    const idx = remaining.toLowerCase().indexOf(pw.toLowerCase());
    if (idx >= 0) {
      foundPlatformWords.push(remaining.substring(idx, idx + pw.length));
      remaining = remaining.substring(0, idx) + remaining.substring(idx + pw.length);
    }
  }
  
  // 第二步：找商品后缀词（从长到短匹配）
  const sortedSuffixes = [...productSuffixes].sort((a, b) => b.length - a.length);
  let foundProduct = '';
  for (const suffix of sortedSuffixes) {
    const idx = remaining.indexOf(suffix);
    if (idx >= 0) {
      foundProduct = suffix;
      // 提取前面的修饰部分
      const before = remaining.substring(0, idx);
      const after = remaining.substring(idx + suffix.length);
      remaining = before + after;
      break;
    }
  }
  
  // 第三步：从剩余部分中提取修饰词
  const foundModifiers = [];
  const sortedModifiers = [...modifierPrefixes].sort((a, b) => b.length - a.length);
  for (const mod of sortedModifiers) {
    const idx = remaining.indexOf(mod);
    if (idx >= 0) {
      foundModifiers.push(mod);
      remaining = remaining.substring(0, idx) + remaining.substring(idx + mod.length);
    }
  }
  
  // 第四步：如果还有剩余且长度>=2，也作为一个词
  if (remaining.length >= 2) {
    foundModifiers.unshift(remaining);
  }
  
  // 组装结果：核心商品词在前，修饰词在中，品牌词随后，平台词最后
  if (foundProduct) {
    tokens.push(foundProduct);
  }
  for (const m of foundModifiers) {
    if (m && !tokens.includes(m)) {
      tokens.push(m);
    }
  }
  for (const b of foundBrandWords) {
    if (b && !tokens.includes(b)) {
      tokens.push(b);
    }
  }
  for (const p of foundPlatformWords) {
    if (p && !tokens.includes(p)) {
      tokens.push(p);
    }
  }
  
  // 如果啥也没拆出来，就返回原词
  if (tokens.length === 0) {
    return [kw];
  }
  
  return tokens;
}

// 为扩展词生成拆词组（降级用）
function generateExpandedTokenGroups(expandedWords, originalTokens) {
  if (!expandedWords || expandedWords.length === 0) return [];
  return expandedWords.map(word => {
    const tokens = smartTokenize(word);
    return { word, tokens };
  });
}

function generateApiSign(params){
  const sortedKeys=Object.keys(params).filter(k=>params[k]!==null&&params[k]!==undefined&&k!=='sign').sort();
  const parts=sortedKeys.map(k=>{
    let v=params[k];
    if(Array.isArray(v)){v='['+v.join(',')+']';}

  });
  const signStr='appSecret='+API_APP_SECRET+'&'+parts.join('&')+'&appSecret='+API_APP_SECRET;

// 流式解析SSE响应
function parseSSE(response, onMessage, onComplete, onError) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';
  let eventType = null;
  
  function processLine(line) {
    if (line.startsWith('event:')) {
      eventType = line.substring(6).trim();
    } else if (line.startsWith('data:')) {
      const dataStr = line.substring(5).trim();
      if (dataStr === '[DONE]') {
        onComplete && onComplete();
        return;
      }
      try {
        const data = JSON.parse(dataStr);
        onMessage && onMessage(eventType, data);
      } catch (e) {
        // 忽略解析失败的行
      }
    }
  }
  
  function read() {
    reader.read().then(({ done, value }) => {
      if (done) {
        onComplete && onComplete();
        return;
      }
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      
      for (const line of lines) {
        if (line.trim()) {
          processLine(line.trim());
        }
      }
      
      read();
    }).catch(err => {
      onError && onError(err);
    });
  }
  
  read();
}

async function callCozeBot(botId, query, onStreamDelta) {
  if (!USE_COZE_AGENT || !COZE_API_TOKEN || !botId) return null;
  
  addDebugLog(`调用智能体[${botId}]: "${query}"`);
  
  try {
    const chatBody = JSON.stringify({
      bot_id: botId,
      user_id: 'dianleida_web_' + Date.now(),
      stream: true,
      auto_save_history: true,
      additional_messages: [
        { role: 'user', content: query, content_type: 'text' }
      ]
    });
    
    addDebugLog('发起流式对话请求（超时60秒）...');
    
    // 超时控制：60秒未完成则中断
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);
    
    const response = await fetch(COZE_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + COZE_API_TOKEN,
        'Accept': 'text/event-stream'
      },
      body: chatBody,
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    
    if (!response.ok) {
      const errText = await response.text().catch(() => '');
      throw new Error('HTTP ' + response.status + ': ' + errText.substring(0, 200));
    }
    
    return new Promise((resolve, reject) => {
      let answerContent = '';  // 只保存answer类型的消息
      let hasError = false;
      let errorMsg = '';
      let answerStarted = false;
      
      // SSE解析超时：90秒未完成则强制结束
      const sseTimeoutId = setTimeout(() => {
        addDebugLog('SSE解析超时90秒，强制结束');
        if (answerContent && answerContent.length > 10) {
          // 超时但有内容，尝试用已有内容解析
          try {
            const json = extractJSON(answerContent);
            if (json) {
              addDebugLog('超时但提取到JSON，返回结果');
              resolve(json);
              return;
            }
          } catch(e) {}
        }
        reject(new Error('智能体分析超时（90秒），请重试'));
      }, 90000);
      
      parseSSE(
        response,
        // onMessage
        (eventType, data) => {
          addDebugLog(`事件: ${eventType}, type: ${data.type || 'unknown'}`);
          
          if (eventType === 'conversation.message.delta') {
            // 只处理answer类型的消息，忽略其他类型（time_capsule_recall, generate_answer_finish等）
            const msgType = data.type || '';
            const content = data.content || '';
            
            if (msgType === 'answer') {
              answerStarted = true;
              answerContent += content;
              if (onStreamDelta) {
                onStreamDelta(content, answerContent);
              }
            } else if (!answerStarted && msgType === '' && content) {
              // 有些情况下type字段可能在其他位置，尝试判断内容是否像JSON
              if (content.trim().startsWith('{') || answerContent.length > 0) {
                answerContent += content;
                if (onStreamDelta) {
                  onStreamDelta(content, answerContent);
                }
              }
            }
          } else if (eventType === 'conversation.message.completed') {
            // 消息完成
            const msgType = data.type || '';
            addDebugLog(`消息完成, type: ${msgType}`);
          } else if (eventType === 'conversation.chat.failed') {
            hasError = true;
            const lastError = data.last_error || {};
            errorMsg = lastError.msg || '未知错误';
            addDebugLog(`对话失败: ${errorMsg}`);
          }
        },
        // onComplete
        () => {
          clearTimeout(sseTimeoutId);
          if (hasError) {
            reject(new Error(errorMsg || '扣子智能体调用失败'));
            return;
          }
          
          addDebugLog(`流式完成，回答内容长度: ${answerContent.length}`);
          
          // 如果answerContent为空，尝试从所有内容中提取
          let contentToParse = answerContent;
          if (!contentToParse || contentToParse.length < 10) {
            addDebugLog('answer内容为空，尝试从完整内容中提取JSON');
            // 这里我们无法获取完整内容了，因为之前过滤了
            // 直接返回失败，让fallback处理
            reject(new Error('未获取到有效的回答内容'));
            return;
          }
          
          // 尝试解析JSON
          try {
            const result = JSON.parse(contentToParse);
            addDebugLog('JSON解析成功');
            resolve(result);
          } catch (e) {
            addDebugLog('直接解析失败，尝试提取第一个完整JSON...');
            
            // 用括号匹配法找第一个完整的JSON对象
            let depth = 0;
            let start = -1;
            let end = -1;
            for (let i = 0; i < contentToParse.length; i++) {
              if (contentToParse[i] === '{') {
                if (depth === 0) start = i;
                depth++;
              } else if (contentToParse[i] === '}') {
                depth--;
                if (depth === 0 && start >= 0) {
                  end = i;
                  break;
                }
              }
            }
            
            if (start >= 0 && end > start) {
              const extracted = contentToParse.substring(start, end + 1);
              try {
                const result = JSON.parse(extracted);
                addDebugLog('提取第一个JSON对象成功，长度: ' + extracted.length);
                resolve(result);
                return;
              } catch (e2) {
                addDebugLog('提取的JSON解析失败: ' + e2.message);
              }
            }
            
            // 如果第一个JSON解析失败，尝试最后一个
            addDebugLog('尝试提取最后一个JSON...');
            let lastStart = -1;
            let lastEnd = -1;
            depth = 0;
            for (let i = contentToParse.length - 1; i >= 0; i--) {
              if (contentToParse[i] === '}') {
                if (depth === 0) lastEnd = i;
                depth++;
              } else if (contentToParse[i] === '{') {
                depth--;
                if (depth === 0 && lastEnd >= 0) {
                  lastStart = i;
                  break;
                }
              }
            }
            
            if (lastStart >= 0 && lastEnd > lastStart) {
              const extracted = contentToParse.substring(lastStart, lastEnd + 1);
              try {
                const result = JSON.parse(extracted);
                addDebugLog('提取最后一个JSON对象成功，长度: ' + extracted.length);
                resolve(result);
                return;
              } catch (e3) {
                addDebugLog('最后一个JSON解析也失败: ' + e3.message);
              }
            }
            
            addDebugLog('所有JSON解析尝试失败，原始内容前300字: ' + contentToParse.substring(0, 300));
            reject(new Error('返回内容不是有效的JSON格式'));
          }
        },
        // onError
        (err) => {
          addDebugLog('流式读取失败: ' + err.message);
          reject(err);
        }
      );
    });
    
  } catch (e) {
    addDebugLog('最终失败: ' + e.message);
    console.warn('[Coze AI] 调用失败:', e.message);
    return null;
  }
}

// ===== 并行调用两个智能体 =====
// 类目智能体 + 关键词智能体，并行请求，最后合并结果
// 返回 { result, categoryTime, keywordTime }
async function callCozeSearchAnalysis(query, onStreamDelta) {
  if (!USE_COZE_AGENT || !COZE_API_TOKEN) return { result: null, categoryTime: 0, keywordTime: 0 };
  
  COZE_DEBUG_LOG = [];
  addDebugLog(`并行启动两个智能体: "${query}"`);
  
  const categoryStart = performance.now();
  const keywordStart = performance.now();
  let categoryTime = 0;
  let keywordTime = 0;
  
  // 同时发起两个请求
  const categoryPromise = callCozeBot(COZE_CATEGORY_BOT_ID, query, null).then(r => {
    categoryTime = performance.now() - categoryStart;
    addDebugLog('类目智能体完成，耗时: ' + formatDuration(categoryTime));
    return r;
  }).catch(e => {
    categoryTime = performance.now() - categoryStart;
    addDebugLog('类目智能体失败: ' + e.message);
    return null;
  });
  
  const keywordPromise = callCozeBot(COZE_KEYWORD_BOT_ID, query, onStreamDelta).then(r => {
    keywordTime = performance.now() - keywordStart;
    addDebugLog('搜索词智能体完成，耗时: ' + formatDuration(keywordTime));
    return r;
  }).catch(e => {
    keywordTime = performance.now() - keywordStart;
    addDebugLog('搜索词智能体失败: ' + e.message);
    return null;
  });
  
  // 等两个都返回
  const [categoryResult, keywordResult] = await Promise.all([categoryPromise, keywordPromise]);
  
  // 合并结果
  const merged = {};
  
  // 优先用关键词智能体的结果作为基底
  if (keywordResult) {
    Object.assign(merged, keywordResult);
  }
  
  // 类目数据用类目智能体的结果覆盖
  if (categoryResult) {
    if (categoryResult.category) merged.category = categoryResult.category;
    if (categoryResult.categoryTree !== undefined) merged.categoryTree = categoryResult.categoryTree;
  }
  
  // 兜底：如果两个都失败，返回 null
  if (!keywordResult && !categoryResult) {
    addDebugLog('两个智能体都失败了');
    return { result: null, categoryTime, keywordTime };
  }
  
  // 补全默认结构，避免后面报错
  if (!merged.category) {
    merged.category = { mainCategory: '', subCategory: '', categoryId: '', categoryKeywords: [], levelNames: [] };
  }
  if (!merged.categoryTree) merged.categoryTree = [];
  if (!merged.coreProduct) merged.coreProduct = query;
  if (!merged.modifiers) {
    merged.modifiers = { style: [], material: [], crowd: [], scene: [] };
  }
  if (!merged.expandedKeywords) merged.expandedKeywords = [];
  if (!merged.excludedKeywords) merged.excludedKeywords = [];
  if (!merged.requiredKeywords) merged.requiredKeywords = [];
  
  addDebugLog('双智能体合并完成');
  return { result: merged, categoryTime, keywordTime };
}

// ===== 简单规则引擎（最后兜底）=====
function ruleBasedAnalysis(query) {
  const bagPatterns = ['包', '袋', '箱'];
  const isBag = bagPatterns.some(p => query.includes(p));
  let mainCategory = '全部分类', subCategory = '';
  let expanded = [query];
  let excluded = [];
  let categoryId = '';
  
  if (isBag) {
    mainCategory = '箱包皮具';
    subCategory = '女士包袋';
    categoryId = '1001';
    expanded = [query + ' 女包', query + ' 箱包', '新款' + query, '时尚' + query];
    excluded = ['材料包', '包装袋', '礼品袋', '工具包', '配件包', '压缩包'];
  }
  
  return {
    category: { mainCategory, subCategory, categoryId, categoryKeywords: [] },
    coreProduct: query,
    modifiers: { style: [], material: [], crowd: [], scene: [], priceRange: {min:null,max:null}, other: [] },
    expandedKeywords: expanded,
    excludedKeywords: excluded,
    requiredKeywords: [query]
  };
}

// ===== 扩展词相关性过滤 =====
function filterRelevantKeywords(expandedKeywords, coreProduct, categoryName, originalQuery) {
  if (!expandedKeywords || expandedKeywords.length === 0) return [];
  
  const core = coreProduct || '';
  const cat = categoryName || '';
  const query = originalQuery || '';
  
  // 从原始搜索词中提取核心限定词（去掉核心商品词后剩下的）
  let modifierWords = [];
  if (query && core) {
    // 去掉核心商品词，剩余部分按常见分隔符切分
    let remaining = query.replace(core, '').trim();
    // 常见修饰词模式：跨境、外贸、亚马逊、户外、透明、86型、PVC、折叠、加厚等
    const modifierPatterns = [
      /跨境|外贸|亚马逊|速卖通|出口|海外/,
      /户外|露营|钓鱼|运动|健身|厨房|办公|家用/,
      /透明|磨砂|加厚|防水|折叠|便携|迷你|大号|小号/,
      /86型|118型|120型|明装|暗装|墙壁/,
      /PVC|硅胶|不锈钢|真皮|棉麻|亚克力|尼龙|帆布/,
      /女|男|儿童|宝宝|婴儿|老人|成人/,
      /新款|爆款|热销|批发|厂家直销|现货/,
    ];
    for (const p of modifierPatterns) {
      const m = remaining.match(p);
      if (m) modifierWords.push(m[0]);
    }
    // 也从整句里抓，避免位置问题
    for (const p of modifierPatterns) {
      const m = query.match(p);
      if (m && !modifierWords.includes(m[0])) modifierWords.push(m[0]);
    }
  }
  
  // 提取核心产品的关键词（去掉修饰词，保留核心名词）
  let coreNouns = [];
  
  // 常见核心名词模式
  const nounPatterns = [
    /手机壳|手机套|保护壳|保护套/,
    /包|袋|箱/,
    /衣服|服装|外套|t恤|衬衫|裤子|裙子|女装|男装|童装/,
    /鞋|靴/,
    /帽|围巾|手套/,
    /饰品|耳环|项链|手链|戒指/,
    /数码|电子|配件/,
    /插座|开关|面板/,
  ];
  
  for (const pattern of nounPatterns) {
    const match = core.match(pattern);
    if (match) {
      coreNouns.push(match[0]);
      break;
    }
  }
  
  // 如果没匹配到，就用整个coreProduct作为核心词
  if (coreNouns.length === 0 && core) {
    coreNouns.push(core);
  }
  
  // 过滤规则：扩展词必须包含至少一个核心名词，并且如果有限定词也要保留
  const filtered = expandedKeywords.filter(kw => {
    const lowerKw = kw.toLowerCase();
    
    // 必须包含核心产品词的一部分
    let hasCoreWord = false;
    for (const noun of coreNouns) {
      if (lowerKw.includes(noun.toLowerCase())) {
        hasCoreWord = true;
        break;
      }
    }
    
    // 或者包含完整搜索词
    if (!hasCoreWord && core && lowerKw.includes(core.toLowerCase())) {
      hasCoreWord = true;
    }
    
    if (!hasCoreWord) return false;
    
    // 关键校验：如果原始搜索词有限定词，扩展词也必须至少包含一个限定词
    // 防止“跨境女装”扩展出“休闲女装”“大码女装”这种跑偏的
    if (modifierWords.length > 0) {
      const hasImportantModifier = modifierWords.some(m => 
        lowerKw.includes(m.toLowerCase())
      );
      // 如果扩展词一个限定词都没带，说明跑偏了，过滤掉
      if (!hasImportantModifier) return false;
    }
    
    // 手机壳类特殊过滤：排除手机膜、数据线、充电器等完全不相关的
    if (core.match(/手机壳|手机套|保护壳|保护套/)) {
      const unrelatedPatterns = [/手机膜/, /钢化膜/, /数据线/, /充电器/, /充电线/, /耳机/, /充电宝/];
      for (const p of unrelatedPatterns) {
        if (lowerKw.match(p)) return false;
      }
    }
    
    // 箱包类特殊过滤：排除完全不相关的
    if (core.match(/包|袋/) && cat.match(/箱包|包/)) {
      const unrelatedPatterns = [/书包|背包|钱包|卡包/];
      // 这些是相关的，不过滤
    }
    
    return true;
  });
  
  return filtered.length > 0 ? filtered : expandedKeywords.slice(0, 3);
}

function matchCategory(query) {
  let bestMatch = null;
  let bestMatchLength = 0;
  
  for (const [name, cfg] of Object.entries(CATEGORY_MAP)) {
    for (const kw of cfg.matchKeywords) {
      if (query.includes(kw)) {
        // 取匹配到的最长关键词
        if (kw.length > bestMatchLength) {
          bestMatchLength = kw.length;
          bestMatch = { categoryName: name, levelNames: cfg.levelNames, matchKeywords: cfg.matchKeywords, fallbackKeywords: cfg.fallbackKeywords, matchedKeyword: kw };
        }
      }
    }
  }
  
  return bestMatch;
}

// ===== 根据类目名称获取levelName前缀 =====
function getCategoryLevelNames(categoryName) {
  if (!categoryName) return [];
  const cfg = CATEGORY_MAP[categoryName];
  return cfg ? cfg.levelNames : [];
}

// ===== 从categoryTree提取叶子类目ID（最后一级类目）=====
function extractLeafCategoryIds(categoryTree) {
  if (!categoryTree || !Array.isArray(categoryTree) || categoryTree.length === 0) return [];
  
  const ids = [];
  for (const item of categoryTree) {
    const id = item.category_id || item.categoryId || '';
    if (id && !ids.includes(id)) {
      ids.push(id);
    }
  }
  // 最多20个（API限制）
  return ids.slice(0, 20);
}

// ===== 从categoryTree派生类目过滤信息（基于getCategory插件返回的类目ID+名称）=====
// 店雷达API返回的商品不含categoryId字段，只有levelName（类目名称路径如"运动户外>垂钓用品>钓鱼包"）
// 因此通过getCategory插件返回的category_id对应的category_name，去精确匹配商品的levelName各级分类
function deriveCategoryFilterFromTree(categoryTree) {
  if (!categoryTree || !Array.isArray(categoryTree) || categoryTree.length === 0) return null;
  
  // 收集所有类目ID和对应的名称
  const categoryIdMap = {};  // {category_id: category_name}
  const categoryNames = [];   // 所有类目名称（拆分顿号后）
  const allowedPrefixes = new Set();
  
  for (const item of categoryTree) {
    const name = item.category_name || item.categoryName || '';
    const id = item.category_id || item.categoryId || '';
    if (!name) continue;
    
    // 记录ID→名称映射
    if (id) categoryIdMap[id] = name;
    
    // 拆分顿号（如"旅行包、旅行袋"→["旅行包","旅行袋"]）
    const parts = name.split('、').map(p => p.trim()).filter(p => p);
    categoryNames.push(...parts);
    
    // 根据类目名称推导所属的一级类目前缀（用于levelName匹配）
    if (name.match(/包|袋|箱包|皮具/)) allowedPrefixes.add('箱包皮具');
    if (name.match(/女装|连衣裙|半身裙|女外套|女t恤|女裤/)) allowedPrefixes.add('女装');
    if (name.match(/男装|男士外套|男士t恤|男裤/)) allowedPrefixes.add('男装');
    if (name.match(/童装|儿童/)) allowedPrefixes.add('童装');
    if (name.match(/钓鱼|渔具|垂钓|路亚|户外|运动|健身/)) allowedPrefixes.add('运动户外');
    if (name.match(/手机壳|手机套|手机配件|数码|电脑/)) allowedPrefixes.add('数码、电脑');
    if (name.match(/饰品|耳环|项链|手链|戒指|手镯|胸针/)) allowedPrefixes.add('饰品');
    if (name.match(/服饰配件/)) allowedPrefixes.add('服饰配件、饰品');
    if (name.match(/家居|收纳|厨房|卫浴|清洁|日用/)) { allowedPrefixes.add('家居百货'); allowedPrefixes.add('家纺家饰'); }
    if (name.match(/食品|零食|饮料|茶叶/)) allowedPrefixes.add('食品、饮料');
    if (name.match(/玩具|益智/)) allowedPrefixes.add('玩具');
    if (name.match(/办公|文具/)) allowedPrefixes.add('办公、文化');
    if (name.match(/鞋|靴/)) allowedPrefixes.add('鞋');
    if (name.match(/插座|开关|电工|电气|电线|电缆|断路器|漏电|配电箱/)) allowedPrefixes.add('电工电气');
    if (name.match(/照明|灯具|灯泡|灯管|LED|吊灯|台灯|手电筒/)) allowedPrefixes.add('照明工业');
    if (name.match(/五金|工具|螺丝|螺母|扳手|钳子|锯片/)) allowedPrefixes.add('五金、工具');
    if (name.match(/建材|家装|建筑|建材|涂料|地板|瓷砖|门窗/)) allowedPrefixes.add('家装、建材');
  }
  
  return {
    allowedPrefixes: Array.from(allowedPrefixes),  // 一级类目前缀，如["箱包皮具"]
    categoryNames: categoryNames,                    // 所有类目名称，如["钓鱼包","其他垂钓用品"]
    categoryIdMap: categoryIdMap                     // ID→名称映射，如{"1045354":"钓鱼包"}
  };
}

// ===== 拆词匹配辅助函数 =====
// 检查一个token是否在标题中匹配，支持商品词的核心名词模糊匹配
function tokenMatchesTitle(title, token) {
  // 直接精确匹配
  if (title.includes(token)) return true;
  
  // 商品词核心名词模糊匹配表
  // key: 核心名词, value: 包含该核心名词的词也会匹配
  const coreNounMap = [
    // 包袋类
    { core: '包', variants: ['包包', '女包', '男包', '手提包', '单肩包', '双肩包', '斜挎包', '腰包', '钱包', '零钱包', '手机包', '胸包', '卡包', '化妆包', '公文包', '电脑包', '书包', '背包', '挎包', '拎包', '皮包', '布包', '帆布包', '托特包', '麻将包'] },
    { core: '袋', variants: ['袋子', '手提袋', '购物袋', '收纳袋', '包装袋', '塑料袋', '无纺布袋'] },
    { core: '箱', variants: ['箱子', '行李箱', '收纳箱', '整理箱', '纸箱', '木箱'] },
    { core: '盒', variants: ['盒子', '包装盒', '收纳盒', '礼品盒', '纸盒', '铁盒'] },
    // 服装类
    { core: '衣', variants: ['衣服', '服装', '上衣', '毛衣', '卫衣', '风衣', '大衣', '羽绒服', '夹克', '外套', '衬衫', 'T恤'] },
    { core: '裤', variants: ['裤子', '长裤', '短裤', '牛仔裤', '休闲裤', '运动裤'] },
    { core: '裙', variants: ['裙子', '连衣裙', '半身裙', '短裙', '长裙'] },
    // 鞋类
    { core: '鞋', variants: ['鞋子', '女鞋', '男鞋', '童鞋', '运动鞋', '高跟鞋', '平底鞋', '凉鞋', '拖鞋', '靴子', '帆布鞋'] },
    // 3C类
    { core: '壳', variants: ['手机壳', '保护壳', '手机套', '保护套', '硬壳', '软壳'] },
    // 饰品类
    { core: '饰', variants: ['饰品', '首饰', '装饰品', '配饰'] },
    // 杯类
    { core: '杯', variants: ['杯子', '水杯', '保温杯', '马克杯', '玻璃杯', '塑料杯'] },
    // 其他
    { core: '帽', variants: ['帽子', '鸭舌帽', '棒球帽', '渔夫帽', '贝雷帽'] },
    { core: '袜', variants: ['袜子', '棉袜', '丝袜', '船袜', '长袜'] },
  ];
  
  // 检查token是否是某个核心名词的变体
  for (const item of coreNounMap) {
    if (item.variants.includes(token)) {
      // token是变体，检查标题是否包含核心名词（作为名词用法）
      const core = item.core;
      // 简单检查：标题包含核心词，且不是量词用法
      if (title.includes(core)) {
        // 简单排除量词用法（"一包"、"两包"等）
        const measurePrefixes = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数', '每'];
        let isMeasureWord = false;
        for (const prefix of measurePrefixes) {
          if (title.includes(prefix + core)) {
            // 检查是否是唯一的核心词出现
            const idx = title.indexOf(prefix + core);
            if (idx >= 0) {
              // 可能是量词，但也可能标题其他地方有核心名词用法
              // 简单起见，只要标题包含核心词就通过（类目筛选已经保证了相关性）
              break;
            }
          }
        }
        // 只要标题包含核心名词就算通过（由类目筛选保证相关性）
        return true;
      }
      break;
    }
  }
  
  return false;
}

// ===== 处理API返回的商品 =====
function processAPIProducts(items, excludedKeywords, requiredKeywords, coreProduct, categoryLevelNames, productAttrs, categoryTreeFilter, andTokens) {
  const result = [];
  const excluded = (excludedKeywords || []).map(k => k.toLowerCase());
  const required = (requiredKeywords || []).map(k => k.toLowerCase());
  const core = coreProduct ? coreProduct.toLowerCase() : '';
  const levelNames = categoryLevelNames || [];
  const tokens = (andTokens || []).map(k => k.toLowerCase()).filter(t => t && t.length > 0);
  
  // 提取核心名词（用于宽松匹配）
  let coreNoun = '';
  const nounPatterns = [
    /手机壳|手机套|保护壳|保护套/,
    /包包|女包|男包|箱包|手提包|双肩包|单肩包|钱包|背包/,
    /包|袋|箱/,
    /t恤|衬衫|外套|裤子|裙子|衣服|服装/,
    /鞋|靴/,
    /饰品|耳环|项链|手链|戒指/,
  ];
  for (const pattern of nounPatterns) {
    const match = core.match(pattern);
    if (match) { coreNoun = match[0]; break; }
  }
  
  // 常见不相关词黑名单
  const blacklistPatterns = [
    /抽纸|纸巾|卫生纸|面巾纸|餐巾纸|卷纸|手帕纸|擦手纸|纸抽/,
    /零食|饼干|糖果|巧克力|坚果|干货|调料|饮料|牛奶/,
    /轴承|齿轮|螺丝|螺母|螺栓|弹簧|密封|阀门|管件|焊条|润滑脂|润滑油|机油|柴油|汽油|燃料|白油/,
    /打包袋|包装袋|包装盒|纸箱|泡沫|气泡膜|材料包|工具包|配件包/,
    /包带|肩带|背带|提手|把手|包配件|箱包配件|五金配件|辅料配件/,
  ];
  
  for (const item of items) {
    const title = (item.title || '').toLowerCase();
    const levelName = item.levelName || '';
    
    // 排除词过滤
    let skip = false;
    for (const ex of excluded) {
      if (ex.length >= 2 && title.includes(ex)) { skip = true; break; }
    }
    if (skip) continue;
    
    // 黑名单过滤：明显不相关的直接排除
    let inBlacklist = false;
    for (const pattern of blacklistPatterns) {
      if (pattern.test(title)) { inBlacklist = true; break; }
    }
    if (inBlacklist) continue;
    
    // 配件类目强制排除（不管什么模式，只要末级类目是配件/附件类就排除）
    if (levelName) {
      const levelParts = levelName.split('>').map(s => s.trim()).filter(s => s);
      const lastLevel = levelParts[levelParts.length - 1] || '';
      const isAccessoryCategory = /配件|附件|零件|工具|材料|辅料|包装|维修|修理|修补|修复|安装|五金|辅料|配件包|配件袋|配件盒/.test(lastLevel);
      if (isAccessoryCategory) continue;
    }
    
    // 类目路径匹配（使用getCategory插件返回的三级类目ID对应名称进行过滤）
    // 店雷达API不支持categoryId参数，商品也不含categoryId字段
    // 通过插件返回的category_name匹配商品的levelName三级类目
    let categoryMatch = true;
    if (levelName) {
      if (categoryTreeFilter && categoryTreeFilter.categoryNames.length > 0) {
        // 将 levelName 按 ">" 拆分为各级类目（如 "电工电气>插座>墙壁插座" → ["电工电气","插座","墙壁插座"]）
        const levelParts = levelName.split('>').map(s => s.trim()).filter(s => s);
        
        // 只用长度>=2的类目名匹配，过滤掉"袋"等单字（避免误匹配"塑料包装袋"等包装类）
        const validCatNames = categoryTreeFilter.categoryNames.filter(n => n.length >= 2);
        
        // 判断一个类目名是否与某个 levelPart 精确匹配（支持顿号分隔的复合类目）
        // 如 catName="墙壁插座" 匹配 part="墙壁插座"（精确相等）
        // 如 catName="墙壁插座" 匹配 part="墙壁插座、地面插座"（顿号分隔的复合类目中有一项相等）
        const matchExact = (catName, part) => {
          if (part === catName) return true;
          // 复合类目：part 用顿号分隔后逐项比较
          if (part.includes('、')) {
            return part.split('、').some(p => p.trim() === catName);
          }
          // 复合类目：catName 用顿号分隔后逐项比较
          if (catName.includes('、')) {
            return catName.split('、').some(p => p.trim() === part);
          }
          return false;
        };
        
        // 区分宽泛类目和具体类目
        // 宽泛类目：被其他类目名包含的（如"插座"被"墙壁插座"包含）→ 匹配倒数第二级（二级类目）
        // 具体类目：不被其他类目名包含的 → 匹配末级（三级类目）
        const broadCatNames = [];  // 宽泛类目名
        const specificCatNames = []; // 具体类目名
        
        for (const catName of validCatNames) {
          const isBroad = validCatNames.some(other => other !== catName && other.includes(catName));
          if (isBroad) {
            broadCatNames.push(catName);
          } else {
            specificCatNames.push(catName);
          }
        }
        
        // 匹配策略：
        // 1. 具体类目匹配末级（最精确）
        // 2. 宽泛类目匹配倒数第二级（二级类目）
        // 注意：有 categoryTree 时不使用一级前缀兜底，避免太宽泛
        categoryMatch = false;
        const lastLevel = levelParts[levelParts.length - 1] || '';
        const secondLastLevel = levelParts[levelParts.length - 2] || '';
        
        // 第1轮：具体类目匹配末级
        if (lastLevel && specificCatNames.length > 0) {
          categoryMatch = specificCatNames.some(catName => matchExact(catName, lastLevel));
        }
        
        // 第2轮：宽泛类目匹配倒数第二级
        if (!categoryMatch && secondLastLevel && broadCatNames.length > 0) {
          // 额外校验：末级类目如果是"配件/附件/工具/材料/包装/维修/安装/盒/罩/盖/框"等非主产品类目，即使二级匹配也排除
          const isAccessoryLevel = /配件|附件|零件|工具|材料|辅料|包装|维修|修理|修补|修复|安装|防水盒|防溅盒|保护盖|保护罩|底盒|接线盒|明盒|暗盒|线盒/.test(lastLevel);
          if (!isAccessoryLevel) {
            categoryMatch = broadCatNames.some(catName => matchExact(catName, secondLastLevel));
          }
        }
        
        // 有categoryTree时，严格排除不在目标类目中的商品
        if (!categoryMatch) continue;
      } else if (levelNames.length > 0) {
        // 回退到本地CATEGORY_MAP（宽松匹配，不排除）
        categoryMatch = levelNames.some(ln => levelName.startsWith(ln));
      }
    }
    
    // 必选词检查：多词时采用"多数匹配"策略
    // 1-2个必选词：必须全部满足
    // 3+个必选词：只需满足其中 ceil(2/3) 个即可通过
    if (required.length > 0) {
      let matchCount = 0;
      let totalRequired = 0;
      
      for (const rq of required) {
        if (!rq) continue;
        totalRequired++;
        
        let matched = false;
        
        // 单字必选词（如"包"）需要特殊处理，排除量词用法和"包邮"等
        if (rq.length === 1) {
          const charIndex = title.indexOf(rq);
          if (charIndex >= 0) {
            const prefixes = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
            const suffixes = ['邮'];
            
            const isBadMatch = (index) => {
              if (index > 0) {
                const prevChar = title[index - 1];
                if (prefixes.includes(prevChar) || /\d/.test(prevChar)) return true;
              }
              if (index < title.length - 1) {
                const nextChar = title[index + 1];
                if (suffixes.includes(nextChar)) return true;
              }
              return false;
            };
            
            if (!isBadMatch(charIndex)) {
              matched = true;
            } else {
              let searchFrom = charIndex + 1;
              while (searchFrom < title.length) {
                const nextIndex = title.indexOf(rq, searchFrom);
                if (nextIndex < 0) break;
                if (!isBadMatch(nextIndex)) {
                  matched = true;
                  break;
                }
                searchFrom = nextIndex + 1;
              }
            }
          }
        } else {
          // 多字词直接匹配
          if (title.includes(rq)) {
            matched = true;
          }
        }
        
        if (matched) matchCount++;
      }
      
      // 判断是否通过：1-2个词要求全匹配，3+个词要求匹配至少 ceil(2/3)
      const threshold = totalRequired <= 2 ? totalRequired : Math.ceil(totalRequired * 2 / 3);
      if (matchCount < threshold) continue;
    }
    
    // 核心词匹配检查（必选词已满足时，这里进一步确认相关性）
    // 使用拆词 AND 匹配：平台/场景词不强制要求在标题中出现（1688标题很少有跨境/亚马逊等词）
    // 只要求商品词和属性词必须全部命中
    let hasCoreMatch = false;
    
    // 平台/场景词白名单：这些词不强制要求在标题中出现
    // （因为1688商品标题很少直接写"跨境""亚马逊"等词，相关性由API搜索和类目保证）
    const platformSceneWords = [
      '跨境', '亚马逊', '外贸', '速卖通', '出口', 'ebay', 'temu', 'shein',
      '独立站', 'shopee', 'lazada', 'wish', '跨境电商', '外贸出口',
      '户外', '厨房', '办公', '家用', '车载', '旅行', '运动', '健身'
    ].map(w => w.toLowerCase());
    
    // 0. 拆词 AND 匹配（最高优先级：商品词/属性词必须全部命中，平台词跳过）
    // 商品词支持核心名词模糊匹配：如"包包"→"包"、"女包"→"包"，标题有"包"也算
    if (tokens.length > 0) {
      let requiredTokens = tokens.filter(t => !platformSceneWords.includes(t));
      // 如果过滤后没有必须匹配的词（所有词都是平台词），则至少要有1个词命中
      if (requiredTokens.length === 0) {
        requiredTokens = tokens;
      }
      let allRequiredMatched = true;
      let hitCount = 0;
      for (const token of requiredTokens) {
        if (tokenMatchesTitle(title, token)) {
          hitCount++;
        } else {
          allRequiredMatched = false;
          break;
        }
      }
      if (allRequiredMatched && hitCount > 0) {
        hasCoreMatch = true;
      }
    }
    // 1. 完全匹配核心产品词
    else if (core && title.includes(core)) {
      hasCoreMatch = true;
    }
    // 2. 匹配核心名词（如"异形包" → 匹配"包"）
    else if (coreNoun && coreNoun.length > 1 && title.includes(coreNoun)) {
      hasCoreMatch = true;
    }
    // 3. 必选词已经全部满足，也算通过（兜底）
    else if (required.length > 0) {
      hasCoreMatch = true;
    }
    
    // categoryTree过滤已在上方处理（严格排除不在目标类目中的商品）
    // 无categoryTree时，类目不匹配仅降低相关性评分（宽松模式）
    
    if (!hasCoreMatch) continue;
    
    // 容器类名词检查：如果核心产品是"XX包/袋/箱/盒"，商品标题必须包含容器类名词
    // 且不能是量词用法（一包、两包等）
    const containerWords = ['包', '袋', '箱', '盒', '套', '组'];
    const isContainerProduct = containerWords.some(cw => core.includes(cw));
    if (isContainerProduct) {
      // 检查标题里有没有容器类名词（不是量词用法）
      const measurePrefixes = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
      const nonNounSuffixes = ['邮', '头', '边', '角', '胶', '浆', '裹', '装'];
      
      let hasContainerNoun = false;
      for (const cw of containerWords) {
        let searchFrom = 0;
        while (searchFrom < title.length) {
          const idx = title.indexOf(cw, searchFrom);
          if (idx < 0) break;
          
          // 检查前缀（是否是量词）
          let isMeasure = false;
          if (idx > 0) {
            const prevChar = title[idx - 1];
            if (measurePrefixes.includes(prevChar) || /\d/.test(prevChar)) {
              isMeasure = true;
            }
          }
          // 检查后缀（是否是非名词用法）
          let isNonNoun = false;
          if (idx < title.length - 1) {
            const nextChar = title[idx + 1];
            if (nonNounSuffixes.includes(nextChar)) {
              isNonNoun = true;
            }
          }
          
          if (!isMeasure && !isNonNoun) {
            hasContainerNoun = true;
            break;
          }
          searchFrom = idx + 1;
        }
        if (hasContainerNoun) break;
      }
      
      if (!hasContainerNoun) continue;
    }
    
    // 计算相关性评分（用于排序，不影响是否通过）
    let relevanceScore = 0;
    // 拆词 AND 匹配全部命中 +12（比整词匹配更高，因为是智能拆词）
    if (tokens.length > 0) {
      let tokenHitCount = 0;
      for (const token of tokens) {
        if (title.includes(token)) tokenHitCount++;
      }
      if (tokenHitCount === tokens.length) {
        relevanceScore += 12; // 全部拆词命中
      } else if (tokenHitCount > 0) {
        relevanceScore += tokenHitCount * 3; // 部分命中，每个3分
      }
    }
    // 完全匹配核心产品词 +10
    if (core && title.includes(core)) relevanceScore += 10;
    // 包含明确的"XX包"结构（前面不是量词）+5
    if (coreNoun && coreNoun.length === 1) {
      const idx = title.indexOf(coreNoun);
      if (idx > 0) {
        const prevChar = title[idx - 1];
        const measureWords = ['一', '两', '三', '四', '五', '六', '七', '八', '九', '十', '几', '每', '整', '半', '数'];
        if (!measureWords.includes(prevChar) && !/\d/.test(prevChar)) {
          relevanceScore += 5;
        }
      }
    } else if (coreNoun && coreNoun.length > 1 && title.includes(coreNoun)) {
      relevanceScore += 5;
    }
    // 类目匹配 +3
    if (categoryMatch) relevanceScore += 3;
    // 属性标签匹配：智能体返回的属性值在标题中命中则加分（每个+2，最高+6）
    if (productAttrs && productAttrs.tags && Array.isArray(productAttrs.tags)) {
      let attrHitCount = 0;
      for (const tag of productAttrs.tags) {
        if (tag.values && Array.isArray(tag.values)) {
          for (const val of tag.values) {
            if (val && val.length >= 2 && title.includes(val.toLowerCase())) {
              attrHitCount++;
            }
          }
        }
      }
      relevanceScore += Math.min(6, attrHitCount * 2);
    }
    // 销量分（归一化到0-2分）
    const salesScore = Math.min(2, Math.log10((item.saleQuantity || item.orderCount || 0) + 1) / 3);
    relevanceScore += salesScore;
    
    result.push({
      id: String(item.offerId || ''),
      title: item.title || '',
      shop: item.company || '',
      model: item.companyType === 1 ? '生产加工' : item.companyType === 2 ? '经销批发' : '--',
      location: item.city || item.province || '',
      price: item.price || 0,
      sales: item.saleQuantity || item.orderCount || 0,
      img: item.image || '',
      link: 'https://detail.1688.com/offer/' + item.offerId + '.html',
      category: levelName,
      _relevance: relevanceScore,
      _raw: item
    });
  }
  
  // 排序：先按相关性评分降序，再按销量降序
  result.sort((a, b) => {
    const scoreDiff = (b._relevance || 0) - (a._relevance || 0);
    if (Math.abs(scoreDiff) > 0.01) return scoreDiff;
    return (b.sales || 0) - (a.sales || 0);
  });
  
  return result;
}

// ===== 从店雷达API获取商品 =====
async function fetchProductsFromAPI(keyword, aiResult) {
  const allProducts = [];
  const seenIds = new Set();
  const pageSize = 50;
  
  // 类目匹配：优先使用categoryTree（来自getCategory插件），其次用本地CATEGORY_MAP
  let catConfig = null;
  let categoryLevelNames = [];
  let categoryTreeFilter = null;
  let categoryIdList = [];
  
  if (aiResult && aiResult.categoryTree && Array.isArray(aiResult.categoryTree) && aiResult.categoryTree.length > 0) {
    // 提取类目ID列表（传给API的categoryIdList参数）
    categoryIdList = extractLeafCategoryIds(aiResult.categoryTree);
    
    // 使用getCategory插件返回的类目数据进行过滤
    categoryTreeFilter = deriveCategoryFilterFromTree(aiResult.categoryTree);
    if (categoryTreeFilter && categoryTreeFilter.allowedPrefixes.length > 0) {
      categoryLevelNames = categoryTreeFilter.allowedPrefixes.map(p => p + '>');
      catConfig = { categoryName: 'categoryTree', levelNames: categoryLevelNames };
    }
  }
  // 宽松版类目过滤器：只用一级类目前缀过滤，不用精确类目名
  // 用于兜底搜索，既保证大类目不错，又不会过滤太严
  let looseCategoryFilter = null;
  if (categoryTreeFilter && categoryTreeFilter.allowedPrefixes.length > 0) {
    looseCategoryFilter = {
      allowedPrefixes: categoryTreeFilter.allowedPrefixes,
      categoryNames: [],  // 空数组：不做精确类目名匹配，只用前缀
      categoryIdMap: categoryTreeFilter.categoryIdMap
    };
  }
  // 如果categoryTree没有数据，回退到本地CATEGORY_MAP
  if (!catConfig) {
    if (aiResult && aiResult.category && aiResult.category.mainCategory) {
      const catName = aiResult.category.mainCategory;
      categoryLevelNames = getCategoryLevelNames(catName);
      if (categoryLevelNames.length > 0) {
        catConfig = { categoryName: catName, levelNames: categoryLevelNames };
      }
    }
    if (!catConfig) {
      catConfig = matchCategory(keyword);
      if (catConfig) {
        categoryLevelNames = catConfig.levelNames || [];
      }
    }
  }
  
  // 扩展词过滤
  let filteredExpanded = [];
  if (aiResult && aiResult.expandedKeywords && aiResult.expandedKeywords.length > 0) {
    const catName = aiResult.category?.mainCategory || '';
    filteredExpanded = filterRelevantKeywords(aiResult.expandedKeywords, aiResult.coreProduct || keyword, catName, keyword);
    if (filteredExpanded.length < 2 && aiResult.expandedKeywords.length > filteredExpanded.length) {
      filteredExpanded = aiResult.expandedKeywords.slice(0, 3);
    }
    aiResult.expandedKeywords = filteredExpanded;
  }
  
  // 排除词
  const excludedKeywords = (aiResult && aiResult.excludedKeywords) ? aiResult.excludedKeywords : [];
  const requiredKeywords = (aiResult && aiResult.requiredKeywords) ? aiResult.requiredKeywords : [];
  const coreProduct = (aiResult && aiResult.coreProduct) ? aiResult.coreProduct : keyword;
  
  // 拆词数据：用于 AND 匹配（词不需要连在一起）
  const keywordTokens = (aiResult && aiResult.keywordTokens) ? aiResult.keywordTokens : [];
  const expandedTokenGroups = (aiResult && aiResult.expandedTokenGroups) ? aiResult.expandedTokenGroups : [];
  
  // ====== 调试信息 ======
  console.log('[搜索调试] 搜索词:', keyword);
  console.log('[搜索调试] 核心商品词:', coreProduct);
  console.log('[搜索调试] 类目ID列表:', categoryIdList);
  console.log('[搜索调试] 类目过滤模式:', categoryTreeFilter ? 'categoryTree严格' : '宽松');
  console.log('[搜索调试] 原词拆词:', keywordTokens);
  console.log('[搜索调试] 扩展词:', filteredExpanded);
  console.log('[搜索调试] 扩展词拆词组:', expandedTokenGroups);
  // ======================
  
  // 辅助函数：根据扩展词找对应的拆词组
  function getTokensForWord(word) {
    if (!word) return [];
    const group = expandedTokenGroups.find(g => g.word === word);
    return group ? group.tokens : [];
  }
  
  // ===== 搜索策略：类目过滤 + 扩展词搜索 + 拆词AND匹配 =====
  
  // 第一轮：类目ID + 主关键词（宽松匹配，不用原词拆词AND，避免太严）
  try {
    const params = {
      pageSize: 50,
      keyWord: keyword,
      searchType: '1',
      sortField: 'orderCount30d',
      sortType: 'desc',
      cycle: 30,
      pageIndex: 1
    };
    
    // 如果有类目ID，通过categoryIdList参数传给API做服务端类目过滤
    if (categoryIdList.length > 0) {

    const result = await callDianLeiDaAPI('search', params);
    
    if (result.code === 200 && result.result && result.result.list) {

      const products = processAPIProducts(
        result.result.list,
        excludedKeywords,

        coreProduct,
        categoryLevelNames,

        categoryTreeFilter
        // 主搜索不用拆词AND匹配，用核心商品词匹配即可（避免"跨境"等词过滤太严）
      );
      console.log('[搜索调试] 第一轮主搜索: API返回', apiCount, '条 → 过滤后', products.length, '条');
      for (const p of products) {
        if (!seenIds.has(p.id)) {

          allProducts.push(p);
        }
      }
    }
    
    // 如果API返回400或无结果，用单关键词+类目重试
    if (allProducts.length === 0 && categoryIdList.length > 0) {
      const retryParams = {
        pageSize: 50,
        keyWord: keyword,
        searchType: '1',
        sortField: 'orderCount30d',
        sortType: 'desc',
        cycle: 30,
        pageIndex: 1
      };
      const retryResult = await callDianLeiDaAPI('search', retryParams);
      if (retryResult.code === 200 && retryResult.result && retryResult.result.list) {
        const products = processAPIProducts(
          retryResult.result.list,
          excludedKeywords,
          requiredKeywords,
          coreProduct,
          categoryLevelNames,
          null,
          looseCategoryFilter

        for (const p of products) {
          if (!seenIds.has(p.id)) {
            seenIds.add(p.id);
            allProducts.push(p);
          }
        }
      }
    }
  } catch (e) {
    console.warn('第一轮搜索失败:', e.message);
  }
  
  // 第二轮：类目范围内，用扩展词搜索 + 扩展词拆词AND匹配（核心搜索方式）
  // 注意：API搜索词去掉平台词（跨境/亚马逊/外贸等），因为1688标题很少有这些词
  // 相关性由类目筛选 + 商品词AND匹配保证，平台词仅用于排序加分
  if (filteredExpanded.length > 0) {
    // 平台词列表（搜索时去掉这些词）
    const platformWords = ['跨境', '亚马逊', '外贸', '速卖通', '出口', '独立站', 'ebay', 'temu', 'shein', 'shopee', 'lazada', 'wish', '跨境电商', '外贸出口'];
    
    // 用前4个扩展词，每个单独搜（带类目过滤 + 拆词AND匹配）
    const expandWords = filteredExpanded.slice(0, 4);
    for (const expWord of expandWords) {
      if (allProducts.length >= 60) break;
      try {
        // API搜索词：去掉平台词，只保留商品属性词（避免1688结果太少）
        let apiSearchWord = expWord;
        for (const pw of platformWords) {
          apiSearchWord = apiSearchWord.replace(new RegExp(pw, 'gi'), '').trim();
        }
        // 如果去掉平台词后太短或为空，用核心商品词兜底
        if (apiSearchWord.length < 2) {
          apiSearchWord = coreProduct;
        }
        
        const params = {
          pageSize: 30,
          keyWord: apiSearchWord,
          searchType: '1',
          sortField: 'orderCount30d',
          sortType: 'desc',
          cycle: 30,
          pageIndex: 1
        };
        // 类目过滤
        if (categoryIdList.length > 0) {
          params.categoryIdList = categoryIdList.join(',');
        }
        
        const result = await callDianLeiDaAPI('search', params);
        if (result.code === 200 && result.result && result.result.list) {
          const expTokens = getTokensForWord(expWord);
          const apiCount = result.result.list.length;
          const products = processAPIProducts(
            result.result.list,
            excludedKeywords,
            [],  // 扩展词搜索放宽必选词
            coreProduct,
            categoryLevelNames,
            null,
            categoryTreeFilter,
            expTokens  // 每个扩展词用自己的拆词做AND匹配（平台词自动跳过）
          );
          console.log('[搜索调试] 扩展词搜索["' + expWord + '"] → API搜"' + apiSearchWord + '": 返回' + apiCount + '条 → 过滤后' + products.length + '条 (拆词:' + JSON.stringify(expTokens) + ')');
          for (const p of products) {
            if (!seenIds.has(p.id)) {
              seenIds.add(p.id);
              allProducts.push(p);
            }
          }
        }
      } catch (e) {
        console.warn('扩展词搜索失败 [' + expWord + ']:', e.message);
      }
    }
  }
  
  // ===== 兜底策略：如果结果太少（<10），放宽限制补充搜索 =====
  if (allProducts.length < 10) {
    let fallbackKeywords = [];
    // 优先用类目热词
    if (catConfig && catConfig.fallbackKeywords) {
      fallbackKeywords = catConfig.fallbackKeywords.slice(0, 2);
    } else if (aiResult && aiResult.category && aiResult.category.categoryKeywords && aiResult.category.categoryKeywords.length > 0) {
      fallbackKeywords = aiResult.category.categoryKeywords.slice(0, 2);
    }
    // 其次用AI扩展词
    if (fallbackKeywords.length === 0 && filteredExpanded.length > 0) {
      fallbackKeywords = filteredExpanded.slice(0, 2);
    }
    
    if (fallbackKeywords.length > 0) {
      const combinedFallback = fallbackKeywords.join('、');
      try {
        const params = {
          pageSize: 30,
          keyWord: combinedFallback,
          searchType: '1',
          sortField: 'orderCount30d',
          sortType: 'desc',
          cycle: 30,
          pageIndex: 1
        };
        // 如果有类目ID，带上类目过滤
        if (categoryIdList.length > 0) {
          params.categoryIdList = categoryIdList.join(',');
        }
        const result = await callDianLeiDaAPI('search', params);
        if (result.code === 200 && result.result && result.result.list) {
          const apiCount = result.result.list.length;
          const products = processAPIProducts(
            result.result.list,
            excludedKeywords,
            [],
            coreProduct,
            categoryLevelNames,
            null,
            looseCategoryFilter
            // 兜底搜索不用拆词AND匹配，最宽松模式
          );
          console.log('[搜索调试] 第一次兜底["' + combinedFallback + '"]: API返回', apiCount, '条 → 宽松类目+核心词过滤后', products.length, '条');
          for (const p of products) {
            if (!seenIds.has(p.id)) {
              seenIds.add(p.id);
              allProducts.push(p);
            }
          }
        }
      } catch (e) {
        console.warn('兜底搜索失败:', e.message);
      }
    }
  }

  // ===== 二次兜底：如果结果太少（<10），完全放宽类目过滤重新搜索 =====
  if (allProducts.length < 10) {
    try {
      const params = {
        pageSize: 50,
        keyWord: keyword,
        'searchType': '1',
        'sortField': 'orderCount30d',
        'sortType': 'desc',
        'cycle': 30,
        'pageIndex': 1
      };
      const result = await callDianLeiDaAPI('search', params);
      if (result.code === 200 && result.result && result.result.list) {

        const products = processAPIProducts(

        );

        for (const p of products) {
          if (!seenIds.has(p.id)) {
            seenIds.add(p.id);
            allProducts.push(p);
          }
        }
      }
    } catch (e) {
      console.warn('二次兜底搜索失败:', e.message);
    }
  }
  
  console.log('[搜索调试] ===== 最终结果:', allProducts.length, '条 =====');
  
  return allProducts;
}

// ===== 搜索历史功能 =====
const HISTORY_KEY = 'dianleida_search_history';
const HISTORY_MAX = 10;

function getSearchHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  } catch(e) { return []; }
}

function saveSearchHistory(keyword) {
  let history = getSearchHistory();
  // 去重：移除已存在的相同词
  history = history.filter(item => item !== keyword);
  // 添加到最前面
  history.unshift(keyword);
  // 最多保留10条
  if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderSearchHistory();
}

function renderSearchHistory() {
  const history = getSearchHistory();
  const container = document.getElementById('search-history');
  const tagsContainer = document.getElementById('search-history-tags');
  if (history.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  tagsContainer.innerHTML = history.map(function(kw) {
    var safeKw = kw.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    return '<span class="history-tag" onclick="clickHistoryTag(\'' + safeKw + '\')">' + escapeHtml(kw) + '</span>';
  }).join('');
}

function clickHistoryTag(keyword) {
  document.getElementById('search-input').value = keyword;
  doSearch();
}

function clearSearchHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderSearchHistory();
}

function formatDuration(ms) {
  if (ms === null || ms === undefined || Number.isNaN(ms)) return '--';
  if (ms < 1000) return Math.round(ms) + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

function updateTimingDisplay(timing) {
  const timingEl = document.getElementById('analysis-timing');
  if (!timingEl) return;
  const keys = ['category', 'keyword', 'api', 'total'];
  const hasValue = keys.some(key => typeof timing[key] === 'number');
  timingEl.classList.toggle('show', hasValue);
  const catEl = document.getElementById('timing-category');
  const kwEl = document.getElementById('timing-keyword');
  const apiEl = document.getElementById('timing-api');
  const totalEl = document.getElementById('timing-total');
  if (catEl && timing.category !== undefined) catEl.textContent = formatDuration(timing.category);
  if (kwEl && timing.keyword !== undefined) kwEl.textContent = formatDuration(timing.keyword);
  if (apiEl && timing.api !== undefined) apiEl.textContent = formatDuration(timing.api);
  if (totalEl && timing.total !== undefined) totalEl.textContent = formatDuration(timing.total);
}

function updateStep(stepEl, icon, title, detail, tokens) {
  let tokensHtml = '';
  if (tokens && tokens.length > 0) {

      <div class="ai-step-title">${escapeHtml(title)}</div>
      <div class="ai-step-detail">${escapeHtml(detail)}</div>
      ${tokensHtml}
    </div>`;
}

      const recentLines = lines.slice(-4);
      step1LiveDetail.innerHTML = recentLines.map(l => 
        '<div style="opacity:' + (recentLines.indexOf(l) === recentLines.length - 1 ? '1' : '0.6') + '; font-size:12px; line-height:1.6;">' + l + '</div>'
      ).join('');
    }
    
    analysisProcessText = cleanText;
    
    // 实时更新总耗时
    updateTimingDisplay({ 
      category: categoryDuration, 
      keyword: keywordDuration, 
      api: apiDuration, 
      total: performance.now() - totalStartTime 
    });
  });
  
  if (cozeData && cozeData.result) {
    aiResult = cozeData.result;
    categoryDuration = cozeData.categoryTime;
    keywordDuration = cozeData.keywordTime;
    aiSource = 'coze';
  }
  
  if (!aiResult) {
    const zhipuStart = performance.now();
    aiResult = await callZhipuSearchAnalysis(query);
    if (aiResult) {
      aiSource = 'zhipu';
      keywordDuration = performance.now() - zhipuStart;
    }
  }
  
  if (!aiResult) {
    aiResult = ruleBasedAnalysis(query);
    aiSource = 'rule';
    keywordDuration = 50;
  }
  
  console.log('[耗时统计] 类目智能体:', formatDuration(categoryDuration), '搜索词智能体:', formatDuration(keywordDuration), '来源:', aiSource);
  updateTimingDisplay({ 
    category: categoryDuration, 
    keyword: keywordDuration, 
    api: apiDuration, 
    total: performance.now() - totalStartTime 
  });

  // ===== Step 1: 核心词提取（替换流式步骤）=====
  const coreProduct = aiResult.coreProduct || query;
  const modifiers = aiResult.modifiers || {};
  const allModifiers = [];
  if (modifiers.style) allModifiers.push(...modifiers.style);
  if (modifiers.material) allModifiers.push(...modifiers.material);
  if (modifiers.crowd) allModifiers.push(...modifiers.crowd);
  if (modifiers.scene) allModifiers.push(...modifiers.scene);
  if (modifiers.other) allModifiers.push(...modifiers.other);
  const tokens = allModifiers.length > 0 ? [coreProduct, ...allModifiers] : [coreProduct];
  const requiredKws = aiResult.requiredKeywords || [];
  
  let step1Detail = '核心产品：' + coreProduct;
  if (allModifiers.length > 0) step1Detail += ' · 修饰词：' + allModifiers.join('、');
  if (requiredKws.length > 0) step1Detail += ' · 必含词：' + requiredKws.join('、');
  
  // 替换流式步骤为最终完成状态
  updateStep(step1Live, '🎯', 'Step 1: 核心词提取', step1Detail, tokens);

  // ===== Step 2: 关键词扩展与排除 =====
  await new Promise(r => setTimeout(r, 300));
  const expanded = aiResult.expandedKeywords || [];
  const excluded = aiResult.excludedKeywords || [];
  
  let step2Detail = '';
  let step2Tokens = [];
  
  if (expanded.length > 0) {
    step2Detail += '智能扩展 ' + expanded.length + ' 个搜索变体';
    step2Tokens = expanded.slice(0, 8);
  } else {
    step2Detail += '无需额外扩展';
  }
  if (excluded.length > 0) {
    step2Detail += ' · 排除 ' + excluded.length + ' 个不相关词';
  }
  
  addStep('🔗', 'Step 2: 关键词扩展与排除', step2Detail, step2Tokens);
  
  // 展示排除词（如果有的话）
  if (excluded.length > 0) {
    const excludedEl = document.createElement('div');
    excludedEl.style.cssText = 'margin-top:8px;font-size:12px;color:#9CA3AF;';
    excludedEl.innerHTML = '<span style="color:#9CA3AF;">排除词：</span>' + 
      excluded.slice(0, 6).map(k => '<span style="display:inline-block;padding:2px 8px;margin:2px;background:#FEF2F2;color:#EF4444;border-radius:10px;font-size:11px;">' + escapeHtml(k) + '</span>').join('');
    // 添加到最后一个步骤里
    const lastStep = document.getElementById('ai-steps').lastElementChild;
    if (lastStep) {
      const contentEl = lastStep.querySelector('.ai-step-content');
      if (contentEl) contentEl.appendChild(excludedEl);
    }
  }

  // ===== Step 2.5: 关键词扩展拆词 =====
  let keywordTokens = aiResult.keywordTokens || [];
  let expandedTokenGroups = aiResult.expandedTokenGroups || [];
  
  // 降级：如果智能体没返回拆词数据，用前端本地拆词
  const isLocalTokenize = keywordTokens.length === 0 && expandedTokenGroups.length === 0;
  if (isLocalTokenize) {
    keywordTokens = smartTokenize(query);
    expandedTokenGroups = generateExpandedTokenGroups(expanded);
  }
  
  // 始终展示拆词步骤（只要有搜索词就展示）
  if (keywordTokens.length > 0 || expandedTokenGroups.length > 0) {
    await new Promise(r => setTimeout(r, 200));
    
    let tokenDetail = '';
    
    if (keywordTokens.length > 0) {
      tokenDetail += '原词拆为 ' + keywordTokens.length + ' 个单元词 · ';
    }
    if (expandedTokenGroups.length > 0) {
      tokenDetail += expandedTokenGroups.length + ' 个扩展词均已拆词';
    }
    tokenDetail += ' · 采用 AND 匹配（词无需连在一起）';
    if (isLocalTokenize) {
      tokenDetail += ' · 本地智能拆词';
    }
    
    addStep('🧩', 'Step 2.5: 关键词扩展拆词', tokenDetail, []);
    
    // 添加详细拆词展示到步骤里
    const lastStep = document.getElementById('ai-steps').lastElementChild;
    if (lastStep) {
      const contentEl = lastStep.querySelector('.ai-step-content');
      if (contentEl) {
        const tokenDetailEl = document.createElement('div');
        tokenDetailEl.style.cssText = 'margin-top:12px;';
        
        // 原词拆词
        if (keywordTokens.length > 0) {
          tokenDetailEl.innerHTML += '<div style="margin-bottom:10px;">' +
            '<div style="font-size:12px;color:#6B7280;margin-bottom:6px;">📝 搜索词拆词（AND匹配：标题需同时包含所有词）' + (isLocalTokenize ? ' <span style="color:#9CA3AF;">(本地拆词)</span>' : '') + '</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">' +
            keywordTokens.map(t => '<span style="display:inline-block;padding:4px 10px;background:#DBEAFE;color:#1D4ED8;border-radius:6px;font-size:13px;font-weight:500;">' + escapeHtml(t) + '</span>').join('') +
            '<span style="font-size:11px;color:#9CA3AF;margin-left:4px;">(' + keywordTokens.length + ' 个词，全部命中才通过)</span>' +
            '</div></div>';
        }
        
        // 扩展词拆词
        if (expandedTokenGroups.length > 0) {
          tokenDetailEl.innerHTML += '<div>' +
            '<div style="font-size:12px;color:#6B7280;margin-bottom:6px;">🔍 扩展词拆词（每个扩展词独立 AND 匹配，扩大召回）</div>' +
            '<div style="display:flex;flex-direction:column;gap:6px;">';
          
          expandedTokenGroups.slice(0, 6).forEach((group, idx) => {
            const isPrecise = idx < 2;
            const layerLabel = isPrecise ? '<span style="font-size:10px;padding:1px 5px;background:#FEF3C7;color:#D97706;border-radius:3px;margin-right:6px;">精准层</span>' : '<span style="font-size:10px;padding:1px 5px;background:#E0E7FF;color:#4F46E5;border-radius:3px;margin-right:6px;">宽泛层</span>';
            tokenDetailEl.innerHTML += '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">' +
              layerLabel +
              '<span style="font-size:12px;color:#4B5563;font-weight:500;min-width:100px;">' + escapeHtml(group.word) + '</span>' +
              '<span style="font-size:11px;color:#D1D5DB;">→</span>' +
              group.tokens.map(t => '<span style="display:inline-block;padding:2px 8px;background:#F3F4F6;color:#4B5563;border-radius:4px;font-size:12px;">' + escapeHtml(t) + '</span>').join('') +
              '</div>';
          });
          
          if (expandedTokenGroups.length > 6) {
            tokenDetailEl.innerHTML += '<div style="font-size:11px;color:#9CA3AF;">(共 ' + expandedTokenGroups.length + ' 个扩展词，已展示前 6 个)</div>';
          }
          tokenDetailEl.innerHTML += '</div></div>';
        }
        
        // 匹配规则说明
        tokenDetailEl.innerHTML += '<div style="margin-top:10px;padding:8px 10px;background:#F0FDF4;border-radius:6px;border:1px solid #BBF7D0;">' +
          '<div style="font-size:11px;color:#15803D;font-weight:500;">💡 匹配规则</div>' +
          '<div style="font-size:11px;color:#166534;margin-top:2px;">拆词后采用 AND 匹配：标题中同时包含所有拆词单元即算匹配，词不需要连在一起。配合类目筛选，既能保证相关性又能扩大召回范围。</div>' +
          '</div>';
        
        contentEl.appendChild(tokenDetailEl);
      }
    }
  }
  
  // 把拆词数据写回 aiResult，供后续搜索使用
  aiResult.keywordTokens = keywordTokens;
  aiResult.expandedTokenGroups = expandedTokenGroups;

  // ===== Step 3: 类目获取（getCategory插件返回） =====
  await new Promise(r => setTimeout(r, 250));
  if (aiResult.categoryTree && Array.isArray(aiResult.categoryTree) && aiResult.categoryTree.length > 0) {
    // 从 categoryTree 提取类目名和ID（插件返回的字段名是 category_name 和 category_id）
    const treeNames = aiResult.categoryTree.map(item => item.category_name || item.categoryName || '').filter(n => n);
    const catIds = aiResult.categoryTree.map(item => item.category_id || item.categoryId || '').filter(id => id);
    // 只展示最后一级（叶子类目），用顿号分隔
    const leafNames = treeNames.slice(0, 8).join('、');
    const catDetail = '匹配类目：' + leafNames + '（共' + treeNames.length + '个）· 数据来源：getCategory插件 · ✅ 已启用类目过滤';
    addStep('📂', 'Step 3: 类目获取（getCategory插件）', catDetail, treeNames.slice(0, 8));
  } else if (aiResult.category && aiResult.category.mainCategory) {
    // 兼容：插件未返回数据但智能体有 category 字段
    let catDetail = '类目：' + aiResult.category.mainCategory + (aiResult.category.subCategory ? ' / ' + aiResult.category.subCategory : '') +
      (aiResult.category.categoryId ? '（ID: ' + aiResult.category.categoryId + '）' : '') + ' · ⚠️ 未调用getCategory插件，类目为智能体推测';
    addStep('📂', 'Step 3: 类目获取', catDetail, aiResult.category.categoryKeywords || []);
  } else {
    addStep('📂', 'Step 3: 类目获取', '未获取到类目数据（getCategory插件未返回数据），将进行全量搜索');
  }

  // ===== Step 4: 调用店雷达API获取商品 =====
  const step4 = addLoadingStep('📡', 'Step 4: 实时商品搜索');
  
  let products = [];
  const apiStartTime = performance.now();
  try {
    products = await fetchProductsFromAPI(query, aiResult);
  } catch (e) {
    console.warn('API调用失败:', e.message);
  } finally {
    apiDuration = performance.now() - apiStartTime;
    console.log('[耗时统计] 店雷达API:', formatDuration(apiDuration));
    updateTimingDisplay({ category: categoryDuration, keyword: keywordDuration, api: apiDuration, total: performance.now() - totalStartTime });
  }
  
  if (products.length > 0) {
    // 构建搜索词展示
    const searchWords = [query];
    if (aiResult && aiResult.expandedKeywords) searchWords.push(...aiResult.expandedKeywords.slice(0, 3));
    const displaySearch = searchWords.join('、');
    updateStep(step4, '✅', 'Step 4: 实时商品搜索完成', 
      '搜索词：' + displaySearch + ' · 从1688实时获取 ' + products.length + ' 条商品数据',
      ['实时API', products.length + '件商品']
    );
  } else {
    updateStep(step4, '⚠️', 'Step 4: 商品搜索', 
      '暂未获取到商品数据，请稍后重试或更换关键词');
  }
  
  // 隐藏顶部loading
  const totalDuration = performance.now() - totalStartTime;
  console.log('[耗时统计] 总调用时间:', formatDuration(totalDuration));
  updateTimingDisplay({ category: categoryDuration, keyword: keywordDuration, api: apiDuration, total: totalDuration });
  document.getElementById('analysis-loading').style.display = 'none';
  document.getElementById('analysis-sub').textContent = 'AI智能分析完成，已为您精准匹配商品';

  // ===== 渲染商品 =====
  currentResults = products;
  renderProducts(products);
  
  isSearching = false;
  btn.disabled = false;
}

// ===== 渲染商品 =====
function renderProducts(products, page) {
  const total = products?.length || 0;
  document.getElementById('products-count').textContent = total + ' 件';
  const grid = document.getElementById('product-grid');
  const paginationEl = document.getElementById('pagination');
  
  if (!products || products.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">暂无相关商品，请尝试其他关键词</div>';
    paginationEl.style.display = 'none';
    return;
  }
  
  // 分页计算
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (!page) page = 1;
  if (page < 1) page = 1;
  if (page > totalPages) page = totalPages;
  currentPage = page;
  
  const start = (page - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageProducts = products.slice(start, end);
  
  grid.innerHTML = '';
  pageProducts.forEach(p => {
    const card = document.createElement('a');
    card.className = 'product-card';
    card.href = p.link || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    
    let imgHtml = '';
    if (p.img) {
      imgHtml = '<img class="product-img" src="' + escapeHtml(p.img) + '" alt="' + escapeHtml(p.title) + '" onerror="this.parentElement.innerHTML=\'<div class=\\\'product-img-placeholder\\\'>📦</div>\'">';
    } else {
      imgHtml = '<div class="product-img-placeholder">📦</div>';
    }
    
    card.innerHTML = `
      <div class="product-img-wrap">${imgHtml}</div>
      <div class="product-info">
        <div class="product-title">${escapeHtml(p.title)}</div>
        <div class="product-price">¥${p.price} <span>起批</span></div>
        <div class="product-meta">
          <span>销量 ${(p.sales || 0).toLocaleString()}</span>
          <span>${escapeHtml(p.location || '')}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  
  // 渲染分页
  renderPagination(total, totalPages, page);
  
  // 滚动到商品区域顶部
  grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== 渲染分页组件 =====
function renderPagination(total, totalPages, currentPage) {
  const paginationEl = document.getElementById('pagination');
  const pageNumbersEl = document.getElementById('page-numbers');
  const pageInfoEl = document.getElementById('page-info');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  
  if (totalPages <= 1) {
    paginationEl.style.display = 'none';
    return;
  }
  
  paginationEl.style.display = 'flex';
  
  // 上一页按钮
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
  
  // 页码信息
  pageInfoEl.textContent = `共 ${total} 件 · 第 ${currentPage}/${totalPages} 页`;
  
  // 更新跳转输入框的值和最大值
  const jumpInput = document.getElementById('jump-input');
  if (jumpInput) {
    jumpInput.value = currentPage;
    jumpInput.max = totalPages;
  }
  
  // 生成页码
  let pages = [];
  const showPages = 5; // 显示多少个页码
  
  if (totalPages <= showPages + 2) {
    // 页数不多，全部显示
    for (let i = 1; i <= totalPages; i++) {
      pages.push(i);
    }
  } else {
    // 页数多，显示省略号
    if (currentPage <= 3) {
      // 当前页在前面
      pages = [1, 2, 3, 4, '...', totalPages];
    } else if (currentPage >= totalPages - 2) {
      // 当前页在后面
      pages = [1, '...', totalPages - 3, totalPages - 2, totalPages - 1, totalPages];
    } else {
      // 当前页在中间
      pages = [1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages];
    }
  }
  
  pageNumbersEl.innerHTML = '';
  pages.forEach(p => {
    const span = document.createElement('span');
    if (p === '...') {
      span.className = 'page-num ellipsis';
      span.textContent = '...';
    } else {
      span.className = 'page-num' + (p === currentPage ? ' active' : '');
      span.textContent = p;
      span.onclick = () => goToPage(p);
    }
    pageNumbersEl.appendChild(span);
  });
}

// ===== 翻页 =====
function changePage(delta) {
  goToPage(currentPage + delta);
}

function goToPage(page) {
  if (!currentResults || currentResults.length === 0) return;
  renderProducts(currentResults, page);
}

// ===== 跳转到指定页 =====
function jumpToPage() {
  const input = document.getElementById('jump-input');
  if (!input) return;
  const page = parseInt(input.value);
  const totalPages = Math.ceil(currentResults.length / pageSize);
  if (!isNaN(page) && page >= 1 && page <= totalPages) {
    goToPage(page);
  } else {
    input.value = currentPage;
  }
}

// ===== 快捷搜索 =====
function quickSearch(keyword) {
  document.getElementById('search-input').value = keyword;
  doSearch();
}

// ===== 回车搜索 =====
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
});

// ===== 跳转输入框回车跳转 =====
document.addEventListener('DOMContentLoaded', function() {
  const jumpInput = document.getElementById('jump-input');
  if (jumpInput) {
    jumpInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        jumpToPage();
      }
    });
  }
});

// ===== 排序切换 =====
document.getElementById('sort-filter').addEventListener('click', function(e) {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#sort-filter .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  
  const sort = e.target.dataset.sort;
  let sorted = [...currentResults];
  
  if (sort === 'score') {
    // 综合相关：按相关性评分降序，再按销量降序
    sorted.sort((a, b) => {
      const scoreDiff = (b._relevance || 0) - (a._relevance || 0);
      if (Math.abs(scoreDiff) > 0.01) return scoreDiff;
      return (b.sales || 0) - (a.sales || 0);
    });
  } else if (sort === 'sales') {
    // 销量订单
    sorted.sort((a, b) => (b.sales || 0) - (a.sales || 0));
  } else if (sort === 'growth') {
    // 7日增长率（用销量近似估算，有增长率数据则用增长率）
    sorted.sort((a, b) => {
      const aGrowth = a._raw && a._raw.growthRate7d ? a._raw.growthRate7d : 0;
      const bGrowth = b._raw && b._raw.growthRate7d ? b._raw.growthRate7d : 0;
      return bGrowth - aGrowth;
    });
  } else if (sort === 'revenue') {
    // 销售额 = 价格 × 销量
    sorted.sort((a, b) => ((b.price || 0) * (b.sales || 0)) - ((a.price || 0) * (a.sales || 0)));
  } else if (sort === 'newest') {
    // 上架时间（用商品ID或时间戳近似，越大的越新）
    sorted.sort((a, b) => {
      const aTime = a._raw && (a._raw.publishTime || a._raw.gmtCreate) ? (a._raw.publishTime || a._raw.gmtCreate) : '';
      const bTime = b._raw && (b._raw.publishTime || b._raw.gmtCreate) ? (b._raw.publishTime || b._raw.gmtCreate) : '';
      return bTime.localeCompare(aTime);
    });
  } else if (sort === 'price-low') {
    sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
  } else if (sort === 'price-high') {
    sorted.sort((a, b) => (b.price || 0) - (a.price || 0));
  }
  
  currentResults = sorted;
  renderProducts(sorted, 1);
});
