<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后端 JSON 映射</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { padding: 24px; background: #111827; color: #dbe4f0; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 16px; }
  .title { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .badge { width: 40px; height: 40px; flex: 0 0 40px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, #14b8a6, #0f766e); color: #fff; font-size: 11px; font-weight: 800; }
  .title b { display: block; font-size: 18px; }
  .title small { display: block; margin-top: 3px; color: #8390a5; font: 12px Consolas, monospace; }
  .copy { height: 36px; padding: 0 18px; border: 0; border-radius: 8px; background: #14b8a6; color: #fff; font-weight: 700; cursor: pointer; transition: .18s; }
  .copy:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(20,184,166,.2); }
  .copy.ok { background: #16a36a; }
  .editor { overflow: hidden; border: 1px solid #293548; border-radius: 12px; background: #0b1220; }
  .bar { height: 38px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid #293548; color: #8290a5; font: 12px Consolas, monospace; }
  .code { height: calc(100vh - 134px); margin: 0; padding: 20px; overflow: auto; white-space: pre; tab-size: 2; color: #d8dee9; font: 13px/1.7 Consolas, "Microsoft YaHei", monospace; }
  .error { color: #ff8585; }
</style>
</head>
<body>
  <div class="head">
    <div class="title">
      <span class="badge">JSON</span>
      <div>
        <b>后端 JSON 映射</b>
        <small>backend-json-mapping.json</small>
      </div>
    </div>
    <button class="copy" id="copy" type="button">复制 JSON</button>
  </div>
  <div class="editor">
    <div class="bar">backend-json-mapping.json</div>
    <pre class="code" id="code">正在读取 JSON…</pre>
  </div>
<script>
  let raw = '';
  const code = document.getElementById('code');
  const copy = document.getElementById('copy');

  fetch('backend-json-mapping.json')
    .then(response => {
      if (!response.ok) throw new Error('读取失败');
      return response.json();
    })
    .then(data => {
      raw = JSON.stringify(data, null, 2);
      code.textContent = raw;
    })
    .catch(() => {
      code.textContent = 'JSON 文件读取失败';
      code.classList.add('error');
      copy.disabled = true;
    });

  copy.addEventListener('click', async () => {
    if (!raw) return;
    try {
      await navigator.clipboard.writeText(raw);
      copy.textContent = '已复制';
      copy.classList.add('ok');
      setTimeout(() => {
        copy.textContent = '复制 JSON';
        copy.classList.remove('ok');
      }, 1600);
    } catch (error) {
      copy.textContent = '复制失败';
    }
  });
</script>
</body>
</html>
