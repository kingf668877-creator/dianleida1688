<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店雷达 - 开发模式</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue:#3370ff; --border:#e5e6eb; --text:#1d2129; --muted:#86909c; --hover:#f2f3f5; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:#f5f6f8; }
  .app { display:flex; width:100%; height:100vh; }
  .layers { width:224px; flex:0 0 224px; background:#fff; border-right:1px solid var(--border); }
  .layers-title { height:52px; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid var(--border); font-size:15px; font-weight:600; }
  .search-wrap { padding:10px 12px 0; }
  .search-input { width:100%; height:34px; padding:0 12px; border:1px solid var(--border); border-radius:8px; color:#1d2129; outline:none; font:13px/1 "PingFang SC","Microsoft YaHei",sans-serif; }
  .search-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(51,112,255,.10); }
  .search-input::placeholder { color:#a8abb2; }
  .layer-list { padding:10px 8px; }
  .version-folder { width:100%; height:34px; padding:0 10px; border:0; border-radius:6px; background:transparent; color:#4e5969; display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; text-align:left; }
  .version-pages { padding:4px 0 0 22px; }
  .layer-empty { display:none; padding:18px 12px; color:#a8abb2; font-size:12px; text-align:center; }
  .layer-item { width:100%; height:42px; padding:0 12px; border:0; border-radius:6px; background:transparent; color:#4e5969; display:flex; align-items:center; gap:10px; font-size:13px; cursor:pointer; text-align:left; transition:.16s ease; }
  .layer-item:hover { background:var(--hover); color:var(--text); }
  .layer-item.active { color:var(--blue); background:#e8f0ff; font-weight:500; }
  .layer-icon { width:22px; height:22px; border-radius:5px; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:700; }
  .icon-p { background:#ff6b6b; }
  .stage { min-width:0; flex:1; height:100%; background:#eef0f3; padding:20px; }
  .frame-shell { width:100%; height:100%; overflow:hidden; background:#fff; border:1px solid #dfe1e5; border-radius:8px; box-shadow:0 8px 24px rgba(29,33,41,.08); }
  iframe { width:100%; height:100%; border:0; display:block; background:#fff; }
  @media (max-width:720px) { .layers { width:176px; flex-basis:176px; } .stage { padding:10px; } }
</style>
</head>
<body>
<div class="app">
  <aside class="layers" aria-label="店雷达选品导航">
    <div class="layers-title">店雷达选品</div>
    <div class="search-wrap">
      <input class="search-input" id="layerSearch" type="search" placeholder="搜索版本或页面">
    </div>
    <nav class="layer-list">
      <div class="version-folder" id="versionFolder">
        <span>V2.8.9</span>
      </div>
      <div class="version-pages" id="versionPages">
        <button class="layer-item active" data-page="search-agent.html" data-search="V2.8.9 搜索智能体 效果图 HTML CSS JS MD 后端 JSON 映射"><span class="layer-icon icon-p">P</span>搜索智能体</button>
      </div>
      <div class="layer-empty" id="layerEmpty">暂无匹配内容</div>
    </nav>
  </aside>
  <main class="stage">
    <div class="frame-shell"><iframe id="designFrame" src="search-agent.html" title="设计页面预览"></iframe></div>
  </main>
</div>
<script>
  const frame = document.getElementById('designFrame');
  const items = Array.from(document.querySelectorAll('.layer-item'));
  const layerSearch = document.getElementById('layerSearch');
  const versionFolder = document.getElementById('versionFolder');
  const layerEmpty = document.getElementById('layerEmpty');

  items.forEach(item => item.addEventListener('click', () => {
    items.forEach(node => node.classList.remove('active'));
    item.classList.add('active');
    frame.src = item.dataset.page;
  }));

  layerSearch.addEventListener('input', () => {
    const keyword = layerSearch.value.trim().toLowerCase();
    let visibleCount = 0;
    const versionMatched = 'v2.8.9'.includes(keyword) || '2.8.9'.includes(keyword);

    items.forEach(item => {
      const text = (item.dataset.search || item.textContent).toLowerCase();
      const matched = !keyword || versionMatched || text.includes(keyword);
      item.style.display = matched ? 'flex' : 'none';
      if (matched) visibleCount += 1;
    });

    versionFolder.style.display = visibleCount > 0 ? 'flex' : 'none';
    layerEmpty.style.display = visibleCount > 0 ? 'none' : 'block';
  });
</script>
</body>
</html>
