<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店雷达 - 开发模式</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue:#3370ff; --border:#e5e6eb; --text:#1d2129; --muted:#86909c; --hover:#f2f3f5; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:#f5f6f8; }
  .app { display:flex; width:100%; height:100vh; }
  .layers { width:224px; flex:0 0 224px; background:#fff; border-right:1px solid var(--border); }
  .layers-title { height:52px; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid var(--border); font-size:15px; font-weight:600; }
  .layer-list { padding:10px 8px; }
  .version-folder { width:100%; height:34px; padding:0 10px; border:0; border-radius:6px; background:transparent; color:#4e5969; display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; cursor:pointer; text-align:left; transition:.16s ease; }
  .version-folder:hover { background:var(--hover); color:var(--text); }
  .version-arrow { width:14px; color:#86909c; transition:transform .16s ease; }
  .version-folder.collapsed .version-arrow { transform:rotate(-90deg); }
  .version-pages { padding:4px 0 0 22px; }
  .version-pages.collapsed { display:none; }
  .layer-item { width:100%; height:42px; padding:0 12px; border:0; border-radius:6px; background:transparent; color:#4e5969; display:flex; align-items:center; gap:10px; font-size:13px; cursor:pointer; text-align:left; transition:.16s ease; }
  .layer-item:hover { background:var(--hover); color:var(--text); }
  .layer-item.active { color:var(--blue); background:#e8f0ff; font-weight:500; }
  .layer-icon { width:22px; height:22px; border-radius:5px; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:700; }
  .icon-p { background:#ff6b6b; } .icon-h { background:#e34f26; } .icon-c { background:#1572b6; } .icon-j { background:#b58b00; }
  .stage { min-width:0; flex:1; height:100%; background:#eef0f3; padding:20px; }
  .frame-shell { width:100%; height:100%; overflow:hidden; background:#fff; border:1px solid #dfe1e5; border-radius:8px; box-shadow:0 8px 24px rgba(29,33,41,.08); }
  iframe { width:100%; height:100%; border:0; display:block; background:#fff; }
  @media (max-width:720px) { .layers { width:176px; flex-basis:176px; } .stage { padding:10px; } }
</style>
</head>
<body>
<div class="app">
  <aside class="layers" aria-label="图层导航">
    <div class="layers-title">图层</div>
    <nav class="layer-list">
      <button class="version-folder" id="versionFolder" type="button" aria-expanded="true" aria-controls="versionPages">
        <span class="version-arrow">▾</span>
        <span>V2.8.9</span>
      </button>
      <div class="version-pages" id="versionPages">
        <button class="layer-item active" data-page="ai-three-step.html"><span class="layer-icon icon-p">P</span>搜索智能体</button>
        <button class="layer-item" data-page="ai-three-step-code-html.html"><span class="layer-icon icon-h">H</span>HTML</button>
        <button class="layer-item" data-page="ai-three-step-code-css.html"><span class="layer-icon icon-c">C</span>CSS</button>
        <button class="layer-item" data-page="ai-three-step-code-js.html"><span class="layer-icon icon-j">J</span>JS</button>
      </div>
    </nav>
  </aside>
  <main class="stage">
    <div class="frame-shell"><iframe id="designFrame" src="ai-three-step.html" title="设计页面预览"></iframe></div>
  </main>
</div>
<script>
  const frame = document.getElementById('designFrame');
  const items = Array.from(document.querySelectorAll('.layer-item'));
  const versionFolder = document.getElementById('versionFolder');
  const versionPages = document.getElementById('versionPages');

  versionFolder.addEventListener('click', () => {
    const collapsed = versionPages.classList.toggle('collapsed');
    versionFolder.classList.toggle('collapsed', collapsed);
    versionFolder.setAttribute('aria-expanded', String(!collapsed));
  });

  items.forEach(item => item.addEventListener('click', () => {
    items.forEach(node => node.classList.remove('active'));
    item.classList.add('active');
    frame.src = item.dataset.page;
  }));
</script>
</body>
</html>
