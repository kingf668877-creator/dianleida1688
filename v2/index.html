<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1688智能选品Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root {
  --primary: #722ED1;
  --primary-dark: #531DAB;
  --primary-light: #F9F0FF;
  --primary-border: #D3ADF7;
  --ink: #1A1A2E;
  --muted: #6B7280;
  --rule: #E5E7EB;
  --surface: #FFFFFF;
  --bg: #FFFFFF;
  --chat-bg: #F7F8FA;
  --user-bubble: #F1F2F4;
  --green: #52C41A;
  --green-bg: #F6FFED;
  --blue: #1890FF;
  --blue-bg: #E6F7FF;
  --orange: #FA8C16;
  --warn: #FAAD14;
  --danger: #FF4D4F;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== Top Header ===== */
.top-header {
  background: #fff;
  border-bottom: 1px solid var(--rule);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}
.top-header .logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #722ED1, #9254DE);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #fff;
  flex-shrink: 0;
}
.top-header .title-wrap {
  display: flex;
  flex-direction: column;
}
.top-header .title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
}
.top-header .subtitle {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.3;
}
.top-header .status-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--green-bg);
  color: var(--green);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

/* ===== Chat Area ===== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 8px 0;
  background: var(--bg);
  scroll-behavior: smooth;
}
.chat-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 120px 24px;
}

/* Welcome message */
.welcome-block {
  text-align: center;
  padding: 48px 20px 32px;
}
.welcome-block .welcome-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, #722ED1, #9254DE);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: #fff;
  margin-bottom: 16px;
}
.welcome-block h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink);
}
.welcome-block p {
  color: var(--muted);
  font-size: 14px;
  max-width: 480px;
  margin: 0 auto;
}
.welcome-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 24px;
}
.suggestion-chip {
  background: var(--primary-light);
  color: var(--primary);
  border: 1px solid var(--primary-border);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.suggestion-chip:hover {
  background: var(--primary);
  color: #fff;
}

/* Message rows */
.msg-row {
  display: flex;
  margin-bottom: 20px;
  gap: 12px;
}
.msg-row.user {
  justify-content: flex-end;
}
.msg-row.ai {
  justify-content: flex-start;
}
.msg-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.msg-row.ai .msg-avatar {
  background: linear-gradient(135deg, #722ED1, #9254DE);
  color: #fff;
}
.msg-content {
  max-width: 78%;
}
.msg-row.user .msg-content {
  max-width: 70%;
}

/* User bubble (gray) */
.user-bubble {
  background: var(--user-bubble);
  padding: 12px 18px;
  border-radius: 18px 18px 4px 18px;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.6;
  word-break: break-word;
}

/* AI bubble */
.ai-bubble {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 4px 18px 18px 18px;
  padding: 0;
  overflow: hidden;
}

/* Thinking process (expandable) */
.thinking-section {
  border-bottom: 1px solid var(--rule);
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  cursor: pointer;
  background: var(--primary-light);
  transition: background 0.2s;
  user-select: none;
}
.thinking-header:hover {
  background: #EFD9FF;
}
.thinking-header .think-icon {
  font-size: 15px;
}
.thinking-header .think-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-dark);
  flex: 1;
}
.thinking-header .think-toggle {
  font-size: 12px;
  color: var(--primary);
  transition: transform 0.2s;
}
.thinking-header.collapsed .think-toggle {
  transform: rotate(-90deg);
}
.thinking-body {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--muted);
  background: #FBFAFC;
  line-height: 1.8;
  display: none;
}
.thinking-body.show {
  display: block;
}
.thinking-body .think-line {
  margin-bottom: 4px;
}
.thinking-body .think-line strong {
  color: var(--ink);
}

/* Skill cards (search steps) */
.skill-cards {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.skill-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: #FAFBFC;
  border: 1px solid var(--rule);
  border-radius: 12px;
  transition: all 0.3s;
  opacity: 0;
  transform: translateY(8px);
  animation: skillFadeIn 0.4s forwards;
}
@keyframes skillFadeIn {
  to { opacity: 1; transform: translateY(0); }
}
.skill-card.active {
  border-color: var(--primary-border);
  background: var(--primary-light);
}
.skill-card.done {
  border-color: var(--rule);
}
.skill-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
  background: #D9D9D9;
  position: relative;
}
.skill-card.active .skill-dot {
  background: var(--blue);
  animation: pulse 1.2s infinite;
}
.skill-card.done .skill-dot {
  background: var(--green);
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(24,144,255,0.4); }
  50% { box-shadow: 0 0 0 5px rgba(24,144,255,0); }
}
.skill-body {
  flex: 1;
  min-width: 0;
}
.skill-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}
.skill-card.active .skill-title {
  color: var(--primary);
}
.skill-detail {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  word-break: break-word;
}
.skill-tokens {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.skill-token {
  background: #fff;
  border: 1px solid var(--primary-border);
  color: var(--primary);
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.skill-tag {
  background: var(--blue-bg);
  color: var(--blue);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* AI summary text */
.ai-summary {
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
}
.ai-summary .highlight {
  color: var(--primary);
  font-weight: 600;
}
.ai-summary .stat-inline {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--chat-bg);
  padding: 2px 10px;
  border-radius: 8px;
  margin: 0 2px;
  font-size: 13px;
}
.ai-summary .stat-inline .v {
  font-weight: 700;
  color: var(--primary);
}

/* Toolbar above results */
.result-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 18px;
  background: #FAFBFC;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap;
}
.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.toolbar-chip {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--rule);
  background: #fff;
  color: var(--muted);
  transition: all 0.2s;
  user-select: none;
}
.toolbar-chip:hover {
  border-color: var(--primary-border);
}
.toolbar-chip.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.toolbar-result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
}
.toolbar-result-count strong {
  color: var(--primary);
  font-size: 14px;
}

/* Product grid in chat */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px 18px;
}
@media (max-width: 640px) {
  .product-grid { grid-template-columns: 1fr; }
}
.prod-card {
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}
.prod-card:hover {
  border-color: var(--primary-border);
  box-shadow: 0 4px 16px rgba(114,46,209,0.1);
  transform: translateY(-2px);
}
.prod-card-img-wrap {
  width: 100%;
  height: 140px;
  background: var(--chat-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.prod-card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.prod-card-rank {
  position: absolute;
  top: 6px;
  left: 6px;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.5);
}
.prod-card-rank.r1 { background: #FA8C16; }
.prod-card-rank.r2 { background: #8C8C8C; }
.prod-card-rank.r3 { background: #D48806; }
.prod-card-score {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(255,255,255,0.95);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 700;
}
.prod-card-score.excellent { color: var(--green); }
.prod-card-score.good { color: var(--blue); }
.prod-card-score.fair { color: var(--warn); }
.prod-card-body {
  padding: 10px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.prod-card-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--ink);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
  min-height: 39px;
}
.prod-card-shop {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.prod-card-shop .shop-icon {
  font-size: 10px;
}
.prod-card-metrics {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: auto;
}
.prod-card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--danger);
}
.prod-card-price .unit {
  font-size: 12px;
  font-weight: 400;
}
.prod-card-sales {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}
.prod-card-sales .sales-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
  display: block;
}

/* Pagination in chat */
.chat-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 18px 18px;
  flex-wrap: wrap;
}
.chat-page-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: #fff;
  color: var(--ink);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.chat-page-btn:hover:not(:disabled) {
  border-color: var(--primary);
  color: var(--primary);
}
.chat-page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.chat-page-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.chat-page-info {
  font-size: 12px;
  color: var(--muted);
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 16px 18px;
}
.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary-border);
  animation: typingBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-6px); opacity: 1; background: var(--primary); }
}

/* Empty result */
.empty-result {
  padding: 24px 18px;
  text-align: center;
  color: var(--muted);
}
.empty-result .emoji {
  font-size: 36px;
  margin-bottom: 8px;
}
.empty-result h4 {
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 4px;
}

/* ===== Bottom Input Bar ===== */
.input-bar {
  flex-shrink: 0;
  background: #fff;
  border-top: 1px solid var(--rule);
  padding: 14px 24px 20px;
}
.input-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-wrap {
  flex: 1;
  position: relative;
}
#chat-input {
  width: 100%;
  border: 2px solid var(--primary);
  border-radius: 20px;
  padding: 12px 20px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: box-shadow 0.2s;
  resize: none;
  min-height: 46px;
  max-height: 120px;
  line-height: 1.5;
  background: #fff;
  color: var(--ink);
}
#chat-input:focus {
  box-shadow: 0 0 0 4px rgba(114,46,209,0.1);
}
#chat-input::placeholder {
  color: #BFBFBF;
}
#send-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
#send-btn:hover {
  background: var(--primary-dark);
  transform: scale(1.05);
}
#send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Scrollbar */
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 3px; }
.chat-area::-webkit-scrollbar-thumb:hover { background: #BFBFBF; }
</style>
</head>
<body>

<!-- Top Header -->
<div class="top-header">
  <div class="logo-icon">AI</div>
  <div class="title-wrap">
    <span class="title">1688智能选品Agent</span>
    <span class="subtitle">多维度智能评分 · 实时数据匹配</span>
  </div>
  <div class="status-badge">
    <span class="status-dot"></span>
    在线
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chat-area">
  <div class="chat-inner" id="chat-inner">
    <div class="welcome-block" id="welcome-block">
      <div class="welcome-icon">AI</div>
      <h1>1688智能选品Agent</h1>
      <p>输入关键词，AI帮你智能选品。基于实时1688数据，多维度评分推荐最优货源。</p>
      <div class="welcome-suggestions">
        <span class="suggestion-chip" onclick="quickSearch('异形包')">异形包</span>
        <span class="suggestion-chip" onclick="quickSearch('瓷砖')">瓷砖</span>
        <span class="suggestion-chip" onclick="quickSearch('欧美女装')">欧美女装</span>
        <span class="suggestion-chip" onclick="quickSearch('美甲钻')">美甲钻</span>
        <span class="suggestion-chip" onclick="quickSearch('手机壳')">手机壳</span>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Input Bar -->
<div class="input-bar">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea id="chat-input" rows="1" placeholder="输入关键词搜索1688商品，如：异形包、瓷砖、欧美女装..." onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button id="send-btn" onclick="doSearch()" title="发送">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
// ===== Data =====
let PRODUCTS = [];
let currentResults = [];
let currentPage = 1;
let currentQuery = '';
let currentPriceFilter = 'all';
let currentSortBy = 'score';
let isSearching = false;
const PAGE_SIZE = 12;

// ===== Load Data =====
let DATA_LOADED = false;

async function loadData() {
  try {
    const resp = await fetch('assets/products.json');
    PRODUCTS = await resp.json();
    DATA_LOADED = true;
  } catch(e) {
    DATA_LOADED = true;
  }
}

// ===== Modifier Synonym Dictionary (based on real data analysis) =====
// 按类别组织修饰词同义词，用于自动扩展搜索
const MODIFIER_SYNONYMS = {
  // 风格类
  '跨境': ['外贸', '出口', '欧美', '速卖通', '亚马逊', '独立站', 'TEMU'],
  '外贸': ['跨境', '出口', '欧美'],
  '欧美': ['跨境', '外贸', '出口'],
  '韩版': ['韩系', '韩国'],
  '韩系': ['韩版', '韩国'],
  '日系': ['日本', '和风'],
  'ins': ['INS', '网红', '社交'],
  '网红': ['ins', '爆款', '热卖'],
  '爆款': ['热销', '网红', '新款', '热卖'],
  '热销': ['爆款', '热卖', '网红'],
  '新款': ['新品', '2024', '2025', '2026'],
  '小众': ['个性', '独特', '冷门'],
  '个性': ['小众', '独特', '创意'],
  '创意': ['个性', '搞怪', '新颖'],
  '搞怪': ['创意', '个性', '有趣'],
  '复古': ['怀旧', '经典', ' vintage'],
  '时尚': ['潮流', '时髦', '流行'],
  '潮流': ['时尚', '流行', '时髦'],
  '可爱': ['卡通', '萌', '甜美'],
  '卡通': ['可爱', '动漫', '萌'],
  '异形': ['个性', '创意', '搞怪', '小众', '独特', '不规则', '造型', '3D', '立体', '特殊', '几何', '不对称', '奇形', '异型', '设计感', '非标', '高颜值'],
  '立体': ['3D', '造型', '异形'],
  // 功能类
  '斜挎': ['单肩', '跨包', '斜跨'],
  '单肩': ['斜挎', '跨包', '斜跨'],
  '手提': ['手拎', '拎包'],

// Split a long compound keyword into known e-commerce segments
// Uses greedy matching (longest first) + 2-char fallback
// e.g., "欧美女装西装针织" → ["欧美", "女装", "西装", "针织"]
function splitLongKeyword(keyword) {
  if (!keyword || keyword.length <= 2) return [keyword];

  // Sort keywords by length descending (greedy: longest first)
  const sortedKeywords = [...ECOMMERCE_KEYWORDS].sort((a, b) => b.length - a.length);

  const result = [];
  let remaining = keyword;
  let maxIterations = 20;

  while (remaining.length > 0 && maxIterations-- > 0) {
    let found = false;

    // Try prefix match (greedy, longest first)
    for (const kw of sortedKeywords) {
      if (remaining.toLowerCase().startsWith(kw.toLowerCase())) {
        result.push(kw);
        remaining = remaining.slice(kw.length);
        found = true;
        break;
      }
    }

    if (!found) {
      // Try substring match: find earliest-occurring known keyword
      let bestMatch = null;
      let bestIdx = Infinity;
      for (const kw of sortedKeywords) {
        const idx = remaining.toLowerCase().indexOf(kw.toLowerCase());
        if (idx >= 0 && idx < bestIdx) {
          bestMatch = kw;
          bestIdx = idx;
        }
      }
      if (bestMatch !== null && bestIdx < remaining.length) {
        // If there's unmatched prefix, add it as a token (if length >= 2)
        if (bestIdx >= 2) {
          result.push(remaining.slice(0, bestIdx));
        } else if (bestIdx === 1) {
          // Single char prefix - attach to next match
          result.push(remaining[0] + bestMatch);
          remaining = remaining.slice(bestIdx + bestMatch.length);
          found = true;
          continue;
        }
        result.push(bestMatch);
        remaining = remaining.slice(bestIdx + bestMatch.length);
        found = true;
      }
    }

    if (!found) {
      // Fallback: take 2 chars at a time
      if (remaining.length >= 2) {
        result.push(remaining.slice(0, 2));
        remaining = remaining.slice(2);
      } else {
        // Single char left - append to last token if possible
        if (result.length > 0) {
          result[result.length - 1] += remaining;
        } else {
          result.push(remaining);
        }
        remaining = '';
      }
    }
  }

  return result.filter(t => t.length > 0);
}

// ===== Check if ambiguous char "包" means bag in this title =====
function isBagContext(title) {
  const titleLower = title.toLowerCase();
  const rules = AMBIGUOUS_CHARS['包'];

  // Check negative context first (higher priority - exclude non-bags)
  for (const neg of rules.negativeContext) {
    if (titleLower.includes(neg.toLowerCase())) {
      // But allow if there's also a strong positive signal
      const hasStrongPositive = rules.positiveContext.some(pos =>
        titleLower.includes(pos.toLowerCase()) && pos.length >= 3
      );
      if (!hasStrongPositive) return false;
    }
  }

  // Check positive context
  for (const pos of rules.positiveContext) {
    if (titleLower.includes(pos.toLowerCase())) return true;
  }

  // Position rule: "包" as last character
  if (rules.endOfTitleIsBag && titleLower.endsWith('包')) {
    // Check end exceptions
    for (const exc of rules.endExceptions) {
      if (titleLower.endsWith(exc.toLowerCase())) return false;
    }
    return true;
  }

  // Default: ambiguous, allow but with lower confidence
  return null;
}

  // 工具设备
  '打版', '打版纸', '裁缝', '缝纫机', '拷边机', '裁布机', '烫画机',
  '打标机', '锁边机', '包缝机',
];

const NON_CLOTHING_KEYWORDS = [
  // 宠物服装
  '宠物', '狗狗', '猫猫', '猫咪', '仓鼠', '兔子', '宠物服装', '宠物衣服',
  '狗衣服', '猫衣服', '四脚衣', '宠物用品',
  // 玩偶/模特
  '玩偶', '布娃娃', '芭比', '模特', '假人', '人台', '模特架',
  // 收纳/包装
  '收纳袋', '防尘罩', '保护套', '收纳箱', '整理袋', '包装袋',
];

// Check if company/shop name indicates an accessories seller
const ACCESSORY_COMPANY_KEYWORDS = ['辅料', '配件', '五金', '拉链', '纽扣', '扣具'];

function isClothingAccessory(title) {
  const titleLower = title.toLowerCase();
  let accessoryCount = 0;
  for (const kw of CLOTHING_ACCESSORY_KEYWORDS) {
    if (titleLower.includes(kw.toLowerCase())) accessoryCount++;
  }
  // 2+ accessory keywords → very likely an accessory, not clothing
  return accessoryCount >= 2;
}

function isNonClothingProduct(title) {
  const titleLower = title.toLowerCase();
  for (const kw of NON_CLOTHING_KEYWORDS) {
    if (titleLower.includes(kw.toLowerCase())) return true;
  }
  return false;
}

function isAccessorySeller(shopName) {
  if (!shopName) return false;
  const shopLower = shopName.toLowerCase();
  for (const kw of ACCESSORY_COMPANY_KEYWORDS) {
    if (shopLower.includes(kw.toLowerCase())) return true;
  }
  return false;
}

// Verify product is actual wearable clothing, not accessory/pet/non-clothing
function isClothingContext(title, shopName) {
  // Exclude pet clothing, doll clothes, etc.
  if (isNonClothingProduct(title)) return false;
  // Exclude accessories (buttons, zippers, etc.)
  if (isClothingAccessory(title)) return false;
  // Exclude products from accessory sellers
  if (isAccessorySeller(shopName)) return false;
  return true;
}

// ===== Decompose multi-modifier string into individual known modifiers =====
// e.g., "异形手提" → ["异形", "手提"], "跨境斜挎" → ["跨境", "斜挎"]
// Uses greedy prefix matching (longest first), then substring fallback
function decomposeModifier(modifier) {
  if (!modifier || modifier.length === 0) return [];

  // Sort known modifiers by length descending (longest first for greedy match)
  const sortedKeys = Object.keys(MODIFIER_SYNONYMS).sort((a, b) => b.length - a.length);

  const result = [];
  let remaining = modifier;
  let maxIterations = 10; // safety guard

  while (remaining.length > 0 && maxIterations-- > 0) {
    let found = false;

    // Try prefix match first (greedy, longest first)
    for (const key of sortedKeys) {
      if (remaining.startsWith(key)) {
        result.push(key);
        remaining = remaining.slice(key.length);
        found = true;
        break;
      }
    }

    if (!found) {
      // Try substring match: find the earliest-occurring known modifier
      let bestMatch = null;
      let bestIdx = Infinity;
      for (const key of sortedKeys) {
        const idx = remaining.indexOf(key);
        if (idx >= 0 && idx < bestIdx) {
          bestMatch = key;
          bestIdx = idx;
        }
      }
      if (bestMatch !== null) {
        // Add the prefix before the match as a token (if any)
        if (bestIdx > 0) result.push(remaining.slice(0, bestIdx));
        result.push(bestMatch);
        remaining = remaining.slice(bestIdx + bestMatch.length);
        found = true;
      }
    }

    if (!found) {
      // No known modifier found in remaining, add as-is
      result.push(remaining);
      break;
    }
  }

  return result;
}

// ===== Smart Tokenize (Universal Auto-Split Algorithm) =====
// Universal rules - NO per-keyword hardcoding:
// Rule 1: Known non-bag compounds → COMPOUND_SPLIT (e.g., 美甲钻 → [美甲, 钻])
// Rule 2: ANY "XX包" ending → decompose XX into modifiers + "包" + synonym expansion
//          - NON_BAG_SUFFIXES excluded (材料包, 贴纸包, etc.)
//          - Multi-modifier auto-decompose: "异形手提包" → [异形, 手提, 包]
//          - "包" always marked as ambiguous for isBagContext validation
// Rule 3: Token containing "包" mid-string → extract modifier + mark ambiguous
// Rule 4: Known modifier → MODIFIER_SYNONYMS synonym expansion
// Rule 5: Everything else → add as-is
function smartTokenize(query) {
  const raw = query.trim().toLowerCase();
  if (!raw) return { tokens: [], expandedTerms: [], isCompound: false, ambiguousChars: [] };

  // Step 1: Split by spaces/commas
  const baseTokens = raw.split(/[\s,，、]+/).filter(t => t.length > 0);

  let tokens = [];
  let expandedTerms = [];
  let isCompound = false;
  let ambiguousChars = [];

  baseTokens.forEach(bt => {
    // --- Rule 1: Known non-bag compound (e.g., 美甲钻, 饰品, 包装) ---
    if (COMPOUND_SPLIT[bt]) {
      const entry = COMPOUND_SPLIT[bt];
      tokens.push(...entry.split);
      expandedTerms.push(...entry.synonyms);
      isCompound = true;
      entry.split.forEach(t => {
        if (AMBIGUOUS_CHARS[t]) ambiguousChars.push(t);
      });
      return;
    }

    // --- Rule 2: UNIVERSAL "XX包" auto-split ---
    // ANY token ending in "包" (length > 1) that is NOT a known non-bag suffix
    if (bt.endsWith('包') && bt.length > 1) {
      // Known non-bag word (材料包, 贴纸包, etc.) → keep as single token, no bag validation
      if (NON_BAG_SUFFIXES.includes(bt)) {
        tokens.push(bt);
        return;
      }

      // Special case: "包包" → just "包"
      if (bt === '包包') {
        tokens.push('包');
        ambiguousChars.push('包');
        isCompound = true;
        return;
      }

      // UNIVERSAL AUTO-SPLIT: "XX包" → decompose XX into modifiers + "包"
      // e.g., "异形手提包" → [异形, 手提, 包], "跨境包" → [跨境, 包]
      const modifier = bt.slice(0, -1);
      const subModifiers = decomposeModifier(modifier);
      tokens.push(...subModifiers);
      tokens.push('包');
      isCompound = true;

      // Expand synonyms for each decomposed modifier
      subModifiers.forEach(sm => {
        if (MODIFIER_SYNONYMS[sm]) {
          expandedTerms.push(...MODIFIER_SYNONYMS[sm]);
        }
      });

      // "包" is ambiguous - needs isBagContext validation
      ambiguousChars.push('包');
      return;
    }

    // --- Rule 3: Token contains "包" but doesn't end with it (e.g., 包批发) ---
    if (bt.includes('包')) {
      tokens.push(bt);
      // Try to extract & decompose modifier before first "包"
      const bagIdx = bt.indexOf('包');
      if (bagIdx > 0) {
        const mod = bt.slice(0, bagIdx);
        const subMods = decomposeModifier(mod);
        subMods.forEach(sm => {
          if (MODIFIER_SYNONYMS[sm]) {
            expandedTerms.push(...MODIFIER_SYNONYMS[sm]);
          }
        });
      }
      // Mark "包" as ambiguous unless it's a known non-bag word
      if (!NON_BAG_SUFFIXES.includes(bt)) {
        ambiguousChars.push('包');
      }
      return;
    }

    // --- Rule 4: Known modifier → add token + synonym expansion ---
    if (MODIFIER_SYNONYMS[bt]) {
      tokens.push(bt);
      expandedTerms.push(...MODIFIER_SYNONYMS[bt]);
      if (AMBIGUOUS_CHARS[bt]) ambiguousChars.push(bt);
      return;
    }

    // --- Rule 5: Long keyword auto-split ---
    // For keywords longer than 2 chars that didn't match other rules,
    // try to split into known e-commerce segments
    if (bt.length > 2) {
      const segments = splitLongKeyword(bt);
      if (segments.length > 1) {
        tokens.push(...segments);
        isCompound = true;
        // Expand synonyms for each segment
        segments.forEach(seg => {
          if (MODIFIER_SYNONYMS[seg]) {
            expandedTerms.push(...MODIFIER_SYNONYMS[seg]);
          }
          if (AMBIGUOUS_CHARS[seg]) ambiguousChars.push(seg);
        });
        return;
      }
    }

    // --- Rule 5b: Default - add as-is ---
    tokens.push(bt);
    if (AMBIGUOUS_CHARS[bt]) ambiguousChars.push(bt);
  });

  // Final pass: expand synonyms for any token matching MODIFIER_SYNONYMS
  // (catches modifier tokens that were split from "XX包" compounds)
  tokens.forEach(t => {
    if (MODIFIER_SYNONYMS[t]) {
      expandedTerms.push(...MODIFIER_SYNONYMS[t]);
    }
  });

  // Deduplicate
  tokens = [...new Set(tokens)];
  expandedTerms = [...new Set(expandedTerms)];
  ambiguousChars = [...new Set(ambiguousChars)];

  return { tokens, expandedTerms, isCompound, ambiguousChars };
}

// ===== Search Logic (v3: context-aware matching for ambiguous chars) =====
function searchProducts(query, priceFilter, sortBy) {
  return searchProductsInArray(query, PRODUCTS, priceFilter, sortBy);
}

function searchProductsInArray(query, productArray, priceFilter, sortBy) {
  const { tokens, expandedTerms, isCompound, ambiguousChars } = smartTokenize(query);
  if (tokens.length === 0) return [];

  const requireAllTokens = isCompound && tokens.length >= 2;
  const hasAmbiguous = ambiguousChars.length > 0;
  // CRITICAL: if search contains "包" (bag), ALWAYS validate bag context
  // regardless of whether it's a compound word or separate token
  const mustValidateBag = ambiguousChars.includes('包');
  // Check if search keyword matches clothing category → validate clothing context
  const clothingCatConfig = matchCategory(query);
  const mustValidateClothing = clothingCatConfig && clothingCatConfig.categoryId === 200035008;
  // Multi-word search: if user inputs 2+ space-separated words, require ALL to match
  const multiWordSearch = tokens.length >= 2;

  const scored = productArray.map(p => {
    let score = 0;
    const titleLower = p.title.toLowerCase();
    const shopLower = p.shop.toLowerCase();
    const locationLower = p.location.toLowerCase();

    // --- Context validation for ambiguous chars (e.g., "包") ---
    // Must validate for BOTH local and API products
    let bagContextResult = null;
    if (mustValidateBag) {
      bagContextResult = isBagContext(p.title);
      // If "包" is in search and this product is NOT a bag, EXCLUDE immediately
      if (bagContextResult !== true) return null;
      // Accessory detection: if title has 2+ accessory keywords, it's a part not a bag
      if (isBagAccessory(p.title)) return null;
    }

    // --- Clothing context validation ---
    // Even for API products: exclude accessories, pet clothing, non-clothing items
    if (mustValidateClothing) {
      if (!isClothingContext(p.title, p.shop)) return null;
    }

    // --- Primary token matching ---
    let matchedTokens = 0;
    tokens.forEach(token => {
      const inTitle = titleLower.includes(token);
      const inShop = shopLower.includes(token);
      const inLocation = locationLower.includes(token);

      if (inTitle) {
        if (AMBIGUOUS_CHARS[token]) {
          score += (bagContextResult === true) ? 10 : 3;
        } else {
          score += 10;
        }
        if (!AMBIGUOUS_CHARS[token]) matchedTokens++;
        // Position bonus
        if (titleLower.startsWith(token) || titleLower.endsWith(token)) score += 5;
        // Frequency bonus
        const count = (titleLower.match(new RegExp(token, 'g')) || []).length;
        if (count > 1) score += count * 2;
      }
      if (inShop) { score += 3; if (!AMBIGUOUS_CHARS[token]) matchedTokens++; }
      if (inLocation) { score += 2; if (!AMBIGUOUS_CHARS[token]) matchedTokens++; }
      if (p.tags && p.tags.some(t => t.toLowerCase().includes(token))) score += 2;
    });

    // --- Synonym expansion matching (bonus only, does NOT count as token match) ---
    expandedTerms.forEach(term => {
      if (titleLower.includes(term)) score += 3;
    });

    // --- Relevance filtering for compound AND multi-word searches ---
    if (requireAllTokens || multiWordSearch) {
      const nonAmbiguousTokens = tokens.filter(t => !AMBIGUOUS_CHARS[t]);
      const ambiguousTokens = tokens.filter(t => AMBIGUOUS_CHARS[t]);

      // For API products: require ALL non-ambiguous tokens to match (same as local)
      // This ensures "男士休闲外套" matches products with ALL three words, not just "男士"
      if (p._fromAPI) {
        const allNonAmbiguousMatched = nonAmbiguousTokens.every(token =>
          titleLower.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
          (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
        );
        if (!allNonAmbiguousMatched && nonAmbiguousTokens.length > 0) return null;
      } else {
        // For local data: require ALL non-ambiguous tokens to match (strict)
        const allNonAmbiguousMatched = nonAmbiguousTokens.every(token =>
          titleLower.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
          (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
        );

        // For ambiguous tokens: must be confirmed context (e.g., "包" = bag)
        const allAmbiguousConfirmed = ambiguousTokens.every(token => {
          if (token === '包') return bagContextResult === true;
          return titleLower.includes(token);
        });

        if (!allNonAmbiguousMatched || !allAmbiguousConfirmed) return null;
      }
    }

    // Must have at least some primary token match
    if (score === 0) return null;

    // Bonus for confirmed bag context
    if (bagContextResult === true) score += 5;

    return { product: p, matchScore: score };
  }).filter(item => item !== null);

  // Apply price filter
  const filtered = scored.filter(item => {
    const price = item.product.price;
    if (priceFilter === 'all') return true;
    if (priceFilter === '0-5') return price < 5;
    if (priceFilter === '5-20') return price >= 5 && price < 20;
    if (priceFilter === '20-50') return price >= 20 && price < 50;
    if (priceFilter === '50+') return price >= 50;
    return true;
  });

  // Calculate composite score
  const maxSales = Math.max(...filtered.map(f => f.product.sales), 1);
  filtered.forEach(item => {
    item.compositeScore = calcCompositeScore(item.product, maxSales);
  });

  // Sort
  if (sortBy === 'score') {
    filtered.sort((a, b) => b.compositeScore - a.compositeScore);
  } else if (sortBy === 'sales') {
    filtered.sort((a, b) => b.product.sales - a.product.sales);
  } else if (sortBy === 'repurchase') {
    filtered.sort((a, b) => b.product.repurchase - a.product.repurchase);
  } else if (sortBy === 'price-low') {
    filtered.sort((a, b) => a.product.price - b.product.price);
  }

  return filtered; // Return all matched results
}

// ===== Scoring Model =====
// ===== Auto-detect & optimize: scan results for outlier products =====
// After initial search, this function:
// 1. Extracts high-frequency keywords from result titles
// 2. Identifies "outlier" products that don't share mainstream keywords
// 3. Extracts exclusion rules from outliers
// 4. Returns optimized result set + optimization report

function autoDetectAndOptimize(query, results) {
  if (!results || results.length < 10) {
    return { results, optimized: false, report: null };
  }

  const products = results.map(r => r.product || r);
  const titles = products.map(p => p.title || '');

  // Step 1: Extract 2-char and 3-char substrings, count frequency
  const freq2 = {};
  const freq3 = {};
  for (const title of titles) {
    const seen2 = new Set();
    const seen3 = new Set();
    for (let i = 0; i < title.length - 1; i++) {
      const sub2 = title.substr(i, 2);
      if (!seen2.has(sub2)) { freq2[sub2] = (freq2[sub2] || 0) + 1; seen2.add(sub2); }
    }
    for (let i = 0; i < title.length - 2; i++) {
      const sub3 = title.substr(i, 3);
      if (!seen3.has(sub3)) { freq3[sub3] = (freq3[sub3] || 0) + 1; seen3.add(sub3); }
    }
  }

  // Step 2: Find "mainstream" keywords (appear in >30% of titles)
  const threshold = Math.max(3, Math.floor(products.length * 0.3));
  const mainstream2 = Object.entries(freq2)
    .filter(([kw, count]) => count >= threshold && kw.length >= 2)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15)
    .map(([kw]) => kw);
  const mainstream3 = Object.entries(freq3)
    .filter(([kw, count]) => count >= threshold && kw.length >= 3)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([kw]) => kw);
  const mainstreamKeywords = [...mainstream3, ...mainstream2];

  // Filter out generic keywords that don't help distinguish categories
  const genericWords = ['的', '了', '和', '与', '在', '新款', '批发', '厂家', '直销', '现货', '热卖', '爆款'];
  const filteredMainstream = mainstreamKeywords.filter(kw => !genericWords.some(gw => kw === gw));

  if (filteredMainstream.length === 0) {
    return { results, optimized: false, report: null };
  }

  // Step 3: Identify outlier products (don't contain ANY mainstream keyword)
  const outliers = [];
  const normalProducts = [];
  for (let i = 0; i < products.length; i++) {
    const titleLower = (products[i].title || '').toLowerCase();
    const hasMainstream = filteredMainstream.some(kw => titleLower.includes(kw.toLowerCase()));
    if (!hasMainstream) {
      outliers.push({ index: i, product: products[i], result: results[i] });
    } else {
      normalProducts.push(results[i]);
    }
  }

  // If outliers < 5% or < 3 products, no optimization needed
  if (outliers.length < 3 || outliers.length / products.length < 0.05) {
    return { results, optimized: false, report: null };
  }

  console.log(`[AutoOptimize] Detected ${outliers.length} outlier products out of ${products.length}`);

  // Step 4: Extract common keywords from outliers (these become new exclusion words)
  const outlierFreq2 = {};
  for (const o of outliers) {
    const title = o.product.title || '';
    const seen = new Set();
    for (let i = 0; i < title.length - 1; i++) {
      const sub = title.substr(i, 2);
      if (!seen.has(sub)) { outlierFreq2[sub] = (outlierFreq2[sub] || 0) + 1; seen.add(sub); }
    }
  }

  // Find keywords that appear frequently in outliers but rarely in normal products
  const newExcludeWords = [];
  for (const [kw, outlierCount] of Object.entries(outlierFreq2)) {
    if (outlierCount < 2) continue;  // Must appear in at least 2 outliers
    const normalCount = freq2[kw] || 0;
    const normalProductCount = normalCount - outlierCount;
    // If keyword appears in >50% of outliers but <10% of normal products → exclusion word
    if (outlierCount / outliers.length >= 0.5 && normalProductCount / normalProducts.length < 0.1) {
      newExcludeWords.push({ keyword: kw, outlierCount, normalCount: normalProductCount });
    }
  }

  // Also check 3-char keywords
  const outlierFreq3 = {};
  for (const o of outliers) {
    const title = o.product.title || '';
    const seen = new Set();
    for (let i = 0; i < title.length - 2; i++) {
      const sub = title.substr(i, 3);
      if (!seen.has(sub)) { outlierFreq3[sub] = (outlierFreq3[sub] || 0) + 1; seen.add(sub); }
    }
  }
  for (const [kw, outlierCount] of Object.entries(outlierFreq3)) {
    if (outlierCount < 2) continue;
    const normalCount = freq3[kw] || 0;
    const normalProductCount = normalCount - outlierCount;
    if (outlierCount / outliers.length >= 0.4 && normalProductCount / normalProducts.length < 0.1) {
      newExcludeWords.push({ keyword: kw, outlierCount, normalCount: normalProductCount });
    }
  }

  // Sort by outlier frequency (most common in outliers first)
  newExcludeWords.sort((a, b) => b.outlierCount - a.outlierCount);

  // Filter out overly short or generic words
  const validExcludeWords = newExcludeWords
    .filter(w => w.keyword.length >= 2 && !genericWords.includes(w.keyword))
    .map(w => w.keyword);

  if (validExcludeWords.length === 0) {
    // Even without extractable exclusion words, just remove outliers
    const optimizedResults = normalProducts;
    return {
      results: optimizedResults,
      optimized: true,
      report: {
        outlierCount: outliers.length,
        totalCount: products.length,
        excludeWords: [],
        outlierSamples: outliers.slice(0, 5).map(o => (o.product.title || '').substr(0, 40)),
      }
    };
  }

  // Step 5: Re-filter ALL results using new exclusion words
  // (not just outliers - some outliers might have been borderline)
  const optimizedResults = results.filter(r => {
    const p = r.product || r;
    const titleLower = (p.title || '').toLowerCase();
    const shopLower = (p.shop || '').toLowerCase();
    for (const ew of validExcludeWords) {
      if (titleLower.includes(ew.toLowerCase()) || shopLower.includes(ew.toLowerCase())) {
        return false;
      }
    }
    return true;
  });

  console.log(`[AutoOptimize] Extracted exclude words: ${validExcludeWords.join(', ')}`);
  console.log(`[AutoOptimize] ${results.length} → ${optimizedResults.length} (removed ${results.length - optimizedResults.length})`);

  return {
    results: optimizedResults,
    optimized: true,
    report: {
      outlierCount: outliers.length,
      totalCount: products.length,
      excludeWords: validExcludeWords,
      outlierSamples: outliers.slice(0, 5).map(o => (o.product.title || '').substr(0, 40)),
      mainstreamKeywords: filteredMainstream.slice(0, 5),
    }
  };
}

function calcCompositeScore(p, maxSales) {
  // Market validation (35 pts)
  let marketScore = 0;
  if (p.sales >= 50000) marketScore = 35;
  else if (p.sales >= 10000) marketScore = 28;
  else if (p.sales >= 5000) marketScore = 22;
  else if (p.sales >= 1000) marketScore = 15;
  else if (p.sales >= 100) marketScore = 8;
  else marketScore = 3;

  // Repurchase rate (25 pts)
  let repurchaseScore = 0;
  if (p.repurchase >= 50) repurchaseScore = 25;
  else if (p.repurchase >= 30) repurchaseScore = 20;
  else if (p.repurchase >= 20) repurchaseScore = 15;
  else if (p.repurchase >= 10) repurchaseScore = 10;
  else if (p.repurchase > 0) repurchaseScore = 5;

  // Credit level (20 pts)
  let creditScore = 0;
  if (p.credit >= 15) creditScore = 20;
  else if (p.credit >= 10) creditScore = 15;
  else if (p.credit >= 5) creditScore = 8;
  else creditScore = 3;

  // Price advantage (10 pts) - lower price = higher score
  let priceScore = 10;
  if (p.price > 100) priceScore = 1;
  else if (p.price > 50) priceScore = 3;
  else if (p.price > 20) priceScore = 5;
  else if (p.price > 5) priceScore = 7;
  else if (p.price > 1) priceScore = 9;
  else priceScore = 10;

  // Service tags (10 pts, 2pts each, max 10)
  const tagScore = Math.min(10, (p.tags ? p.tags.length : 0) * 2);

  return Math.round((marketScore + repurchaseScore + creditScore + priceScore + tagScore) * 10) / 10;
}

function getScoreGrade(score) {
  if (score >= 80) return { grade: 'excellent', label: '优选', cls: 'score-excellent' };
  if (score >= 65) return { grade: 'good', label: '推荐', cls: 'score-good' };
  if (score >= 50) return { grade: 'fair', label: '一般', cls: 'score-fair' };
  return { grade: 'low', label: '观望', cls: 'score-fair' };
}

// MD5 hash function (using crypto-js CDN library)
function md5Hash(str) {
  return CryptoJS.MD5(str).toString();
}

// Generate MD5 signature for API request
function generateApiSign(params) {
  // Sort keys alphabetically
  const sortedKeys = Object.keys(params).filter(k => params[k] !== null && params[k] !== undefined && k !== 'sign').sort();
  // Build sign string: appSecret=xxx&k1=v1&k2=v2&...&appSecret=xxx
  const parts = sortedKeys.map(k => {
    let v = params[k];
    if (Array.isArray(v)) { v = '[' + v.join(',') + ']'; }
    return k + '=' + v;
  });
  const signStr = 'appSecret=' + API_APP_SECRET + '&' + parts.join('&') + '&appSecret=' + API_APP_SECRET;
  return md5Hash(signStr);
}

// Call DianLeiDa API directly (no proxy needed)
async function callDianLeiDaAPI(action, params) {
  // Build full request with signature
  const nonceStr = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
  const allParams = {
    appId: API_APP_ID,
    nonceStr: nonceStr,
    ...params,
  };
  allParams.sign = generateApiSign(allParams);

  const resp = await fetch(API_DIRECT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(allParams),
  });
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

// Match a search keyword to a category config
// Returns the category config object or null if no match
function matchCategory(keyword) {
  for (const [name, config] of Object.entries(CATEGORY_CONFIG)) {
    // Check if keyword contains any match keyword
    if (config.matchKeywords.some(kw => keyword.includes(kw))) {
      return config;
    }
  }
  return null;
}

// Check if a product should be excluded based on category config
function shouldExcludeByCategory(levelName, title, catConfig) {
  if (!catConfig) return false;

  // Check levelName against excludeSubcategories
  if (levelName && catConfig.excludeSubcategories) {
    for (const sub of catConfig.excludeSubcategories) {
      if (levelName.includes(sub)) return true;
    }
  }

  // Check title against excludeTitleKeywords
  if (title && catConfig.excludeTitleKeywords) {
    for (const kw of catConfig.excludeTitleKeywords) {
      if (title.includes(kw)) return true;
    }
  }

  return false;
}

// Fetch all pages of search results from API
// Uses concurrent requests for speed (5 pages at a time)
// Multi-query strategy: when keyword is "descriptor + category" (e.g. "异形包"),
// also search with just the descriptor ("异形") to get more relevant results
async function fetchProductsFromAPI(keyword) {
  const allProducts = [];
  const seenOfferIds = new Set(); // For deduplication
  const pageSize = 100;

  // Universal category matching: find the best category for this keyword
  const catConfig = matchCategory(keyword);
  const hasCategoryFilter = catConfig !== null;

  // === Multi-query strategy ===
  // If keyword contains a category word (e.g. "包" in "异形包"), generate
  // an additional search with just the descriptor ("异形") for better relevance
  const searchQueries = generateSearchQueries(keyword, catConfig);
  console.log(`[MultiQuery] Search queries: ${JSON.stringify(searchQueries)}`);

  for (const searchKW of searchQueries) {
    console.log(`[MultiQuery] Searching: "${searchKW}"`);
    const products = await searchSingleQuery(searchKW, catConfig, hasCategoryFilter, pageSize);

    // Merge with deduplication
    for (const p of products) {
      const oid = p.offerId || p.id;
      if (!seenOfferIds.has(oid)) {
        seenOfferIds.add(oid);
        allProducts.push(p);
      }
    }
    console.log(`[MultiQuery] "${searchKW}" returned ${products.length} products (total unique: ${allProducts.length})`);
  }

  return allProducts;
}

// Generate multiple search queries for better coverage
// e.g. "异形包" → ["异形包", "异形"] (full keyword + descriptor only)
function generateSearchQueries(keyword, catConfig) {
  const queries = [keyword]; // Always search with full keyword first

  // If keyword ends with a category word, also search without it
  if (catConfig && catConfig.matchKeywords) {
    for (const catKW of catConfig.matchKeywords) {
      // Check if keyword contains this category word (e.g. "包" in "异形包")
      if (keyword.length > catKW.length && keyword.includes(catKW)) {
        // Extract the descriptor part (e.g. "异形" from "异形包")
        let descriptor = keyword.replace(catKW, '').trim();
        // Only add if descriptor is meaningful (length >= 2)
        if (descriptor.length >= 2 && descriptor !== keyword) {
          queries.push(descriptor);
          break; // Only add one descriptor query
        }
      }
    }
  }

  return queries;
}

// Search a single query and return products
async function searchSingleQuery(keyword, catConfig, hasCategoryFilter, pageSize) {
  const products = [];

  const baseParams = {
    pageSize: pageSize,
    keyWord: keyword,
    searchType: '1',
    sortField: 'orderCount30d',
    sortType: 'desc',
    cycle: 30,
  };
  if (hasCategoryFilter) {
    baseParams.categoryIdList = [catConfig.categoryId];
  }

  // Step 1: Fetch first page to get totalPages
  let firstResult = await callDianLeiDaAPI('search', { ...baseParams, pageIndex: 1 });
  if (firstResult.code !== 200) {
    throw new Error(`API error: ${firstResult.msg}`);
  }

  // Fallback: if category filter returns 0 results, retry without category filter
  if (hasCategoryFilter && (!firstResult.result.totalPages || firstResult.result.totalPages === 0)) {
    console.log('Category filter returned 0 results, retrying without category filter...');
    const fallbackParams = { ...baseParams };
    delete fallbackParams.categoryIdList;
    firstResult = await callDianLeiDaAPI('search', { ...fallbackParams, pageIndex: 1 });
    if (firstResult.code !== 200) {
      throw new Error(`API error: ${firstResult.msg}`);
    }
  }

  const totalPages = Math.min(firstResult.result.totalPages || 1, 20);

  // Process first page products
  processAPIProducts(firstResult.result.list || [], products, catConfig);

  // Step 2: Fetch remaining pages concurrently (5 at a time)
  const remainingPages = [];
  for (let i = 2; i <= totalPages; i++) {
    remainingPages.push(i);
  }

  // Batch concurrent requests: 5 pages at a time
  const BATCH_SIZE = 5;
  for (let i = 0; i < remainingPages.length; i += BATCH_SIZE) {
    const batch = remainingPages.slice(i, i + BATCH_SIZE);
    const promises = batch.map(pageIndex =>
      callDianLeiDaAPI('search', { ...baseParams, pageIndex })
        .catch(err => {
          console.warn(`Page ${pageIndex} failed: ${err.message}`);
          return null;
        })
    );
    const results = await Promise.all(promises);

    for (const result of results) {
      if (result && result.code === 200 && result.result) {
        processAPIProducts(result.result.list || [], products, catConfig);
      }
    }
  }

  return products;
}

// Process API products: filter and convert to internal format
function processAPIProducts(items, allProducts, catConfig) {
  for (const item of items) {
    const levelName = item.levelName || '';
    const title = item.title || '';

    // Universal local filter: exclude accessories/irrelevant subcategories
    if (catConfig && shouldExcludeByCategory(levelName, title, catConfig)) {
      continue;
    }

    allProducts.push({
      id: String(item.offerId || ''),
      title: title,
      shop: item.company || '',
      model: item.companyType === 1 ? '生产加工' : item.companyType === 2 ? '经销批发' : '--',
      location: item.city || item.province || '',
      price: item.price || 0,
      sales: item.saleQuantity || 0,
      repurchase: 0,
      credit: 0,
      tags: (() => {
        try { return JSON.parse(item.buyerProtections || '[]'); }
        catch(e) { return []; }
      })(),
      img: item.image || '',
      link: `http://detail.m.1688.com/page/index.html?offerId=${item.offerId}`,
      _orderCount: item.orderCount || 0,
      _salesVolume: item.salesVolume || 0,
      _consignPrice: item.consignPrice || 0,
      _tpYear: item.tpYear || 0,
      _levelName: levelName,
      _fromAPI: true,
    });
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function addUserMessage(text) {
  const inner = document.getElementById('chat-inner');

  row.className = 'msg-row user';

function buildThinkingSection(thinkingLines) {
  let html = '<div class="thinking-section">';
  html += '<div class="thinking-header" onclick="toggleThinking(this)">';
  html += '<span class="think-icon">🧠</span>';
  html += '<span class="think-title">思考过程</span>';
  html += '<span class="think-toggle">▼</span>';
  html += '</div>';
  html += '<div class="thinking-body show">';
  thinkingLines.forEach(line => {
    html += `<div class="think-line">${line}</div>`;
  });
  html += '</div></div>';
  return html;
}

function toggleThinking(headerEl) {
  const body = headerEl.nextElementSibling;
  if (body.classList.contains('show')) {
    body.classList.remove('show');
    headerEl.classList.add('collapsed');
  } else {
    body.classList.add('show');
    headerEl.classList.remove('collapsed');
  }
}

function buildSkillCard(status, title, detailHtml, extraHtml) {
  const dotClass = status === 'active' ? 'active' : 'done';
  const cardClass = status === 'active' ? 'skill-card active' : 'skill-card done';
  let html = `<div class="${cardClass}">`;
  html += `<div class="skill-dot ${dotClass}"></div>`;
  html += `<div class="skill-body">`;
  html += `<div class="skill-title">${escapeHtml(title)}</div>`;
  html += `<div class="skill-detail">${detailHtml}</div>`;
  if (extraHtml) html += extraHtml;
  html += `</div></div>`;
  return html;
}

async function doSearch() {
  const input = document.getElementById('chat-input');
  const query = input.value.trim();
  if (!query || isSearching) return;

  isSearching = true;
  document.getElementById('send-btn').disabled = true;

  // Add user message
  addUserMessage(query);

  // Clear input
  input.value = '';
  autoResize(input);

  // Create AI message bubble
  const bubble = addAIMessage();
  currentQuery = query;
  currentPriceFilter = 'all';
  currentSortBy = 'score';
  currentPage = 1;

  // Prepare thinking lines
  const thinkingLines = [
    `<strong>用户输入：</strong>"${escapeHtml(query)}"`,
    `<strong>任务：</strong>理解关键词意图，调用智能分词引擎，扩展同义词，验证歧义，从1688实时匹配商品并综合评分排序`
  ];

  // Step 1: Keyword understanding
  await sleep(400);
  let content = buildThinkingSection(thinkingLines);
  content += '<div class="skill-cards" id="skill-cards">';
  content += buildSkillCard('done', 'Step 1: 关键词理解', `接收用户输入："${escapeHtml(query)}"`);
  content += '</div>';
  setAIContent(bubble, content);

  // Step 2: Smart tokenization
  const { tokens, expandedTerms, isCompound, ambiguousChars } = smartTokenize(query);
  await sleep(500);
  let skillCards = document.getElementById('skill-cards');
  let splitDetail;
  if (tokens.length === 0) {
    splitDetail = '未能识别有效关键词';
  } else {
    const tokenDesc = tokens.map(t => `"${escapeHtml(t)}"`).join(' + ');
    splitDetail = isCompound
      ? `检测到复合词，自动拆分 → ${tokenDesc}`
      : `拆分为 ${tokens.length} 个核心词：${tokenDesc}`;
  }
  let tokensHtml = '';
  if (tokens.length > 0) {
    tokensHtml = '<div class="skill-tokens">' +
      tokens.map(t => `<span class="skill-token">${escapeHtml(t)}</span>`).join('') +
      '</div>';
  }
  skillCards.insertAdjacentHTML('beforeend',
    buildSkillCard('done', 'Step 2: 智能分词', escapeHtml(splitDetail), tokensHtml)
  );
  scrollToBottom();

  // Step 3: Synonym expansion
  await sleep(500);
  let synDetail, synExtra = '';
  if (expandedTerms.length > 0) {
    const shown = expandedTerms.slice(0, 12);
    const more = expandedTerms.length > 12 ? `...等${expandedTerms.length}个` : '';
    synDetail = `基于修饰词词典扩展同义词：${escapeHtml(shown.join('、') + more)}`;
    synExtra = '<div class="skill-tags">' +
      shown.slice(0, 8).map(t => `<span class="skill-tag">${escapeHtml(t)}</span>`).join('') +
      '</div>';
  } else {
    synDetail = '当前关键词无需同义词扩展';
  }
  skillCards.insertAdjacentHTML('beforeend',
    buildSkillCard('done', 'Step 3: 同义词扩展', synDetail, synExtra)
  );
  scrollToBottom();

  // Step 4: Ambiguity verification
  await sleep(500);
  const mustValidateBag = ambiguousChars.includes('包');
  let ambigDetail;
  if (mustValidateBag) {
    ambigDetail = '检测到歧义字符「包」→ 启动上下文验证，排除材料包/贴纸包/配件包等非包包商品';
  } else {
    ambigDetail = '未检测到歧义字符，无需上下文验证';
  }
  skillCards.insertAdjacentHTML('beforeend',
    buildSkillCard('done', 'Step 4: 歧义验证', escapeHtml(ambigDetail))
  );
  scrollToBottom();

  // Step 5: Product matching (active state)
  await sleep(500);
  const catConfig = matchCategory(query);
  const catFilterDesc = catConfig
    ? `已匹配1688类目(ID:${catConfig.categoryId})，仅返回该类目商品`
    : '未匹配到特定类目，返回全量搜索结果';
  skillCards.insertAdjacentHTML('beforeend',
    buildSkillCard('active', 'Step 5: 商品匹配', `正在从1688实时拉取商品数据... ${escapeHtml(catFilterDesc)}`)
  );
  scrollToBottom();

  // Fetch products
  let apiProducts = [];
  let apiError = null;
  try {
    if (API_MODE === 'api') {
      apiProducts = await fetchProductsFromAPI(query);
    } else {
      apiProducts = PRODUCTS;
    }
  } catch (e) {
    apiError = e.message;
    apiProducts = PRODUCTS;
  }

  // Cache for re-filtering when price/sort changes
  window._lastApiProducts = apiProducts;

  // Update step 5 to done with result
  let bagExcluded = 0;
  let accessoryExcluded = 0;
  if (mustValidateBag) {
    for (const p of apiProducts) {
      if (isBagContext(p.title) !== true) {
        bagExcluded++;
      } else if (isBagAccessory(p.title)) {
        accessoryExcluded++;
      }
    }
  }
  const totalExcluded = bagExcluded + accessoryExcluded;
  const searchQueries = generateSearchQueries(query, catConfig);
  const multiQueryNote = searchQueries.length > 1
    ? `（多关键词搜索：${searchQueries.map(q => `"${escapeHtml(q)}"`).join(' + ')}）`
    : '';
  const matchDetail = apiError
    ? `API暂时不可用（${escapeHtml(apiError)}），已切换到本地${PRODUCTS.length}条数据 → 匹配中`
    : `从1688实时拉取 ${apiProducts.length} 条商品${multiQueryNote}${catConfig ? '（类目过滤排除部分无关商品）' : ''}`;

  // Replace last skill card (step 5) with done status
  const cards = skillCards.querySelectorAll('.skill-card');
  const step5Card = cards[cards.length - 1];
  step5Card.className = 'skill-card done';
  step5Card.querySelector('.skill-dot').className = 'skill-dot done';
  step5Card.querySelector('.skill-title').textContent = 'Step 5: 商品匹配';
  step5Card.querySelector('.skill-detail').innerHTML = escapeHtml(matchDetail);

  // Now do local matching on the fetched products
  let results = searchProductsInArray(query, apiProducts, currentPriceFilter, currentSortBy);

  // Fallback: if API returned products but local matching filtered all out
  if (results.length === 0 && apiProducts.length > 0 && API_MODE === 'api') {
    const maxSales = Math.max(...apiProducts.map(p => p.sales), 1);
    results = apiProducts
      .filter(p => {
        if (currentPriceFilter === 'all') return true;
        if (currentPriceFilter === '0-5') return p.price < 5;
        if (currentPriceFilter === '5-20') return p.price >= 5 && p.price < 20;
        if (currentPriceFilter === '20-50') return p.price >= 20 && p.price < 50;
        if (currentPriceFilter === '50+') return p.price >= 50;
        return true;
      })
      .map(p => ({
        product: p,
        matchScore: 1,
        compositeScore: calcCompositeScore(p, maxSales),
      }))
      .sort((a, b) => b.compositeScore - a.compositeScore);
  }

  // ===== Auto-detect & optimize step =====
  let autoOptReport = null;
  let autoOptExcluded = 0;
  if (results.length >= 10) {
    const optResult = autoDetectAndOptimize(query, results);
    if (optResult.optimized) {
      autoOptExcluded = results.length - optResult.results.length;
      autoOptReport = optResult.report;
      results = optResult.results;
    }
  }

  // Show auto-optimize step (Step 6)
  if (autoOptReport) {
    await sleep(400);
    const excludeWordsStr = autoOptReport.excludeWords.length > 0
      ? autoOptReport.excludeWords.join('、')
      : '（无特定排除词，直接移除离群商品）';
    skillCards.insertAdjacentHTML('beforeend',
      buildSkillCard('done', 'Step 6: 智能检测优化',
        `检测到 ${autoOptReport.outlierCount} 款离群商品（共 ${autoOptReport.totalCount} 款）→ 提取排除词：${escapeHtml(excludeWordsStr)} → 移除 ${autoOptExcluded} 款不相关商品`)
    );
    scrollToBottom();
  }

  // Step 7: Score ranking
  await sleep(400);
  let rankDetail;
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    const locations = {};
    results.forEach(r => {
      const loc = r.product.location || '未知';
      locations[loc] = (locations[loc] || 0) + 1;
    });
    const topLocations = Object.entries(locations).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const stepNum = autoOptReport ? 'Step 7' : 'Step 6';
    rankDetail = `匹配 ${results.length} 款商品 · 最高评分 ${topScore} · 均价 ¥${avgPrice.toFixed(1)} · 均销量 ${Math.round(avgSales)} · 产地TOP3: ${topLocations.map(l => `${escapeHtml(l[0])}(${l[1]})`).join(', ')}`;
  } else {
    rankDetail = '无匹配商品';
  }
  const stepNum = autoOptReport ? 'Step 7' : 'Step 6';
  skillCards.insertAdjacentHTML('beforeend',
    buildSkillCard('done', `${stepNum}: 综合排序`, escapeHtml(rankDetail))
  );

  // Build summary + results
  currentResults = results;
  currentPage = 1;

  let resultsHtml = '';

  // AI summary text
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    const locations = {};
    results.forEach(r => {
      const loc = r.product.location || '未知';
      locations[loc] = (locations[loc] || 0) + 1;
    });
    const topLocations = Object.entries(locations).sort((a, b) => b[1] - a[1]).slice(0, 3);

    let insight = '';
    if (results.length > 200) {
      insight = `匹配商品较多（${results.length}款），建议添加更具体的修饰词（如<strong>跨境、韩版、真皮</strong>）缩小范围，聚焦高评分商品。`;
    } else if (results.length > 50) {
      insight = `匹配商品适中（${results.length}款），TOP商品评分<strong>${topScore}</strong>，建议优先关注评分≥65的推荐商品。`;
    } else if (results.length > 10) {
      insight = `匹配精准（${results.length}款），已筛选出高相关度商品。建议结合复购率和产地综合判断。`;
    } else {
      insight = `匹配较少（${results.length}款），关键词较为精准。可尝试扩展同义词或减少修饰词增加结果。`;
    }

    resultsHtml += `<div class="ai-summary">`;
    resultsHtml += `已为你匹配到 <span class="highlight">${results.length} 款商品</span>，`;
    resultsHtml += `最高评分 <span class="stat-inline"><span class="v">${topScore}</span></span>`;
    resultsHtml += `，均价 <span class="stat-inline"><span class="v">¥${avgPrice.toFixed(1)}</span></span>`;
    resultsHtml += `，均销量 <span class="stat-inline"><span class="v">${Math.round(avgSales).toLocaleString()}</span></span>`;
    if (topLocations.length > 0) {
      resultsHtml += `，主要产地：${topLocations.map(l => escapeHtml(l[0])).join('、')}`;
    }
    resultsHtml += `。${insight}`;
    if (totalExcluded > 0) {
      resultsHtml += `<br><span style="color:var(--muted);font-size:12px;">已通过上下文验证排除 ${totalExcluded} 款非目标商品（非包包商品 ${bagExcluded} 款 + 配件商品 ${accessoryExcluded} 款）</span>`;
    }
    if (autoOptExcluded > 0) {
      resultsHtml += `<br><span style="color:var(--muted);font-size:12px;">智能检测优化移除 ${autoOptExcluded} 款离群商品</span>`;
    }
    resultsHtml += `</div>`;

    // Toolbar
    resultsHtml += buildToolbar(results.length);
    // Product grid
    resultsHtml += renderProductGrid(results, currentPage);
    // Pagination
    resultsHtml += renderChatPagination(results.length, currentPage);
  } else {
    resultsHtml += `<div class="empty-result">`;
    resultsHtml += `<div class="emoji">😔</div>`;
    resultsHtml += `<h4>未找到匹配「${escapeHtml(query)}」的商品</h4>`;
    resultsHtml += `<p>试试更宽泛的关键词，如「饰品」「包装」「DIY」</p>`;
    resultsHtml += `</div>`;
  }

  bubble.insertAdjacentHTML('beforeend', resultsHtml);
  scrollToBottom();

  isSearching = false;
  document.getElementById('send-btn').disabled = false;
}

function buildToolbar(total) {
  let html = '<div class="result-toolbar">';
  html += '<div class="toolbar-group">';
  html += '<span class="toolbar-label">价格：</span>';
  html += `<span class="toolbar-chip ${currentPriceFilter==='all'?'active':''}" onclick="changePriceFilter('all')">全部</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='0-5'?'active':''}" onclick="changePriceFilter('0-5')">0-5元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='5-20'?'active':''}" onclick="changePriceFilter('5-20')">5-20元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='20-50'?'active':''}" onclick="changePriceFilter('20-50')">20-50元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='50+'?'active':''}" onclick="changePriceFilter('50+')">50元以上</span>`;
  html += '</div>';
  html += '<div class="toolbar-group">';
  html += '<span class="toolbar-label">排序：</span>';
  html += `<span class="toolbar-chip ${currentSortBy==='score'?'active':''}" onclick="changeSortBy('score')">综合评分</span>`;
  html += `<span class="toolbar-chip ${currentSortBy==='sales'?'active':''}" onclick="changeSortBy('sales')">销量</span>`;
  html += `<span class="toolbar-chip ${currentSortBy==='repurchase'?'active':''}" onclick="changeSortBy('repurchase')">复购率</span>`;
  html += `<span class="toolbar-chip ${currentSortBy==='price-low'?'active':''}" onclick="changeSortBy('price-low')">价格最低</span>`;
  html += '</div>';
  html += `<span class="toolbar-result-count">共 <strong>${total}</strong> 款</span>`;
  html += '</div>';
  return html;
}

function renderProductGrid(results, page) {
  const start = (page - 1) * PAGE_SIZE;
  const pageResults = results.slice(start, start + PAGE_SIZE);
  let html = '<div class="product-grid">';
  pageResults.forEach((item, i) => {
    html += renderProductCard(item, start + i + 1);
  });
  html += '</div>';
  return html;
}

function renderProductCard(item, rank) {
  const p = item.product;
  const score = item.compositeScore;
  const grade = getScoreGrade(score);

  let rankCls = '';
  if (rank === 1) rankCls = 'r1';
  else if (rank === 2) rankCls = 'r2';
  else if (rank === 3) rankCls = 'r3';

  const imgHtml = p.img
    ? `<img class="prod-card-img" src="${escapeHtml(p.img)}" alt="" onerror="this.style.opacity=0.3;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect width=%22120%22 height=%22120%22 fill=%22%23F5F7FA%22/></svg>'">`
    : `<div style="font-size:32px;color:#ccc;">📦</div>`;

  return `
    <div class="prod-card" onclick="window.open('${escapeHtml(p.link)}', '_blank')">
      <div class="prod-card-img-wrap">
        ${rank ? `<div class="prod-card-rank ${rankCls}">${rank}</div>` : ''}
        <div class="prod-card-score ${grade.cls}">${score}</div>
        ${imgHtml}
      </div>
      <div class="prod-card-body">
        <div class="prod-card-title">${escapeHtml(p.title)}</div>
        <div class="prod-card-shop">
          <span class="shop-icon">🏪</span>${escapeHtml(p.shop || '未知店铺')}
        </div>
        <div class="prod-card-metrics">
          <div class="prod-card-price">¥${p.price}<span class="unit">起</span></div>
          <div class="prod-card-sales">
            <span class="sales-val">${p.sales > 0 ? p.sales.toLocaleString() : '--'}</span>
            月销量
          </div>
        </div>
      </div>
    </div>`;
}

function renderChatPagination(total, page) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) {
    return `<div class="chat-pagination"><span class="chat-page-info">共 ${total} 款商品</span></div>`;
  }
  let html = '<div class="chat-pagination">';
  const startIdx = (page - 1) * PAGE_SIZE + 1;
  const endIdx = Math.min(page * PAGE_SIZE, total);
  html += `<span class="chat-page-info">第 ${startIdx}-${endIdx} 条 / 共 ${total} 条</span>`;
  if (page > 1) {
    html += `<button class="chat-page-btn" onclick="goToPage(${page - 1})">上一页</button>`;
  } else {
    html += `<button class="chat-page-btn" disabled>上一页</button>`;
  }
  let startPage = Math.max(1, page - 2);
  let endPage = Math.min(totalPages, page + 2);
  if (endPage - startPage < 4) {
    if (startPage === 1) endPage = Math.min(totalPages, 5);
    else startPage = Math.max(1, totalPages - 4);
  }
  if (startPage > 1) {
    html += `<button class="chat-page-btn" onclick="goToPage(1)">1</button>`;
    if (startPage > 2) html += `<span class="chat-page-info">...</span>`;
  }
  for (let i = startPage; i <= endPage; i++) {
    if (i === page) {
      html += `<button class="chat-page-btn active">${i}</button>`;
    } else {
      html += `<button class="chat-page-btn" onclick="goToPage(${i})">${i}</button>`;
    }
  }
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span class="chat-page-info">...</span>`;
    html += `<button class="chat-page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }
  if (page < totalPages) {
    html += `<button class="chat-page-btn" onclick="goToPage(${page + 1})">下一页</button>`;
  } else {
    html += `<button class="chat-page-btn" disabled>下一页</button>`;
  }
  html += '</div>';
  return html;
}

function goToPage(page) {
  const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  // Find the last AI bubble and update its product grid + pagination
  const bubbles = document.querySelectorAll('.ai-bubble');
  if (bubbles.length === 0) return;
  const bubble = bubbles[bubbles.length - 1];
  // Replace product grid
  const grid = bubble.querySelector('.product-grid');
  if (grid) {
    grid.outerHTML = renderProductGrid(currentResults, currentPage);
  }
  // Replace pagination
  const pagination = bubble.querySelector('.chat-pagination');
  if (pagination) {
    pagination.outerHTML = renderChatPagination(currentResults.length, currentPage);
  }
  // Update toolbar count highlight
  scrollToBottom();
}

function changePriceFilter(filter) {
  if (currentPriceFilter === filter) return;
  currentPriceFilter = filter;
  currentPage = 1;
  reSearchCurrent();
}

function changeSortBy(sort) {
  if (currentSortBy === sort) return;
  currentSortBy = sort;
  currentPage = 1;
  reSearchCurrent();
}

function reSearchCurrent() {
  // Re-run searchProductsInArray on the last fetched products using new filters
  // We need to re-fetch or use cached products. Since we don't cache, re-run full search.
  // For simplicity, re-run the entire search flow but without re-adding user message.
  if (!currentQuery) return;

  // Find last AI bubble
  const bubbles = document.querySelectorAll('.ai-bubble');
  if (bubbles.length === 0) return;
  const bubble = bubbles[bubbles.length - 1];

  // Re-run search using cached apiProducts if available, else re-fetch
  // We'll store last apiProducts on window
  if (!window._lastApiProducts) {
    // fallback: re-run full doSearch is complex, just re-filter currentResults
    reFilterResults(bubble);
    return;
  }

  let results = searchProductsInArray(currentQuery, window._lastApiProducts, currentPriceFilter, currentSortBy);

  // Fallback
  if (results.length === 0 && window._lastApiProducts.length > 0) {
    const maxSales = Math.max(...window._lastApiProducts.map(p => p.sales), 1);
    results = window._lastApiProducts
      .filter(p => {
        if (currentPriceFilter === 'all') return true;
        if (currentPriceFilter === '0-5') return p.price < 5;
        if (currentPriceFilter === '5-20') return p.price >= 5 && p.price < 20;
        if (currentPriceFilter === '20-50') return p.price >= 20 && p.price < 50;
        if (currentPriceFilter === '50+') return p.price >= 50;
        return true;
      })
      .map(p => ({
        product: p,
        matchScore: 1,
        compositeScore: calcCompositeScore(p, maxSales),
      }))
      .sort((a, b) => b.compositeScore - a.compositeScore);
  }

  // Auto-detect & optimize
  if (results.length >= 10) {
    const optResult = autoDetectAndOptimize(currentQuery, results);
    if (optResult.optimized) {
      results = optResult.results;
    }
  }

  currentResults = results;
  updateBubbleResults(bubble, results);
}

function reFilterResults(bubble) {
  // Just re-sort/filter currentResults
  let results = [...currentResults];
  if (currentSortBy === 'score') {
    results.sort((a, b) => b.compositeScore - a.compositeScore);
  } else if (currentSortBy === 'sales') {
    results.sort((a, b) => b.product.sales - a.product.sales);
  } else if (currentSortBy === 'repurchase') {
    results.sort((a, b) => b.product.repurchase - a.product.repurchase);
  } else if (currentSortBy === 'price-low') {
    results.sort((a, b) => a.product.price - b.product.price);
  }
  currentResults = results;
  updateBubbleResults(bubble, results);
}

function updateBubbleResults(bubble, results) {
  // Remove old toolbar, grid, pagination
  const oldToolbar = bubble.querySelector('.result-toolbar');
  if (oldToolbar) oldToolbar.remove();
  const oldGrid = bubble.querySelector('.product-grid');
  if (oldGrid) oldGrid.remove();
  const oldPagination = bubble.querySelector('.chat-pagination');
  if (oldPagination) oldPagination.remove();
  const oldSummary = bubble.querySelector('.ai-summary');
  if (oldSummary) oldSummary.remove();
  const oldEmpty = bubble.querySelector('.empty-result');
  if (oldEmpty) oldEmpty.remove();

  let html = '';
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    const locations = {};
    results.forEach(r => {
      const loc = r.product.location || '未知';
      locations[loc] = (locations[loc] || 0) + 1;
    });
    const topLocations = Object.entries(locations).sort((a, b) => b[1] - a[1]).slice(0, 3);

    html += `<div class="ai-summary">`;
    html += `已为你匹配到 <span class="highlight">${results.length} 款商品</span>，`;
    html += `最高评分 <span class="stat-inline"><span class="v">${topScore}</span></span>`;
    html += `，均价 <span class="stat-inline"><span class="v">¥${avgPrice.toFixed(1)}</span></span>`;
    html += `，均销量 <span class="stat-inline"><span class="v">${Math.round(avgSales).toLocaleString()}</span></span>`;
    if (topLocations.length > 0) {
      html += `，主要产地：${topLocations.map(l => escapeHtml(l[0])).join('、')}`;
    }
    html += `。</div>`;
    html += buildToolbar(results.length);
    html += renderProductGrid(results, currentPage);
    html += renderChatPagination(results.length, currentPage);
  } else {
    html += `<div class="empty-result">`;
    html += `<div class="emoji">😔</div>`;
    html += `<h4>当前筛选条件下无匹配商品</h4>`;
    html += `<p>请尝试调整价格范围或排序方式</p>`;
    html += `</div>`;
  }
  bubble.insertAdjacentHTML('beforeend', html);
  scrollToBottom();
}

function quickSearch(keyword) {
  const input = document.getElementById('chat-input');
  input.value = keyword;
  doSearch();
}

// Init
loadData();
document.getElementById('chat-input').focus();
</script>
