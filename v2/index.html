// Split a long compound keyword into known e-commerce segments
// Uses greedy matching (longest first) + 2-char fallback
// e.g., "欧美女装西装针织" → ["欧美", "女装", "西装", "针织"]
function splitLongKeyword(keyword) {
  if (!keyword || keyword.length <= 2) return [keyword];

  // Sort keywords by length descending (greedy: longest first)
  const sortedKeywords = [...ECOMMERCE_KEYWORDS].sort((a, b) => b.length - a.length);

  const result = [];
  let remaining = keyword;
  let maxIterations = 20;

  while (remaining.length > 0 && maxIterations-- > 0) {
    let found = false;

    // Try prefix match (greedy, longest first)
    for (const kw of sortedKeywords) {
      if (remaining.toLowerCase().startsWith(kw.toLowerCase())) {
        result.push(kw);
        remaining = remaining.slice(kw.length);
        found = true;
        break;
      }
    }

    if (!found) {
      // Try substring match: find earliest-occurring known keyword
      let bestMatch = null;
      let bestIdx = Infinity;
      for (const kw of sortedKeywords) {
        const idx = remaining.toLowerCase().indexOf(kw.toLowerCase());
        if (idx >= 0 && idx < bestIdx) {
          bestMatch = kw;
          bestIdx = idx;
        }
      }
      if (bestMatch !== null && bestIdx < remaining.length) {
        // If there's unmatched prefix, add it as a token (if length >= 2)
        if (bestIdx >= 2) {
          result.push(remaining.slice(0, bestIdx));
        } else if (bestIdx === 1) {
          // Single char prefix - attach to next match
          result.push(remaining[0] + bestMatch);
          remaining = remaining.slice(bestIdx + bestMatch.length);
          found = true;
          continue;
        }
        result.push(bestMatch);
        remaining = remaining.slice(bestIdx + bestMatch.length);
        found = true;
      }
    }

    if (!found) {
      // Fallback: take 2 chars at a time
      if (remaining.length >= 2) {
        result.push(remaining.slice(0, 2));
        remaining = remaining.slice(2);
      } else {
        // Single char left - append to last token if possible
        if (result.length > 0) {
          result[result.length - 1] += remaining;
        } else {
          result.push(remaining);
        }
        remaining = '';
      }
    }
  }

  return result.filter(t => t.length > 0);
}

// ===== Check if ambiguous char "包" means bag in this title =====
function isBagContext(title) {
  const titleLower = title.toLowerCase();
  const rules = AMBIGUOUS_CHARS['包'];

  // Check negative context first (higher priority - exclude non-bags)
  for (const neg of rules.negativeContext) {
    if (titleLower.includes(neg.toLowerCase())) {
      // But allow if there's also a strong positive signal
      const hasStrongPositive = rules.positiveContext.some(pos =>
        titleLower.includes(pos.toLowerCase()) && pos.length >= 3
      );
      if (!hasStrongPositive) return false;
    }
  }

  // Check positive context
  for (const pos of rules.positiveContext) {
    if (titleLower.includes(pos.toLowerCase())) return true;
  }

  // Position rule: "包" as last character
  if (rules.endOfTitleIsBag && titleLower.endsWith('包')) {
    // Check end exceptions
    for (const exc of rules.endExceptions) {
      if (titleLower.endsWith(exc.toLowerCase())) return false;
    }
    return true;
  }

  // Default: ambiguous, allow but with lower confidence
  return null;
}

// ===== Decompose multi-modifier string into individual known modifiers =====
// e.g., "异形手提" → ["异形", "手提"], "跨境斜挎" → ["跨境", "斜挎"]
// Uses greedy prefix matching (longest first), then substring fallback
function decomposeModifier(modifier) {
  if (!modifier || modifier.length === 0) return [];

  // Sort known modifiers by length descending (longest first for greedy match)
  const sortedKeys = Object.keys(MODIFIER_SYNONYMS).sort((a, b) => b.length - a.length);

  const result = [];
  let remaining = modifier;
  let maxIterations = 10; // safety guard

  while (remaining.length > 0 && maxIterations-- > 0) {
    let found = false;

    // Try prefix match first (greedy, longest first)
    for (const key of sortedKeys) {
      if (remaining.startsWith(key)) {
        result.push(key);
        remaining = remaining.slice(key.length);
        found = true;
        break;
      }
    }

    if (!found) {
      // Try substring match: find the earliest-occurring known modifier
      let bestMatch = null;
      let bestIdx = Infinity;
      for (const key of sortedKeys) {
        const idx = remaining.indexOf(key);
        if (idx >= 0 && idx < bestIdx) {
          bestMatch = key;
          bestIdx = idx;
        }
      }
      if (bestMatch !== null) {
        // Add the prefix before the match as a token (if any)
        if (bestIdx > 0) result.push(remaining.slice(0, bestIdx));
        result.push(bestMatch);
        remaining = remaining.slice(bestIdx + bestMatch.length);
        found = true;
      }
    }

    if (!found) {
      // No known modifier found in remaining, add as-is
      result.push(remaining);
      break;
    }
  }

  return result;
}

// ===== Smart Tokenize (Universal Auto-Split Algorithm) =====
// Universal rules - NO per-keyword hardcoding:
// Rule 0: Proper noun match → keep as single token + add synonyms + category context (HIGHEST PRIORITY)
// Rule 1: Known non-bag compounds → COMPOUND_SPLIT (e.g., 美甲钻 → [美甲, 钻])
// Rule 2: ANY "XX包" ending → decompose XX into modifiers + "包" + synonym expansion
//          - NON_BAG_SUFFIXES excluded (材料包, 贴纸包, etc.)
//          - Multi-modifier auto-decompose: "异形手提包" → [异形, 手提, 包]
//          - "包" always marked as ambiguous for isBagContext validation
// Rule 3: Token containing "包" mid-string → extract modifier + mark ambiguous
// Rule 4: Known modifier → MODIFIER_SYNONYMS synonym expansion
// Rule 5: Everything else → add as-is
function smartTokenize(query) {
  const raw = query.trim().toLowerCase();
  if (!raw) return { tokens: [], expandedTerms: [], isCompound: false, ambiguousChars: [], properNoun: null, category: null };

  // Step 1: Split by spaces/commas
  const baseTokens = raw.split(/[\s,，、]+/).filter(t => t.length > 0);

  let tokens = [];
  let expandedTerms = [];
  let isCompound = false;
  let ambiguousChars = [];
  let detectedProperNoun = null;
  let detectedCategory = null;

  // --- Step 0.5: Check for proper noun matches in the FULL query ---
  // Try to match the entire query (or space-joined tokens) against PROPER_NOUNS
  const fullQuery = baseTokens.join('');
  // Sort proper nouns by length descending (longest match first)
  const sortedProperNouns = Object.keys(PROPER_NOUNS).sort((a, b) => b.length - a.length);
  for (const pn of sortedProperNouns) {
    if (fullQuery.includes(pn)) {
      const pnData = PROPER_NOUNS[pn];
      detectedProperNoun = pn;
      detectedCategory = pnData.category;
      // Add proper noun as a token
      tokens.push(pn);
      // Add its synonyms as expanded terms
      if (pnData.synonyms) {
        expandedTerms.push(...pnData.synonyms);
      }
      // Mark compound so we use strict matching
      isCompound = true;
      // If it's a bag category, mark "包" as ambiguous for context validation
      if (pnData.category === 'bag') {
        ambiguousChars.push('包');
      }
      // Remove the matched proper noun from the query and process remaining parts
      // We need to find which baseTokens contain the proper noun
      let remainingParts = [];
      let processed = fullQuery.replace(pn, '|||SPLIT|||');
      remainingParts = processed.split('|||SPLIT|||').filter(p => p.length > 0);
      
      // If there are remaining parts, add them as additional tokens
      // (e.g., "新款 麻将包" → after matching "麻将包", remaining is "新款")
      remainingParts.forEach(part => {
        if (part.length >= 2) {
          // Try to match known modifiers
          if (MODIFIER_SYNONYMS[part]) {
            tokens.push(part);
            expandedTerms.push(...MODIFIER_SYNONYMS[part]);
          } else {
            // Try to decompose if it looks like a modifier string
            const subMods = decomposeModifier(part);
            subMods.forEach(sm => {
              if (sm.length >= 2) {
                tokens.push(sm);
                if (MODIFIER_SYNONYMS[sm]) {
                  expandedTerms.push(...MODIFIER_SYNONYMS[sm]);
                }
              }
            });
          }
        }
      });
      
      break; // Only match the longest proper noun
    }
  }

  // If we found a proper noun, return early with the proper noun as primary token
  if (detectedProperNoun) {
    return { tokens, expandedTerms, isCompound, ambiguousChars, properNoun: detectedProperNoun, category: detectedCategory };
  }

  baseTokens.forEach(bt => {
    // --- Rule 1: Known non-bag compound (e.g., 美甲钻, 饰品, 包装) ---
    if (COMPOUND_SPLIT[bt]) {
      const entry = COMPOUND_SPLIT[bt];
      tokens.push(...entry.split);
      expandedTerms.push(...entry.synonyms);
      isCompound = true;
      entry.split.forEach(t => {
        if (AMBIGUOUS_CHARS[t]) ambiguousChars.push(t);
      });
      return;
    }

    // --- Rule 2: UNIVERSAL "XX包" auto-split ---
    // ANY token ending in "包" (length > 1) that is NOT a known non-bag suffix
    if (bt.endsWith('包') && bt.length > 1) {
      // Known non-bag word (材料包, 贴纸包, etc.) → keep as single token, no bag validation
      if (NON_BAG_SUFFIXES.includes(bt)) {
        tokens.push(bt);
        return;
      }

      // Special case: "包包" → just "包"
      if (bt === '包包') {
        tokens.push('包');
        ambiguousChars.push('包');
        isCompound = true;
        return;
      }

      // UNIVERSAL AUTO-SPLIT: "XX包" → decompose XX into modifiers + "包"
      // e.g., "异形手提包" → [异形, 手提, 包], "跨境包" → [跨境, 包]
      const modifier = bt.slice(0, -1);
      const subModifiers = decomposeModifier(modifier);
      tokens.push(...subModifiers);
      tokens.push('包');
      isCompound = true;

      // Expand synonyms for each decomposed modifier
      subModifiers.forEach(sm => {
        if (MODIFIER_SYNONYMS[sm]) {
          expandedTerms.push(...MODIFIER_SYNONYMS[sm]);
        }
      });

      // "包" is ambiguous - needs isBagContext validation
      ambiguousChars.push('包');
      return;
    }

    // --- Rule 3: Token contains "包" but doesn't end with it (e.g., 包批发) ---
    if (bt.includes('包')) {
      tokens.push(bt);
      // Try to extract & decompose modifier before first "包"
      const bagIdx = bt.indexOf('包');
      if (bagIdx > 0) {
        const mod = bt.slice(0, bagIdx);
        const subMods = decomposeModifier(mod);
        subMods.forEach(sm => {
          if (MODIFIER_SYNONYMS[sm]) {
            expandedTerms.push(...MODIFIER_SYNONYMS[sm]);
          }
        });
      }
      // Mark "包" as ambiguous unless it's a known non-bag word
      if (!NON_BAG_SUFFIXES.includes(bt)) {
        ambiguousChars.push('包');
      }
      return;
    }

    // --- Rule 4: Known modifier → add token + synonym expansion ---
    if (MODIFIER_SYNONYMS[bt]) {
      tokens.push(bt);
      expandedTerms.push(...MODIFIER_SYNONYMS[bt]);
      if (AMBIGUOUS_CHARS[bt]) ambiguousChars.push(bt);
      return;
    }

    // --- Rule 5: Long keyword auto-split ---
    // For keywords longer than 2 chars that didn't match other rules,
    // try to split into known e-commerce segments
    if (bt.length > 2) {
      const segments = splitLongKeyword(bt);
      if (segments.length > 1) {
        tokens.push(...segments);
        isCompound = true;
        // Expand synonyms for each segment
        segments.forEach(seg => {
          if (MODIFIER_SYNONYMS[seg]) {
            expandedTerms.push(...MODIFIER_SYNONYMS[seg]);
          }
          if (AMBIGUOUS_CHARS[seg]) ambiguousChars.push(seg);
        });
        return;
      }
    }

    // --- Rule 5b: Default - add as-is ---
    tokens.push(bt);
    if (AMBIGUOUS_CHARS[bt]) ambiguousChars.push(bt);
  });

  // Final pass: expand synonyms for any token matching MODIFIER_SYNONYMS
  // (catches modifier tokens that were split from "XX包" compounds)
  tokens.forEach(t => {
    if (MODIFIER_SYNONYMS[t]) {
      expandedTerms.push(...MODIFIER_SYNONYMS[t]);
    }
  });

  // Deduplicate
  tokens = [...new Set(tokens)];
  expandedTerms = [...new Set(expandedTerms)];
  ambiguousChars = [...new Set(ambiguousChars)];

  return { tokens, expandedTerms, isCompound, ambiguousChars };
}

// ===== Search Logic (v3: context-aware matching for ambiguous chars) =====
function searchProducts(query, priceFilter, sortBy) {
  return searchProductsInArray(query, PRODUCTS, priceFilter, sortBy);
}

function searchProductsInArray(query, productArray, priceFilter, sortBy, overrideAnalysis) {
  let analysis;
  if (overrideAnalysis) {
    analysis = overrideAnalysis;
  } else {
    analysis = smartTokenize(query);
  }
  const { tokens, expandedTerms, isCompound, ambiguousChars, properNoun, category } = analysis;
  if (tokens.length === 0) return [];

  // === Query Intervention: Get per-query rules ===
  const intervention = getQueryIntervention(query);
  
  // Add extra synonyms from intervention
  if (intervention && intervention.extraSynonyms) {
    expandedTerms.push(...intervention.extraSynonyms);
  }

  // === AI分析的排除词和必选词 ===
  const aiExcludedKeywords = analysis.excludedKeywords || [];
  const aiRequiredKeywords = analysis.requiredKeywords || [];

  const requireAllTokens = isCompound && tokens.length >= 2;
  const hasAmbiguous = ambiguousChars.length > 0;
  // CRITICAL: if search contains "包" (bag), ALWAYS validate bag context
  // regardless of whether it's a compound word or separate token
  const mustValidateBag = ambiguousChars.includes('包');
  // Check if search keyword matches clothing category → validate clothing context
  const clothingCatConfig = matchCategory(query);
  const mustValidateClothing = clothingCatConfig && clothingCatConfig.categoryId === 200035008;
  // Multi-word search: if user inputs 2+ space-separated words, require ALL to match
  const multiWordSearch = tokens.length >= 2;

  const scored = productArray.map(p => {
    let score = 0;
    const titleLower = p.title.toLowerCase();
    const normalizedTitle = normalizeTitle(p.title).toLowerCase();
    const shopLower = p.shop.toLowerCase();
    const locationLower = p.location.toLowerCase();

    // --- Query Intervention: Excluded keywords (HARD EXCLUDE) ---
    if (intervention && intervention.excludedKeywords) {
      for (const kw of intervention.excludedKeywords) {
        if (titleLower.includes(kw.toLowerCase())) {
          return null;
        }
      }
    }

    // --- AI分析的排除词 ---
    if (aiExcludedKeywords.length > 0) {
      for (const kw of aiExcludedKeywords) {
        if (titleLower.includes(kw.toLowerCase())) {
          return null;
        }
      }
    }

    // --- Query Intervention: Required keywords ---
    if (intervention && intervention.requiredKeywords && intervention.requiredKeywords.length > 0) {
      const hasAnyRequired = intervention.requiredKeywords.some(kw => 
        titleLower.includes(kw.toLowerCase()) || shopLower.includes(kw.toLowerCase())
      );
      if (!hasAnyRequired) return null;
    }

    // --- AI分析的必选词 ---
    if (aiRequiredKeywords.length > 0) {
      const hasAnyRequired = aiRequiredKeywords.some(kw => 
        titleLower.includes(kw.toLowerCase()) || shopLower.includes(kw.toLowerCase())
      );
      if (!hasAnyRequired) return null;
    }

    // --- Context validation for ambiguous chars (e.g., "包") ---
    // Must validate for BOTH local and API products
    let bagContextResult = null;
    if (mustValidateBag) {
      bagContextResult = isBagContext(p.title);
      // If "包" is in search and this product is NOT a bag, EXCLUDE immediately
      if (bagContextResult !== true) return null;
      // Accessory detection: if title has 2+ accessory keywords, it's a part not a bag
      if (isBagAccessory(p.title)) return null;
    }

    // --- Clothing context validation ---
    // Even for API products: exclude accessories, pet clothing, non-clothing items
    if (mustValidateClothing) {
      if (!isClothingContext(p.title, p.shop)) return null;
    }

    // --- Primary token matching (use normalized title for cleaner matching) ---
    let matchedTokens = 0;
    tokens.forEach(token => {
      const inTitle = titleLower.includes(token) || normalizedTitle.includes(token);
      const inShop = shopLower.includes(token);
      const inLocation = locationLower.includes(token);

      if (inTitle) {
        if (AMBIGUOUS_CHARS[token]) {
          score += (bagContextResult === true) ? 10 : 3;
        } else {
          // Proper noun match gets higher weight
          if (token === properNoun) {
            score += 20; // Proper noun match is worth double
          } else {
            score += 10;
          }
        }
        if (!AMBIGUOUS_CHARS[token]) matchedTokens++;
        // Position bonus (check on normalized title)
        if (normalizedTitle.startsWith(token) || normalizedTitle.endsWith(token)) score += 5;
        // Frequency bonus
        const count = (titleLower.match(new RegExp(token, 'g')) || []).length;
        if (count > 1) score += count * 2;
      }
      if (inShop) { score += 3; if (!AMBIGUOUS_CHARS[token]) matchedTokens++; }
      if (inLocation) { score += 2; if (!AMBIGUOUS_CHARS[token]) matchedTokens++; }
      if (p.tags && p.tags.some(t => t.toLowerCase().includes(token))) score += 2;
    });

    // --- Synonym expansion matching (bonus only, does NOT count as token match) ---
    expandedTerms.forEach(term => {
      if (titleLower.includes(term) || normalizedTitle.includes(term)) score += 3;
    });

    // --- Relevance filtering for compound AND multi-word searches ---
    if (requireAllTokens || multiWordSearch) {
      const nonAmbiguousTokens = tokens.filter(t => !AMBIGUOUS_CHARS[t]);
      const ambiguousTokens = tokens.filter(t => AMBIGUOUS_CHARS[t]);

      // For API products: require ALL non-ambiguous tokens to match (same as local)
      // This ensures "男士休闲外套" matches products with ALL three words, not just "男士"
      if (p._fromAPI) {
        const allNonAmbiguousMatched = nonAmbiguousTokens.every(token =>
          titleLower.includes(token) || normalizedTitle.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
          (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
        );
        if (!allNonAmbiguousMatched && nonAmbiguousTokens.length > 0) return null;
      } else {
        // For local data: require ALL non-ambiguous tokens to match (strict)
        const allNonAmbiguousMatched = nonAmbiguousTokens.every(token =>
          titleLower.includes(token) || normalizedTitle.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
          (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
        );

        // For ambiguous tokens: must be confirmed context (e.g., "包" = bag)
        const allAmbiguousConfirmed = ambiguousTokens.every(token => {
          if (token === '包') return bagContextResult === true;
          return titleLower.includes(token);
        });

        if (!allNonAmbiguousMatched || !allAmbiguousConfirmed) return null;
      }
    }

    // Must have at least some primary token match
    if (score === 0) return null;

    // Bonus for confirmed bag context
    if (bagContextResult === true) score += 5;

    // Bonus for proper noun exact match (highest relevance signal)
    if (properNoun && (titleLower.includes(properNoun) || normalizedTitle.includes(properNoun))) {
      score += 15;
    }

    return { product: p, matchScore: score };
  }).filter(item => item !== null);

  // Apply price filter
  const filtered = scored.filter(item => {
    const price = item.product.price;
    if (priceFilter === 'all') return true;
    if (priceFilter === '0-5') return price < 5;
    if (priceFilter === '5-20') return price >= 5 && price < 20;
    if (priceFilter === '20-50') return price >= 20 && price < 50;
    if (priceFilter === '50+') return price >= 50;
    return true;
  });

  // Calculate composite score (with text match score as primary factor)
  const maxSales = Math.max(...filtered.map(f => f.product.sales), 1);
  const maxMatchScore = Math.max(...filtered.map(f => f.matchScore), 1);
  filtered.forEach(item => {
    item.compositeScore = calcCompositeScore(item.product, maxSales, item.matchScore);
  });

  // === Query Intervention: Pin specific products to top ===
  if (intervention && intervention.pinnedOfferIds && intervention.pinnedOfferIds.length > 0) {
    const pinned = [];
    const rest = [];
    filtered.forEach(item => {
      const oid = item.product.offerId || item.product.id;
      if (intervention.pinnedOfferIds.includes(String(oid))) {
        pinned.push(item);
      } else {
        rest.push(item);
      }
    });
    // Re-sort: pinned items first (in order of pinning), then rest by composite score
    if (sortBy === 'score') {
      return [...pinned, ...rest];
    }
  }

  // Sort
  if (sortBy === 'score') {
    filtered.sort((a, b) => b.compositeScore - a.compositeScore);
  } else if (sortBy === 'sales') {
    filtered.sort((a, b) => b.product.sales - a.product.sales);
  } else if (sortBy === 'repurchase') {
    filtered.sort((a, b) => b.product.repurchase - a.product.repurchase);
  } else if (sortBy === 'price-low') {
    filtered.sort((a, b) => a.product.price - b.product.price);
  }

  return filtered; // Return all matched results
}

// ===== Scoring Model =====
// ===== Auto-detect & optimize: scan results for outlier products =====
// After initial search, this function:
// 1. Extracts high-frequency keywords from result titles
// 2. Identifies "outlier" products that don't share mainstream keywords
// 3. Extracts exclusion rules from outliers
// 4. Returns optimized result set + optimization report

function autoDetectAndOptimize(query, results) {
  if (!results || results.length < 10) {
    return { results, optimized: false, report: null };
  }

  const products = results.map(r => r.product || r);
  const titles = products.map(p => p.title || '');

  // Step 1: Extract 2-char and 3-char substrings, count frequency
  const freq2 = {};
  const freq3 = {};
  for (const title of titles) {
    const seen2 = new Set();
    const seen3 = new Set();
    for (let i = 0; i < title.length - 1; i++) {
      const sub2 = title.substr(i, 2);
      if (!seen2.has(sub2)) { freq2[sub2] = (freq2[sub2] || 0) + 1; seen2.add(sub2); }
    }
    for (let i = 0; i < title.length - 2; i++) {
      const sub3 = title.substr(i, 3);
      if (!seen3.has(sub3)) { freq3[sub3] = (freq3[sub3] || 0) + 1; seen3.add(sub3); }
    }
  }

  // Step 2: Find "mainstream" keywords (appear in >30% of titles)
  const threshold = Math.max(3, Math.floor(products.length * 0.3));
  const mainstream2 = Object.entries(freq2)
    .filter(([kw, count]) => count >= threshold && kw.length >= 2)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15)
    .map(([kw]) => kw);
  const mainstream3 = Object.entries(freq3)
    .filter(([kw, count]) => count >= threshold && kw.length >= 3)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([kw]) => kw);
  const mainstreamKeywords = [...mainstream3, ...mainstream2];

  // Filter out generic keywords that don't help distinguish categories
  const genericWords = ['的', '了', '和', '与', '在', '新款', '批发', '厂家', '直销', '现货', '热卖', '爆款'];
  const filteredMainstream = mainstreamKeywords.filter(kw => !genericWords.some(gw => kw === gw));

  if (filteredMainstream.length === 0) {
    return { results, optimized: false, report: null };
  }

  // Step 3: Identify outlier products (don't contain ANY mainstream keyword)
  const outliers = [];
  const normalProducts = [];
  for (let i = 0; i < products.length; i++) {
    const titleLower = (products[i].title || '').toLowerCase();
    const hasMainstream = filteredMainstream.some(kw => titleLower.includes(kw.toLowerCase()));
    if (!hasMainstream) {
      outliers.push({ index: i, product: products[i], result: results[i] });
    } else {
      normalProducts.push(results[i]);
    }
  }

  // If outliers < 5% or < 3 products, no optimization needed
  if (outliers.length < 3 || outliers.length / products.length < 0.05) {
    return { results, optimized: false, report: null };
  }

  console.log(`[AutoOptimize] Detected ${outliers.length} outlier products out of ${products.length}`);

  // Step 4: Extract common keywords from outliers (these become new exclusion words)
  const outlierFreq2 = {};
  for (const o of outliers) {
    const title = o.product.title || '';
    const seen = new Set();
    for (let i = 0; i < title.length - 1; i++) {
      const sub = title.substr(i, 2);
      if (!seen.has(sub)) { outlierFreq2[sub] = (outlierFreq2[sub] || 0) + 1; seen.add(sub); }
    }
  }

  // Find keywords that appear frequently in outliers but rarely in normal products
  const newExcludeWords = [];
  for (const [kw, outlierCount] of Object.entries(outlierFreq2)) {
    if (outlierCount < 2) continue;  // Must appear in at least 2 outliers
    const normalCount = freq2[kw] || 0;
    const normalProductCount = normalCount - outlierCount;
    // If keyword appears in >50% of outliers but <10% of normal products → exclusion word
    if (outlierCount / outliers.length >= 0.5 && normalProductCount / normalProducts.length < 0.1) {
      newExcludeWords.push({ keyword: kw, outlierCount, normalCount: normalProductCount });
    }
  }

  // Also check 3-char keywords
  const outlierFreq3 = {};
  for (const o of outliers) {
    const title = o.product.title || '';
    const seen = new Set();
    for (let i = 0; i < title.length - 2; i++) {
      const sub = title.substr(i, 3);
      if (!seen.has(sub)) { outlierFreq3[sub] = (outlierFreq3[sub] || 0) + 1; seen.add(sub); }
    }
  }
  for (const [kw, outlierCount] of Object.entries(outlierFreq3)) {
    if (outlierCount < 2) continue;
    const normalCount = freq3[kw] || 0;
    const normalProductCount = normalCount - outlierCount;
    if (outlierCount / outliers.length >= 0.4 && normalProductCount / normalProducts.length < 0.1) {
      newExcludeWords.push({ keyword: kw, outlierCount, normalCount: normalProductCount });
    }
  }

  // Sort by outlier frequency (most common in outliers first)
  newExcludeWords.sort((a, b) => b.outlierCount - a.outlierCount);

  // Filter out overly short or generic words
  const validExcludeWords = newExcludeWords
    .filter(w => w.keyword.length >= 2 && !genericWords.includes(w.keyword))
    .map(w => w.keyword);

  if (validExcludeWords.length === 0) {
    // Even without extractable exclusion words, just remove outliers
    const optimizedResults = normalProducts;
    return {
      results: optimizedResults,
      optimized: true,
      report: {
        outlierCount: outliers.length,
        totalCount: products.length,
        excludeWords: [],
        outlierSamples: outliers.slice(0, 5).map(o => (o.product.title || '').substr(0, 40)),
      }
    };
  }

  // Step 5: Re-filter ALL results using new exclusion words
  // (not just outliers - some outliers might have been borderline)
  const optimizedResults = results.filter(r => {
    const p = r.product || r;
    const titleLower = (p.title || '').toLowerCase();
    const shopLower = (p.shop || '').toLowerCase();
    for (const ew of validExcludeWords) {
      if (titleLower.includes(ew.toLowerCase()) || shopLower.includes(ew.toLowerCase())) {
        return false;
      }
    }
    return true;
  });

  console.log(`[AutoOptimize] Extracted exclude words: ${validExcludeWords.join(', ')}`);
  console.log(`[AutoOptimize] ${results.length} → ${optimizedResults.length} (removed ${results.length - optimizedResults.length})`);

  return {
    results: optimizedResults,
    optimized: true,
    report: {
      outlierCount: outliers.length,
      totalCount: products.length,
      excludeWords: validExcludeWords,
      outlierSamples: outliers.slice(0, 5).map(o => (o.product.title || '').substr(0, 40)),
      mainstreamKeywords: filteredMainstream.slice(0, 5),
    }
  };
}

function calcCompositeScore(p, maxSales, matchScore) {
  // === Text relevance score (40 pts) - BM25风格的文本匹配度 ===
  // This is the most important factor for search relevance
  let relevanceScore = 0;
  if (matchScore !== undefined && matchScore !== null) {
    // Normalize matchScore to 0-40 range
    // matchScore typically ranges from 0 (no match) to ~100+ (perfect match)
    relevanceScore = Math.min(40, Math.round(matchScore * 0.8));
  }

  // Market validation (25 pts)
  let marketScore = 0;
  if (p.sales >= 50000) marketScore = 25;
  else if (p.sales >= 10000) marketScore = 20;
  else if (p.sales >= 5000) marketScore = 16;
  else if (p.sales >= 1000) marketScore = 11;
  else if (p.sales >= 100) marketScore = 6;
  else marketScore = 2;

  // Repurchase rate (15 pts)
  let repurchaseScore = 0;
  if (p.repurchase >= 50) repurchaseScore = 15;
  else if (p.repurchase >= 30) repurchaseScore = 12;
  else if (p.repurchase >= 20) repurchaseScore = 9;
  else if (p.repurchase >= 10) repurchaseScore = 6;
  else if (p.repurchase > 0) repurchaseScore = 3;

  // Credit level (10 pts)
  let creditScore = 0;
  if (p.credit >= 15) creditScore = 10;
  else if (p.credit >= 10) creditScore = 7;
  else if (p.credit >= 5) creditScore = 4;
  else creditScore = 1;

  // Price advantage (5 pts) - lower price = higher score
  let priceScore = 5;
  if (p.price > 100) priceScore = 1;
  else if (p.price > 50) priceScore = 2;
  else if (p.price > 20) priceScore = 3;
  else if (p.price > 5) priceScore = 4;
  else if (p.price > 1) priceScore = 5;
  else priceScore = 5;

  // Service tags (5 pts, 1pt each, max 5)
  const tagScore = Math.min(5, (p.tags ? p.tags.length : 0));

  return Math.round((relevanceScore + marketScore + repurchaseScore + creditScore + priceScore + tagScore) * 10) / 10;
}

function getScoreGrade(score) {
  if (score >= 80) return { grade: 'excellent', label: '优选', cls: 'score-excellent' };
  if (score >= 65) return { grade: 'good', label: '推荐', cls: 'score-good' };
  if (score >= 50) return { grade: 'fair', label: '一般', cls: 'score-fair' };
  return { grade: 'low', label: '观望', cls: 'score-fair' };
}

// 带超时控制的智谱AI调用
// CORS代理列表（按优先级尝试）
const CORS_PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
];

async function callZhipuSearchAnalysis(query) {
  if (!USE_ZHIPU_AI || !ZHIPU_API_KEY) return null;

  const requestBody = JSON.stringify({
    model: ZHIPU_MODEL,
    messages: [
      { role: 'system', content: ZHIPU_SEARCH_SYSTEM_PROMPT },
      { role: 'user', content: query }
    ],
    temperature: 0.3,
    response_format: { type: 'json_object' }
  });

  const requestHeaders = {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + ZHIPU_API_KEY
  };

  // 尝试直接调用 + 多个CORS代理
  const tryUrls = [
    { url: ZHIPU_API_URL, useProxy: false },
    ...CORS_PROXIES.map(p => ({ url: p + encodeURIComponent(ZHIPU_API_URL), useProxy: true }))
  ];

  let lastError = null;

  for (const target of tryUrls) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    try {
      const fetchOptions = {
        method: 'POST',
        headers: requestHeaders,
        body: requestBody,
        signal: controller.signal
      };

      // 代理模式下，Authorization头可能需要特殊处理
      // 一些代理支持通过URL参数传递headers
      if (target.useProxy && target.url.includes('allorigins.win')) {
        // allorigins.win支持通过POST body传递，保持原样
      }

      const response = await fetch(target.url, fetchOptions);
      clearTimeout(timeoutId);

      if (!response.ok) {
        const errText = await response.text().catch(() => '');
        throw new Error('API错误 ' + response.status + ': ' + (errText || response.statusText));
      }

      const data = await response.json();
      const content = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';

      if (!content) throw new Error('API返回内容为空');

      let result;
      try {
        result = JSON.parse(content);
      } catch (e) {
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          result = JSON.parse(jsonMatch[0]);
        } else {
          throw new Error('返回内容不是有效的JSON格式');
        }
      }

      if (target.useProxy) {
        console.log('[Zhipu AI] 通过CORS代理调用成功');
      }
      return result;
    } catch (e) {
      clearTimeout(timeoutId);
      lastError = e;
      if (e.name === 'AbortError') {
        console.warn('[Zhipu AI] 请求超时，尝试下一个方案');
      } else {
        console.warn('[Zhipu AI] 调用失败:', target.useProxy ? '(代理)' : '(直连)', e.message);
      }
      // 继续尝试下一个方案
    }
  }

  // 所有方案都失败
  console.warn('[Zhipu AI] 所有调用方案均失败，降级到规则引擎');
  return null;
}

// 将智谱AI分析结果转换为规则引擎可用的格式
function zhipuResultToRuleFormat(aiResult, query) {
  if (!aiResult) return null;

  const tokens = [];
  if (aiResult.coreProduct) tokens.push(aiResult.coreProduct);
  if (aiResult.modifiers) {
    ['style', 'material', 'crowd', 'scene'].forEach(k => {
      if (aiResult.modifiers[k] && Array.isArray(aiResult.modifiers[k])) {
        tokens.push(...aiResult.modifiers[k].slice(0, 2));
      }
    });
  }

  const expandedTerms = aiResult.expandedKeywords || [];
  const ambiguousChars = aiResult.ambiguity && aiResult.ambiguity.hasAmbiguity
    ? (aiResult.ambiguity.ambiguousTerms || []).join('').split('').filter(c => c === '包')
    : [];

  return {
    tokens: tokens.length > 0 ? tokens : [query],
    expandedTerms,
    isCompound: tokens.length > 1,
    ambiguousChars,
    aiResult: aiResult,
    excludedKeywords: aiResult.excludedKeywords || [],
    requiredKeywords: aiResult.requiredKeywords || [],
    category: aiResult.category || {},
    searchStrategy: aiResult.searchStrategy || {}
  };
}

// Get query intervention config for a given keyword
// Returns the most specific (longest key) match
function getQueryIntervention(keyword) {
  const kwLower = keyword.toLowerCase();
  let bestMatch = null;
  let bestLen = 0;
  
  for (const [key, config] of Object.entries(QUERY_INTERVENTION)) {
    if (kwLower.includes(key.toLowerCase()) && key.length > bestLen) {
      bestMatch = config;
      bestLen = key.length;
    }
  }
  
  return bestMatch;
}

// ===== Title Normalization =====
// Clean up product titles for better matching:
// - Remove promo symbols (🔥, 💥, 🎁, etc.)
// - Normalize spacing
// - Extract core product info
function normalizeTitle(title) {
  if (!title) return '';
  let t = title;
  // Remove emoji and special promo symbols
  t = t.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}]/gu, '');
  // Remove common promo prefixes/suffixes in brackets
  t = t.replace(/[【\[（(](新品|爆款|热销|厂家直销|批发|现货|包邮|特价|促销|清仓|尾货|外贸|跨境|亚马逊|速卖通|独立站|temu|一件代发|代发|定制|加工|OEM|ODM|来图|来样)[\]】）)]/gi, '');
  // Remove extra whitespace
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

// Match a search keyword to a category config
// Returns the category config object or null if no match
function matchCategory(keyword) {
  // Priority 1: Check query intervention forceCategory
  const intervention = getQueryIntervention(keyword);
  if (intervention && intervention.forceCategory && CATEGORY_MAP[intervention.forceCategory]) {
    return CATEGORY_MAP[intervention.forceCategory];
  }
  
  // Priority 2: Check proper noun category
  const kwLower = keyword.toLowerCase();
  const sortedProperNouns = Object.keys(PROPER_NOUNS).sort((a, b) => b.length - a.length);
  for (const pn of sortedProperNouns) {
    if (kwLower.includes(pn)) {
      const pnData = PROPER_NOUNS[pn];
      if (pnData.category && CATEGORY_MAP[pnData.category]) {
        return CATEGORY_MAP[pnData.category];
      }
    }
  }
  
  // Priority 3: Default category map matching
  for (const [name, config] of Object.entries(CATEGORY_MAP)) {
    // Check if keyword contains any match keyword
    if (config.matchKeywords.some(kw => keyword.includes(kw))) {
      return config;
    }
  }
  return null;
}

// Check if a product should be excluded based on category config
function shouldExcludeByCategory(levelName, title, catConfig) {
  if (!catConfig) return false;
  
  // Check levelName against excludeSubcategories
  if (levelName && catConfig.excludeSubcategories) {
    for (const sub of catConfig.excludeSubcategories) {
      if (levelName.includes(sub)) return true;
    }
  }
  
  // Check title against excludeTitleKeywords
  if (title && catConfig.excludeTitleKeywords) {
    for (const kw of catConfig.excludeTitleKeywords) {
      if (title.includes(kw)) return true;
    }
  }
  
  return false;
}

// Fetch all pages of search results from API
// Uses concurrent requests for speed (5 pages at a time)
// Multi-query strategy: when keyword is "descriptor + category" (e.g. "异形包"),
// also search with just the descriptor ("异形") to get more relevant results
async function fetchProductsFromAPI(keyword, overrideCatConfig) {
  const allProducts = [];
  const seenOfferIds = new Set(); // For deduplication
  const pageSize = 100;
  
  // Universal category matching: find the best category for this keyword
  const catConfig = overrideCatConfig || matchCategory(keyword);
  const hasCategoryFilter = catConfig !== null;
  
  // === Multi-query strategy ===
  // If keyword contains a category word (e.g. "包" in "异形包"), generate
  // an additional search with just the descriptor ("异形") for better relevance
  const searchQueries = generateSearchQueries(keyword, catConfig);
  console.log(`[MultiQuery] Search queries: ${JSON.stringify(searchQueries)}`);
  
  for (const searchKW of searchQueries) {
    console.log(`[MultiQuery] Searching: "${searchKW}"`);
    const products = await searchSingleQuery(searchKW, catConfig, hasCategoryFilter, pageSize);
    
    // Merge with deduplication
    for (const p of products) {
      const oid = p.offerId || p.id;
      if (!seenOfferIds.has(oid)) {
        seenOfferIds.add(oid);
        allProducts.push(p);
      }
    }
    console.log(`[MultiQuery] "${searchKW}" returned ${products.length} products (total unique: ${allProducts.length})`);
  }
  
  return allProducts;
}

// Generate multiple search queries for better coverage
// e.g. "异形包" → ["异形包", "异形"] (full keyword + descriptor only)
function generateSearchQueries(keyword, catConfig) {
  const queries = [keyword]; // Always search with full keyword first
  
  // If keyword ends with a category word, also search without it
  if (catConfig && catConfig.matchKeywords) {
    for (const catKW of catConfig.matchKeywords) {
      // Check if keyword contains this category word (e.g. "包" in "异形包")
      if (keyword.length > catKW.length && keyword.includes(catKW)) {
        // Extract the descriptor part (e.g. "异形" from "异形包")
        let descriptor = keyword.replace(catKW, '').trim();
        // Only add if descriptor is meaningful (length >= 2)
        if (descriptor.length >= 2 && descriptor !== keyword) {
          queries.push(descriptor);
          break; // Only add one descriptor query
        }
      }
    }
  }
  
  return queries;
}

// Search a single query and return products
async function searchSingleQuery(keyword, catConfig, hasCategoryFilter, pageSize) {
  const products = [];
  
  const baseParams = {
    pageSize: pageSize,
    keyWord: keyword,
    searchType: '1',
    sortField: 'orderCount30d',
    sortType: 'desc',
    cycle: 30,
  };
  if (hasCategoryFilter) {
    baseParams.categoryIdList = [catConfig.categoryId];
  }
  
  // Step 1: Fetch first page to get totalPages
  let firstResult = await callDianLeiDaAPI('search', { ...baseParams, pageIndex: 1 });
  if (firstResult.code !== 200) {
    throw new Error(`API error: ${firstResult.msg}`);
  }
  
  // Fallback: if category filter returns 0 results, retry without category filter
  if (hasCategoryFilter && (!firstResult.result.totalPages || firstResult.result.totalPages === 0)) {
    console.log('Category filter returned 0 results, retrying without category filter...');
    const fallbackParams = { ...baseParams };
    delete fallbackParams.categoryIdList;
    firstResult = await callDianLeiDaAPI('search', { ...fallbackParams, pageIndex: 1 });
    if (firstResult.code !== 200) {
      throw new Error(`API error: ${firstResult.msg}`);
    }
  }
  
  const totalPages = Math.min(firstResult.result.totalPages || 1, 20);
  
  // Process first page products
  processAPIProducts(firstResult.result.list || [], products, catConfig);
  
  // Step 2: Fetch remaining pages concurrently (5 at a time)
  const remainingPages = [];
  for (let i = 2; i <= totalPages; i++) {
    remainingPages.push(i);
  }
  
  // Batch concurrent requests: 5 pages at a time
  const BATCH_SIZE = 5;
  for (let i = 0; i < remainingPages.length; i += BATCH_SIZE) {
    const batch = remainingPages.slice(i, i + BATCH_SIZE);
    const promises = batch.map(pageIndex => 
      callDianLeiDaAPI('search', { ...baseParams, pageIndex })
        .catch(err => {
          console.warn(`Page ${pageIndex} failed: ${err.message}`);
          return null;
        })
    );
    const results = await Promise.all(promises);
    
    for (const result of results) {
      if (result && result.code === 200 && result.result) {
        processAPIProducts(result.result.list || [], products, catConfig);
      }
    }
  }
  
  return products;
}

// Process API products: filter and convert to internal format
function processAPIProducts(items, allProducts, catConfig) {
  for (const item of items) {
    const levelName = item.levelName || '';
    const title = item.title || '';
    
    // Universal local filter: exclude accessories/irrelevant subcategories
    if (catConfig && shouldExcludeByCategory(levelName, title, catConfig)) {
      continue;
    }
    
    allProducts.push({
      id: String(item.offerId || ''),
      title: title,
      shop: item.company || '',
      model: item.companyType === 1 ? '生产加工' : item.companyType === 2 ? '经销批发' : '--',
      location: item.city || item.province || '',
      price: item.price || 0,
      sales: item.saleQuantity || 0,
      repurchase: 0,
      credit: 0,
      tags: (() => {
        try { return JSON.parse(item.buyerProtections || '[]'); }
        catch(e) { return []; }
      })(),
      img: item.image || '',
      link: `http://detail.m.1688.com/page/index.html?offerId=${item.offerId}`,
      _orderCount: item.orderCount || 0,
      _salesVolume: item.salesVolume || 0,
      _consignPrice: item.consignPrice || 0,
      _tpYear: item.tpYear || 0,
      _levelName: levelName,
      _fromAPI: true,
    });
  }
}

  if (autoOptReport) {
    steps.push({

      detail: `检测到 ${autoOptReport.outlierCount} 款离群商品 → 提取排除词：${autoOptReport.excludeWords.join('、') || '（移除离群商品）'} → 移除 ${autoOptExcluded} 款`,
      optimized: true, outlier_count: autoOptReport.outlierCount, exclude_words: autoOptReport.excludeWords,
      status: 'done'
    });
  }

  steps.push({ step: 6, title: '综合评分排序', icon: '📊', detail: results.length > 0 ? `匹配${results.length}款${autoOptExcluded > 0 ? `（智能优化移除${autoOptExcluded}款）` : ''}` : '无匹配', status: 'done' });

  currentResults = results;
  currentPage = 1;
  renderResultsWithAI(query, results, steps, stats);
}

// Generate AI analysis steps + results using pure frontend logic
function generateAISteps(query, priceFilter, sortBy) {
  const steps = [];

  // Step 1: Keyword understanding
  steps.push({
    step: 1, title: '关键词理解', icon: '🧠',
    detail: `接收用户输入："${query}"`, status: 'done'
  });

  // Step 2: Smart tokenization
  const { tokens, expandedTerms, isCompound, ambiguousChars } = smartTokenize(query);
  let splitDetail;
  if (tokens.length === 0) {
    splitDetail = '未能识别有效关键词';
  } else {
    const tokenDesc = tokens.join(' + ');
    splitDetail = isCompound ? `检测到复合词，自动拆分 → ${tokenDesc}` : `拆分为 ${tokens.length} 个核心词：${tokenDesc}`;
  }
  steps.push({
    step: 2, title: '智能分词', icon: '✂️',
    detail: splitDetail, tokens: tokens, is_compound: isCompound, status: 'done'
  });

  // Step 3: Synonym expansion
  if (expandedTerms.length > 0) {
    const shown = expandedTerms.slice(0, 10);
    const more = expandedTerms.length > 10 ? `...等${expandedTerms.length}个` : '';
    steps.push({
      step: 3, title: '同义词扩展', icon: '🔗',
      detail: `基于修饰词词典扩展同义词：${shown.join('、')}${more}`,
      expanded_terms: expandedTerms, status: 'done'
    });
  } else {
    steps.push({
      step: 3, title: '同义词扩展', icon: '🔗',
      detail: '当前关键词无需同义词扩展', expanded_terms: [], status: 'done'
    });
  }

  // Step 4: Ambiguity verification
  const mustValidateBag = ambiguousChars.includes('包');
  if (mustValidateBag) {
    steps.push({
      step: 4, title: '歧义字符验证', icon: '⚠️',
      detail: '检测到歧义字符「包」→ 启动上下文验证，排除材料包/贴纸包/配件包等非包包商品',
      status: 'done'
    });
  } else {
    steps.push({
      step: 4, title: '歧义字符验证', icon: '✅',
      detail: '未检测到歧义字符，无需上下文验证', status: 'done'
    });
  }

  // Step 5: Product matching (use existing searchProducts function)
  const results = searchProducts(query, priceFilter, sortBy);
  let bagExcluded = 0;
  let accessoryExcluded = 0;
  if (mustValidateBag) {
    // Count excluded products (non-bag context + accessories)
    for (const p of PRODUCTS) {
      if (isBagContext(p.title) !== true) {
        bagExcluded++;
      } else if (isBagAccessory(p.title)) {
        accessoryExcluded++;
      }
    }
  }
  const totalExcluded = bagExcluded + accessoryExcluded;
  const matchDetail = `扫描 ${PRODUCTS.length} 条商品 → 匹配 ${results.length} 款${mustValidateBag ? `（上下文验证排除 ${bagExcluded} 款非包包商品，配件检测排除 ${accessoryExcluded} 款配件商品）` : ''}`;
  steps.push({
    step: 5, title: '商品匹配', icon: '🔍',
    detail: matchDetail, matched_count: results.length,
    excluded_count: totalExcluded, status: 'done'
  });

  // Step 6: Score ranking
  let stats = { total: results.length, excluded: totalExcluded };
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    const locations = {};
    results.forEach(r => {
      const loc = r.product.location || '未知';
      locations[loc] = (locations[loc] || 0) + 1;
    });
    const topLocations = Object.entries(locations).sort((a, b) => b[1] - a[1]).slice(0, 3);
    steps.push({
      step: 6, title: '综合评分排序', icon: '📊',
      detail: `最高评分 ${topScore} · 均价 ¥${avgPrice.toFixed(1)} · 均销量 ${Math.round(avgSales)} · 产地TOP3: ${topLocations.map(l => `${l[0]}(${l[1]})`).join(', ')}`,
      top_score: topScore, status: 'done'
    });
    stats.avg_price = Math.round(avgPrice * 10) / 10;
    stats.avg_sales = Math.round(avgSales);
    stats.top_score = topScore;
    stats.top_locations = topLocations;
  } else {
    steps.push({
      step: 6, title: '综合评分排序', icon: '📊',
      detail: '无匹配商品', status: 'done'
    });
  }

  return { steps, results, stats };
}

  const totalPages = Math.ceil(total / PAGE_SIZE);

        <p>按${getSortLabel()}排序 · 最高评分 ${topScore} · 共${totalPages}页 · 每页${PAGE_SIZE}条</p>
      </div>
    </div>
  `;

  // Product list (paginated)
  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const endIdx = Math.min(startIdx + PAGE_SIZE, results.length);
  const pageResults = results.slice(startIdx, endIdx);

  html += '<div class="product-list">';
  pageResults.forEach((item, idx) => {
    html += renderProductCard(item, startIdx + idx + 1);
  });
  html += '</div>';

  // Pagination
  html += renderPagination(currentPage, totalPages, results.length, startIdx, endIdx);

  main.innerHTML = html;
}

// ===== Pagination Render =====
function renderPagination(page, totalPages, totalItems, startIdx, endIdx) {
  if (totalPages <= 1) {
    return `<div class="pagination"><span class="page-info">共 ${totalItems} 款商品</span></div>`;
  }

  let html = '<div class="pagination">';

  // Page info
  html += `<span class="page-info">第 ${startIdx + 1}-${endIdx} 条 / 共 ${totalItems} 条</span>`;

  // Prev button
  if (page > 1) {
    html += `<button class="page-btn" onclick="goToPage(${page - 1})">上一页</button>`;
  } else {
    html += `<button class="page-btn disabled" disabled>上一页</button>`;
  }

  // Page number buttons
  const maxVisible = 7;
  let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  if (endPage - startPage < maxVisible - 1) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }

  // First page + ellipsis
  if (startPage > 1) {
    html += `<button class="page-num" onclick="goToPage(1)">1</button>`;
    if (startPage > 2) html += `<span class="page-ellipsis">...</span>`;
  }

  // Page numbers
  for (let i = startPage; i <= endPage; i++) {
    if (i === page) {
      html += `<button class="page-num active">${i}</button>`;
    } else {
      html += `<button class="page-num" onclick="goToPage(${i})">${i}</button>`;
    }
  }

  // Last page + ellipsis
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span class="page-ellipsis">...</span>`;
    html += `<button class="page-num" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }

  // Next button
  if (page < totalPages) {
    html += `<button class="page-btn" onclick="goToPage(${page + 1})">下一页</button>`;
  } else {
    html += `<button class="page-btn disabled" disabled>下一页</button>`;
  }

  // Jump to page
  html += `<span class="page-jump">跳至 <input type="number" class="page-input" min="1" max="${totalPages}" value="${page}" onchange="goToPage(parseInt(this.value))"> 页</span>`;

  html += '</div>';
  return html;
}

// ===== Page Navigation =====
function goToPage(page) {
  const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  const query = document.getElementById('search-input').value.trim();
  renderResults(query, currentResults);
  // Scroll to product list
  const productList = document.querySelector('.product-list');
  if (productList) {
    productList.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function renderProductCard(item, rank) {
  const p = item.product;
  const score = item.compositeScore;
  const grade = getScoreGrade(score);
  const isTopPick = score >= 80;
  const isHighValue = p.repurchase >= 30 && p.sales >= 5000;

  let cardCls = 'product-card';
  if (isTopPick) cardCls += ' top-pick';
  else if (isHighValue) cardCls += ' high-value';

  let rankCls = 'rank-other';
  if (rank === 1) rankCls = 'rank-1';
  else if (rank === 2) rankCls = 'rank-2';
  else if (rank === 3) rankCls = 'rank-3';

  const tags = (p.tags || []).map(t => `<span class="ptag">${t}</span>`).join('');
  const modelTag = p.model && p.model !== '--'
    ? `<span class="shop-tag ${p.model === '生产加工' ? 'factory' : ''}">${p.model}</span>`
    : '';

  return `
    <div class="${cardCls}" onclick="window.open('${p.link}', '_blank')">
      <div class="product-rank ${rankCls}">${rank}</div>
      <img class="product-img" src="${p.img}" alt="" onerror="this.style.opacity=0.3;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2272%22 height=%2272%22><rect width=%2272%22 height=%2272%22 fill=%22%23F5F7FA%22/></svg>'">
      <div class="product-info">
        <div class="product-title"><a href="${p.link}" target="_blank" onclick="event.stopPropagation()">${escapeHtml(p.title)}</a></div>
        <div class="product-shop">
          <span class="shop-name">${escapeHtml(p.shop)}</span>
          ${modelTag}
          <span class="shop-tag">${escapeHtml(p.location)}</span>
          <span class="shop-tag">诚信${p.credit}级</span>
        </div>
        <div class="product-metrics">
          <div class="metric"><span class="val price">¥${p.price}</span><span class="lbl">起批价</span></div>
          <div class="metric"><span class="val sales">${p.sales > 0 ? p.sales.toLocaleString() : '--'}</span><span class="lbl">年销量</span></div>
          <div class="metric"><span class="val repurchase">${p.repurchase > 0 ? p.repurchase + '%' : '--'}</span><span class="lbl">复购率</span></div>
        </div>
        <div class="product-tags">${tags}</div>
      </div>
      <div class="product-score">
        <div class="score-circle ${grade.cls}">${score}</div>
        <div class="score-label">${grade.label}</div>
      </div>
    </div>`;
}

function getSortLabel() {
  const sort = document.querySelector('#sort-filter .chip.active').dataset.sort;
  const labels = { 'score': '综合评分', 'sales': '销量', 'repurchase': '复购率', 'price-low': '价格' };
  return labels[sort] || '综合';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== Live Search Analysis =====
let liveDebounceTimer = null;

function showLiveAnalysis(query) {
  const panel = document.getElementById('live-panel');
  if (!query || query.trim().length === 0) {
    panel.classList.remove('show');
    return;
  }

  const trimmed = query.trim().toLowerCase();
  const { tokens, expandedTerms, isCompound, ambiguousChars } = smartTokenize(trimmed);

  // Quick result count (no sorting, just count matches)
  const quickCount = countMatches(trimmed);

  let html = '';

  // --- Section 1: Token Decomposition ---
  html += '<div class="live-section">';
  html += '<div class="live-section-title">🔬 智能拆词分析</div>';
  html += '<div class="token-flow">';

  if (tokens.length === 0) {
    html += '<span class="token-chip literal">等待输入...</span>';
  } else {
    tokens.forEach((token, i) => {
      if (i > 0) html += '<span class="token-arrow">+</span>';
      let cls = 'literal';
      let label = '';
      if (AMBIGUOUS_CHARS[token]) {
        cls = 'ambiguous';
        label = ' ⚠歧义';
      } else if (MODIFIER_SYNONYMS[token]) {
        cls = 'modifier';
        label = ' 修饰词';
      } else if (token === '包') {
        cls = 'bag';
        label = ' 包包';
      }
      html += `<span class="token-chip ${cls}">${escapeHtml(token)}${label ? `<span style="font-size:10px;opacity:0.7">${label}</span>` : ''}</span>`;
    });
  }
  html += '</div>';

  // Show decomposition note
  if (isCompound) {
    html += '<div style="margin-top:6px;font-size:11px;color:var(--muted);">已自动拆分复合词，要求所有核心词同时命中</div>';
  }
  if (ambiguousChars.includes('包')) {
    html += '<div style="margin-top:4px;font-size:11px;color:#F57F17;">检测到歧义字符「包」，将验证上下文排除材料包/贴纸包等非包包商品</div>';
  }
  html += '</div>';

  // --- Section 2: Synonym Expansion ---
  if (expandedTerms.length > 0) {
    html += '<div class="live-section">';
    html += '<div class="live-section-title">🔗 同义词扩展</div>';
    html += '<div class="synonym-tags">';
    const showCount = Math.min(expandedTerms.length, 12);
    expandedTerms.slice(0, showCount).forEach(term => {
      html += `<span class="syn-tag">${escapeHtml(term)}</span>`;
    });
    if (expandedTerms.length > showCount) {
      html += `<span class="syn-tag more">+${expandedTerms.length - showCount}个</span>`;
    }
    html += '</div>';
    html += '</div>';
  }

  // --- Section 3: Result Count Banner ---
  html += '<div class="live-result-bar">';
  html += `<span class="live-result-count">${quickCount}</span>`;
  html += `<span class="live-result-label">款匹配商品</span>`;
  if (quickCount > 0) {
    if (quickCount > 200) {
      html += '<span class="live-result-hint">结果较多，可加修饰词缩小范围</span>';
    } else if (quickCount > 0 && quickCount <= 10) {
      html += '<span class="live-result-hint">精准匹配，点击搜索查看</span>';
    } else {
      html += '<span class="live-result-hint">点击搜索查看完整列表</span>';
    }
  } else {
    html += '<span class="live-result-hint" style="color:var(--danger);border-color:#FFCDD2;">无匹配，试试更宽泛的词</span>';
  }
  html += '</div>';

  // --- Section 4: Smart Suggestions ---
  const suggestions = generateSuggestions(trimmed, tokens, quickCount);
  if (suggestions.length > 0) {
    html += '<div class="suggestion-section-label">💡 智能建议</div>';
    suggestions.forEach(s => {
      html += `<div class="suggestion-item" onclick="applySuggestion('${escapeHtml(s.query)}')">`;
      html += `<span class="suggestion-icon">${s.icon}</span>`;
      html += `<span class="suggestion-text">${escapeHtml(s.label)}</span>`;
      html += `<span class="suggestion-count">${s.count}</span>`;
      html += '</div>';
    });
  }

  // --- Section 5: Mini Preview (top 3 products) ---
  if (quickCount > 0) {
    const preview = getPreviewProducts(trimmed, 3);
    if (preview.length > 0) {
      html += '<div class="suggestion-section-label">👀 商品预览</div>';
      preview.forEach(p => {
        html += '<div class="mini-preview">';
        html += `<img class="mini-preview-img" src="${p.img}" alt="" onerror="this.style.opacity=0.3;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2228%22 height=%2228%22><rect width=%2228%22 height=%2228%22 fill=%22%23F5F7FA%22/></svg>'">`;
        html += `<span class="mini-preview-title">${escapeHtml(p.title.substring(0, 40))}${p.title.length > 40 ? '...' : ''}</span>`;
        html += `<span class="mini-preview-price">¥${p.price}</span>`;
        html += '</div>';
      });
    }
  }

  panel.innerHTML = html;
  panel.classList.add('show');
}

function hideLiveAnalysis() {
  document.getElementById('live-panel').classList.remove('show');
}

// Quick count matches without full scoring (for speed)
function countMatches(query) {
  if (!query || PRODUCTS.length === 0) return 0;
  const { tokens, isCompound, ambiguousChars } = smartTokenize(query);
  if (tokens.length === 0) return 0;

  const multiWordSearch = tokens.length >= 2;
  const mustValidateBag = ambiguousChars.includes('包');
  const clothingCat = matchCategory(query);
  const mustValidateClothing = clothingCat && clothingCat.categoryId === 200035008;
  let count = 0;

  for (const p of PRODUCTS) {
    const titleLower = p.title.toLowerCase();
    const shopLower = p.shop.toLowerCase();
    const locationLower = p.location.toLowerCase();

    if (mustValidateBag) {
      const ctx = isBagContext(p.title);
      if (ctx !== true) continue;
    }
    if (mustValidateClothing && !isClothingContext(p.title, p.shop)) continue;

    if (multiWordSearch) {
      const nonAmbiguous = tokens.filter(t => !AMBIGUOUS_CHARS[t]);
      const allMatch = nonAmbiguous.every(token =>
        titleLower.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
        (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
      );
      if (!allMatch) continue;
    } else {
      const hasMatch = tokens.some(token =>
        titleLower.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
        (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
      );
      if (!hasMatch) continue;
    }
    count++;
  }
  return count;
}

// Get top N preview products (lightweight, no full scoring)
function getPreviewProducts(query, n) {
  const { tokens, expandedTerms, ambiguousChars } = smartTokenize(query);
  if (tokens.length === 0) return [];

  const multiWordSearch = tokens.length >= 2;
  const mustValidateBag = ambiguousChars.includes('包');
  const clothingCat = matchCategory(query);
  const mustValidateClothing = clothingCat && clothingCat.categoryId === 200035008;
  const results = [];

  for (const p of PRODUCTS) {
    const titleLower = p.title.toLowerCase();
    const shopLower = p.shop.toLowerCase();
    const locationLower = p.location.toLowerCase();

    if (mustValidateBag) {
      if (isBagContext(p.title) !== true) continue;
    }
    if (mustValidateClothing && !isClothingContext(p.title, p.shop)) continue;

    let score = 0;
    tokens.forEach(token => {
      if (titleLower.includes(token)) score += 10;
      if (shopLower.includes(token)) score += 3;
      if (locationLower.includes(token)) score += 2;
    });
    expandedTerms.forEach(term => {
      if (titleLower.includes(term)) score += 3;
    });

    if (score > 0) {
      if (multiWordSearch) {
        const nonAmbiguous = tokens.filter(t => !AMBIGUOUS_CHARS[t]);
        const allMatch = nonAmbiguous.every(token =>
          titleLower.includes(token) || shopLower.includes(token) || locationLower.includes(token) ||
          (MODIFIER_SYNONYMS[token] && MODIFIER_SYNONYMS[token].some(syn => titleLower.includes(syn)))
        );
        if (!allMatch) continue;
      }
      results.push({ ...p, _score: score });
    }
  }

  results.sort((a, b) => b._score - a._score);
  return results.slice(0, n);
}

// Generate smart search suggestions
function generateSuggestions(query, tokens, currentCount) {
  const suggestions = [];

  // Suggestion 1: If result is too many, suggest adding a modifier
  if (currentCount > 200 && tokens.length <= 2) {
    const bagToken = tokens.find(t => t === '包');
    if (bagToken) {
      const mods = ['跨境', '欧美', '韩版', '小众', '创意', '复古', '可爱'];
      mods.forEach(m => {
        if (!tokens.includes(m)) {
          const testQuery = m + tokens.filter(t => t !== '包').join('') + '包';
          const c = countMatches(testQuery);
          if (c > 0 && c < currentCount) {
            suggestions.push({ query: testQuery, label: `缩小范围：${testQuery}`, count: c + '款', icon: '🎯' });
          }
        }
      });
    }
  }

  // Suggestion 2: If result is too few (0-3), suggest broader search
  if (currentCount <= 3 && tokens.length >= 2) {
    // Try removing one token at a time
    tokens.forEach((token, i) => {
      if (AMBIGUOUS_CHARS[token]) return;
      const broader = tokens.filter((_, j) => j !== i).join(' ');
      if (broader && broader !== query) {
        const c = countMatches(broader);
        if (c > currentCount) {
          suggestions.push({ query: broader, label: `放宽搜索：${broader}`, count: c + '款', icon: '🔍' });
        }
      }
    });
    // Also suggest single-token search
    if (tokens.length >= 2) {
      tokens.forEach(token => {
        if (AMBIGUOUS_CHARS[token]) return;
        const c = countMatches(token);
        if (c > currentCount) {
          suggestions.push({ query: token, label: `只搜「${token}」`, count: c + '款', icon: '📂' });
        }
      });
    }
  }

  // Suggestion 3: Suggest related modifier combos
  if (tokens.length >= 1 && currentCount > 0) {
    const bagToken = tokens.find(t => t === '包');
    if (bagToken) {
      const existingMods = tokens.filter(t => t !== '包' && !AMBIGUOUS_CHARS[t]);
      const relatedMods = {
        '跨境': ['欧美', '外贸'],
        '欧美': ['跨境', '外贸'],
        '外贸': ['跨境', '欧美'],
        '异形': ['创意', '搞怪', '小众'],
        '创意': ['异形', '个性', '搞怪'],
        '斜挎': ['单肩', '手提'],
        '单肩': ['斜挎', '手提'],
        '手提': ['斜挎', '单肩'],
        '韩版': ['可爱', '时尚'],
        '可爱': ['韩版', '卡通'],
      };
      existingMods.forEach(m => {
        if (relatedMods[m]) {
          relatedMods[m].forEach(rm => {
            if (!existingMods.includes(rm)) {
              const testQuery = existingMods.filter(x => x !== m).join('') + rm + '包';
              const c = countMatches(testQuery);
              if (c > 0) {
                suggestions.push({ query: testQuery, label: `换修饰词：${testQuery}`, count: c + '款', icon: '🔄' });
              }
            }
          });
        }
      });
    }
  }

  // Deduplicate and limit
  const seen = new Set();
  const unique = suggestions.filter(s => {
    if (seen.has(s.query)) return false;
    seen.add(s.query);
    return true;
  });
  return unique.slice(0, 5);
}

function applySuggestion(query) {
  document.getElementById('search-input').value = query;
  hideLiveAnalysis();
  doSearch();
}

// ===== Event Listeners =====
document.getElementById('search-input').addEventListener('input', function(e) {
  clearTimeout(liveDebounceTimer);
  const val = e.target.value.trim();
  if (val.length === 0) {
    hideLiveAnalysis();
    return;
  }
  liveDebounceTimer = setTimeout(() => {
    showLiveAnalysis(val);
  }, 200);
});

document.getElementById('search-input').addEventListener('focus', function(e) {
  const val = e.target.value.trim();
  if (val.length > 0) {
    showLiveAnalysis(val);
  }
});

document.getElementById('search-input').addEventListener('blur', function() {
  // Delay to allow clicking on suggestions
  setTimeout(() => hideLiveAnalysis(), 200);
});

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    hideLiveAnalysis();
  }
});

document.getElementById('search-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') {
    hideLiveAnalysis();
    doSearch();
  }
});

document.querySelectorAll('#price-filter .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#price-filter .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (document.getElementById('search-input').value.trim()) doSearch();
  });
});

document.querySelectorAll('#sort-filter .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#sort-filter .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (document.getElementById('search-input').value.trim()) doSearch();
  });
});

// ===== Init =====
if (typeof API_MODE !== 'undefined' && API_MODE === 'api') {
  // API mode: search button ready immediately, load static data as fallback
  document.getElementById('search-btn').disabled = false;
  document.getElementById('search-btn').textContent = '智能选品';
  document.getElementById('stat-total').textContent = '实时';
  document.getElementById('stat-shops').textContent = '实时';
  // Load static data in background as fallback for API failures
  loadData();
} else {
  // Local mode: load static JSON data
  document.getElementById('search-btn').disabled = true;
  document.getElementById('search-btn').textContent = '加载中...';
  loadData();
}
</script>
