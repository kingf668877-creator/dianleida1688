<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1688智能选品Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root {
  --primary: #722ED1;
  --primary-dark: #531DAB;
  --primary-light: #F9F0FF;
  --primary-border: #D3ADF7;
  --ink: #1A1A2E;
  --muted: #6B7280;
  --rule: #E5E7EB;
  --surface: #FFFFFF;
  --bg: #FFFFFF;
  --chat-bg: #F7F8FA;
  --user-bubble: #F1F2F4;
  --green: #52C41A;
  --green-bg: #F6FFED;
  --blue: #1890FF;
  --blue-bg: #E6F7FF;
  --orange: #FA8C16;
  --warn: #FAAD14;
  --danger: #FF4D4F;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== Top Header ===== */
.top-header {
  background: #fff;
  border-bottom: 1px solid var(--rule);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}
.top-header .logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #722ED1, #9254DE);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #fff;
  flex-shrink: 0;
}
.top-header .title-wrap {
  display: flex;
  flex-direction: column;
}
.top-header .title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
}
.top-header .subtitle {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.3;
}
.top-header .status-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--green-bg);
  color: var(--green);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

/* ===== Chat Area ===== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 8px 0;
  background: var(--bg);
  scroll-behavior: smooth;
}
.chat-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 120px 24px;
}

/* Welcome message */
.welcome-block {
  text-align: center;
  padding: 48px 20px 32px;
}
.welcome-block .welcome-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, #722ED1, #9254DE);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: #fff;
  margin-bottom: 16px;
}
.welcome-block h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink);
}
.welcome-block p {
  color: var(--muted);
  font-size: 14px;
  max-width: 480px;
  margin: 0 auto;
}
.welcome-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 24px;
}
.suggestion-chip {
  background: var(--primary-light);
  color: var(--primary);
  border: 1px solid var(--primary-border);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.suggestion-chip:hover {
  background: var(--primary);
  color: #fff;
}

/* Message rows */
.msg-row {
  display: flex;
  margin-bottom: 20px;
  gap: 12px;
}
.msg-row.user {
  justify-content: flex-end;
}
.msg-row.ai {
  justify-content: flex-start;
}
.msg-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.msg-row.ai .msg-avatar {
  background: linear-gradient(135deg, #722ED1, #9254DE);
  color: #fff;
}
.msg-content {
  max-width: 78%;
}
.msg-row.user .msg-content {
  max-width: 70%;
}

/* User bubble (gray) */
.user-bubble {
  background: var(--user-bubble);
  padding: 12px 18px;
  border-radius: 18px 18px 4px 18px;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.6;
  word-break: break-word;
}

/* AI bubble */
.ai-bubble {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 4px 18px 18px 18px;
  padding: 0;
  overflow: hidden;
}

/* Thinking process (expandable) */
.thinking-section {
  border-bottom: 1px solid var(--rule);
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  cursor: pointer;
  background: var(--primary-light);
  transition: background 0.2s;
  user-select: none;
}
.thinking-header:hover {
  background: #EFD9FF;
}
.thinking-header .think-icon {
  font-size: 15px;
}
.thinking-header .think-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-dark);
  flex: 1;
}
.thinking-header .think-toggle {
  font-size: 12px;
  color: var(--primary);
  transition: transform 0.2s;
}
.thinking-header.collapsed .think-toggle {
  transform: rotate(-90deg);
}
.thinking-body {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--muted);
  background: #FBFAFC;
  line-height: 1.8;
  display: none;
}
.thinking-body.show {
  display: block;
}
.thinking-body .think-line {
  margin-bottom: 4px;
}
.thinking-body .think-line strong {
  color: var(--ink);
}

/* Skill cards (search steps) */
.skill-cards {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.skill-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: #FAFBFC;
  border: 1px solid var(--rule);
  border-radius: 12px;
  transition: all 0.3s;
  opacity: 0;
  transform: translateY(8px);
  animation: skillFadeIn 0.4s forwards;
}
@keyframes skillFadeIn {
  to { opacity: 1; transform: translateY(0); }
}
.skill-card.active {
  border-color: var(--primary-border);
  background: var(--primary-light);
}
.skill-card.done {
  border-color: var(--rule);
}
.skill-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
  background: #D9D9D9;
  position: relative;
}
.skill-card.active .skill-dot {
  background: var(--blue);
  animation: pulse 1.2s infinite;
}
.skill-card.done .skill-dot {
  background: var(--green);
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(24,144,255,0.4); }
  50% { box-shadow: 0 0 0 5px rgba(24,144,255,0); }
}
.skill-body {
  flex: 1;
  min-width: 0;
}
.skill-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}
.skill-card.active .skill-title {
  color: var(--primary);
}
.skill-detail {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  word-break: break-word;
}
.skill-tokens {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.skill-token {
  background: #fff;
  border: 1px solid var(--primary-border);
  color: var(--primary);
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.skill-tag {
  background: var(--blue-bg);
  color: var(--blue);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* AI analysis summary card */
.ai-analysis-card {
  margin: 0 18px 12px;
  padding: 14px 16px;
  background: linear-gradient(135deg, #F9F0FF 0%, #E6F7FF 100%);
  border: 1px solid var(--primary-border);
  border-radius: 12px;
}
.ai-analysis-card .card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ai-analysis-card .card-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.6;
}
.ai-analysis-card .card-label {
  color: var(--muted);
  flex-shrink: 0;
  min-width: 60px;
}
.ai-analysis-card .card-value {
  color: var(--ink);
  font-weight: 500;
}
.ai-analysis-card .card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.ai-analysis-card .card-tag {
  background: #fff;
  border: 1px solid var(--primary-border);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.ai-analysis-card .intent-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--primary);
  color: #fff;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.ai-analysis-card .confidence-bar {
  height: 4px;
  background: #fff;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}
.ai-analysis-card .confidence-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.5s;
}

/* Ambiguity options */
.ambiguity-options {
  margin: 0 18px 12px;
  padding: 14px 16px;
  background: #FFFBE6;
  border: 1px solid #FFE58F;
  border-radius: 12px;
}
.ambiguity-options .amb-title {
  font-size: 13px;
  font-weight: 600;
  color: #D48806;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ambiguity-options .amb-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.ambiguity-options .amb-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #FFE58F;
  background: #fff;
  color: var(--ink);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.ambiguity-options .amb-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.ambiguity-options .amb-btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.ambiguity-options .amb-btn .amb-count {
  font-size: 11px;
  opacity: 0.8;
  margin-left: 4px;
}

/* AI summary text */
.ai-summary {
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
}
.ai-summary .highlight {
  color: var(--primary);
  font-weight: 600;
}
.ai-summary .stat-inline {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--chat-bg);
  padding: 2px 10px;
  border-radius: 8px;
  margin: 0 2px;
  font-size: 13px;
}
.ai-summary .stat-inline .v {
  font-weight: 700;
  color: var(--primary);
}

/* Toolbar above results */
.result-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 18px;
  background: #FAFBFC;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap;
}
.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.toolbar-chip {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--rule);
  background: #fff;
  color: var(--muted);
  transition: all 0.2s;
  user-select: none;
}
.toolbar-chip:hover {
  border-color: var(--primary-border);
}
.toolbar-chip.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.toolbar-result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--muted);
}
.toolbar-result-count strong {
  color: var(--primary);
  font-size: 14px;
}

/* Product grid in chat */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px 18px;
}
@media (max-width: 640px) {
  .product-grid { grid-template-columns: 1fr; }
}
.prod-card {
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}
.prod-card:hover {
  border-color: var(--primary-border);
  box-shadow: 0 4px 16px rgba(114,46,209,0.1);
  transform: translateY(-2px);
}
.prod-card-img-wrap {
  width: 100%;
  height: 140px;
  background: var(--chat-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.prod-card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.prod-card-rank {
  position: absolute;
  top: 6px;
  left: 6px;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.5);
}
.prod-card-rank.r1 { background: #FA8C16; }
.prod-card-rank.r2 { background: #8C8C8C; }
.prod-card-rank.r3 { background: #D48806; }
.prod-card-score {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(255,255,255,0.95);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 700;
}
.prod-card-score.excellent { color: var(--green); }
.prod-card-score.good { color: var(--blue); }
.prod-card-score.fair { color: var(--warn); }
.prod-card-body {
  padding: 10px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.prod-card-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--ink);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
  min-height: 39px;
}
.prod-card-shop {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.prod-card-shop .shop-icon {
  font-size: 10px;
}
.prod-card-metrics {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: auto;
}
.prod-card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--danger);
}
.prod-card-price .unit {
  font-size: 12px;
  font-weight: 400;
}
.prod-card-sales {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}
.prod-card-sales .sales-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
  display: block;
}

/* Pagination in chat */
.chat-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 18px 18px;
  flex-wrap: wrap;
}
.chat-page-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--rule);
  background: #fff;
  color: var(--ink);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.chat-page-btn:hover:not(:disabled) {
  border-color: var(--primary);
  color: var(--primary);
}
.chat-page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.chat-page-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.chat-page-info {
  font-size: 12px;
  color: var(--muted);
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 16px 18px;
}
.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary-border);
  animation: typingBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-6px); opacity: 1; background: var(--primary); }
}

/* Empty result */
.empty-result {
  padding: 24px 18px;
  text-align: center;
  color: var(--muted);
}
.empty-result .emoji {
  font-size: 36px;
  margin-bottom: 8px;
}
.empty-result h4 {
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 4px;
}

/* ===== Bottom Input Bar ===== */
.input-bar {
  flex-shrink: 0;
  background: #fff;
  border-top: 1px solid var(--rule);
  padding: 14px 24px 20px;
}
.input-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-wrap {
  flex: 1;
  position: relative;
}
#chat-input {
  width: 100%;
  border: 2px solid var(--primary);
  border-radius: 20px;
  padding: 12px 20px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: box-shadow 0.2s;
  resize: none;
  min-height: 46px;
  max-height: 120px;
  line-height: 1.5;
  background: #fff;
  color: var(--ink);
}
#chat-input:focus {
  box-shadow: 0 0 0 4px rgba(114,46,209,0.1);
}
#chat-input::placeholder {
  color: #BFBFBF;
}
#send-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
#send-btn:hover {
  background: var(--primary-dark);
  transform: scale(1.05);
}
#send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Scrollbar */
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 3px; }
.chat-area::-webkit-scrollbar-thumb:hover { background: #BFBFBF; }
</style>
</head>
<body>

<!-- Top Header -->
<div class="top-header">
  <div class="logo-icon">AI</div>
  <div class="title-wrap">
    <span class="title">1688智能选品Agent</span>
    <span class="subtitle">AI七步智能分析 · 精准匹配货源</span>
  </div>
  <div class="status-badge">
    <span class="status-dot"></span>
    在线
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chat-area">
  <div class="chat-inner" id="chat-inner">
    <div class="welcome-block" id="welcome-block">
      <div class="welcome-icon">✨</div>
      <h1>AI智能搜 · 店雷达</h1>
      <p>说你想找的，AI帮你精准搜。基于智普AI大模型，智能理解搜索意图，自动扩展相关关键词，精准匹配1688优质货源。</p>
      <div class="welcome-suggestions">
        <span class="suggestion-chip" onclick="quickSearch('麻将包')">麻将包</span>
        <span class="suggestion-chip" onclick="quickSearch('近30天增长快的真皮女包')">近30天增长快的真皮女包</span>
        <span class="suggestion-chip" onclick="quickSearch('夏天卖什么好')">夏天卖什么好</span>
        <span class="suggestion-chip" onclick="quickSearch('异形包')">异形包</span>
        <span class="suggestion-chip" onclick="quickSearch('瓷砖')">瓷砖</span>
        <span class="suggestion-chip" onclick="quickSearch('欧美女装')">欧美女装</span>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Input Bar -->
<div class="input-bar">

// 七步流程：预处理 → 分词与词性标注 → 意图识别 → 类目预测 → 关键词扩展 → 筛选条件提取 → 歧义检测

// ===== 第①步：预处理 =====
// 做什么：把用户输入的"脏数据"清洗干净，变成标准化的文本
function preprocessQuery(query) {
  if (!query) return { original: query, cleaned: '', corrections: [] };
  
  const corrections = [];
  let cleaned = query;
  
  // 1. 去除首尾和多余空格
  const beforeTrim = cleaned;
  cleaned = cleaned.replace(/\s+/g, ' ').trim();
  if (beforeTrim !== cleaned) corrections.push('去除多余空格');
  
  // 2. 全角转半角
  const beforeFullWidth = cleaned;
  cleaned = cleaned.replace(/[\uff01-\uff5e]/g, function(ch) {
    return String.fromCharCode(ch.charCodeAt(0) - 0xfee0);
  }).replace(/\u3000/g, ' ');
  if (beforeFullWidth !== cleaned) corrections.push('全角转半角');
  
  // 3. 去除表情符号
  const beforeEmoji = cleaned;
  cleaned = cleaned.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}]/gu, '');
  if (beforeEmoji !== cleaned) corrections.push('去除表情符号');
  
  // 4. 去除促销词（常见无效词）
  const promoWords = ['包邮', '特价', '促销', '清仓', '打折', '秒杀', '限时', '亏本', '甩卖', '捡漏'];
  promoWords.forEach(word => {
    if (cleaned.includes(word)) {
      cleaned = cleaned.replace(new RegExp(word, 'g'), '');
      if (!corrections.includes('去除促销词')) corrections.push('去除促销词');
    }
  });
  cleaned = cleaned.replace(/\s+/g, ' ').trim();
  
  // 5. 常见错别字纠正
  const typos = {
    '纯绵': '纯棉',
    '仿水': '防水',
    '妨晒': '防晒',
    '休闭': '休闲',
    '时赏': '时尚',
    '欧州': '欧洲',
    '运功': '运动',
    '牛宰裤': '牛仔裤',
    '连衣群': '连衣裙',
    '围脖': '围巾',
  };
  // 按错误词长度从长到短排序，避免短词先匹配导致误替换
  const sortedTypoKeys = Object.keys(typos).sort((a, b) => b.length - a.length);
  let hasTypoCorrection = false;
  for (const wrong of sortedTypoKeys) {
    const right = typos[wrong];
    if (cleaned.includes(wrong)) {
      cleaned = cleaned.replace(new RegExp(wrong, 'g'), right);
      hasTypoCorrection = true;
    }
  }
  if (hasTypoCorrection) corrections.push('错别字纠正');
  
  return {
    original: query,
    cleaned: cleaned,
    corrections: corrections
  };
}

// 非包包类的"包"结尾词
const NON_BAG_SUFFIXES = [
  '材料包', '贴纸包', '配件包', '零件包', '礼物包', '礼品包',
  '散珠包', '珠子包', '挂件包', '挂饰包', '气球包', '香薰包',
  '茶包', '面包', '红包', 'DIY包', '手工包', '香囊'
];

// 智能分词 + 词性标注
function tokenizeWithPOS(query) {
  const raw = query.trim().toLowerCase();
  if (!raw) return { tokens: [], posTags: {}, properNoun: null, category: null };
  
  const baseTokens = raw.split(/[\s,，、]+/).filter(t => t.length > 0);
  const tokens = [];
  const posTags = {}; // { token: posTag }
  let detectedProperNoun = null;
  let detectedCategory = null;
  
  // Step 1: 检查完整查询是否匹配专有名词
  const fullQuery = baseTokens.join('');
  const sortedProperNouns = Object.keys(PROPER_NOUNS).sort((a, b) => b.length - a.length);
  
  for (const pn of sortedProperNouns) {
    if (fullQuery.includes(pn)) {
      const pnData = PROPER_NOUNS[pn];
      detectedProperNoun = pn;
      detectedCategory = pnData.category;
      tokens.push(pn);
      posTags[pn] = pnData.pos;
      
      // 处理剩余部分
      let remaining = fullQuery.replace(pn, '|||SPLIT|||');
      const parts = remaining.split('|||SPLIT|||').filter(p => p.length > 0);
      
      parts.forEach(part => {
        if (part.length >= 2) {
          const subTokens = decomposeModifier(part);
          subTokens.forEach(st => {
            if (st.length >= 2) {
              tokens.push(st);
              // 标注词性
              if (MODIFIER_DICT[st]) {
                posTags[st] = MODIFIER_DICT[st].pos;
              }
            }
          });
        }
      });
      break;
    }
  }
  
  // 如果没有找到专有名词，逐个处理token
  if (!detectedProperNoun) {
    baseTokens.forEach(bt => {
      // 检查是否是品类基础词
      if (CATEGORY_BASE_WORDS[bt]) {
        tokens.push(bt);
        posTags[bt] = 'CATEGORY';
        if (!detectedCategory) detectedCategory = CATEGORY_BASE_WORDS[bt].category;
        return;
      }
      
      // 检查是否是已知修饰词
      if (MODIFIER_DICT[bt]) {
        tokens.push(bt);
        posTags[bt] = MODIFIER_DICT[bt].pos;
        return;
      }
      
      // 检查是否是"XX包"形式
      if (bt.endsWith('包') && bt.length > 1) {
        if (NON_BAG_SUFFIXES.includes(bt)) {
          tokens.push(bt);
          posTags[bt] = 'CATEGORY';
          return;
        }
        // 分解为修饰词 + 包
        const modifier = bt.slice(0, -1);
        const subMods = decomposeModifier(modifier);
        subMods.forEach(sm => {
          if (sm.length >= 2) {
            tokens.push(sm);
            if (MODIFIER_DICT[sm]) {
              posTags[sm] = MODIFIER_DICT[sm].pos;
            }
          }
        });
        tokens.push('包');
        posTags['包'] = 'CATEGORY';
        if (!detectedCategory) detectedCategory = 'bag';
        return;
      }
      
      // 尝试分解长词
      if (bt.length > 2) {
        const subMods = decomposeModifier(bt);
        if (subMods.length > 1) {
          subMods.forEach(sm => {
            tokens.push(sm);
            if (MODIFIER_DICT[sm]) {
              posTags[sm] = MODIFIER_DICT[sm].pos;
            }
          });
          return;
        }
      }
      
      // 默认：直接加入
      tokens.push(bt);
    });
  }
  
  // 去重（保留顺序）
  const seen = new Set();
  const uniqueTokens = [];
  tokens.forEach(t => {
    if (!seen.has(t)) {
      seen.add(t);
      uniqueTokens.push(t);
    }
  });
  
  return {
    tokens: uniqueTokens,
    posTags: posTags,
    properNoun: detectedProperNoun,
    category: detectedCategory
  };
}

// 分解修饰词复合词
function decomposeModifier(modifier) {
  if (!modifier || modifier.length === 0) return [];
  
  const sortedKeys = Object.keys(MODIFIER_DICT).sort((a, b) => b.length - a.length);
  const result = [];
  let remaining = modifier;
  let maxIterations = 10;
  
  while (remaining.length > 0 && maxIterations-- > 0) {
    let found = false;
    
    // 前缀匹配（最长优先）
    for (const key of sortedKeys) {
      if (remaining.startsWith(key)) {
        result.push(key);
        remaining = remaining.slice(key.length);
        found = true;
        break;
      }
    }
    
    if (!found) {
      // 子串匹配
      let bestMatch = null;
      let bestIdx = Infinity;
      for (const key of sortedKeys) {
        const idx = remaining.indexOf(key);
        if (idx >= 0 && idx < bestIdx) {
          bestMatch = key;
          bestIdx = idx;
        }
      }
      if (bestMatch !== null) {
        if (bestIdx > 0) result.push(remaining.slice(0, bestIdx));
        result.push(bestMatch);
        remaining = remaining.slice(bestIdx + bestMatch.length);
        found = true;
      }
    }
    
    if (!found) {
      result.push(remaining);
      break;
    }
  }
  
  return result;
}

// ===== 第③步：意图识别 =====
// 做什么：判断用户搜索的"真实目的"是什么
const INTENT_TYPES = {
  CLEAR_SEARCH: { name: '明确找品', icon: '🎯', desc: '有明确的品类词，用户知道自己要找什么' },
  TREND_SEARCH: { name: '趋势选品', icon: '📈', desc: '关注销量增长、爆款趋势，找好卖的品' },
  SCENE_SEARCH: { name: '场景选品', icon: '🏖️', desc: '有特定场景/季节需求，按场景找品' },
  RECOMMENDATION: { name: '选品推荐', icon: '💡', desc: '模糊需求，需要AI推荐选品方向' },
  COMPETITOR_SEARCH: { name: '竞品找源', icon: '🔍', desc: '找同款、同源、对标竞品的货源' },
  CROSS_BORDER: { name: '跨境选品', icon: '🌍', desc: '针对海外平台的选品需求' },
};

function recognizeIntent(tokens, posTags, query) {
  const intents = [];
  const queryLower = query.toLowerCase();
  
  // 1. 检查是否有明确品类词
  const hasCategory = tokens.some(t => posTags[t] === 'CATEGORY');
  if (hasCategory) {
    intents.push({ type: 'CLEAR_SEARCH', confidence: 0.8 });
  }
  
  // 2. 检查是否有趋势/销量词
  const hasSales = tokens.some(t => posTags[t] === 'SALES') || 
    /增长|飙升|暴涨|爆款|热销|热卖|销量|卖得好/.test(queryLower);
  if (hasSales) {
    intents.push({ type: 'TREND_SEARCH', confidence: 0.85 });
  }
  
  // 3. 检查是否有场景/季节词
  const hasScene = tokens.some(t => posTags[t] === 'SCENE') ||
    /夏天|冬季|春季|秋季|开学|毕业|节日|圣诞|春节|情人节|母亲节/.test(queryLower);
  if (hasScene) {
    intents.push({ type: 'SCENE_SEARCH', confidence: 0.8 });
  }
  
  // 4. 检查是否有平台词（跨境）
  const hasPlatform = tokens.some(t => posTags[t] === 'PLATFORM') ||
    /亚马逊|temu|速卖通|跨境|外贸|出口/.test(queryLower);
  if (hasPlatform) {
    intents.push({ type: 'CROSS_BORDER', confidence: 0.85 });
  }
  
  // 5. 检查是否是模糊需求（推荐型）
  const recommendationPatterns = [
    '卖什么好', '卖什么赚钱', '选什么品', '推荐', '什么好卖',
    '新手', '起步', '小本', '创业', '不知道', '求推荐', '给点建议'
  ];
  const isRecommendation = recommendationPatterns.some(p => queryLower.includes(p));
  if (isRecommendation || (!hasCategory && intents.length === 0)) {
    intents.push({ type: 'RECOMMENDATION', confidence: isRecommendation ? 0.9 : 0.6 });
  }
  
  // 6. 检查是否是竞品找源
  const competitorPatterns = ['同款', '同源', '对标', '同款货源', '找同款', '类似'];
  const isCompetitor = competitorPatterns.some(p => queryLower.includes(p));
  if (isCompetitor) {
    intents.push({ type: 'COMPETITOR_SEARCH', confidence: 0.8 });
  }
  
  // 排序：置信度从高到低
  intents.sort((a, b) => b.confidence - a.confidence);
  
  // 生成描述
  let description = '';
  if (intents.length > 0) {
    const primary = INTENT_TYPES[intents[0].type];
    description = `用户意图：${primary.name} — ${primary.desc}`;
  }
  
  return {
    primary: intents.length > 0 ? intents[0] : null,
    all: intents,
    description: description,
    intentNames: intents.map(i => INTENT_TYPES[i.type].name)
  };
}

function predictCategory(tokens, posTags, properNoun, categoryHint) {
  // 辅助函数：基于主类目推导次级类目
  function deriveSecondary(cat, primaryPath, primaryConfidence) {
    const secondary = [];
    if (!cat || !cat.subCategories) return secondary;
    
    // 收集未作为主类目的子类目
    const primaryLeaf = primaryPath[primaryPath.length - 1];
    const otherSubs = cat.subCategories.filter(sub => {
      const subLeaf = sub.path[sub.path.length - 1];
      return subLeaf !== primaryLeaf;
    });
    
    // 取前1-2个作为次级类目，置信度比主类目低 0.05-0.15
    for (let i = 0; i < Math.min(2, otherSubs.length); i++) {
      const sub = otherSubs[i];
      const confidenceDrop = 0.05 + i * 0.05; // 第一个低0.05，第二个低0.10
      secondary.push({
        path: sub.path,
        confidence: Math.max(0.5, primaryConfidence - confidenceDrop),
        categoryId: cat.categoryId
      });
    }
    return secondary;
  }
  
  // 1. 如果有明确的类目提示，直接使用
  if (categoryHint && CATEGORY_CONFIG[categoryHint]) {
    const cat = CATEGORY_CONFIG[categoryHint];
    const primaryConf = 0.9;
    return {
      primary: { path: cat.path, confidence: primaryConf, categoryId: cat.categoryId },
      secondary: deriveSecondary(cat, cat.path, primaryConf),
      categoryName: cat.name
    };
  }
  
  // 2. 专有名词的类目
  if (properNoun && PROPER_NOUNS[properNoun]) {
    const catKey = PROPER_NOUNS[properNoun].category;
    if (catKey && CATEGORY_CONFIG[catKey]) {
      const cat = CATEGORY_CONFIG[catKey];
      // 尝试匹配更细的子类目
      let subPath = cat.path;
      let subConfidence = 0.9;
      if (cat.subCategories) {
        for (const sub of cat.subCategories) {
          if (tokens.some(t => sub.keywords.some(kw => t.includes(kw) || kw.includes(t)))) {
            subPath = sub.path;
            subConfidence = 0.92;
            break;
          }
        }
      }
      return {
        primary: { path: subPath, confidence: subConfidence, categoryId: cat.categoryId },
        secondary: deriveSecondary(cat, subPath, subConfidence),
        categoryName: cat.name
      };
    }
  }
  
  // 3. 基于token匹配
  let bestMatch = null;
  let bestScore = 0;
  
  for (const [catKey, cat] of Object.entries(CATEGORY_CONFIG)) {
    let score = 0;
    tokens.forEach(t => {
      if (cat.matchKeywords.some(kw => t === kw || t.includes(kw) || kw.includes(t))) {
        score += posTags[t] === 'CATEGORY' ? 10 : 5;
      }
    });
    
    if (score > bestScore) {
      bestScore = score;
      bestMatch = catKey;
    }
  }
  
  if (bestMatch && bestScore >= 5) {
    const cat = CATEGORY_CONFIG[bestMatch];
    const confidence = Math.min(0.95, 0.6 + bestScore * 0.03);
    return {
      primary: { path: cat.path, confidence: confidence, categoryId: cat.categoryId },
      secondary: deriveSecondary(cat, cat.path, confidence),
      categoryName: cat.name
    };
  }
  
  // 4. 无匹配
  return {
    primary: null,
    secondary: [],
    categoryName: null
  };
}

    const animalBags = YIXING_SHAPE_KEYWORDS.animal.slice(0, 6).map(a => a + '包');
    core.push(...animalBags);
    
    // 相关扩展：食物/物品造型包
    const foodBags = YIXING_SHAPE_KEYWORDS.food.slice(0, 6).map(f => f + '包');
    related.push(...foodBags);
    
    // 宽泛扩展：创意造型描述词+包
    const creativeBags = YIXING_SHAPE_KEYWORDS.creative.slice(0, 5).map(c => c + '包');
    broad.push(...creativeBags);
  }
  
  // 2. 修饰词的同义词
  tokens.forEach(token => {
    if (MODIFIER_DICT[token]) {
      const syns = MODIFIER_DICT[token].synonyms || [];
      const pos = posTags[token];
      if (pos === 'MATERIAL' || pos === 'STYLE') {
        core.push(...syns.slice(0, 2));
        related.push(...syns.slice(2, 4));
      } else {
        related.push(...syns.slice(0, 3));
      }
    }
  });
  
  // 2.5 风格家族扩展（同风格的其他说法）
  const STYLE_FAMILIES = {
    '国潮': ['国潮风', '中国风', '复古印花', '国风', '民族风', '潮牌'],
    '中国风': ['国潮', '国潮风', '国风', '民族风', '复古印花'],
    '国风': ['国潮', '中国风', '国潮风', '民族风'],
    '麻将': ['国潮风', '中国风', '复古印花', '国风'],
    '复古': ['复古风', 'vintage', '怀旧', '做旧', '中古'],
    '韩版': ['韩系', '韩国', '东大门', '韩系风'],
    '日系': ['和风', '日本', '森系', '日式'],
    'ins': ['网红', 'ins风', '博主同款', '社交'],
    '网红': ['ins', 'ins风', '爆款', '博主同款'],
    '简约': ['极简', '北欧风', 'ins风', '冷淡风'],
    '可爱': ['甜美', '萌系', '卡通', '少女心'],
    '通勤': ['简约风', '职业风', 'OL风', '气质'],
    '小众': ['个性', '独特', '设计感', '轻奢'],
    '异形': ['个性', '创意', '独特', '造型感'],
  };
  
  const styleTokens = tokens.filter(t => posTags[t] === 'STYLE');
  for (const st of styleTokens) {
    // 直接匹配风格家族
    if (STYLE_FAMILIES[st]) {
      related.push(...STYLE_FAMILIES[st].slice(0, 3));
      broad.push(...STYLE_FAMILIES[st].slice(3, 5));
    }
    // 通过 MODIFIER_DICT 的同义词反向查找风格家族
    if (MODIFIER_DICT[st] && MODIFIER_DICT[st].pos === 'STYLE') {
      const syns = MODIFIER_DICT[st].synonyms || [];
      for (const syn of syns) {
        if (STYLE_FAMILIES[syn]) {
          related.push(...STYLE_FAMILIES[syn].slice(0, 2));
          break;
        }
      }
    }
  }
  
  // 2.6 场景家族扩展（同场景的相关词）
  const SCENE_FAMILIES = {
    '夏天': ['夏季', '春夏', '清凉', '透气', '薄款', '冰丝', '防晒'],
    '夏季': ['夏天', '春夏', '清凉', '透气', '薄款'],
    '冬天': ['冬季', '秋冬', '保暖', '加厚', '加绒'],
    '冬季': ['冬天', '秋冬', '保暖', '加厚'],
    '春季': ['春天', '春夏', '开春', '新款'],
    '秋季': ['秋天', '秋冬', '早秋', '秋款'],
    '通勤': ['上班', '办公', '日常', '职业', '商务'],
    '运动': ['健身', '跑步', '户外', '训练', '瑜伽'],
    '健身': ['运动', '跑步', '瑜伽', '训练'],
    '旅行': ['旅游', '出差', '出行', '度假'],
    '约会': ['聚会', '派对', '晚宴', '婚礼'],
    '日常': ['休闲', '百搭', '通勤', '逛街'],
    '晚宴': ['宴会', '派对', '婚礼', '正式场合'],
  };
  
  const sceneTokens = tokens.filter(t => posTags[t] === 'SCENE');
  for (const sc of sceneTokens) {
    if (SCENE_FAMILIES[sc]) {
      related.push(...SCENE_FAMILIES[sc].slice(0, 3));
      broad.push(...SCENE_FAMILIES[sc].slice(3, 5));
    }
  }
  
  // 3. 品类相关的宽泛词
  if (category) {
    const catConfig = CATEGORY_CONFIG[category];
    if (catConfig) {
      broad.push(...catConfig.matchKeywords.slice(0, 3));
    }
  }
  
  // 去重 + 过滤原词
  const originalLower = originalQuery.toLowerCase();
  const filterOriginal = (arr) => arr.filter(w => w.toLowerCase() !== originalLower && !originalLower.includes(w.toLowerCase()));
  
  return {
    original: originalQuery,
    core: [...new Set(filterOriginal(core))].slice(0, 3),
    related: [...new Set(filterOriginal(related))].slice(0, 4),
    broad: [...new Set(filterOriginal(broad))].slice(0, 2),
    allExpanded: function() {
      return [...this.core, ...this.related, ...this.broad];
    }
  };
}

// ===== 第⑥步：筛选条件提取 =====
// 做什么：从自然语言中提取结构化的筛选条件

function extractFilters(query, tokens, posTags, intent) {
  const filters = {};
  const queryLower = query.toLowerCase();
  
  // 1. 价格区间提取
  // 模式：50元以内、10-50元、不超过100、低于50、50块钱以下
  const pricePatterns = [
    { pattern: /(\d+)\s*元?以[内下]/, extract: (m) => ({ price_max: parseFloat(m[1]) }) },
    { pattern: /(\d+)\s*块钱?以[内下]/, extract: (m) => ({ price_max: parseFloat(m[1]) }) },
    { pattern: /低于\s*(\d+)/, extract: (m) => ({ price_max: parseFloat(m[1]) }) },
    { pattern: /不超过\s*(\d+)/, extract: (m) => ({ price_max: parseFloat(m[1]) }) },
    { pattern: /(\d+)\s*[-~到]\s*(\d+)\s*元?/, extract: (m) => ({ price_min: parseFloat(m[1]), price_max: parseFloat(m[2]) }) },
    { pattern: /(\d+)\s*元以上/, extract: (m) => ({ price_min: parseFloat(m[1]) }) },
    { pattern: /(\d+)\s*块以上/, extract: (m) => ({ price_min: parseFloat(m[1]) }) },
    { pattern: /高于\s*(\d+)/, extract: (m) => ({ price_min: parseFloat(m[1]) }) },
    { pattern: /便宜|平价|低价/, extract: () => ({ price_hint: 'low' }) },
    { pattern: /高端|轻奢|高档/, extract: () => ({ price_hint: 'high' }) },
  ];
  
  for (const pp of pricePatterns) {
    const match = queryLower.match(pp.pattern);
    if (match) {
      Object.assign(filters, pp.extract(match));
      break;
    }
  }
  
  // 2. 材质提取
  const materials = [];
  tokens.forEach(t => {
    if (posTags[t] === 'MATERIAL') {
      materials.push(t);
    }
  });
  if (materials.length > 0) filters.material = materials;
  
  // 2.5 风格提取
  const styleTokens = tokens.filter(t => posTags[t] === 'STYLE');
  if (styleTokens.length > 0) {
    filters.style = styleTokens;
  }
  
  // 3. 人群提取
  const audienceTokens = tokens.filter(t => posTags[t] === 'AUDIENCE');
  if (audienceTokens.length > 0) {
    if (audienceTokens.some(t => t.includes('女'))) filters.gender = 'female';
    if (audienceTokens.some(t => t.includes('男'))) filters.gender = 'male';
    if (audienceTokens.some(t => t.includes('儿童') || t.includes('小孩') || t.includes('宝宝'))) filters.audience = 'children';
    if (audienceTokens.some(t => t.includes('中老年') || t.includes('妈妈') || t.includes('爸爸'))) filters.audience = 'middle_elderly';
  }
  
  // 4. 时间范围提取
  const timePatterns = [
    { pattern: /近(\d+)天/, extract: (m) => ({ time_range: m[1] + 'd' }) },
    { pattern: /(\d+)天内/, extract: (m) => ({ time_range: m[1] + 'd' }) },
    { pattern: /最近|近期/, extract: () => ({ time_range: '30d' }) },
    { pattern: /近一周|近7天/, extract: () => ({ time_range: '7d' }) },
    { pattern: /近一个月|近30天/, extract: () => ({ time_range: '30d' }) },
  ];
  
  for (const tp of timePatterns) {
    const match = queryLower.match(tp.pattern);
    if (match) {
      Object.assign(filters, tp.extract(match));
      break;
    }
  }
  
  // 5. 增长率/销量要求
  if (/增长快|飙升|暴涨|增长迅速|高增长/.test(queryLower)) {
    filters.growth_rate = 'high';
  }
  if (/爆款|热销|热卖|卖得好/.test(queryLower)) {
    filters.sales_hint = 'high';
  }
  
  // 6. 排序方式推断
  let sortBy = 'relevance';
  if (filters.growth_rate === 'high' || /增长|趋势|飙升/.test(queryLower)) {
    sortBy = 'growth_desc';
  } else if (filters.sales_hint === 'high' || /销量|爆款|热销/.test(queryLower)) {
    sortBy = 'sales_desc';
  } else if (filters.price_hint === 'low' || /便宜|低价/.test(queryLower)) {
    sortBy = 'price_asc';
  } else if (filters.price_hint === 'high' || /高端|品质/.test(queryLower)) {
    sortBy = 'price_desc';
  }
  filters.sort_by = sortBy;
  
  // 7. 平台/场景
  const platformTokens = tokens.filter(t => posTags[t] === 'PLATFORM');
  if (platformTokens.length > 0) filters.platform = platformTokens[0];
  
  // 8. 商家类型
  const supplierTokens = tokens.filter(t => posTags[t] === 'SUPPLIER');
  if (supplierTokens.length > 0) filters.supplier_type = 'factory';
  
  return filters;
}

// 检测"包"的歧义
function detectBagAmbiguity(query, tokens, category) {
  const queryLower = query.toLowerCase();
  
  // 如果搜索明确包含包包相关的上下文，歧义较低
  const bagContextWords = ['女', '女式', '女士', '手提', '单肩', '斜挎', '双肩', '背', '拎', '钱包', '卡包', '化妆包'];
  const hasBagContext = bagContextWords.some(w => queryLower.includes(w));
  
  // 如果搜索包含棋牌相关的词，可能是麻将收纳
  const mahjongContextWords = ['麻将', '牌', '棋牌', '桌', '骰子'];
  const hasMahjongContext = mahjongContextWords.some(w => queryLower.includes(w));
  
  // 特殊词：麻将包
  if (queryLower.includes('麻将包') || (queryLower.includes('麻将') && queryLower.includes('包'))) {
    return {
      is_ambiguous: true,
      reason: '多义词："麻将包"可能指麻将图案的包包，也可能指装麻将牌的收纳包',
      confidence: hasBagContext ? 0.85 : 0.7,
      options: [
        { text: '女式包包（麻将纹/印花风格）', category: 'bag', is_most_likely: !hasMahjongContext || hasBagContext },
        { text: '麻将收纳盒/收纳包', category: 'mahjong', is_most_likely: hasMahjongContext && !hasBagContext },
      ]
    };
  }
  
  // 一般情况：搜索"包"但没有上下文
  if (tokens.includes('包') && tokens.length === 1) {
    return {
      is_ambiguous: true,
      reason: '"包"是一个多义词，可能指包包，也可能指包装、套件等',
      confidence: 0.5,
      options: [
        { text: '箱包/包包', category: 'bag', is_most_likely: true },
        { text: '包装/包装袋', category: 'packaging', is_most_likely: false },
        { text: '其他套件类产品', category: 'other', is_most_likely: false },
      ]
    };
  }
  
  return { is_ambiguous: false };
}

function detectAmbiguity(query, tokens, posTags, category) {
  const queryLower = query.toLowerCase();
  
  // 1. 检查预定义的歧义词
  for (const [keyword, rule] of Object.entries(AMBIGUOUS_RULES)) {
    if (queryLower.includes(keyword)) {
      return {
        is_ambiguous: true,
        reason: rule.reason,
        confidence: 0.75,
        options: rule.options
      };
    }
  }
  
  // 2. 检测"包"的歧义
  if (tokens.includes('包') || category === 'bag') {
    const bagAmb = detectBagAmbiguity(query, tokens, category);
    if (bagAmb.is_ambiguous) return bagAmb;
  }
  
  // 3. 通用歧义检测：品类词太泛
  const categoryTokens = tokens.filter(t => posTags[t] === 'CATEGORY');
  if (categoryTokens.length === 0 && tokens.length <= 2) {
    return {
      is_ambiguous: true,
      reason: '搜索词较为宽泛，可能有多种理解',
      confidence: 0.5,
      options: []
    };
  }
  
  // 4. 无歧义
  return {
    is_ambiguous: false,
    confidence: 0.92
  };
}

// ===== 歧义处理策略 =====
// 置信度>0.9: 直接搜索
// 置信度0.7-0.9: 主结果走高置信方向，顶部显示"你是不是想找"
// 置信度0.5-0.7: 先让用户选，再搜索
// 置信度<0.5: 完全让用户选
function getAmbiguityStrategy(ambiguity) {
  if (!ambiguity.is_ambiguous || ambiguity.confidence > 0.9) {
    return { strategy: 'direct', showOptions: false };
  }
  if (ambiguity.confidence >= 0.7) {
    return { strategy: 'hint', showOptions: true, usePrimary: true };
  }
  if (ambiguity.confidence >= 0.5) {
    return { strategy: 'ask_first', showOptions: true, usePrimary: false };
  }
  return { strategy: 'show_all', showOptions: true, usePrimary: false };
}

// ===== AI分析总入口：七步分析 =====
// ============================================================
function aiAnalyzeQuery(query) {
  // 第①步：预处理
  const preprocessResult = preprocessQuery(query);
  const cleanedQuery = preprocessResult.cleaned;
  
  // 第②步：分词与词性标注
  const tokenizeResult = tokenizeWithPOS(cleanedQuery);
  const { tokens, posTags, properNoun, category: tokenCategory } = tokenizeResult;
  
  // 第③步：意图识别
  const intentResult = recognizeIntent(tokens, posTags, cleanedQuery);
  
  // 第④步：类目预测
  const categoryResult = predictCategory(tokens, posTags, properNoun, tokenCategory);
  
  // 第⑤步：关键词扩展
  const expansionResult = expandKeywords(cleanedQuery, tokens, posTags, properNoun, categoryResult.categoryName ? 
    Object.keys(CATEGORY_CONFIG).find(k => CATEGORY_CONFIG[k].name === categoryResult.categoryName) : null);
  
  // 第⑥步：筛选条件提取
  const filtersResult = extractFilters(cleanedQuery, tokens, posTags, intentResult);
  
  // 第⑦步：歧义检测
  const ambiguityResult = detectAmbiguity(cleanedQuery, tokens, posTags, tokenCategory);
  
  // 生成店雷达搜索参数
  const searchParams = generateSearchParams(cleanedQuery, tokens, expansionResult, categoryResult, filtersResult);
  
  return {
    original_query: query,
    cleaned_query: cleanedQuery,
    preprocess: preprocessResult,
    tokenize: tokenizeResult,
    intent: intentResult,
    category: categoryResult,
    expansion: expansionResult,
    filters: filtersResult,
    ambiguity: ambiguityResult,
    search_params: searchParams,
  };
}

// 生成店雷达搜索参数
function generateSearchParams(query, tokens, expansion, category, filters) {
  const keywords = [query, ...expansion.core, ...expansion.related];
  const uniqueKeywords = [...new Set(keywords)].slice(0, 8);
  
  return {
    keywords: uniqueKeywords,
    keyword_match_mode: 'weighted_or',
    category_id: category.primary ? category.primary.categoryId : null,
    category_path: category.primary ? category.primary.path : null,
    filters: filters,
    sort_by: filters.sort_by || 'relevance',
    fallback_strategy: 'expand_to_related_keywords'
  };
}

判断用户的搜索意图属于哪一类：
- CLEAR_SEARCH: 明确找品（有明确的品类词）
- TREND_SEARCH: 趋势选品（有趋势/销量相关词）
- SCENE_SEARCH: 场景选品（有场景/季节词）
- RECOMMENDATION: 选品推荐（模糊需求，需要推荐方向）
- COMPETITOR_SEARCH: 竞品找源（找同款/同源）
- CROSS_BORDER: 跨境选品（涉及海外平台/国家）

输出意图类型、置信度(0-1)、一句话描述。

### 第4步：类目预测
预测对应的1688商品类目路径（一级→二级→三级），输出置信度。
如果有多个可能的类目，按置信度排序输出。

常见类目参考：
- 箱包 → 女包 → 手提包/单肩包/斜挎包/双肩包/手拿包
- 服饰 → 女装/男装/童装 → 上衣/裤子/裙子...
- 鞋靴 → 女鞋/男鞋 → 运动鞋/高跟鞋/凉鞋...
- 数码 → 手机配件 → 手机壳/钢化膜/充电宝
- 家居 → 家纺/厨具/收纳

### 第5步：关键词扩展
基于原词，从以下维度扩展相关关键词：
- 同义词：意思完全相同的词
- 近义词：意思相近的词
- 风格相关词：同风格的其他说法
- 场景相关词：使用场景相关
- 具体造型词：如果是异形/创意类，扩展具体造型（动物造型、食物造型等）

要求：
- 总共扩展5-10个词
- 分层级：核心扩展（3-4个，高相关）、相关扩展（3-4个，中相关）、宽泛扩展（2-3个，低相关）
- 宁缺毋滥，必须高度相关

### 第6步：筛选条件提取
从用户输入中提取结构化的筛选条件，包括：
- price_min / price_max: 价格区间（数字）
- material: 材质（数组）
- gender: 人群（female/male/kid）
- time_range: 时间范围（如"30d"）
- growth_rate: 增长率要求（high/medium/low）
- style: 风格（数组）
- sort_by: 排序方式（relevance/growth_desc/sales_desc/price_asc）

### 第7步：歧义检测
判断搜索词是否存在歧义：
- 如果置信度>0.9，认为无歧义
- 如果0.7-0.9，列出主要方向和备选方向
- 如果<0.7，列出所有可能的方向供用户选择

// 调用智谱AI进行搜索分析
async function callZhipuSearchAnalysis(query) {
  if (!USE_ZHIPU_AI || !ZHIPU_API_KEY) return null;
  
  try {
    const response = await fetch(ZHIPU_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + ZHIPU_API_KEY
      },
      body: JSON.stringify({
        model: ZHIPU_MODEL,
        messages: [
          { role: 'system', content: ZHIPU_SEARCH_SYSTEM_PROMPT },
          { role: 'user', content: query }
        ],
        temperature: 0.3,
        response_format: { type: 'json_object' }
      })
    });
    
    if (!response.ok) {
      throw new Error('Zhipu API error: ' + response.status);
    }
    
    const data = await response.json();
    const content = data.choices[0].message.content;
    
    // 尝试解析JSON
    let result;
    try {
      result = JSON.parse(content);
    } catch (e) {
      // 如果解析失败，尝试提取JSON部分
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        result = JSON.parse(jsonMatch[0]);
      } else {
        throw new Error('Failed to parse Zhipu response');
      }
    }
    
    return result;
  } catch (e) {
    console.warn('[Zhipu AI] Analysis failed:', e.message);
    return null; // 失败返回null，降级到规则引擎
  }
}

// 将智谱返回的结果转换为统一格式（兼容规则引擎的输出格式）
function convertZhipuResultToStandard(zhipuResult) {
  if (!zhipuResult) return null;
  
  const tokens = zhipuResult.tokens || [];
  const tokenWords = tokens.map(t => t.word);
  const posTags = {};
  tokens.forEach(t => { posTags[t.word] = t.pos; });
  
  const category = zhipuResult.category_prediction || {};
  const expansion = zhipuResult.keyword_expansion || { core: [], related: [], broad: [] };
  const ambiguity = zhipuResult.ambiguity || { is_ambiguous: false, confidence: 0.9 };
  
  return {
    original_query: zhipuResult.original_query || '',
    cleaned_query: zhipuResult.cleaned_query || zhipuResult.original_query || '',
    preprocess: {
      original: zhipuResult.original_query || '',
      cleaned: zhipuResult.cleaned_query || zhipuResult.original_query || '',
      corrections: zhipuResult.preprocess_corrections || []
    },
    tokenize: {
      tokens: tokenWords,
      posTags: posTags,
      properNoun: tokenWords.find(w => posTags[w] === 'CATEGORY' && w.length > 2) || null,
      category: category.primary && category.primary.path ? category.primary.path[0] : null
    },
    intent: {
      primary: zhipuResult.intent ? {
        type: zhipuResult.intent.type,
        confidence: zhipuResult.intent.confidence || 0.8
      } : null,
      all: zhipuResult.intent ? [zhipuResult.intent] : [],
      description: zhipuResult.intent ? zhipuResult.intent.description : '',
      intentNames: zhipuResult.intent ? [zhipuResult.intent.type] : []
    },
    category: {
      primary: category.primary ? {
        path: category.primary.path,
        confidence: category.primary.confidence || 0.8,
        categoryId: category.primary.category_id || null
      } : null,
      secondary: category.secondary || [],
      categoryName: category.primary && category.primary.path ? category.primary.path[0] : null
    },
    expansion: {
      original: zhipuResult.cleaned_query || zhipuResult.original_query || '',
      core: expansion.core || [],
      related: expansion.related || [],
      broad: expansion.broad || [],
      allExpanded: function() {
        return [...this.core, ...this.related, ...this.broad];
      }
    },
    filters: zhipuResult.filters || {},
    ambiguity: {
      is_ambiguous: ambiguity.is_ambiguous || false,
      confidence: ambiguity.confidence || 0.9,
      reason: ambiguity.reason || '',
      options: ambiguity.options || []
    },
    search_params: {
      keywords: [...expansion.core || [], ...expansion.related || []],
      keyword_match_mode: 'weighted_or',
      category_id: category.primary && category.primary.category_id ? category.primary.category_id : null,
      category_path: category.primary ? category.primary.path : null,
      filters: zhipuResult.filters || {},
      sort_by: zhipuResult.sort_by || 'relevance',
      fallback_strategy: 'expand_to_related_keywords'
    },
    _fromZhipu: true // 标记来自智谱AI
  };
}

function md5Hash(str) {
  return CryptoJS.MD5(str).toString();
}

function generateApiSign(params) {
  const sortedKeys = Object.keys(params).filter(k => params[k] !== null && params[k] !== undefined && k !== 'sign').sort();
  const parts = sortedKeys.map(k => {
    let v = params[k];
    if (Array.isArray(v)) { v = '[' + v.join(',') + ']'; }
    return k + '=' + v;
  });
  const signStr = 'appSecret=' + API_APP_SECRET + '&' + parts.join('&') + '&appSecret=' + API_APP_SECRET;
  return md5Hash(signStr);
}

async function callDianLeiDaAPI(action, params) {
  const nonceStr = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
  const allParams = {
    appId: API_APP_ID,
    nonceStr: nonceStr,
    ...params,
  };
  allParams.sign = generateApiSign(allParams);
  
  const resp = await fetch(API_DIRECT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(allParams),
  });
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

// 从API获取商品
async function fetchProductsWithAnalysis(analysis) {
  const allProducts = [];
  const seenOfferIds = new Set();
  const pageSize = 100;
  const catConfig = matchCategoryFromAnalysis(analysis);
  const hasCategoryFilter = catConfig !== null;
  const filters = analysis.filters || {};
  const intent = analysis.intent || {};
  
  // 检测是否为异形包搜索
  const properNoun = analysis.tokenize.properNoun;
  const isYixingSearch = properNoun === '异形包' || 
    (analysis.tokenize.tokens.includes('异形') && analysis.category.primary && analysis.category.primary.path[0] === '箱包');
  
  // 搜索策略：原词 + 核心扩展词
  let searchQueries = [
    analysis.cleaned_query,
    ...analysis.expansion.core,
    ...analysis.expansion.related.slice(0, 2)
  ].filter((v, i, a) => a.indexOf(v) === i && v.length > 0);
  
  // 异形包专用：增加更多具体造型关键词（多路召回）
  if (isYixingSearch) {
    const yixingExtraQueries = [
      '动物造型包', '蝴蝶包', '鱼形包', '猫头鹰包', '兔子包',
      '云朵包', '爱心包', '创意包包', '个性女包', '立体造型包',
      '饺子包', '贝壳包', '马鞍包'
    ];
    searchQueries = [...searchQueries, ...yixingExtraQueries].slice(0, 10);
  } else {
    searchQueries = searchQueries.slice(0, 3);
  }
  
  console.log('[AI Search] Queries:', searchQueries);
  console.log('[AI Search] Filters:', filters);
  
  for (const searchKW of searchQueries) {
    const products = await searchSingleQuery(searchKW, catConfig, hasCategoryFilter, pageSize, filters, intent);
    for (const p of products) {
      const oid = p.offerId || p.id;
      if (!seenOfferIds.has(oid)) {
        seenOfferIds.add(oid);
        allProducts.push(p);
      }
    }
  }
  
  return allProducts;
}

async function searchSingleQuery(keyword, catConfig, hasCategoryFilter, pageSize, filters, intent) {
  const products = [];
  filters = filters || {};
  intent = intent || {};
  
  // 确定排序方式：趋势选品默认按增长率排序
  let sortField = 'orderCount30d';
  let sortType = 'desc';
  const isTrendIntent = intent.primary && intent.primary.type === 'TREND_SEARCH';
  
  if (filters.growth_rate === 'high' || isTrendIntent || filters.sort_by === 'growth_desc') {
    sortField = 'growthRate';
    sortType = 'desc';
  } else if (filters.sort_by === 'sales_desc') {
    sortField = 'orderCount30d';
    sortType = 'desc';
  } else if (filters.sort_by === 'price_asc') {
    sortField = 'price';
    sortType = 'asc';
  } else if (filters.sort_by === 'price_desc') {
    sortField = 'price';
    sortType = 'desc';
  }
  
  // 确定时间周期
  let cycle = 30;
  if (filters.time_range) {
    const match = filters.time_range.match(/(\d+)d/);
    if (match) {
      cycle = parseInt(match[1]);
    }
  }
  
  const baseParams = {
    pageSize: pageSize,
    keyWord: keyword,
    searchType: '1',
    sortField: sortField,
    sortType: sortType,
    cycle: cycle,
  };
  if (hasCategoryFilter) {
    baseParams.categoryIdList = [catConfig.categoryId];
  }
  // 价格过滤（如API支持）
  if (filters.price_min !== undefined) {
    baseParams.priceMin = filters.price_min;
  }
  if (filters.price_max !== undefined) {
    baseParams.priceMax = filters.price_max;
  }
  
  let firstResult = await callDianLeiDaAPI('search', { ...baseParams, pageIndex: 1 });
  if (firstResult.code !== 200) {
    throw new Error(`API error: ${firstResult.msg}`);
  }
  
  // 类目过滤回退
  if (hasCategoryFilter && (!firstResult.result.totalPages || firstResult.result.totalPages === 0)) {
    console.log('Category filter returned 0 results, retrying without...');
    const fallbackParams = { ...baseParams };
    delete fallbackParams.categoryIdList;
    firstResult = await callDianLeiDaAPI('search', { ...fallbackParams, pageIndex: 1 });
    if (firstResult.code !== 200) {
      throw new Error(`API error: ${firstResult.msg}`);
    }
  }
  
  const totalPages = Math.min(firstResult.result.totalPages || 1, 10);
  processAPIProducts(firstResult.result.list || [], products, catConfig);
  
  // 获取剩余页
  const remainingPages = [];
  for (let i = 2; i <= totalPages; i++) remainingPages.push(i);
  
  const BATCH_SIZE = 5;
  for (let i = 0; i < remainingPages.length; i += BATCH_SIZE) {
    const batch = remainingPages.slice(i, i + BATCH_SIZE);
    const promises = batch.map(pageIndex =>
      callDianLeiDaAPI('search', { ...baseParams, pageIndex })
        .catch(err => { console.warn(`Page ${pageIndex} failed`); return null; })
    );
    const results = await Promise.all(promises);
    for (const result of results) {
      if (result && result.code === 200 && result.result) {
        processAPIProducts(result.result.list || [], products, catConfig);
      }
    }
  }
  
  return products;
}

function processAPIProducts(items, allProducts, catConfig) {
  for (const item of items) {
    const levelName = item.levelName || '';
    const title = item.title || '';
    
    if (catConfig && shouldExcludeByCategory(levelName, title, catConfig)) {
      continue;
    }
    
    allProducts.push({
      id: String(item.offerId || ''),
      title: title,
      shop: item.company || '',
      model: item.companyType === 1 ? '生产加工' : item.companyType === 2 ? '经销批发' : '--',
      location: item.city || item.province || '',
      price: item.price || 0,
      sales: item.saleQuantity || 0,
      repurchase: 0,
      credit: 0,
      tags: (() => { try { return JSON.parse(item.buyerProtections || '[]'); } catch(e) { return []; } })(),
      img: item.image || '',
      link: `http://detail.m.1688.com/page/index.html?offerId=${item.offerId}`,
      _orderCount: item.orderCount || 0,
      _levelName: levelName,
      _fromAPI: true,
    });
  }
}

function shouldExcludeByCategory(levelName, title, catConfig) {
  if (!catConfig) return false;
  if (levelName && catConfig.excludeSubcategories) {
    for (const sub of catConfig.excludeSubcategories) {
      if (levelName.includes(sub)) return true;
    }
  }
  if (title && catConfig.excludeTitleKeywords) {
    for (const kw of catConfig.excludeTitleKeywords) {
      if (title.includes(kw)) return true;
    }
  }
  return false;
}

// 本地搜索（简化版，用于本地数据和结果再过滤）
function searchProductsLocal(query, productArray, priceFilter, sortBy, analysis) {
  // 使用AI分析结果进行更精准的匹配
  const tokens = analysis ? analysis.tokenize.tokens : query.split(/\s+/);
  const expandedTerms = analysis ? analysis.expansion.allExpanded() : [];
  const catConfig = matchCategoryFromAnalysis(analysis);
  
  const mustValidateBag = analysis && analysis.category.primary && 
    (analysis.category.primary.path[0] === '箱包' || tokens.includes('包'));
  
  // 检测是否为异形包搜索
  const isYixingSearch = analysis && analysis.tokenize.properNoun === '异形包' || 
    (tokens.includes('异形') && mustValidateBag);
  
  // 异形包形状特征词库（用于二次打分排序）
  const YIXING_FEATURES = {
    // 动物造型（高分：最典型的异形包）
    high: ['鱼形', '蝴蝶', '猫头鹰', '兔子', '猫咪', '小熊', '恐龙', '天鹅', '独角兽', '青蛙', '熊猫', '老虎', '狐狸', '蜜蜂', '瓢虫', '鲸鱼', '海豚', '大象', '小狗', '猫咪造型'],
    // 食物/物品造型（中分：比较有特色）
    mid: ['云朵', '饺子', '贝壳', '爱心', '心形', '星星', '月亮', '花朵', '花瓣', '草莓', '蛋糕', '冰淇淋', '棒棒糖', '法棍', '马鞍', '水桶', '枕头', '波士顿'],
    // 创意造型描述（低分：有特色但不算特别异形）
    low: ['异形', '个性', '创意', '搞怪', '独特', '不规则', '造型', '3D', '立体', '设计感', '小众', '高颜值', '解构', '拼接', '褶皱', '打结', '扭结', '编织']
  };
  
  // 计算异形度：标题中有多少形状特征词
  function calcYixingScore(title) {
    const t = title.toLowerCase();
    let score = 0;
    YIXING_FEATURES.high.forEach(w => { if (t.includes(w)) score += 15; });
    YIXING_FEATURES.mid.forEach(w => { if (t.includes(w)) score += 8; });
    YIXING_FEATURES.low.forEach(w => { if (t.includes(w)) score += 3; });
    return score;
  }
  
  const scored = productArray.map(p => {
    let score = 0;
    const titleLower = p.title.toLowerCase();
    const shopLower = p.shop.toLowerCase();
    
    // 包包上下文验证
    if (mustValidateBag) {
      // 简化版验证
      const nonBagWords = ['材料包', '贴纸包', '配件包', '包装', '麻将桌', '麻将机', '麻将牌'];
      const hasNonBag = nonBagWords.some(w => titleLower.includes(w));
      const hasBagWord = ['包', '包包', '手提', '单肩', '斜挎', '双肩', '背包'].some(w => titleLower.includes(w));
      if (hasNonBag && !hasBagWord) return null;
    }
    
    // 类目过滤
    if (catConfig && catConfig.excludeTitleKeywords) {
      if (catConfig.excludeTitleKeywords.some(kw => titleLower.includes(kw.toLowerCase()))) return null;
    }
    
    // Token匹配
    tokens.forEach(token => {
      if (titleLower.includes(token.toLowerCase())) {
        score += 10;
        if (titleLower.startsWith(token) || titleLower.endsWith(token)) score += 3;
      }
      if (shopLower.includes(token.toLowerCase())) score += 3;
    });
    
    // 扩展词匹配
    expandedTerms.forEach(term => {
      if (titleLower.includes(term.toLowerCase())) score += 3;
    });
    
    // 异形包搜索：额外异形度打分
    let yixingScore = 0;
    if (isYixingSearch) {
      yixingScore = calcYixingScore(titleLower);
      // 异形度加成：把真正有造型的包排前面
      score += yixingScore * 2;
    }
    
    if (score === 0) return null;
    return { product: p, matchScore: score, yixingScore: yixingScore };
  }).filter(item => item !== null);
  
  // 价格过滤
  const filtered = scored.filter(item => {
    const price = item.product.price;
    if (priceFilter === 'all') return true;
    if (priceFilter === '0-5') return price < 5;
    if (priceFilter === '5-20') return price >= 5 && price < 20;
    if (priceFilter === '20-50') return price >= 20 && price < 50;
    if (priceFilter === '50+') return price >= 50;
    return true;
  });
  
  // 综合评分
  const maxSales = Math.max(...filtered.map(f => f.product.sales), 1);
  const maxMatchScore = Math.max(...filtered.map(f => f.matchScore), 1);
  filtered.forEach(item => {
    item.compositeScore = calcCompositeScore(item.product, maxSales, item.matchScore);
  });
  
  // 排序
  if (sortBy === 'score') {
    filtered.sort((a, b) => b.compositeScore - a.compositeScore);
  } else if (sortBy === 'sales') {
    filtered.sort((a, b) => b.product.sales - a.product.sales);
  } else if (sortBy === 'price-low') {
    filtered.sort((a, b) => a.product.price - b.product.price);
  }
  
  return filtered;
}

function calcCompositeScore(p, maxSales, matchScore) {
  let relevanceScore = matchScore ? Math.min(40, Math.round(matchScore * 0.8)) : 0;
  let marketScore = p.sales >= 50000 ? 25 : p.sales >= 10000 ? 20 : p.sales >= 5000 ? 16 : p.sales >= 1000 ? 11 : p.sales >= 100 ? 6 : 2;
  let priceScore = p.price > 100 ? 1 : p.price > 50 ? 2 : p.price > 20 ? 3 : p.price > 5 ? 4 : 5;
  let creditScore = p.credit >= 15 ? 10 : p.credit >= 10 ? 7 : p.credit >= 5 ? 4 : 1;
  let tagScore = Math.min(5, (p.tags ? p.tags.length : 0));
  
  return Math.round((relevanceScore + marketScore + 5 + creditScore + priceScore + tagScore) * 10) / 10;
}

function getScoreGrade(score) {
  if (score >= 80) return { grade: 'excellent', label: '优选', cls: 'score-excellent' };
  if (score >= 65) return { grade: 'good', label: '推荐', cls: 'score-good' };
  if (score >= 50) return { grade: 'fair', label: '一般', cls: 'score-fair' };
  return { grade: 'low', label: '观望', cls: 'score-fair' };
}

  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleInputKey(e) {

}

function buildAIAnalysisCard(analysis) {
  const intent = analysis.intent.primary;

  const category = analysis.category.primary;
  const expansion = analysis.expansion;
  const filters = analysis.filters;
  
  let html = '<div class="ai-analysis-card">';
  html += '<div class="card-title">✨ AI智能分析结果</div>';

  if (intentInfo) {
    html += '<div class="card-row">';
    html += '<span class="card-label">搜索意图</span>';
    html += `<span class="card-value"><span class="intent-badge">${intentInfo.icon} ${intentInfo.name}</span></span>`;
    html += '</div>';
  }
  
  // 类目预测
  if (category) {
    const confPercent = Math.round(category.confidence * 100);
    html += '<div class="card-row">';
    html += '<span class="card-label">识别类目</span>';
    html += `<span class="card-value">${category.path.join(' → ')}</span>`;
    html += '</div>';
    html += '<div class="card-row" style="padding-left:68px;margin-top:-4px;">';

    html += '<div class="card-row" style="padding-left:68px;margin-top:-2px;">';
    html += `<div class="confidence-bar" style="width:120px;"><div class="confidence-fill" style="width:${confPercent}%;"></div></div>`;
    html += '</div>';
  }
  
  // 扩展关键词
  const allKeywords = [...expansion.core, ...expansion.related];
  if (allKeywords.length > 0) {
    html += '<div class="card-row">';
    html += '<span class="card-label">扩展搜索</span>';
    html += '<span class="card-tags">';
    allKeywords.slice(0, 6).forEach(kw => {
      html += `<span class="card-tag">${escapeHtml(kw)}</span>`;
    });
    html += '</span></div>';
  }
  
  // 筛选条件
  const filterKeys = Object.keys(filters).filter(k => k !== 'sort_by' && filters[k] !== undefined && filters[k] !== null);
  if (filterKeys.length > 0) {
    html += '<div class="card-row">';
    html += '<span class="card-label">筛选条件</span>';
    html += '<span class="card-tags">';
    filterKeys.forEach(key => {
      const val = filters[key];
      let label = key;
      let displayVal = Array.isArray(val) ? val.join('、') : String(val);
      if (key === 'price_max') { label = '价格上限'; displayVal = '¥' + val + '以下'; }
      if (key === 'price_min') { label = '价格下限'; displayVal = '¥' + val + '以上'; }
      if (key === 'material') { label = '材质'; displayVal = val.join('、'); }
      if (key === 'gender') { label = '性别'; displayVal = val === 'female' ? '女款' : '男款'; }
      if (key === 'time_range') { label = '时间范围'; displayVal = val.replace('d', '天内'); }
      if (key === 'growth_rate') { label = '增长率'; displayVal = val === 'high' ? '高增长' : val; }
      html += `<span class="card-tag">${escapeHtml(label)}: ${escapeHtml(displayVal)}</span>`;
    });
    html += '</span></div>';
  }
  
  // 排序
  html += '<div class="card-row">';
  html += '<span class="card-label">排序方式</span>';

    'growth_desc': '增长率优先',

    'price_asc': '价格从低到高',
    'price_desc': '价格从高到低',
  };
  html += `<span class="card-value">${sortLabels[filters.sort_by] || '综合评分'}</span>`;
  html += '</div>';
  
  html += '</div>';
  return html;
}

// 构建歧义选项
function buildAmbiguityOptions(ambiguity, onSelect) {
  if (!ambiguity.is_ambiguous) return '';
  
  const strategy = getAmbiguityStrategy(ambiguity);
  if (strategy.strategy === 'direct') return '';
  
  let html = '<div class="ambiguity-options">';
  html += `<div class="amb-title">🤔 检测到歧义：${escapeHtml(ambiguity.reason)}</div>`;
  html += '<div class="amb-buttons">';
  
  ambiguity.options.forEach((opt, idx) => {
    const btnClass = opt.is_most_likely ? 'amb-btn primary' : 'amb-btn';
    html += `<button class="${btnClass}" onclick="selectAmbiguityOption(${idx})">`;
    html += escapeHtml(opt.text);
    if (opt.estimated_ratio) {
      html += `<span class="amb-count">${Math.round(opt.estimated_ratio * 100)}%用户选</span>`;
    }
    html += '</button>';
  });
  
  html += '</div></div>';
  return html;
}

  // ==========================================
  // 综合排序
  // ==========================================
  await sleep(300);
  const stepNum = '综合排序';
  let rankDetail = results.length > 0
    ? `匹配 ${results.length} 款商品 · 最高评分 ${results[0].compositeScore} · 按${currentSortBy === 'score' ? '综合评分' : currentSortBy === 'sales' ? '销量' : '价格'}排序`
    : '无匹配商品';
  
  const skillCards8 = bubble.querySelector('#skill-cards');
  if (skillCards8) {
    skillCards8.insertAdjacentHTML('beforeend',
      buildSkillCard('done', stepNum, escapeHtml(rankDetail))
    );
  }
  
  // ==========================================
  // 构建结果展示
  // ==========================================
  currentResults = results;
  currentPage = 1;
  
  let resultsHtml = '';
  
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    
    resultsHtml += `<div class="ai-summary">`;
    resultsHtml += `已为你匹配到 <span class="highlight">${results.length} 款商品</span>，`;
    resultsHtml += `最高评分 <span class="stat-inline"><span class="v">${topScore}</span></span>`;
    resultsHtml += `，均价 <span class="stat-inline"><span class="v">¥${avgPrice.toFixed(1)}</span></span>`;
    resultsHtml += `，均销量 <span class="stat-inline"><span class="v">${Math.round(avgSales).toLocaleString()}</span></span>`;
    resultsHtml += `。</div>`;
    
    resultsHtml += buildToolbar(results.length);
    resultsHtml += renderProductGrid(results, currentPage);
    resultsHtml += renderChatPagination(results.length, currentPage);
  } else {
    resultsHtml += `<div class="empty-result">`;
    resultsHtml += `<div class="emoji">😔</div>`;
    resultsHtml += `<h4>未找到匹配「${escapeHtml(query)}」的商品</h4>`;
    resultsHtml += `<p>试试更宽泛的关键词，或者换个说法</p>`;
    resultsHtml += `</div>`;
  }
  
  bubble.insertAdjacentHTML('beforeend', resultsHtml);
  scrollToBottom();
  
  isSearching = false;
  document.getElementById('send-btn').disabled = false;
}

// 选择歧义选项
function selectAmbiguityOption(idx) {
  const pending = window._pendingAmbiguity;
  if (!pending) return;
  
  const { analysis, bubble } = pending;
  const option = analysis.ambiguity.options[idx];
  
  // 根据选择调整搜索方向
  if (option.category === 'bag') {
    // 用户确认是包包，继续搜索
    analysis.ambiguity.is_ambiguous = false;
    analysis.ambiguity.confidence = 0.95;
    
    // 移除歧义选项，显示确认
    const ambOptions = bubble.querySelector('.ambiguity-options');
    if (ambOptions) {
      ambOptions.innerHTML = `<div style="padding:10px 0;font-size:13px;color:var(--green);">✅ 已选择：${escapeHtml(option.text)}</div>`;
    }
    
    // 继续执行搜索
    continueSearchAfterAmbiguity(analysis, bubble);
  } else {
    // 其他选项 - 重新构造搜索词
    const newQuery = option.text;
    window._pendingAmbiguity = null;
    
    // 清空当前气泡内容，重新搜索
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    
    // 用新关键词重新搜索
    const input = document.getElementById('chat-input');
    input.value = newQuery;
    doSearch();
  }
}

async function continueSearchAfterAmbiguity(analysis, bubble) {
  // 商品匹配
  const skillCards = bubble.querySelector('#skill-cards');
  if (skillCards) {
    skillCards.insertAdjacentHTML('beforeend',
      buildSkillCard('active', '商品匹配', '正在从1688实时拉取商品数据...')
    );
  }
  scrollToBottom();
  
  let apiProducts = [];
  let apiError = null;
  try {
    if (API_MODE === 'api') {
      apiProducts = await fetchProductsWithAnalysis(analysis);
    } else {
      apiProducts = PRODUCTS;
    }
  } catch (e) {
    apiError = e.message;
    apiProducts = PRODUCTS;
  }
  
  window._lastApiProducts = apiProducts;
  
  // 更新商品匹配步骤
  const cards = bubble.querySelectorAll('.skill-card');
  const stepMatchCard = cards[cards.length - 1];
  if (stepMatchCard) {
    stepMatchCard.className = 'skill-card done';
    stepMatchCard.querySelector('.skill-dot').className = 'skill-dot done';
    stepMatchCard.querySelector('.skill-title').textContent = '商品匹配';
    stepMatchCard.querySelector('.skill-detail').innerHTML = escapeHtml(
      apiError ? `API暂时不可用，已切换到本地数据` : `从1688实时拉取 ${apiProducts.length} 条商品`
    );
  }
  
  // 本地匹配
  let results = searchProductsLocal(analysis.cleaned_query, apiProducts, currentPriceFilter, currentSortBy, analysis);
  
  if (results.length === 0 && apiProducts.length > 0 && API_MODE === 'api') {
    const maxSales = Math.max(...apiProducts.map(p => p.sales), 1);
    results = apiProducts
      .filter(p => {
        if (currentPriceFilter === 'all') return true;
        if (currentPriceFilter === '0-5') return p.price < 5;
        if (currentPriceFilter === '5-20') return p.price >= 5 && p.price < 20;
        if (currentPriceFilter === '20-50') return p.price >= 20 && p.price < 50;
        if (currentPriceFilter === '50+') return p.price >= 50;
        return true;
      })
      .map(p => ({
        product: p,
        matchScore: 1,
        compositeScore: calcCompositeScore(p, maxSales),
      }))
      .sort((a, b) => b.compositeScore - a.compositeScore);
  }
  
  // 综合排序
  await sleep(300);
  let rankDetail = results.length > 0
    ? `匹配 ${results.length} 款商品 · 最高评分 ${results[0].compositeScore}`
    : '无匹配商品';
  
  if (skillCards) {
    skillCards.insertAdjacentHTML('beforeend',
      buildSkillCard('done', '综合排序', escapeHtml(rankDetail))
    );
  }
  
  currentResults = results;
  currentPage = 1;
  
  let resultsHtml = '';
  
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    
    resultsHtml += `<div class="ai-summary">`;
    resultsHtml += `已为你匹配到 <span class="highlight">${results.length} 款商品</span>，`;
    resultsHtml += `最高评分 <span class="stat-inline"><span class="v">${topScore}</span></span>`;
    resultsHtml += `，均价 <span class="stat-inline"><span class="v">¥${avgPrice.toFixed(1)}</span></span>`;
    resultsHtml += `，均销量 <span class="stat-inline"><span class="v">${Math.round(avgSales).toLocaleString()}</span></span>`;
    resultsHtml += `。</div>`;
    
    resultsHtml += buildToolbar(results.length);
    resultsHtml += renderProductGrid(results, currentPage);
    resultsHtml += renderChatPagination(results.length, currentPage);
  } else {
    resultsHtml += `<div class="empty-result">`;
    resultsHtml += `<div class="emoji">😔</div>`;
    resultsHtml += `<h4>未找到匹配商品</h4>`;
    resultsHtml += `<p>试试更宽泛的关键词</p>`;
    resultsHtml += `</div>`;
  }
  
  bubble.insertAdjacentHTML('beforeend', resultsHtml);
  scrollToBottom();
  
  isSearching = false;
  document.getElementById('send-btn').disabled = false;
}

// 工具栏
function buildToolbar(total) {
  let html = '<div class="result-toolbar">';
  html += '<div class="toolbar-group">';
  html += '<span class="toolbar-label">价格：</span>';
  html += `<span class="toolbar-chip ${currentPriceFilter==='all'?'active':''}" onclick="changePriceFilter('all')">全部</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='0-5'?'active':''}" onclick="changePriceFilter('0-5')">0-5元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='5-20'?'active':''}" onclick="changePriceFilter('5-20')">5-20元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='20-50'?'active':''}" onclick="changePriceFilter('20-50')">20-50元</span>`;
  html += `<span class="toolbar-chip ${currentPriceFilter==='50+'?'active':''}" onclick="changePriceFilter('50+')">50元以上</span>`;
  html += '</div>';
  html += '<div class="toolbar-group">';
  html += '<span class="toolbar-label">排序：</span>';
  html += `<span class="toolbar-chip ${currentSortBy==='score'?'active':''}" onclick="changeSortBy('score')">综合评分</span>`;
  html += `<span class="toolbar-chip ${currentSortBy==='sales'?'active':''}" onclick="changeSortBy('sales')">销量</span>`;
  html += `<span class="toolbar-chip ${currentSortBy==='price-low'?'active':''}" onclick="changeSortBy('price-low')">价格最低</span>`;
  html += '</div>';
  html += `<span class="toolbar-result-count">共 <strong>${total}</strong> 款</span>`;
  html += '</div>';
  return html;
}

function renderProductGrid(results, page) {
  const start = (page - 1) * PAGE_SIZE;
  const pageResults = results.slice(start, start + PAGE_SIZE);
  let html = '<div class="product-grid">';
  pageResults.forEach((item, i) => {
    html += renderProductCard(item, start + i + 1);
  });
  html += '</div>';
  return html;
}

function renderProductCard(item, rank) {
  const p = item.product;
  const score = item.compositeScore;
  const grade = getScoreGrade(score);
  
  let rankCls = '';
  if (rank === 1) rankCls = 'r1';
  else if (rank === 2) rankCls = 'r2';
  else if (rank === 3) rankCls = 'r3';
  
  const imgHtml = p.img
    ? `<img class="prod-card-img" src="${escapeHtml(p.img)}" alt="" onerror="this.style.opacity=0.3;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect width=%22120%22 height=%22120%22 fill=%22%23F5F7FA%22/></svg>'">`
    : `<div style="font-size:32px;color:#ccc;">📦</div>`;
  
  return `
    <div class="prod-card" onclick="window.open('${escapeHtml(p.link)}', '_blank')">
      <div class="prod-card-img-wrap">
        ${rank ? `<div class="prod-card-rank ${rankCls}">${rank}</div>` : ''}
        <div class="prod-card-score ${grade.cls}">${score}</div>
        ${imgHtml}
      </div>
      <div class="prod-card-body">
        <div class="prod-card-title">${escapeHtml(p.title)}</div>
        <div class="prod-card-shop">
          <span class="shop-icon">🏪</span>${escapeHtml(p.shop || '未知店铺')}
        </div>
        <div class="prod-card-metrics">
          <div class="prod-card-price">¥${p.price}<span class="unit">起</span></div>
          <div class="prod-card-sales">
            <span class="sales-val">${p.sales > 0 ? p.sales.toLocaleString() : '--'}</span>
            月销量
          </div>
        </div>
      </div>
    </div>`;
}


function renderChatPagination(total, page) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) return '';
  
  let html = '<div class="chat-pagination">';
  
  // 上一页
  html += `<button class="chat-page-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>上一页</button>`;
  
  // 页码按钮
  const showPages = [];
  const range = 2;
  for (let i = Math.max(1, page - range); i <= Math.min(totalPages, page + range); i++) {
    showPages.push(i);
  }
  
  if (showPages[0] > 1) {
    html += `<button class="chat-page-btn" onclick="goToPage(1)">1</button>`;
    if (showPages[0] > 2) {
      html += '<span class="chat-page-info">...</span>';
    }
  }
  
  showPages.forEach(p => {
    html += `<button class="chat-page-btn ${p === page ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
  });
  
  if (showPages[showPages.length - 1] < totalPages) {
    if (showPages[showPages.length - 1] < totalPages - 1) {
      html += '<span class="chat-page-info">...</span>';
    }
    html += `<button class="chat-page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }
  
  // 下一页
  html += `<button class="chat-page-btn" onclick="goToPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>下一页</button>`;
  
  html += `<span class="chat-page-info">共 ${total} 条 / ${totalPages} 页</span>`;
  html += '</div>';
  
  return html;
}

function goToPage(page) {
  const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
  if (page < 1 || page > totalPages || page === currentPage) return;
  
  currentPage = page;
  
  const bubbles = document.querySelectorAll('.ai-bubble');
  const bubble = bubbles[bubbles.length - 1];
  if (!bubble) return;
  
  const grid = bubble.querySelector('.product-grid');
  if (grid) {
    grid.outerHTML = renderProductGrid(currentResults, currentPage);
  }
  
  const pagination = bubble.querySelector('.chat-pagination');
  if (pagination) {
    pagination.outerHTML = renderChatPagination(currentResults.length, currentPage);
  }
  
  scrollToBottom();
}

function changePriceFilter(filter) {
  if (filter === currentPriceFilter) return;
  currentPriceFilter = filter;
  currentPage = 1;
  rerenderResults();
}

function changeSortBy(sortBy) {
  if (sortBy === currentSortBy) return;
  currentSortBy = sortBy;
  currentPage = 1;
  rerenderResults();
}

function rerenderResults() {
  const bubbles = document.querySelectorAll('.ai-bubble');
  const bubble = bubbles[bubbles.length - 1];
  if (!bubble) return;
  
  // 重新筛选排序
  const apiProducts = window._lastApiProducts || PRODUCTS;
  const results = searchProductsLocal(currentQuery, apiProducts, currentPriceFilter, currentSortBy, currentAnalysis);
  currentResults = results;
  
  // 移除旧的结果元素
  const selectors = ['.ai-summary', '.result-toolbar', '.product-grid', '.chat-pagination', '.empty-result'];
  selectors.forEach(sel => {
    const el = bubble.querySelector(sel);
    if (el) el.remove();
  });
  
  // 构建新的结果HTML
  let resultsHtml = '';
  
  if (results.length > 0) {
    const avgPrice = results.reduce((s, r) => s + r.product.price, 0) / results.length;
    const avgSales = results.reduce((s, r) => s + r.product.sales, 0) / results.length;
    const topScore = results[0].compositeScore;
    
    resultsHtml += `<div class="ai-summary">`;
    resultsHtml += `已为你匹配到 <span class="highlight">${results.length} 款商品</span>，`;
    resultsHtml += `最高评分 <span class="stat-inline"><span class="v">${topScore}</span></span>`;
    resultsHtml += `，均价 <span class="stat-inline"><span class="v">¥${avgPrice.toFixed(1)}</span></span>`;
    resultsHtml += `，均销量 <span class="stat-inline"><span class="v">${Math.round(avgSales).toLocaleString()}</span></span>`;
    resultsHtml += `。</div>`;
    
    resultsHtml += buildToolbar(results.length);
    resultsHtml += renderProductGrid(results, currentPage);
    resultsHtml += renderChatPagination(results.length, currentPage);
  } else {
    resultsHtml += `<div class="empty-result">`;
    resultsHtml += `<div class="emoji">😔</div>`;
    resultsHtml += `<h4>未找到匹配商品</h4>`;
    resultsHtml += `<p>试试调整筛选条件</p>`;
    resultsHtml += `</div>`;
  }
  
  // 插入到 skill-cards 之后
  const skillCards = bubble.querySelector('#skill-cards');
  if (skillCards) {
    skillCards.insertAdjacentHTML('afterend', resultsHtml);
  } else {
    bubble.insertAdjacentHTML('beforeend', resultsHtml);
  }
  
  scrollToBottom();
}

function quickSearch(keyword) {
  const input = document.getElementById('chat-input');
  input.value = keyword;
  autoResize(input);
  doSearch();
}

// 页面初始化
document.addEventListener('DOMContentLoaded', function() {
  loadData();
});
