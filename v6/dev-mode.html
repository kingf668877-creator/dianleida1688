<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店雷达 - 开发模式</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue:#3370ff; --border:#e5e6eb; --text:#1d2129; --muted:#86909c; --hover:#f2f3f5; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:#f5f6f8; }
  .app { display:flex; width:100%; height:100vh; }

  /* 侧边栏 */
  .layers {
    width:224px; flex:0 0 224px;
    background:#fff; border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    transition: width .25s ease, flex-basis .25s ease;
    overflow:hidden;
  }
  .layers.collapsed {
    width:0; flex-basis:0;
    border-right:0;
  }

  .layers-title {
    height:52px; display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:0 16px; border-bottom:1px solid var(--border);
    font-size:15px; font-weight:600; flex-shrink:0;
  }
  .layers-title-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .layers-title img { width:28px; height:28px; border-radius:6px; flex:0 0 28px; }
  .layers-title span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .toggle-btn {
    width:28px; height:28px; flex-shrink:0;
    border:0; border-radius:6px;
    background:transparent; color:#86909c;
    cursor:pointer; font-size:14px;
    display:grid; place-items:center;
    transition:.15s;
  }
  .toggle-btn:hover { background:var(--hover); color:var(--text); }

  .search-wrap { padding:10px 12px 0; flex-shrink:0; }
  .search-input {
    width:100%; height:34px; padding:0 12px;
    border:1px solid var(--border); border-radius:8px;
    color:#1d2129; outline:none;
    font:13px/1 "PingFang SC","Microsoft YaHei",sans-serif;
  }
  .search-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(51,112,255,.10); }
  .search-input::placeholder { color:#a8abb2; }

  .layer-list { padding:10px 8px; flex:1; overflow-y:auto; }
  .version-folder {
    width:100%; height:34px; padding:0 10px;
    border:0; border-radius:6px; background:transparent;
    color:#4e5969; display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; text-align:left;
    cursor:pointer; transition:.15s;
  }
  .version-folder:hover { background:var(--hover); }
  .version-folder .folder-arrow {
    width:14px; display:inline-block;
    transition: transform .2s ease;
    font-size:10px; color:#86909c;
  }
  .version-folder.open .folder-arrow { transform: rotate(90deg); }
  .version-badge {
    margin-left:auto;
    font-size:10px; font-weight:500;
    padding:2px 6px; border-radius:4px;
    background:#e8f0ff; color:var(--blue);
  }

  .version-pages {
    padding:4px 0 0 22px;
    display:none;
  }
  .version-pages.open { display:block; }

  .layer-empty { display:none; padding:18px 12px; color:#a8abb2; font-size:12px; text-align:center; }
  .layer-item {
    width:100%; height:42px; padding:0 12px;
    border:0; border-radius:6px; background:transparent;
    color:#4e5969; display:flex; align-items:center; gap:10px;
    font-size:13px; cursor:pointer; text-align:left;
    transition:.16s ease;
  }
  .layer-item:hover { background:var(--hover); color:var(--text); }
  .layer-item.active { color:var(--blue); background:#e8f0ff; font-weight:500; }
  .layer-icon {
    width:22px; height:22px; border-radius:5px;
    display:grid; place-items:center;
    color:#fff; font-size:11px; font-weight:700;
  }
  .icon-p { background:#ff6b6b; }

  /* 主内容区 */
  .stage { min-width:0; flex:1; height:100%; background:#eef0f3; padding:20px; position:relative; }
  .frame-shell { width:100%; height:100%; overflow:hidden; background:#fff; border:1px solid #dfe1e5; border-radius:8px; box-shadow:0 8px 24px rgba(29,33,41,.08); }
  iframe { width:100%; height:100%; border:0; display:block; background:#fff; }

  /* 侧边栏收起时的展开按钮 */
  .expand-btn {
    position:fixed; top:12px; left:12px; z-index:100;
    width:40px; height:40px;
    border:1px solid var(--border); border-radius:10px;
    background:#fff; color:#4e5969;
    cursor:pointer; font-size:16px;
    display:none; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    transition:.15s;
  }
  .expand-btn:hover { background:var(--hover); color:var(--text); }
  .expand-btn.show { display:flex; }

  @media (max-width:720px) {
    .layers { width:176px; flex-basis:176px; }
    .stage { padding:10px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 收起时的展开按钮 -->
  <button class="expand-btn" id="expandBtn" title="展开导航栏">☰</button>

  <aside class="layers collapsed" id="layers" aria-label="店雷达选品导航">
    <div class="layers-title">
      <div class="layers-title-left">
        <img src="logo.png" alt="店雷达选品">
        <span>店雷达选品</span>
      </div>
      <button class="toggle-btn" id="toggleBtn" title="收起导航栏">✕</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="layerSearch" type="search" placeholder="搜索版本或页面">
    </div>
    <nav class="layer-list">

      <!-- V2.8.9 版本 -->
      <div class="version-folder open" data-version="v2.8.9">
        <span class="folder-arrow">▶</span>
        <span>V2.8.9</span>
        <span class="version-badge">最新</span>
      </div>
      <div class="version-pages open" data-version="v2.8.9">
        <button class="layer-item active" data-page="search-agent.html" data-search="V2.8.9 搜索智能体 效果图 HTML CSS JS MD 后端 JSON 映射"><span class="layer-icon icon-p">P</span>搜索智能体</button>
        <button class="layer-item" data-page="ai-output-interaction-viewer.html" data-search="V2.8.9 AI输出结果交互 效果图 HTML CSS JS MD 智能体提示词"><span class="layer-icon icon-p" style="background:#7c4dff;">AI</span>AI输出结果交互</button>
        <button class="layer-item" data-page="prototype-spec.html" data-search="V2.8.9 原型说明 版本规划 功能列表"><span class="layer-icon icon-p" style="background:#f59e0b;">P</span>原型说明</button>
        <button class="layer-item" data-page="backend-json-mapping-viewer.html" data-search="V2.8.9 后端对接文档 扣子智能体 API SSE Markdown 编辑 发布 导入"><span class="layer-icon icon-p" style="background:#10b981;">MD</span>后端对接文档</button>
      </div>

      <div class="layer-empty" id="layerEmpty">暂无匹配内容</div>
    </nav>
  </aside>
  <main class="stage">
    <div class="frame-shell"><iframe id="designFrame" src="search-agent.html" title="设计页面预览"></iframe></div>
  </main>
</div>
<script>
  const frame = document.getElementById('designFrame');
  const items = Array.from(document.querySelectorAll('.layer-item'));
  const layerSearch = document.getElementById('layerSearch');
  const layerEmpty = document.getElementById('layerEmpty');
  const layers = document.getElementById('layers');
  const toggleBtn = document.getElementById('toggleBtn');
  const expandBtn = document.getElementById('expandBtn');
  const versionFolders = Array.from(document.querySelectorAll('.version-folder'));
  const versionPages = Array.from(document.querySelectorAll('.version-pages'));

  // ===== 侧边栏展开/收起 =====
  function toggleSidebar(show) {
    if (show) {
      layers.classList.remove('collapsed');
      expandBtn.classList.remove('show');
      localStorage.setItem('sidebar-collapsed', 'false');
    } else {
      layers.classList.add('collapsed');
      expandBtn.classList.add('show');
      localStorage.setItem('sidebar-collapsed', 'true');
    }
  }
  toggleBtn.addEventListener('click', () => toggleSidebar(false));
  expandBtn.addEventListener('click', () => toggleSidebar(true));

  // ===== 版本文件夹展开/收起 =====
  function toggleVersion(version, open) {
    const folder = document.querySelector('.version-folder[data-version="' + version + '"]');
    const pages = document.querySelector('.version-pages[data-version="' + version + '"]');
    if (!folder || !pages) return;

    if (open) {
      folder.classList.add('open');
      pages.classList.add('open');
    } else {
      folder.classList.remove('open');
      pages.classList.remove('open');
    }
  }

  versionFolders.forEach(folder => {
    folder.addEventListener('click', () => {
      const version = folder.dataset.version;
      const isOpen = folder.classList.contains('open');
      toggleVersion(version, !isOpen);
    });
  });

  // ===== 页面切换 =====
  items.forEach(item => item.addEventListener('click', () => {
    items.forEach(node => node.classList.remove('active'));
    item.classList.add('active');
    frame.src = item.dataset.page;
  }));

  // ===== 搜索 =====
  layerSearch.addEventListener('input', () => {
    const keyword = layerSearch.value.trim().toLowerCase();
    let visibleCount = 0;

    // 搜索时展开所有版本
    const isSearching = !!keyword;
    versionFolders.forEach(folder => {
      const version = folder.dataset.version;
      const pages = document.querySelector('.version-pages[data-version="' + version + '"]');
      const versionMatched = version.includes(keyword);

      if (isSearching) {
        folder.classList.add('open');
        pages.classList.add('open');
      } else {
        // 非搜索状态下，V2.8.9 默认展开
        if (version === 'v2.8.9') {
          folder.classList.add('open');
          pages.classList.add('open');
        } else {
          folder.classList.remove('open');
          pages.classList.remove('open');
        }
      }
    });

    items.forEach(item => {
      const text = (item.dataset.search || item.textContent).toLowerCase();
      const matched = !keyword || text.includes(keyword);
      item.style.display = matched ? 'flex' : 'none';
      if (matched) visibleCount += 1;
    });

    layerEmpty.style.display = visibleCount > 0 ? 'none' : 'block';
  });

  // ===== 初始化 =====
  const savedState = localStorage.getItem('sidebar-collapsed');
  if (savedState === 'false') {
    toggleSidebar(true);
  } else {
    toggleSidebar(false);
  }
</script>
</body>
</html>
