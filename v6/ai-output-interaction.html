<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 输出结果交互</title>
<link rel="stylesheet" href="ai-output-interaction.css">
</head>
<body>

<!-- 编辑工具栏 -->
<div class="edit-toolbar" id="editToolbar">
  <button class="btn primary" id="editModeBtn">编辑模式</button>
  <button class="btn ghost" id="copyChangesBtn" disabled>复制修改记录</button>
  <button class="btn ghost" id="resetChangesBtn" disabled>重置修改</button>
  <span class="edit-tip" id="editTip">开启后可直接点击文案修改</span>
</div>

<!-- 修改记录面板 -->
<div class="changes-panel" id="changesPanel">
  <div class="changes-header">
    <strong>修改记录</strong>
    <span class="changes-count" id="changesCount">0 条</span>
  </div>
  <div class="changes-body" id="changesPreview">暂无修改</div>
</div>

<!-- 主内容区 -->
<div class="page-container">

  <!-- AI 分析完成提示条 -->
  <div class="ai-result-bar">
    <div class="ai-result-left">
      <span class="ai-icon">AI</span>
      <span class="ai-text" data-editable data-edit-label="提示文案">
        智能分析完成，已为您匹配 <strong data-editable data-edit-label="商品数量">10000+</strong> 的商品
      </span>
    </div>
    <div class="ai-result-right">
      <button class="expand-btn" data-editable data-edit-label="展开按钮">
        展开
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="ai-output-interaction.js"></script>
</body>
</html>
