<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD 文档管理 - 店雷达</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f8fafc;
    color: #1e293b;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ========== 顶部工具栏 ========== */
  .toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    z-index: 100;
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .logo-badge {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 9px;
    display: grid; place-items: center;
    color: #fff;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }
  .title-group { min-width: 0; }
  .title-main {
    font-size: 15px;
    font-weight: 600;
    color: #1e293b;
  }
  .title-sub {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
    font-family: Consolas, Monaco, monospace;
  }

  /* 目标文件选择 */
  .target-select-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .target-label {
    font-size: 12px;
    color: #64748b;
  }
  .target-select {
    height: 32px;
    padding: 0 10px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #334155;
    background: #f8fafc;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    max-width: 280px;
  }
  .target-select:focus { border-color: #3370ff; }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 模式切换标签 */
  .mode-tabs {
    display: flex; gap: 2px; padding: 3px;
    background: #f1f5f9; border-radius: 8px;
  }
  .mode-tab {
    height: 28px; padding: 0 12px;
    border: 0; border-radius: 6px;
    background: transparent; color: #64748b;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: .15s;
    font-family: inherit;
  }
  .mode-tab.active { background: #fff; color: #334155; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  .btn {
    height: 32px; padding: 0 12px;
    border: 0; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: .15s;
    display: inline-flex; align-items: center; gap: 5px;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-primary { background: #3370ff; color: #fff; }
  .btn-primary:hover { background: #2968f2; }
  .btn-primary:disabled { background: #a8c5ff; cursor: not-allowed; }
  .btn-secondary { background: #f1f5f9; color: #334155; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-ghost:hover { background: #f8fafc; color: #334155; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-warning { background: #f59e0b; color: #fff; }
  .btn-warning:hover { background: #d97706; }

  /* ========== 主编辑区 ========== */
  .editor-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* 预览模式 */
  .preview-only .editor-pane { display: none; }
  .preview-only .preview-pane { width: 100%; border-left: 0; }

  /* 编辑模式 */
  .edit-only .preview-pane { display: none; }
  .edit-only .editor-pane { width: 100%; border-right: 0; }

  /* 分屏模式 */
  .split-mode .editor-pane { width: 50%; }
  .split-mode .preview-pane { width: 50%; }

  .editor-pane, .preview-pane {
    height: 100%;
    overflow: auto;
  }
  .editor-pane {
    border-right: 1px solid #e2e8f0;
    background: #fafbfc;
  }
  .preview-pane {
    background: #fff;
    overflow-y: auto;
  }

  /* 编辑器 */
  .editor-textarea {
    width: 100%;
    height: 100%;
    border: 0;
    outline: none;
    padding: 24px 28px;
    font: 14px/1.7 Consolas, "Microsoft YaHei", monospace;
    color: #334155;
    background: transparent;
    resize: none;
    tab-size: 2;
  }

  /* Markdown 渲染样式 */
  .markdown {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 28px 60px;
    line-height: 1.8;
    font-size: 14px;
    color: #1e293b;
  }
  .markdown h1 {
    font-size: 26px;
    margin: 0 0 22px;
    padding-bottom: 14px;
    border-bottom: 2px solid #e2e8f0;
    font-weight: 700;
    color: #0f172a;
  }
  .markdown h2 {
    font-size: 19px;
    margin: 28px 0 14px;
    padding-left: 12px;
    border-left: 4px solid #3370ff;
    font-weight: 600;
    color: #1e293b;
  }
  .markdown h3 {
    font-size: 16px;
    margin: 22px 0 10px;
    font-weight: 600;
    color: #334155;
  }
  .markdown p { margin: 10px 0; }
  .markdown ul, .markdown ol {
    padding-left: 26px;
    margin: 10px 0;
  }
  .markdown li { margin: 5px 0; }
  .markdown code {
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: Consolas, Monaco, monospace;
    color: #d97706;
  }
  .markdown pre {
    background: #1e293b;
    color: #f1f5f9;
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 14px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .markdown pre code {
    background: transparent;
    color: inherit;
    padding: 0;
  }
  .markdown table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 13px;
  }
  .markdown th, .markdown td {
    border: 1px solid #e2e8f0;
    padding: 8px 12px;
    text-align: left;
  }
  .markdown th {
    background: #f8fafc;
    font-weight: 600;
    color: #1e293b;
  }
  .markdown blockquote {
    border-left: 4px solid #3370ff;
    padding: 10px 16px;
    background: #f0f7ff;
    color: #475569;
    margin: 14px 0;
    border-radius: 0 8px 8px 0;
  }
  .markdown hr {
    border: 0;
    border-top: 1px solid #e2e8f0;
    margin: 24px 0;
  }
  .markdown strong { color: #0f172a; font-weight: 600; }
  .markdown a { color: #3370ff; text-decoration: none; }
  .markdown a:hover { text-decoration: underline; }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #94a3b8;
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 16px; font-weight: 500; color: #64748b; margin-bottom: 8px; }
  .empty-desc { font-size: 13px; line-height: 1.6; max-width: 360px; }
  .empty-actions { margin-top: 20px; display: flex; gap: 10px; }

  /* ========== 底部状态栏 ========== */
  .status-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: #fff;
    border-top: 1px solid #e2e8f0;
    font-size: 12px;
    color: #64748b;
  }
  .status-left, .status-right { display: flex; align-items: center; gap: 16px; }
  .save-status { display: flex; align-items: center; gap: 6px; }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #f59e0b;
    animation: pulse 2s infinite;
  }
  .save-dot.saved { background: #10b981; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    padding: 10px 18px;
    background: #1e293b;
    color: #fff;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: .25s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #10b981; }
  .toast.error { background: #ef4444; }
  .toast.loading { background: #3370ff; }

  /* ========== 部署弹窗 ========== */
  .modal-mask {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, .5);
    display: none; align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn .2s ease;
  }
  .modal-mask.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal {
    background: #fff;
    border-radius: 14px;
    width: 90%;
    max-width: 460px;
    overflow: hidden;
    animation: slideUp .25s ease;
  }
  .modal-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid #f1f5f9;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-icon {
    width: 34px; height: 34px;
    background: #e0f2fe;
    color: #0284c7;
    border-radius: 9px;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .modal-body {
    padding: 18px 22px;
  }
  .modal-desc {
    font-size: 13px;
    color: #475569;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .modal-desc b { color: #1e293b; }

  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    font-size: 12px;
    color: #475569;
    margin-bottom: 6px;
    font-weight: 500;
    display: block;
  }
  .form-input {
    width: 100%;
    height: 36px;
    padding: 0 12px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    color: #1e293b;
    outline: none;
    font-family: inherit;
  }
  .form-input:focus { border-color: #3370ff; box-shadow: 0 0 0 2px rgba(51,112,255,.1); }
  .form-hint {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 4px;
    line-height: 1.5;
  }
  .form-hint a { color: #3370ff; text-decoration: none; }

  .deploy-steps {
    background: #f8fafc;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .deploy-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    font-size: 12px;
    color: #475569;
  }
  .step-num {
    width: 20px; height: 20px;
    background: #3370ff;
    color: #fff;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .step-text { flex: 1; padding-top: 1px; }
  .step-text b { color: #1e293b; }

  .modal-footer {
    padding: 12px 22px 18px;
    display: flex;
    gap: 10px;
  }
  .modal-footer .btn {
    flex: 1;
    height: 38px;
    justify-content: center;
    font-size: 13px;
  }

  /* Token 切换 */
  .token-toggle {
    font-size: 11px;
    color: #3370ff;
    cursor: pointer;
    text-align: right;
    margin-top: 4px;
    user-select: none;
  }
  .token-toggle:hover { text-decoration: underline; }

  /* 隐藏文件输入 */
  #fileInput { display: none; }

  /* ========== 响应式 ========== */
  @media (max-width: 768px) {
    .toolbar { flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
    .toolbar-left { width: 100%; }
    .toolbar-right { width: 100%; justify-content: space-between; }
    .target-select { max-width: none; }
    .editor-wrap { flex-direction: column; }
    .split-mode .editor-pane,
    .split-mode .preview-pane { width: 100%; height: 50%; }
    .editor-pane { border-right: 0; border-bottom: 1px solid #e2e8f0; }
    .markdown { padding: 20px 16px 40px; }
    .editor-textarea { padding: 16px; }
    .mode-tabs { display: flex; }
  }
</style>
</head>
<body class="preview-only">

<!-- 顶部工具栏 -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="logo-badge">M</div>
    <div class="title-group">
      <div class="title-main">MD 文档管理</div>
      <div class="title-sub" id="currentFileLabel">请选择目标文件</div>
    </div>
  </div>

  <div class="target-select-wrap">
    <span class="target-label">目标文件：</span>
    <select class="target-select" id="targetSelect">
      <option value="">-- 选择要编辑的文件 --</option>
      <option value="v6/backend-json-mapping.md">v6/backend-json-mapping.md（后端对接文档）</option>
      <option value="v6/coze_agent_prompt_fast.md">v6/coze_agent_prompt_fast.md（智能体提示词）</option>
    </select>
  </div>

  <div class="toolbar-right">
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="preview">预览</button>
      <button class="mode-tab" data-mode="split">分屏</button>
      <button class="mode-tab" data-mode="edit">编辑</button>
    </div>
    <button class="btn btn-ghost" id="importBtn" title="导入 MD 文件">📥 导入</button>
    <button class="btn btn-ghost" id="copyBtn" title="复制 Markdown">📋 复制</button>
    <button class="btn btn-primary" id="deployBtn" disabled>🚀 部署到 Git</button>
  </div>
</div>

<!-- 主编辑区 -->
<div class="editor-wrap" id="editorWrap">

  <!-- 编辑区 -->
  <div class="editor-pane">
    <textarea class="editor-textarea" id="editor" placeholder="在此输入 Markdown 内容..." spellcheck="false"></textarea>
  </div>

  <!-- 预览区 -->
  <div class="preview-pane">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📝</div>
      <div class="empty-title">选择目标文件开始编辑</div>
      <div class="empty-desc">从上方下拉框选择要编辑的 MD 文件，或导入本地文件开始编辑</div>
      <div class="empty-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📥 导入文件</button>
      </div>
    </div>
    <div class="markdown" id="preview" style="display:none;"></div>
  </div>

</div>

<!-- 底部状态栏 -->
<div class="status-bar">
  <div class="status-left">
    <div class="save-status">
      <span class="save-dot saved" id="saveDot"></span>
      <span id="saveStatus">未修改</span>
    </div>
  </div>
  <div class="status-right">
    <span id="wordCount">0 字</span>
    <span id="lineCount">0 行</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 部署弹窗 -->
<div class="modal-mask" id="deployModal" onclick="if(event.target===this)closeDeployModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-icon">🚀</span>
        <span>部署到 GitHub</span>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc">
        将当前内容部署到 <b id="deployTargetLabel">-</b>
      </p>

      <div class="form-group" id="tokenGroup">
        <label class="form-label">GitHub Token</label>
        <input type="password" class="form-input" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        <div class="form-hint">
          Token 仅保存在本地浏览器，不会上传。
          <a href="https://github.com/settings/tokens?type=beta" target="_blank">获取 Token →</a>
        </div>
      </div>

      <div class="deploy-steps">
        <div class="deploy-step">
          <span class="step-num">1</span>
          <div class="step-text">填写 <b>GitHub Token</b>（首次需要，之后自动保存）</div>
        </div>
        <div class="deploy-step">
          <span class="step-num">2</span>
          <div class="step-text">点击 <b>立即部署</b>，内容会直接更新到 GitHub</div>
        </div>
        <div class="deploy-step">
          <span class="step-num">3</span>
          <div class="step-text">1-2 分钟后 GitHub Pages 生效</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeployModal()">取消</button>
      <button class="btn btn-primary" id="confirmDeployBtn" onclick="confirmDeploy()">立即部署</button>
    </div>
  </div>
</div>

<!-- 隐藏文件输入 -->
<input type="file" id="fileInput" accept=".md,text/markdown">

<script>
// ============================================================
//  全局状态
// ============================================================
const STORAGE_KEY = 'md_manager_data';
const TOKEN_KEY = 'md_manager_token';

let currentFile = '';
let currentContent = '';
let hasChanges = false;
let autoSaveTimer = null;
let currentMode = 'preview';

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const emptyState = document.getElementById('emptyState');
const deployBtn = document.getElementById('deployBtn');
const importBtn = document.getElementById('importBtn');
const copyBtn = document.getElementById('copyBtn');
const fileInput = document.getElementById('fileInput');
const targetSelect = document.getElementById('targetSelect');
const currentFileLabel = document.getElementById('currentFileLabel');

// ============================================================
//  初始化
// ============================================================
function init() {
  // 加载保存的 Token
  const savedToken = localStorage.getItem(TOKEN_KEY);
  if (savedToken) {
    document.getElementById('githubToken').value = savedToken;
  }

  // 加载保存的内容
  loadSavedData();

  // 绑定事件
  bindEvents();
}

function loadSavedData() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (data.file && data.content) {
      currentFile = data.file;
      currentContent = data.content;
      targetSelect.value = data.file;
      updateFileLabel();
      setEditorContent(data.content);
      updatePreview();
      updateStats();
      hasChanges = false;
      updateSaveStatus();
      showContent();
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      file: currentFile,
      content: currentContent,
      time: Date.now()
    }));
  } catch(e) {}
}

// ============================================================
//  事件绑定
// ============================================================
function bindEvents() {
  // 目标文件切换
  targetSelect.addEventListener('change', (e) => {
    const file = e.target.value;
    if (!file) return;

    if (hasChanges && !confirm('当前内容有未保存的更改，确定切换文件吗？')) {
      targetSelect.value = currentFile;
      return;
    }

    currentFile = file;
    updateFileLabel();
    loadFileFromGithub(file);
  });

  // 模式切换
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      switchMode(mode);
    });
  });

  // 编辑器输入
  editor.addEventListener('input', () => {
    currentContent = editor.value;
    hasChanges = true;
    updateSaveStatus();
    updateStats();
    scheduleAutoSave();
    if (currentMode !== 'edit') {
      updatePreview();
    }
  });

  // Tab 键插入缩进
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      editor.dispatchEvent(new Event('input'));
    }
  });

  // 导入按钮
  importBtn.addEventListener('click', () => fileInput.click());

  // 文件导入
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importFile(file);
  });

  // 复制按钮
  copyBtn.addEventListener('click', copyMarkdown);

  // 部署按钮
  deployBtn.addEventListener('click', openDeployModal);

  // 快捷键
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + S 部署
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if (hasChanges && currentFile) {
        openDeployModal();
      }
    }
    // Ctrl/Cmd + 1/2/3 切换模式
    if ((e.ctrlKey || e.metaKey) && ['1','2','3'].includes(e.key)) {
      e.preventDefault();
      const modes = ['preview', 'split', 'edit'];
      switchMode(modes[parseInt(e.key) - 1]);
    }
  });

  // 离开提醒
  window.addEventListener('beforeunload', (e) => {
    if (hasChanges) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

// ============================================================
//  模式切换
// ============================================================
function switchMode(mode) {
  currentMode = mode;
  const body = document.body;
  body.classList.remove('preview-only', 'edit-only', 'split-mode');

  if (mode === 'preview') body.classList.add('preview-only');
  else if (mode === 'edit') body.classList.add('edit-only');
  else body.classList.add('split-mode');

  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  if (mode !== 'edit') updatePreview();
}

// ============================================================
//  文件操作
// ============================================================
function updateFileLabel() {
  if (currentFile) {
    currentFileLabel.textContent = currentFile;
    document.getElementById('deployTargetLabel').textContent = currentFile;
  } else {
    currentFileLabel.textContent = '请选择目标文件';
  }
}

function setEditorContent(text) {
  editor.value = text;
  currentContent = text;
}

function showContent() {
  emptyState.style.display = 'none';
  preview.style.display = 'block';
  deployBtn.disabled = !currentFile;
}

function importFile(file) {
  if (hasChanges && !confirm('当前内容有未保存的更改，确定导入新文件吗？')) {
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const content = e.target.result;
    setEditorContent(content);
    updatePreview();
    updateStats();
    hasChanges = true;
    updateSaveStatus();
    showContent();
    saveData();
    showToast('导入成功', 'success');
  };
  reader.readAsText(file, 'UTF-8');
  fileInput.value = '';
}

// ============================================================
//  从 GitHub 加载文件
// ============================================================
function loadFileFromGithub(filePath) {
  const token = localStorage.getItem(TOKEN_KEY);
  const repo = 'kingf668877-creator/dianleida1688';
  const branch = 'master';
  const url = `https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`;

  const headers = { 'Accept': 'application/vnd.github.v3.raw' };
  if (token) headers['Authorization'] = `token ${token}`;

  showToast('正在加载文件...', 'loading');

  fetch(url, { headers })
    .then(r => {
      if (!r.ok) throw new Error('加载失败: ' + r.status);
      return r.text();
    })
    .then(text => {
      setEditorContent(text);
      updatePreview();
      updateStats();
      hasChanges = false;
      updateSaveStatus();
      showContent();
      saveData();
      showToast('文件加载成功', 'success');
    })
    .catch(err => {
      showToast(err.message || '加载失败', 'error');
      // 如果加载失败，用空白内容
      setEditorContent('');
      updatePreview();
      updateStats();
      hasChanges = true;
      updateSaveStatus();
      showContent();
    });
}

// ============================================================
//  Markdown 渲染
// ============================================================
function renderMarkdown(text) {
  const lines = text.replace(/\r/g, '').split('\n');
  const html = [];
  let inCode = false, codeLang = '', codeLines = [];
  let inList = false, listType = '', listItems = [];
  let inTable = false, tableRows = [];
  let inBlockquote = false, blockquoteLines = [];

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s) {
    return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  }
  function closeList() {
    if (inList) { html.push(`<${listType}>${listItems.join('')}</${listType}>`); inList=false; listItems=[]; }
  }
  function closeCode() {
    if (inCode) { html.push(`<pre><code class="lang-${codeLang}">${esc(codeLines.join('\n'))}</code></pre>`); inCode=false; codeLines=[]; }
  }
  function closeTable() {
    if (inTable && tableRows.length > 1) {
      let t = '<table><thead><tr>';
      tableRows[0].forEach(c => t += `<th>${inline(c)}</th>`);
      t += '</tr></thead><tbody>';
      for (let i = 2; i < tableRows.length; i++) { t += '<tr>'; tableRows[i].forEach(c => t += `<td>${inline(c)}</td>`); t += '</tr>'; }
      t += '</tbody></table>'; html.push(t);
    }
    inTable=false; tableRows=[];
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push(`<blockquote>${blockquoteLines.join('<br>')}</blockquote>`); inBlockquote=false; blockquoteLines=[]; }
  }

  for (let line of lines) {
    if (line.startsWith('```')) {
      closeList(); closeTable(); closeBlockquote();
      if (!inCode) { inCode=true; codeLang=line.slice(3).trim(); } else closeCode();
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }
    if (line.startsWith('# ')) { closeList();closeTable();closeBlockquote(); html.push(`<h1>${inline(line.slice(2))}</h1>`); continue; }
    if (line.startsWith('## ')) { closeList();closeTable();closeBlockquote(); html.push(`<h2>${inline(line.slice(3))}</h2>`); continue; }
    if (line.startsWith('### ')) { closeList();closeTable();closeBlockquote(); html.push(`<h3>${inline(line.slice(4))}</h3>`); continue; }
    if (/^---+$/.test(line.trim())) { closeList();closeTable();closeBlockquote(); html.push('<hr>'); continue; }
    if (line.startsWith('> ')) {
      closeList(); closeTable();
      inBlockquote=true; blockquoteLines.push(inline(line.slice(2))); continue;
    } else if (inBlockquote && line.trim()==='') { closeBlockquote(); continue; }
    if (line.includes('|') && line.trim().startsWith('|')) {
      closeList(); closeBlockquote();
      const cells = line.split('|').filter(c=>c.trim()!=='').map(c=>c.trim());
      if (!inTable) { inTable=true; tableRows=[cells]; }
      else if (cells.every(c=>/^[-:]+$/.test(c))) { tableRows.push(cells); }
      else { tableRows.push(cells); }
      continue;
    } else { closeTable(); }
    if (/^\d+\.\s+/.test(line)) {
      closeBlockquote();
      if (!inList || listType!=='ol') { closeList(); inList=true; listType='ol'; }
      listItems.push(`<li>${inline(line.replace(/^\d+\.\s+/,''))}</li>`); continue;
    }
    if (/^[-*+]\s+/.test(line)) {
      closeBlockquote();
      if (!inList || listType!=='ul') { closeList(); inList=true; listType='ul'; }
      listItems.push(`<li>${inline(line.replace(/^[-*+]\s+/,''))}</li>`); continue;
    }
    if (line.trim() === '') { closeList();closeTable();closeBlockquote(); continue; }
    closeList();closeTable();closeBlockquote();
    html.push(`<p>${inline(line)}</p>`);
  }
  closeList(); closeCode(); closeTable(); closeBlockquote();
  return html.join('\n');
}

function updatePreview() {
  if (!currentContent) return;
  preview.innerHTML = renderMarkdown(currentContent);
}

// ============================================================
//  自动保存 & 状态
// ============================================================
function scheduleAutoSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveData();
    hasChanges = true; // 内容改了就算有更改
    updateSaveStatus();
  }, 1000);
}

function updateSaveStatus() {
  const dot = document.getElementById('saveDot');
  const text = document.getElementById('saveStatus');
  if (hasChanges) {
    dot.classList.remove('saved');
    text.textContent = '已修改（未部署）';
  } else {
    dot.classList.add('saved');
    text.textContent = '已同步';
  }
}

function updateStats() {
  const text = currentContent || '';
  const chars = text.length;
  const lines = text ? text.split('\n').length : 0;
  document.getElementById('wordCount').textContent = chars + ' 字';
  document.getElementById('lineCount').textContent = lines + ' 行';
}

// ============================================================
//  复制
// ============================================================
function copyMarkdown() {
  const text = currentContent;
  if (!text) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => {
        showToast('已复制 Markdown', 'success');
        const old = copyBtn.textContent;
        copyBtn.textContent = '✓ 已复制';
        setTimeout(() => { copyBtn.innerHTML = '📋 复制'; }, 1500);
      })
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      showToast('已复制 Markdown', 'success');
      return;
    }
  } catch(e) {}
  showToast('复制失败', 'error');
}

// ============================================================
//  部署到 GitHub
// ============================================================
function openDeployModal() {
  if (!currentFile) {
    showToast('请先选择目标文件', 'error');
    return;
  }
  if (!currentContent.trim()) {
    showToast('内容不能为空', 'error');
    return;
  }

  const token = localStorage.getItem(TOKEN_KEY);
  if (token) {
    document.getElementById('githubToken').value = token;
  }

  document.getElementById('deployTargetLabel').textContent = currentFile;
  document.getElementById('deployModal').classList.add('show');
}

function closeDeployModal() {
  document.getElementById('deployModal').classList.remove('show');
}

async function confirmDeploy() {
  const token = document.getElementById('githubToken').value.trim();
  if (!token) {
    showToast('请填写 GitHub Token', 'error');
    return;
  }

  // 保存 Token
  localStorage.setItem(TOKEN_KEY, token);

  const btn = document.getElementById('confirmDeployBtn');
  btn.disabled = true;
  btn.textContent = '部署中...';
  showToast('正在部署到 GitHub...', 'loading');

  try {
    const repo = 'kingf668877-creator/dianleida1688';
    const branch = 'master';
    const filePath = currentFile;

    // 1. 获取当前文件 sha
    let sha = null;
    try {
      const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (resp.ok) {
        const data = await resp.json();
        sha = data.sha;
      }
    } catch(e) {}

    // 2. 编码内容
    const base64 = btoa(unescape(encodeURIComponent(currentContent)));

    // 3. 创建/更新文件
    const body = {
      message: `Update: ${filePath.split('/').pop()}`,
      content: base64,
      branch: branch
    };
    if (sha) body.sha = sha;

    const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (resp.ok) {
      hasChanges = false;
      updateSaveStatus();
      saveData();
      closeDeployModal();
      showToast('🎉 部署成功！1-2 分钟后生效', 'success');
    } else {
      const err = await resp.json();
      throw new Error(err.message || '部署失败');
    }

  } catch (e) {
    showToast('部署失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '立即部署';
  }
}

// ============================================================
//  Toast
// ============================================================
let toastTimer = null;
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2500);
}

// 启动
init();
</script>
