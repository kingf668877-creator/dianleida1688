<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 输出结果交互</title>
<link rel="stylesheet" href="ai-output-interaction-clean.css">
</head>
<body>

<div class="page-container">

  <!-- AI 分析完成提示条 -->
  <div class="ai-result-bar">
    <div class="ai-result-left">
      <span class="ai-icon">AI</span>
      <span class="ai-text">
        智能分析完成，已为您匹配 <strong>10000+</strong> 的商品
      </span>
    </div>
    <div class="ai-result-right">
      <button class="expand-btn">
        展开
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script src="ai-output-interaction-clean.js"></script>
</body>
</html>
