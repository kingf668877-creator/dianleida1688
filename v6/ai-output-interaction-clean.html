<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 输出结果交互</title>
<link rel="stylesheet" href="ai-output-interaction-clean.css">
</head>
<body>

<div class="page-wrap">
  <section class="analysis-card">
    <div class="card-header">
      <span class="ai-mark">
        <span class="ai-mark-icon ai-spinner"></span>
      </span>
      <span class="heading-copy">
        <strong>AI 智能搜索分析中</strong>
        <small>正在生成分析结果</small>
      </span>
    </div>

    <div class="card-body">
      <ol class="steps">
        <li class="step done">
          <span class="step-dot">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M3 8.5L6.5 12L13 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="step-content">
            <div class="step-title">Step 1：核心词提取</div>
            <p class="step-summary">核心产品：蓝牙耳机 · 修饰词：蓝牙 · 必含词：蓝牙耳机、耳机</p>
            <div class="tags">
              <span class="tag tag-core">核心：蓝牙耳机</span>
              <span class="tag tag-mod">修饰：蓝牙、耳机</span>
              <span class="tag tag-req">必含：耳机、无线</span>
            </div>
          </div>
        </li>

        <li class="step done">
          <span class="step-dot">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M3 8.5L6.5 12L13 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="step-content">
            <div class="step-title">Step 2：关键词扩展与排除</div>
            <p class="step-summary">智能扩展 6 个搜索变体 · 排除 4 个不相关词</p>
            <div class="tags">
              <span class="tag tag-primary">无线蓝牙耳机</span>
              <span class="tag tag-primary">TWS蓝牙耳机</span>
              <span class="tag tag-primary">爆款蓝牙耳机</span>
              <span class="tag tag-primary">降噪蓝牙耳机</span>
              <span class="tag tag-primary">运动蓝牙耳机</span>
              <span class="tag tag-primary">便携蓝牙耳机</span>
              <span class="tag tag-danger">有线耳机</span>
              <span class="tag tag-danger">耳机线</span>
              <span class="tag tag-danger">耳机套</span>
              <span class="tag tag-danger">耳机支架</span>
            </div>
          </div>
        </li>

        <li class="step active">
          <span class="step-dot step-dot-loading">
            <span class="step-dot-ring"></span>
          </span>
          <div class="step-content">
            <div class="step-title">Step 3：实时商品搜索中 <span class="loading-dots"><span></span><span></span><span></span></span></div>
            <p class="step-summary">搜索词：蓝牙耳机、无线蓝牙耳机、TWS蓝牙耳机、爆款蓝牙耳机等，正在搜索商品中...</p>
          </div>
        </li>
      </ol>
    </div>
  </section>
</div>

<script src="ai-output-interaction-clean.js"></script>
</body>
</html>
