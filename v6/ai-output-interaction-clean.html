<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 输出结果交互</title>
<link rel="stylesheet" href="ai-output-interaction-clean.css">
</head>
<body>

<div class="page-container">

  <!-- 顶部操作栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <label class="checkbox-wrap">
        <input type="checkbox" id="selectAll">
        <span>全选</span>
      </label>
      <span class="selected-count">已选 0</span>
      <button class="btn-tool">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M8 10a2 2 0 100-4 2 2 0 000 4z" fill="currentColor"/><path d="M1.5 8s2.5-5 6.5-5 6.5 5 6.5 5-2.5 5-6.5 5S1.5 8 1.5 8z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        监控
      </button>
      <button class="btn-tool">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M8 14s-5.5-3.5-5.5-8a3.5 3.5 0 016-2.5A3.5 3.5 0 0113.5 6c0 4.5-5.5 8-5.5 8z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        关注商品
      </button>
      <button class="btn-tool">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M8 3v7m0 0l-2.5-2.5M8 10l2.5-2.5M3 12.5v.5a1 1 0 001 1h8a1 1 0 001-1v-.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        导出
      </button>
    </div>
    <div class="toolbar-right">
      <button class="btn-publish">
        <span class="publish-tag">NEW</span>
        铺货 Temu
      </button>
    </div>
  </div>

  <!-- 统计栏 -->
  <div class="stats-bar">
    <div class="stats-left">
      <span class="ai-badge">AI</span>
      <span>智能分析完成，已为您匹配 <strong>10000+</strong> 的商品</span>
    </div>
    <div class="stats-right">
      <div class="filter-item">
        <span>统计周期</span>
        <select class="filter-select">
          <option>近30天</option>
          <option>近7天</option>
          <option>近90天</option>
        </select>
      </div>
      <div class="filter-item">
        <select class="filter-select">
          <option>7日增长率</option>
          <option>30日增长率</option>
          <option>销量</option>
          <option>价格</option>
        </select>
      </div>
      <div class="filter-item">
        <select class="filter-select">
          <option>降序</option>
          <option>升序</option>
        </select>
      </div>
      <button class="icon-btn" title="列表视图">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M3 4h10M3 8h10M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" title="刷新">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M13 8a5 5 0 11-1.5-3.5M13 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- 商品列表 -->
  <div class="product-grid">

    <!-- 商品卡片 1 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">蓝牙耳机无线运动降噪超长续航</h3>
        <div class="product-meta">
          <span class="price">¥39.9</span>
          <span class="sales">月销 2.3w</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-up">7日 +25.6%</span>
          <span class="tag tag-hot">爆款</span>
        </div>
      </div>
    </div>

    <!-- 商品卡片 2 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">TWS蓝牙耳机入耳式高音质运动</h3>
        <div class="product-meta">
          <span class="price">¥59.0</span>
          <span class="sales">月销 1.8w</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-up">7日 +18.3%</span>
          <span class="tag tag-new">新品</span>
        </div>
      </div>
    </div>

    <!-- 商品卡片 3 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">降噪蓝牙耳机入耳式电竞游戏低延迟</h3>
        <div class="product-meta">
          <span class="price">¥89.9</span>
          <span class="sales">月销 9.5k</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-up">7日 +32.1%</span>
          <span class="tag tag-quality">优质</span>
        </div>
      </div>
    </div>

    <!-- 商品卡片 4 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">运动蓝牙耳机挂脖式防水跑步专用</h3>
        <div class="product-meta">
          <span class="price">¥49.9</span>
          <span class="sales">月销 1.2w</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-up">7日 +15.8%</span>
        </div>
      </div>
    </div>

    <!-- 商品卡片 5 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">便携蓝牙耳机迷你隐形单耳商务</h3>
        <div class="product-meta">
          <span class="price">¥29.9</span>
          <span class="sales">月销 6.8k</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-down">7日 -5.2%</span>
        </div>
      </div>
    </div>

    <!-- 商品卡片 6 -->
    <div class="product-card">
      <div class="card-checkbox">
        <input type="checkbox">
      </div>
      <div class="product-img">
        <div class="img-placeholder">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-info">
        <h3 class="product-title">无线蓝牙耳机超长续航大电量</h3>
        <div class="product-meta">
          <span class="price">¥69.0</span>
          <span class="sales">月销 3.1w</span>
        </div>
        <div class="product-tags">
          <span class="tag tag-up">7日 +28.9%</span>
          <span class="tag tag-hot">爆款</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="ai-output-interaction-clean.js"></script>
</body>
</html>
