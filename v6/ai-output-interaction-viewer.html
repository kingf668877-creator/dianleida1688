<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 输出结果交互</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; color: #1d2129; }

  .tabs-wrap {
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: #fff;
    border-bottom: 1px solid #e5e6eb;
    gap: 4px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab-btn {
    height: 32px;
    padding: 0 16px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: #4e5969;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .tab-btn:hover { background: #f2f3f5; color: #1d2129; }
  .tab-btn.active {
    background: #f0ebff;
    color: #6236ff;
    font-weight: 600;
  }
  .tab-btn .tab-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-right: 6px;
    border-radius: 3px;
    vertical-align: -1px;
  }
  .tab-preview .tab-dot { background: #ff6b6b; }
  .tab-html .tab-dot { background: #e34f26; }
  .tab-css .tab-dot { background: #1572b6; }
  .tab-js .tab-dot { background: #b58b00; }

  .panels {
    height: calc(100vh - 48px);
    overflow: hidden;
    position: relative;
  }
  .panel {
    position: absolute;
    inset: 0;
    display: none;
    overflow: auto;
  }
  .panel.active { display: block; }

  /* 效果图面板 */
  #panel-preview iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* 代码面板通用 */
  .code-panel {
    padding: 20px;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .code-header small {
    color: #86909c;
    font: 12px Consolas, monospace;
  }
  .copy-btn {
    height: 30px;
    padding: 0 14px;
    border: 1px solid #e5e6eb;
    border-radius: 6px;
    background: #fff;
    color: #4e5969;
    font-size: 12px;
    cursor: pointer;
    transition: .15s;
  }
  .copy-btn:hover { border-color: #6236ff; color: #6236ff; }
  .copy-btn.ok { background: #16a36a; border-color: #16a36a; color: #fff; }

  pre.code {
    margin: 0;
    padding: 20px;
    overflow: auto;
    border: 1px solid #e5e6eb;
    border-radius: 10px;
    background: #fafbfc;
    color: #334155;
    font: 13px/1.7 Consolas, "Microsoft YaHei", monospace;
    white-space: pre;
    tab-size: 2;
    min-height: calc(100% - 50px);
  }
</style>
</head>
<body>
  <div class="tabs-wrap" role="tablist">
    <button class="tab-btn tab-preview active" data-tab="preview" role="tab">
      <span class="tab-dot"></span>效果图
    </button>
    <button class="tab-btn tab-html" data-tab="html" role="tab">
      <span class="tab-dot"></span>HTML
    </button>
    <button class="tab-btn tab-css" data-tab="css" role="tab">
      <span class="tab-dot"></span>CSS
    </button>
    <button class="tab-btn tab-js" data-tab="js" role="tab">
      <span class="tab-dot"></span>JS
    </button>
  </div>

  <div class="panels">
    <!-- 效果图 -->
    <section class="panel active" id="panel-preview">
      <iframe id="previewFrame" src="ai-output-interaction.html" title="效果图"></iframe>
    </section>

    <!-- HTML -->
    <section class="panel code-panel" id="panel-html">
      <div class="code-header">
        <small>ai-output-interaction-clean.html</small>
        <button class="copy-btn" data-copy="html">复制 HTML</button>
      </div>
      <pre class="code" id="codeHtml">正在加载…</pre>
    </section>

    <!-- CSS -->
    <section class="panel code-panel" id="panel-css">
      <div class="code-header">
        <small>ai-output-interaction-clean.css</small>
        <button class="copy-btn" data-copy="css">复制 CSS</button>
      </div>
      <pre class="code" id="codeCss">正在加载…</pre>
    </section>

    <!-- JS -->
    <section class="panel code-panel" id="panel-js">
      <div class="code-header">
        <small>ai-output-interaction-clean.js</small>
        <button class="copy-btn" data-copy="js">复制 JS</button>
      </div>
      <pre class="code" id="codeJs">正在加载…</pre>
    </section>
  </div>

<script>
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');
  const codeCache = { html: '', css: '', js: '' };

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      tabs.forEach(b => b.classList.toggle('active', b === btn));
      panels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
    });
  });

  function loadCode(type, url, targetId) {
    fetch(url).then(r => { if (!r.ok) throw new Error('加载失败'); return r.text(); })
      .then(text => {
        codeCache[type] = text;
        document.getElementById(targetId).textContent = text;
      })
      .catch(() => {
        document.getElementById(targetId).textContent = '加载失败：' + url;
      });
  }

  loadCode('html', 'ai-output-interaction-clean.html', 'codeHtml');
  loadCode('css', 'ai-output-interaction-clean.css', 'codeCss');
  loadCode('js', 'ai-output-interaction-clean.js', 'codeJs');

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.dataset.copy;
      const text = codeCache[type];
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const old = btn.textContent;
        btn.textContent = '已复制';
        btn.classList.add('ok');
        setTimeout(() => { btn.textContent = old; btn.classList.remove('ok'); }, 1600);
      } catch (e) {
        btn.textContent = '复制失败';
      }
    });
  });
</script>
</body>
</html>
