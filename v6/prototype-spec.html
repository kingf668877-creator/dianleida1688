<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">
<title>原型说明 - 店雷达</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff;
    min-height: 100vh;
    color: #1d2129;
    line-height: 1.7;
  }

  /* 顶部栏 */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    background: #fff;
    border-bottom: 1px solid #f2f3f5;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 24px;
    height: 24px;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    border-radius: 6px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }
  .breadcrumb {
    font-size: 13px;
    color: #86909c;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .breadcrumb span:last-child { color: #1d2129; font-weight: 500; }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    height: 32px;
    padding: 0 14px;
    border: 0;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: .15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn.primary { background: #3370ff; color: #fff; }
  .btn.primary:hover { background: #2968f2; }
  .btn.ghost { background: transparent; color: #4e5969; border: 1px solid #e5e6eb; }
  .btn.ghost:hover { background: #f7f8fa; color: #1d2129; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* 文档主体 */
  .doc-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 28px 120px;
  }

  /* 文档标题 */
  .doc-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 24px;
    outline: none;
    color: #1d2129;
  }
  .doc-title:empty::before {
    content: attr(data-placeholder);
    color: #c9cdd4;
  }

  /* 内容块 */
  .block {
    position: relative;
    padding: 4px 0;
    margin: 2px 0;
  }
  .block:hover .block-handle { opacity: 1; }

  /* 块操作手柄 */
  .block-handle {
    position: absolute;
    left: -40px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 2px;
    opacity: 0;
    transition: opacity .15s;
  }
  .handle-btn {
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    border: 0;
    border-radius: 4px;
    background: transparent;
    color: #86909c;
    cursor: pointer;
    transition: .15s;
    font-size: 14px;
  }
  .handle-btn:hover { background: #f2f3f5; color: #1d2129; }
  .handle-btn.drag { cursor: grab; }
  .handle-btn.drag:active { cursor: grabbing; }

  /* 文本块 */
  .text-block {
    font-size: 15px;
    line-height: 1.8;
    color: #1d2129;
    outline: none;
    min-height: 28px;
  }
  .text-block:empty::before {
    content: attr(data-placeholder);
    color: #c9cdd4;
  }
  .text-block.heading1 {
    font-size: 26px;
    font-weight: 700;
    margin-top: 24px;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .text-block.heading2 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 20px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .text-block.heading3 {
    font-size: 16px;
    font-weight: 600;
    margin-top: 16px;
    margin-bottom: 8px;
  }
  .text-block.quote {
    padding: 8px 16px;
    border-left: 3px solid #3370ff;
    background: #f7f9ff;
    color: #4e5969;
    border-radius: 0 6px 6px 0;
  }
  .text-block.bullet {
    padding-left: 24px;
    position: relative;
  }
  .text-block.bullet::before {
    content: "•";
    position: absolute;
    left: 8px;
    color: #86909c;
  }
  .text-block.ordered {
    padding-left: 28px;
    position: relative;
  }
  .text-block.ordered::before {
    content: attr(data-order) ".";
    position: absolute;
    left: 6px;
    color: #86909c;
    min-width: 16px;
  }

  /* 分割线 */
  .divider-block {
    padding: 16px 0;
  }
  .divider-block hr {
    border: 0;
    border-top: 1px solid #e5e6eb;
  }

  /* 图片块 */
  .image-block {
    padding: 8px 0;
    text-align: center;
  }
  .image-block img {
    max-width: 100%;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .image-uploader {
    border: 2px dashed #e5e6eb;
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    color: #86909c;
    cursor: pointer;
    transition: .15s;
  }
  .image-uploader:hover {
    border-color: #3370ff;
    color: #3370ff;
    background: #f7f9ff;
  }
  .image-uploader .icon { font-size: 32px; margin-bottom: 8px; }
  .image-uploader .tip { font-size: 13px; }

  /* 表格块 */
  .table-block {
    padding: 8px 0;
    overflow-x: auto;
  }
  .doc-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #e5e6eb;
    border-radius: 8px;
    overflow: hidden;
  }
  .doc-table th,
  .doc-table td {
    border: 1px solid #e5e6eb;
    padding: 8px 12px;
    text-align: left;
    font-size: 14px;
    outline: none;
    min-width: 100px;
    vertical-align: top;
  }
  .doc-table th {
    background: #f7f8fa;
    font-weight: 600;
    color: #4e5969;
  }
  .doc-table td:focus,
  .doc-table th:focus {
    background: #eff4ff;
  }
  .table-toolbar {
    display: flex;
    gap: 6px;
    padding: 6px 0 0;
    opacity: 0;
    transition: opacity .15s;
  }
  .block:hover .table-toolbar { opacity: 1; }
  .table-btn {
    height: 26px;
    padding: 0 10px;
    border: 1px solid #e5e6eb;
    border-radius: 4px;
    background: #fff;
    color: #86909c;
    font-size: 12px;
    cursor: pointer;
    transition: .15s;
    font-family: inherit;
  }
  .table-btn:hover {
    border-color: #3370ff;
    color: #3370ff;
  }
  .table-btn.danger:hover {
    border-color: #ff4d4f;
    color: #ff4d4f;
  }

  /* 代码块 */
  .code-block {
    padding: 8px 0;
  }
  .code-block pre {
    background: #1d2129;
    color: #f2f3f5;
    padding: 16px;
    border-radius: 8px;
    font-family: Consolas, Monaco, monospace;
    font-size: 13px;
    line-height: 1.6;
    overflow-x: auto;
    outline: none;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* 添加块按钮 */
  .add-block-area {
    position: relative;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-block-btn {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: #c9cdd4;
    cursor: pointer;
    transition: .15s;
    font-size: 16px;
  }
  .add-block-btn:hover {
    background: #f2f3f5;
    color: #4e5969;
  }

  /* 块菜单弹窗 */
  .block-menu {
    position: absolute;
    top: 100%;
    left: 0;
    width: 240px;
    background: #fff;
    border: 1px solid #e5e6eb;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    z-index: 200;
    padding: 6px;
    display: none;
  }
  .block-menu.show { display: block; }
  .menu-group-title {
    font-size: 11px;
    color: #86909c;
    padding: 6px 10px 4px;
    font-weight: 500;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
  }
  .menu-item:hover { background: #f7f8fa; }
  .menu-icon {
    width: 28px;
    height: 28px;
    background: #f2f3f5;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 14px;
    color: #4e5969;
    flex-shrink: 0;
  }
  .menu-info { flex: 1; min-width: 0; }
  .menu-name { font-size: 13px; color: #1d2129; font-weight: 500; }
  .menu-desc { font-size: 11px; color: #86909c; margin-top: 1px; }

  /* 底部统计 */
  .doc-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 28px;
    background: #fff;
    border-top: 1px solid #f2f3f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #86909c;
    z-index: 50;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    padding: 10px 18px;
    background: #1d2129;
    color: #fff;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: .25s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { background: #10b981; }

  /* 隐藏的文件输入 */
  #fileInput { display: none; }

  /* 响应式 */
  @media (max-width: 640px) {
    .topbar { padding: 10px 16px; }
    .doc-wrap { padding: 24px 16px 100px; }
    .doc-title { font-size: 24px; }
    .block-handle { display: none; }
  }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">P</div>
    <div class="breadcrumb">
      <span>原型说明</span>
      <span>/</span>
      <span id="breadcrumbTitle">1688选品库-AI搜索方案</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn ghost" id="clearBtn">清空</button>
    <button class="btn primary" id="publishBtn">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none"><path d="M13 8L7 2 1 8m6-1v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      发布
    </button>
  </div>
</div>

<!-- 文档主体 -->
<div class="doc-wrap">
  <div class="doc-title" id="docTitle" contenteditable="true" data-placeholder="请输入标题">
    1688选品库 - AI搜索方案
  </div>
  <div id="blocksContainer">
    <!-- 动态渲染 -->
  </div>
  <div class="add-block-area">
    <button class="add-block-btn" id="addBlockBtn" title="添加内容块">+</button>
    <div class="block-menu" id="blockMenu">
      <div class="menu-group-title">基础</div>
      <div class="menu-item" data-type="text">
        <div class="menu-icon">¶</div>
        <div class="menu-info">
          <div class="menu-name">正文</div>
          <div class="menu-desc">普通文本段落</div>
        </div>
      </div>
      <div class="menu-item" data-type="heading1">
        <div class="menu-icon">H1</div>
        <div class="menu-info">
          <div class="menu-name">一级标题</div>
          <div class="menu-desc">大号标题</div>
        </div>
      </div>
      <div class="menu-item" data-type="heading2">
        <div class="menu-icon">H2</div>
        <div class="menu-info">
          <div class="menu-name">二级标题</div>
          <div class="menu-desc">中号标题</div>
        </div>
      </div>
      <div class="menu-item" data-type="heading3">
        <div class="menu-icon">H3</div>
        <div class="menu-info">
          <div class="menu-name">三级标题</div>
          <div class="menu-desc">小号标题</div>
        </div>
      </div>
      <div class="menu-group-title">列表</div>
      <div class="menu-item" data-type="bullet">
        <div class="menu-icon">•</div>
        <div class="menu-info">
          <div class="menu-name">无序列表</div>
          <div class="menu-desc">圆点列表</div>
        </div>
      </div>
      <div class="menu-item" data-type="ordered">
        <div class="menu-icon">1.</div>
        <div class="menu-info">
          <div class="menu-name">有序列表</div>
          <div class="menu-desc">数字列表</div>
        </div>
      </div>
      <div class="menu-group-title">高级</div>
      <div class="menu-item" data-type="quote">
        <div class="menu-icon">❝</div>
        <div class="menu-info">
          <div class="menu-name">引用</div>
          <div class="menu-desc">引用文字块</div>
        </div>
      </div>
      <div class="menu-item" data-type="divider">
        <div class="menu-icon">―</div>
        <div class="menu-info">
          <div class="menu-name">分割线</div>
          <div class="menu-desc">水平分割线</div>
        </div>
      </div>
      <div class="menu-item" data-type="image">
        <div class="menu-icon">🖼</div>
        <div class="menu-info">
          <div class="menu-name">图片</div>
          <div class="menu-desc">上传或粘贴图片</div>
        </div>
      </div>
      <div class="menu-item" data-type="table">
        <div class="menu-icon">▦</div>
        <div class="menu-info">
          <div class="menu-name">表格</div>
          <div class="menu-desc">插入可编辑表格</div>
        </div>
      </div>
      <div class="menu-item" data-type="code">
        <div class="menu-icon">{ }</div>
        <div class="menu-info">
          <div class="menu-name">代码块</div>
          <div class="menu-desc">插入代码片段</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 底部统计 -->
<div class="doc-footer">
  <span id="wordCount">共 0 字</span>
  <span id="blockCount">0 个内容块</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 隐藏文件输入 -->
<input type="file" id="fileInput" accept="image/*" multiple>

<script>
// ========== 数据结构 ==========
let blocks = [
  { id: genId(), type: 'heading2', content: '功能概述' },
  { id: genId(), type: 'text', content: '本页面用于展示1688选品库的AI搜索功能，支持关键词搜索、智能筛选、商品分析等功能。' },
  { id: genId(), type: 'heading2', content: '功能列表' },
  { id: genId(), type: 'bullet', content: '1688选品库 - AI搜索选品功能入口' },
  { id: genId(), type: 'bullet', content: '1688选品库-方案一 - 关键词搜索+筛选方案' },
  { id: genId(), type: 'bullet', content: '商品分析 - 商品详情数据分析面板' },
  { id: genId(), type: 'bullet', content: '1688选品库-方案二 - 图片搜索+同款对比方案' },
  { id: genId(), type: 'bullet', content: '亚马逊精选货盘 - 亚马逊热销商品货盘' },
  { id: genId(), type: 'bullet', content: '下游商机榜 - 下游平台商机榜单' },
  { id: genId(), type: 'bullet', content: '淘宝商品分析 - 淘宝平台商品数据分析' },
  { id: genId(), type: 'bullet', content: '抖音商品分析 - 抖音平台商品数据分析' },
  { id: genId(), type: 'heading2', content: '版本对比' },
  { id: genId(), type: 'table', data: {
    rows: [
      ['版本', '功能', '状态'],
      ['V2.8.9', 'AI搜索方案', '进行中'],
      ['V2.8.8', '筛选优化', '已完成'],
      ['V2.8.7', '商品分析', '已完成']
    ]
  }},
  { id: genId(), type: 'quote', content: '点击任意位置即可编辑，支持添加文字、图片、表格等多种内容块。' }
];

let currentInsertIndex = blocks.length;
let imageUploadTargetId = null;

// ========== 工具函数 ==========
function genId() {
  return 'b_' + Math.random().toString(36).substr(2, 9);
}

// ========== 渲染 ==========
function render() {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = blocks.map((block, index) => renderBlock(block, index)).join('');
  bindBlockEvents();
  updateStats();
}

function renderBlock(block, index) {
  let content = '';
  const handle = `
    <div class="block-handle">
      <button class="handle-btn add" data-action="add" title="添加块">+</button>
      <button class="handle-btn drag" data-action="drag" title="拖动排序">⋮⋮</button>
      <button class="handle-btn del" data-action="delete" title="删除">✕</button>
    </div>
  `;

  switch (block.type) {
    case 'text':
    case 'heading1':
    case 'heading2':
    case 'heading3':
    case 'quote':
    case 'bullet':
    case 'ordered':
      const order = block.type === 'ordered' ? (index + 1) : '';
      content = `<div class="text-block ${block.type}" contenteditable="true" data-placeholder="输入文字...">${block.content || ''}</div>`;
      break;

    case 'divider':
      content = `<div class="divider-block"><hr></div>`;
      break;

    case 'image':
      if (block.src) {
        content = `
          <div class="image-block">
            <img src="${block.src}" alt="${block.alt || ''}">
          </div>
        `;
      } else {
        content = `
          <div class="image-block">
            <div class="image-uploader" data-action="upload">
              <div class="icon">📷</div>
              <div class="tip">点击上传图片 或 粘贴图片</div>
            </div>
          </div>
        `;
      }
      break;

    case 'table':
      const rows = block.data?.rows || [['', '', ''], ['', '', ''], ['', '', '']];
      let tableHtml = '<table class="doc-table">';
      rows.forEach((row, ri) => {
        tableHtml += '<tr>';
        row.forEach((cell, ci) => {
          const tag = ri === 0 ? 'th' : 'td';
          tableHtml += `<${tag} contenteditable="true" data-row="${ri}" data-col="${ci}">${cell || ''}</${tag}>`;
        });
        tableHtml += '</tr>';
      });
      tableHtml += '</table>';
      content = `
        <div class="table-block">
          ${tableHtml}
          <div class="table-toolbar">
            <button class="table-btn" data-action="add-row">+ 行</button>
            <button class="table-btn" data-action="add-col">+ 列</button>
            <button class="table-btn danger" data-action="del-row">- 行</button>
            <button class="table-btn danger" data-action="del-col">- 列</button>
          </div>
        </div>
      `;
      break;

    case 'code':
      content = `
        <div class="code-block">
          <pre contenteditable="true">${block.content || '// 输入代码'}</pre>
        </div>
      `;
      break;

    default:
      content = `<div class="text-block" contenteditable="true">${block.content || ''}</div>`;
  }

  return `<div class="block" data-id="${block.id}" data-index="${index}">${handle}${content}</div>`;
}

// ========== 绑定事件 ==========
function bindBlockEvents() {
  document.querySelectorAll('.block').forEach(blockEl => {
    const id = blockEl.dataset.id;
    const block = blocks.find(b => b.id === id);
    if (!block) return;

    // 文本编辑
    const textEl = blockEl.querySelector('.text-block');
    if (textEl) {
      textEl.addEventListener('input', () => {
        block.content = textEl.textContent;
        saveToLocal();
        updateStats();
      });
      textEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const idx = blocks.findIndex(b => b.id === id);
          const newType = (block.type === 'bullet' || block.type === 'ordered') ? block.type : 'text';
          blocks.splice(idx + 1, 0, { id: genId(), type: newType, content: '' });
          render();
          saveToLocal();
          setTimeout(() => {
            const next = document.querySelector(`[data-index="${idx + 1}"] .text-block`);
            if (next) next.focus();
          }, 30);
        }
        if (e.key === 'Backspace' && textEl.textContent === '' && blocks.length > 1) {
          e.preventDefault();
          const idx = blocks.findIndex(b => b.id === id);
          blocks.splice(idx, 1);
          render();
          saveToLocal();
          setTimeout(() => {
            const prev = document.querySelector(`[data-index="${Math.max(0, idx - 1)}"] .text-block`);
            if (prev) prev.focus();
          }, 30);
        }
      });
    }

    // 块操作按钮
    const addBtn = blockEl.querySelector('[data-action="add"]');
    if (addBtn) {
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = blocks.findIndex(b => b.id === id);
        currentInsertIndex = idx;
        showBlockMenu(addBtn);
      });
    }

    const delBtn = blockEl.querySelector('[data-action="delete"]');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (blocks.length <= 1) { showToast('至少保留一个内容块'); return; }
        const idx = blocks.findIndex(b => b.id === id);
        blocks.splice(idx, 1);
        render();
        saveToLocal();
        showToast('已删除');
      });
    }

    // 拖拽排序
    const dragBtn = blockEl.querySelector('[data-action="drag"]');
    if (dragBtn) {
      dragBtn.addEventListener('mousedown', (e) => startDrag(e, id));
    }

    // 图片上传
    const uploader = blockEl.querySelector('[data-action="upload"]');
    if (uploader) {
      uploader.addEventListener('click', () => {
        imageUploadTargetId = id;
        document.getElementById('fileInput').click();
      });
    }

    // 表格编辑
    const table = blockEl.querySelector('.doc-table');
    if (table) {
      table.querySelectorAll('[contenteditable]').forEach(cell => {
        cell.addEventListener('input', () => {
          const r = parseInt(cell.dataset.row);
          const c = parseInt(cell.dataset.col);
          block.data.rows[r][c] = cell.textContent;
          saveToLocal();
        });
      });
    }

    // 表格工具栏
    const tableToolbar = blockEl.querySelector('.table-toolbar');
    if (tableToolbar) {
      tableToolbar.querySelector('[data-action="add-row"]').addEventListener('click', (e) => {
        e.stopPropagation();
        const cols = block.data.rows[0]?.length || 3;
        block.data.rows.push(new Array(cols).fill(''));
        render();
        saveToLocal();
      });
      tableToolbar.querySelector('[data-action="add-col"]').addEventListener('click', (e) => {
        e.stopPropagation();
        block.data.rows.forEach(row => row.push(''));
        render();
        saveToLocal();
      });
      tableToolbar.querySelector('[data-action="del-row"]').addEventListener('click', (e) => {
        e.stopPropagation();
        if (block.data.rows.length <= 1) { showToast('至少保留一行'); return; }
        block.data.rows.pop();
        render();
        saveToLocal();
      });
      tableToolbar.querySelector('[data-action="del-col"]').addEventListener('click', (e) => {
        e.stopPropagation();
        if ((block.data.rows[0]?.length || 0) <= 1) { showToast('至少保留一列'); return; }
        block.data.rows.forEach(row => row.pop());
        render();
        saveToLocal();
      });
    }

    // 代码块
    const codeEl = blockEl.querySelector('pre');
    if (codeEl) {
      codeEl.addEventListener('input', () => {
        block.content = codeEl.textContent;
        saveToLocal();
      });
    }
  });
}

// ========== 拖拽排序 ==========
let dragData = null;

function startDrag(e, id) {
  e.preventDefault();
  dragData = { id, startY: e.clientY, el: document.querySelector(`[data-id="${id}"]`) };
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
  if (!dragData) return;
  const delta = e.clientY - dragData.startY;
  const blockHeight = 40;
  const idx = blocks.findIndex(b => b.id === dragData.id);
  const moveBy = Math.round(delta / blockHeight);
  if (moveBy !== 0 && idx + moveBy >= 0 && idx + moveBy < blocks.length) {
    const [removed] = blocks.splice(idx, 1);
    blocks.splice(idx + moveBy, 0, removed);
    render();
    saveToLocal();
    dragData.startY = e.clientY;
  }
}

function endDrag() {
  dragData = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
}

// ========== 块菜单 ==========
const addBlockBtn = document.getElementById('addBlockBtn');
const blockMenu = document.getElementById('blockMenu');

addBlockBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  currentInsertIndex = blocks.length;
  blockMenu.classList.toggle('show');
});

document.addEventListener('click', (e) => {
  if (!blockMenu.contains(e.target) && e.target !== addBlockBtn) {
    blockMenu.classList.remove('show');
  }
});

function showBlockMenu(anchor) {
  const rect = anchor.getBoundingClientRect();
  blockMenu.style.left = rect.left + 'px';
  blockMenu.style.top = (rect.bottom + 4) + 'px';
  blockMenu.classList.add('show');
}

blockMenu.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', () => {
    const type = item.dataset.type;
    addBlock(type, currentInsertIndex);
    blockMenu.classList.remove('show');
  });
});

function addBlock(type, index) {
  const newBlock = { id: genId(), type, content: '' };
  if (type === 'table') {
    newBlock.data = { rows: [
      ['列1', '列2', '列3'],
      ['', '', ''],
      ['', '', '']
    ]};
  }
  if (type === 'divider') {
    newBlock.content = '';
  }
  if (index === undefined) index = blocks.length;
  blocks.splice(index, 0, newBlock);
  render();
  saveToLocal();

  // 聚焦新块
  setTimeout(() => {
    const newEl = document.querySelector(`[data-id="${newBlock.id}"]`);
    if (newEl) {
      const editable = newEl.querySelector('[contenteditable="true"]');
      if (editable) editable.focus();
    }
  }, 30);
}

// ========== 图片上传 ==========
document.getElementById('fileInput').addEventListener('change', (e) => {
  const files = e.target.files;
  if (!files || files.length === 0) return;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (evt) => {
      if (imageUploadTargetId) {
        const block = blocks.find(b => b.id === imageUploadTargetId);
        if (block) {
          block.src = evt.target.result;
          block.alt = file.name;
        }
        imageUploadTargetId = null;
      } else {
        blocks.push({ id: genId(), type: 'image', src: evt.target.result, alt: file.name });
      }
      render();
      saveToLocal();
      showToast('图片已添加');
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

// 粘贴图片
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (let item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (evt) => {
        blocks.push({ id: genId(), type: 'image', src: evt.target.result, alt: '粘贴图片' });
        render();
        saveToLocal();
        showToast('图片已粘贴');
      };
      reader.readAsDataURL(file);
      break;
    }
  }
});

// ========== 标题 ==========
const docTitle = document.getElementById('docTitle');
const breadcrumbTitle = document.getElementById('breadcrumbTitle');
docTitle.addEventListener('input', () => {
  breadcrumbTitle.textContent = docTitle.textContent || '未命名文档';
  saveToLocal();
  updateStats();
});

// ========== 统计 ==========
function updateStats() {
  let words = docTitle.textContent.length;
  blocks.forEach(b => {
    if (b.content) words += b.content.length;
    if (b.type === 'table' && b.data?.rows) {
      b.data.rows.forEach(row => row.forEach(cell => words += (cell?.length || 0)));
    }
  });
  document.getElementById('wordCount').textContent = `共 ${words} 字`;
  document.getElementById('blockCount').textContent = `${blocks.length} 个内容块`;
}

// ========== 发布 ==========
document.getElementById('publishBtn').addEventListener('click', () => {
  let md = `# ${docTitle.textContent}\n\n`;
  blocks.forEach(b => {
    switch (b.type) {
      case 'heading1': md += `# ${b.content}\n\n`; break;
      case 'heading2': md += `## ${b.content}\n\n`; break;
      case 'heading3': md += `### ${b.content}\n\n`; break;
      case 'bullet': md += `- ${b.content}\n`; break;
      case 'ordered': md += `1. ${b.content}\n`; break;
      case 'quote': md += `> ${b.content}\n\n`; break;
      case 'divider': md += `---\n\n`; break;
      case 'image':
        if (b.src) md += `![${b.alt || '图片'}](${b.src})\n\n`;
        break;
      case 'table':
        if (b.data?.rows) {
          b.data.rows.forEach((row, i) => {
            md += `| ${row.join(' | ')} |\n`;
            if (i === 0) md += `| ${row.map(() => '---').join(' | ')} |\n`;
          });
          md += '\n';
        }
        break;
      case 'code':
        md += '```\n' + b.content + '\n```\n\n';
        break;
      default: md += `${b.content}\n\n`;
    }
  });

  navigator.clipboard.writeText(md).then(() => {
    showToast('已复制 Markdown，可直接发布', 'success');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = md;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制 Markdown，可直接发布', 'success');
  });
});

// ========== 清空 ==========
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('确定要清空所有内容吗？')) return;
  blocks = [{ id: genId(), type: 'text', content: '' }];
  docTitle.textContent = '未命名文档';
  breadcrumbTitle.textContent = '未命名文档';
  render();
  saveToLocal();
  showToast('已清空');
});

// ========== 本地存储 ==========
function saveToLocal() {
  try {
    localStorage.setItem('yuque-doc-data', JSON.stringify({
      title: docTitle.textContent,
      blocks
    }));
  } catch (e) {
    console.warn('保存失败，可能是图片太大');
  }
}

function loadFromLocal() {
  const saved = localStorage.getItem('yuque-doc-data');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.title !== undefined) {
        docTitle.textContent = data.title;
        breadcrumbTitle.textContent = data.title || '未命名文档';
      }
      if (data.blocks) blocks = data.blocks;
    } catch (e) {
      console.warn('加载失败，使用默认内容');
    }
  }
}

// ========== Toast ==========
const toast = document.getElementById('toast');
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'success' ? ' success' : '');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ========== 初始化 ==========
loadFromLocal();
render();

// 快捷键
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    document.getElementById('publishBtn').click();
  }
});
</script>
