<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后端 JSON 映射说明</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { padding: 28px; background: #f8fafc; color: #1e293b; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }

  /* 顶部工具栏 */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    gap: 18px; padding: 14px 18px; margin: -8px auto 22px;
    max-width: 1080px;
    border: 1px solid #dbe4ef;
    border-radius: 14px;
    background: rgba(255,255,255,.94);
    box-shadow: 0 8px 24px rgba(30,41,59,.08);
    backdrop-filter: blur(12px);
  }
  .title { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .badge {
    width: 40px; height: 40px; flex: 0 0 40px;
    display: grid; place-items: center;
    border-radius: 10px;
    background: #64748b; color: #fff;
    font-size: 12px; font-weight: 800;
  }
  .badge.edit { background: #3370ff; }
  .title b { display: block; font-size: 17px; }
  .title small { display: block; margin-top: 3px; color: #64748b; font: 12px Consolas, monospace; }

  /* 工具栏按钮组 */
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .btn {
    height: 36px; padding: 0 14px;
    border: 0; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: .15s;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .btn-primary { background: #3370ff; color: #fff; }
  .btn-primary:hover { background: #2968f2; }
  .btn-secondary { background: #f1f5f9; color: #334155; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-ghost:hover { background: #f8fafc; color: #334155; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* 模式切换标签 */
  .mode-tabs {
    display: flex; gap: 2px; padding: 3px;
    background: #f1f5f9; border-radius: 8px;
  }
  .mode-tab {
    height: 30px; padding: 0 14px;
    border: 0; border-radius: 6px;
    background: transparent; color: #64748b;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: .15s;
    font-family: inherit;
  }
  .mode-tab.active { background: #fff; color: #334155; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* 文档主体 */
  .document {
    max-width: 1080px; margin: 0 auto;
    padding: 42px 54px 64px;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 12px 32px rgba(30,41,59,.07);
  }

  /* Markdown 预览样式 */
  .markdown { font-size: 15px; line-height: 1.85; }
  .markdown h1 { margin: 0 0 24px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; color: #0f172a; font-size: 30px; line-height: 1.25; }
  .markdown h2 { margin: 34px 0 14px; padding-left: 12px; border-left: 4px solid #64748b; color: #1e293b; font-size: 22px; }
  .markdown h3 { margin: 26px 0 10px; color: #334155; font-size: 18px; }
  .markdown p { margin: 12px 0; }
  .markdown ol, .markdown ul { padding-left: 28px; }
  .markdown li { margin: 5px 0; }
  .markdown code { padding: 2px 6px; border-radius: 5px; background: #f1f5f9; color: #475569; font: .92em Consolas, monospace; }
  .markdown pre { margin: 16px 0; padding: 16px 18px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #334155; font: 13px/1.7 Consolas, monospace; }
  .markdown pre code { padding: 0; background: transparent; }
  .markdown table { width: 100%; margin: 16px 0; border-collapse: collapse; font-size: 14px; }
  .markdown th, .markdown td { padding: 10px 12px; border: 1px solid #dbe4ef; text-align: left; vertical-align: top; }
  .markdown th { background: #f1f5f9; color: #334155; font-weight: 700; }
  .markdown blockquote { margin: 16px 0; padding: 8px 16px; border-left: 4px solid #94a3b8; background: #f8fafc; color: #475569; }
  .error { color: #b91c1c; }

  /* 编辑器样式 */
  .editor-container { display: none; gap: 0; }
  .editor-container.active { display: flex; }
  .editor-pane, .preview-pane { flex: 1; min-width: 0; }
  .editor-pane { border-right: 1px solid #e2e8f0; }
  .preview-pane { overflow: auto; max-height: calc(100vh - 200px); }

  .editor-textarea {
    width: 100%;
    min-height: calc(100vh - 200px);
    padding: 20px;
    border: 0;
    resize: none;
    font-family: Consolas, Monaco, "Courier New", monospace;
    font-size: 14px;
    line-height: 1.7;
    color: #334155;
    background: #fafbfc;
    outline: none;
  }
  .editor-textarea:focus { background: #fff; }

  .preview-pane .markdown { padding: 20px; }

  /* 单栏模式 */
  .single-pane .editor-textarea { min-height: calc(100vh - 200px); padding: 42px 54px; font-size: 15px; line-height: 1.85; }

  /* Toast 提示 */
  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    padding: 10px 20px;
    background: #1e293b; color: #fff;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: .25s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #10b981; }
  .toast.error { background: #ef4444; }

  /* 底部状态栏 */
  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 28px;
    background: rgba(255,255,255,.95);
    border-top: 1px solid #e2e8f0;
    font-size: 12px; color: #64748b;
    z-index: 50;
    backdrop-filter: blur(8px);
  }
  .status-bar .status-left, .status-bar .status-right { display: flex; align-items: center; gap: 16px; }
  .save-status { display: flex; align-items: center; gap: 6px; }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #f59e0b;
    animation: pulse 2s infinite;
  }
  .save-dot.saved { background: #10b981; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* 响应式 */
  @media (max-width: 720px) {
    body { padding: 12px; }
    .document { padding: 26px 20px 40px; }
    .toolbar { margin-top: 0; flex-wrap: wrap; gap: 10px; }
    .toolbar-right { width: 100%; justify-content: flex-end; }
    .markdown h1 { font-size: 24px; }
    .mode-tabs { display: none; }
    .editor-container.active { flex-direction: column; }
    .editor-pane { border-right: 0; border-bottom: 1px solid #e2e8f0; }
    .preview-pane { max-height: none; }
    .single-pane .editor-textarea { padding: 20px; }
  }

  /* 隐藏的文件输入 */
  #mdFileInput { display: none; }

  /* 发布弹窗 */
  .modal-mask {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, .5);
    display: none; align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn .2s ease;
  }
  .modal-mask.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 90%;
    max-width: 480px;
    overflow: hidden;
    animation: slideUp .25s ease;
  }
  .modal-header {
    padding: 22px 24px 14px;
    border-bottom: 1px solid #f1f5f9;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    color: #1e293b;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-icon {
    width: 36px; height: 36px;
    background: #e0f2fe;
    color: #0284c7;
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
  }
  .modal-body {
    padding: 20px 24px;
  }
  .modal-desc {
    font-size: 14px;
    color: #475569;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .modal-desc b { color: #1e293b; }
  .modal-steps {
    background: #f8fafc;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .modal-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
    color: #475569;
  }
  .step-num {
    width: 22px; height: 22px;
    background: #3370ff;
    color: #fff;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .step-text { flex: 1; padding-top: 1px; }
  .step-text b { color: #1e293b; }
  .content-preview {
    background: #f1f5f9;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #64748b;
    font-family: Consolas, Monaco, monospace;
    max-height: 80px;
    overflow: hidden;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .modal-footer {
    padding: 14px 24px 22px;
    display: flex;
    gap: 10px;
  }
  .modal-footer .btn {
    flex: 1;
    height: 40px;
    justify-content: center;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="toolbar">
  <div class="title">
    <span class="badge" id="modeBadge">MD</span>
    <div>
      <b id="docTitle">后端 JSON 映射说明</b>
      <small id="docFile">backend-json-mapping.md</small>
    </div>
  </div>
  <div class="toolbar-right">
    <!-- 模式切换 -->
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="preview">预览</button>
      <button class="mode-tab" data-mode="split">分屏</button>
      <button class="mode-tab" data-mode="edit">编辑</button>
    </div>
    <button class="btn btn-ghost" id="importBtn" title="导入 MD 文件">📥 导入</button>
    <button class="btn btn-ghost" id="copyBtn" title="复制 Markdown">📋 复制 MD</button>
    <button class="btn btn-primary" id="publishBtn">🚀 发布更新</button>
  </div>
</div>

<!-- 文档主体 - 预览模式 -->
<article class="document" id="previewDoc">
  <div class="markdown" id="markdown">正在读取 MD 文件…</div>
</article>

<!-- 文档主体 - 编辑模式 -->
<div class="editor-container" id="editorContainer">
  <div class="editor-pane">
    <textarea class="editor-textarea" id="editor" placeholder="在此输入 Markdown 内容..."></textarea>
  </div>
  <div class="preview-pane">
    <div class="markdown" id="livePreview"></div>
  </div>
</div>

<!-- 底部状态栏 -->
<div class="status-bar">
  <div class="status-left">
    <div class="save-status">
      <span class="save-dot saved" id="saveDot"></span>
      <span id="saveStatusText">已保存</span>
    </div>
  </div>
  <div class="status-right">
    <span id="wordCount">0 字</span>
    <span id="lineCount">0 行</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 隐藏文件输入 -->
<input type="file" id="mdFileInput" accept=".md,text/markdown">

<!-- 发布弹窗 -->
<div class="modal-mask" id="publishModal" onclick="if(event.target===this)closePublishModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-icon">🚀</span>
        <span>发布更新到线上</span>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc">
        内容已保存到本地。要更新到线上 Git，请按以下步骤操作：
      </p>
      <div class="modal-steps">
        <div class="modal-step">
          <span class="step-num">1</span>
          <div class="step-text">点击下方按钮 <b>复制最新内容</b></div>
        </div>
        <div class="modal-step">
          <span class="step-num">2</span>
          <div class="step-text">打开 WorkBuddy 对话框，<b>粘贴内容</b>并说「帮我更新这个 MD 文档」</div>
        </div>
        <div class="modal-step">
          <span class="step-num">3</span>
          <div class="step-text">WorkBuddy 会帮你更新到 GitHub，1-2 分钟后线上生效</div>
        </div>
      </div>
      <div class="content-preview" id="publishContentPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePublishModal()">取消</button>
      <button class="btn btn-primary" id="copyPublishBtn" onclick="copyPublishContent()">📋 复制内容并发给 WorkBuddy</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  状态
// ============================================================
let currentMode = 'preview'; // preview | split | edit
let rawContent = '';
let hasChanges = false;
let autoSaveTimer = null;
const STORAGE_KEY = 'backend-json-mapping-content';

const editor = document.getElementById('editor');
const markdownEl = document.getElementById('markdown');
const livePreviewEl = document.getElementById('livePreview');
const previewDoc = document.getElementById('previewDoc');
const editorContainer = document.getElementById('editorContainer');
const modeBadge = document.getElementById('modeBadge');
const copyBtn = document.getElementById('copyBtn');
const publishBtn = document.getElementById('publishBtn');
const importBtn = document.getElementById('importBtn');
const saveDot = document.getElementById('saveDot');
const saveStatusText = document.getElementById('saveStatusText');
const wordCountEl = document.getElementById('wordCount');
const lineCountEl = document.getElementById('lineCount');

// ============================================================
//  Markdown 解析
// ============================================================
function inline(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function renderMarkdown(markdown) {
  const lines = markdown.replace(/\r/g, '').split('\n');
  const html = [];
  let inCode = false;
  let codeLines = [];
  let codeLang = '';
  let listType = null;
  let table = false;

  const closeList = () => { if (listType) { html.push(`</${listType}>`); listType = null; } };
  const closeTable = () => { if (table) { html.push('</tbody></table>'); table = false; } };

  for (let i = 0; i < lines.length; i += 1) {
    const line = lines[i];

    // 代码块
    if (line.startsWith('```')) {
      if (!inCode) {
        closeList(); closeTable();
        inCode = true;
        codeLines = [];
        codeLang = line.slice(3).trim();
      } else {
        const code = codeLines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html.push(`<pre><code>${code}</code></pre>`);
        inCode = false;
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    // 空行
    if (!line.trim()) { closeList(); closeTable(); continue; }

    // 表格
    if (/^\|.*\|$/.test(line)) {
      const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
      if (cells.every(cell => /^[-: ]+$/.test(cell))) continue;
      if (!table) {
        closeList();
        html.push('<table><thead><tr>' + cells.map(cell => `<th>${inline(cell)}</th>`).join('') + '</tr></thead><tbody>');
        table = true;
      } else {
        html.push('<tr>' + cells.map(cell => `<td>${inline(cell)}</td>`).join('') + '</tr>');
      }
      continue;
    }
    closeTable();

    // 标题
    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if (heading) {
      closeList();
      const level = Math.min(heading[1].length, 6);
      html.push(`<h${level}>${inline(heading[2])}</h${level}>`);
      continue;
    }

    // 列表
    const ordered = line.match(/^\d+\.\s+(.+)$/);
    const unordered = line.match(/^[-*]\s+(.+)$/);
    if (ordered || unordered) {
      const type = ordered ? 'ol' : 'ul';
      if (listType !== type) { closeList(); listType = type; html.push(`<${type}>`); }
      html.push(`<li>${inline((ordered || unordered)[1])}</li>`);
      continue;
    }

    // 引用
    if (line.startsWith('> ')) {
      closeList();
      html.push(`<blockquote>${inline(line.slice(2))}</blockquote>`);
      continue;
    }

    // 普通段落
    closeList();
    html.push(`<p>${inline(line)}</p>`);
  }

  if (inCode) {
    html.push(`<pre><code>${codeLines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`);
  }
  closeList(); closeTable();

  return html.join('\n');
}

// ============================================================
//  模式切换
// ============================================================
function switchMode(mode) {
  currentMode = mode;

  // 更新标签状态
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });

  // 更新徽章
  if (mode === 'preview') {
    modeBadge.textContent = 'MD';
    modeBadge.className = 'badge';
  } else {
    modeBadge.textContent = '编';
    modeBadge.className = 'badge edit';
  }

  // 切换显示
  if (mode === 'preview') {
    previewDoc.style.display = 'block';
    editorContainer.classList.remove('active');
    markdownEl.innerHTML = renderMarkdown(rawContent);
  } else if (mode === 'split') {
    previewDoc.style.display = 'none';
    editorContainer.classList.add('active');
    editorContainer.classList.remove('single-pane');
    editor.style.display = 'block';
    livePreviewEl.parentElement.style.display = 'block';
    livePreviewEl.innerHTML = renderMarkdown(editor.value);
    setTimeout(() => editor.focus(), 50);
  } else if (mode === 'edit') {
    previewDoc.style.display = 'none';
    editorContainer.classList.add('active', 'single-pane');
    editor.style.display = 'block';
    livePreviewEl.parentElement.style.display = 'none';
    setTimeout(() => editor.focus(), 50);
  }

  updateStats();
}

// ============================================================
//  编辑器事件
// ============================================================
editor.addEventListener('input', () => {
  rawContent = editor.value;
  hasChanges = true;
  updateSaveStatus(false);

  // 实时预览
  if (currentMode === 'split') {
    livePreviewEl.innerHTML = renderMarkdown(rawContent);
  }

  // 自动保存（防抖）
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveToLocal();
  }, 1000);

  updateStats();
});

// ============================================================
//  统计
// ============================================================
function updateStats() {
  const text = rawContent;
  const chars = text.replace(/\s/g, '').length;
  const lines = text.split('\n').length;
  wordCountEl.textContent = `${chars} 字`;
  lineCountEl.textContent = `${lines} 行`;
}

// ============================================================
//  本地存储
// ============================================================
function saveToLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, rawContent);
    hasChanges = false;
    updateSaveStatus(true);
    return true;
  } catch (e) {
    showToast('保存失败', 'error');
    return false;
  }
}

function loadFromLocal() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    rawContent = saved;
    return true;
  }
  return false;
}

function updateSaveStatus(saved) {
  if (saved) {
    saveDot.className = 'save-dot saved';
    saveStatusText.textContent = '已保存到本地';
  } else {
    saveDot.className = 'save-dot';
    saveStatusText.textContent = '有未保存的更改';
  }
}

// ============================================================
//  发布更新
// ============================================================
function publish() {
  if (!rawContent.trim()) {
    showToast('内容不能为空', 'error');
    return;
  }

  saveToLocal();
  showPublishModal();
}

// 发布提示弹窗
function showPublishModal() {
  const modal = document.getElementById('publishModal');
  const contentPreview = document.getElementById('publishContentPreview');

  // 显示前 200 字预览
  const preview = rawContent.length > 200 ? rawContent.slice(0, 200) + '...' : rawContent;
  contentPreview.textContent = preview;

  modal.classList.add('show');
}

function closePublishModal() {
  document.getElementById('publishModal').classList.remove('show');
}

function copyPublishContent() {
  const text = editor.value || rawContent;
  if (!text) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => {
        const btn = document.getElementById('copyPublishBtn');
        const old = btn.innerHTML;
        btn.innerHTML = '✓ 已复制，请发给 WorkBuddy';
        btn.style.background = '#10b981';
        setTimeout(() => { btn.innerHTML = old; btn.style.background = ''; }, 2000);
      })
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

// ============================================================
//  复制 MD
// ============================================================
function copyMD() {
  const text = editor.value || rawContent;
  if (!text) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => {
        showToast('已复制 Markdown', 'success');
        copyBtn.textContent = '✓ 已复制';
        setTimeout(() => { copyBtn.innerHTML = '📋 复制 MD'; }, 1500);
      })
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      showToast('已复制 Markdown', 'success');
      return;
    }
  } catch (e) {}
  showToast('复制失败', 'error');
}

// ============================================================
//  导入 MD 文件
// ============================================================
function importMD(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const content = e.target.result;
    if (hasChanges && !confirm('当前内容有未保存的更改，确定要导入新文件吗？')) {
      return;
    }
    rawContent = content;
    editor.value = content;
    markdownEl.innerHTML = renderMarkdown(content);
    livePreviewEl.innerHTML = renderMarkdown(content);

    // 提取标题
    const firstLine = content.split('\n').find(l => l.startsWith('# '));
    if (firstLine) {
      document.getElementById('docTitle').textContent = firstLine.replace(/^#\s+/, '').trim();
    }

    hasChanges = true;
    updateSaveStatus(false);
    updateStats();
    showToast('导入成功', 'success');
    saveToLocal();
  };
  reader.readAsText(file);
}

// ============================================================
//  Toast
// ============================================================
const toastEl = document.getElementById('toast');
function showToast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show';
  if (type === 'success') toastEl.classList.add('success');
  if (type === 'error') toastEl.classList.add('error');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ============================================================
//  事件绑定
// ============================================================

// 模式切换
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    switchMode(tab.dataset.mode);
  });
});

// 发布按钮
publishBtn.addEventListener('click', publish);

// 复制按钮
copyBtn.addEventListener('click', copyMD);

// 导入按钮
importBtn.addEventListener('click', () => {
  document.getElementById('mdFileInput').click();
});

document.getElementById('mdFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) importMD(file);
  e.target.value = '';
});

// 快捷键
document.addEventListener('keydown', (e) => {
  // Ctrl+S 发布
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    publish();
  }
  // Ctrl+1/2/3 切换模式
  if (e.ctrlKey && e.key === '1') { e.preventDefault(); switchMode('preview'); }
  if (e.ctrlKey && e.key === '2') { e.preventDefault(); switchMode('split'); }
  if (e.ctrlKey && e.key === '3') { e.preventDefault(); switchMode('edit'); }
});

// 离开页面提示
window.addEventListener('beforeunload', (e) => {
  if (hasChanges) {
    e.preventDefault();
    e.returnValue = '有未保存的更改，确定要离开吗？';
  }
});

// ============================================================
//  初始化
// ============================================================
function init() {
  // 先尝试从本地存储加载
  if (loadFromLocal()) {
    editor.value = rawContent;
    markdownEl.innerHTML = renderMarkdown(rawContent);

    // 提取标题
    const firstLine = rawContent.split('\n').find(l => l.startsWith('# '));
    if (firstLine) {
      document.getElementById('docTitle').textContent = firstLine.replace(/^#\s+/, '').trim();
    }

    updateStats();
    updateSaveStatus(true);
    return;
  }

  // 否则从 MD 文件加载
  fetch('backend-json-mapping.md')
    .then(response => {
      if (!response.ok) throw new Error('读取失败');
      return response.text();
    })
    .then(markdown => {
      rawContent = markdown;
      editor.value = markdown;
      markdownEl.innerHTML = renderMarkdown(markdown);

      // 提取标题
      const firstLine = markdown.split('\n').find(l => l.startsWith('# '));
      if (firstLine) {
        document.getElementById('docTitle').textContent = firstLine.replace(/^#\s+/, '').trim();
      }

      updateStats();
      updateSaveStatus(true);
    })
    .catch(() => {
      markdownEl.textContent = 'MD 文件读取失败';
      markdownEl.classList.add('error');
    });
}

init();
</script>
