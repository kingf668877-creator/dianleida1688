<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后端 JSON 映射说明</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { padding: 28px; background: #f8fafc; color: #1e293b; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  .toolbar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 14px 18px; margin: -8px auto 22px; max-width: 1080px; border: 1px solid #dbe4ef; border-radius: 14px; background: rgba(255,255,255,.94); box-shadow: 0 8px 24px rgba(30,41,59,.08); backdrop-filter: blur(12px); }
  .title { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .badge { width: 40px; height: 40px; flex: 0 0 40px; display: grid; place-items: center; border-radius: 10px; background: #64748b; color: #fff; font-size: 12px; font-weight: 800; }
  .title b { display: block; font-size: 17px; }
  .title small { display: block; margin-top: 3px; color: #64748b; font: 12px Consolas, monospace; }
  .copy { height: 36px; padding: 0 16px; border: 0; border-radius: 8px; background: #334155; color: #fff; font-weight: 700; cursor: pointer; }
  .copy.ok { background: #16805a; }
  .document { max-width: 1080px; margin: 0 auto; padding: 42px 54px 64px; border: 1px solid #e2e8f0; border-radius: 16px; background: #fff; box-shadow: 0 12px 32px rgba(30,41,59,.07); }
  .markdown { font-size: 15px; line-height: 1.85; }
  .markdown h1 { margin: 0 0 24px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; color: #0f172a; font-size: 30px; line-height: 1.25; }
  .markdown h2 { margin: 34px 0 14px; padding-left: 12px; border-left: 4px solid #64748b; color: #1e293b; font-size: 22px; }
  .markdown h3 { margin: 26px 0 10px; color: #334155; font-size: 18px; }
  .markdown p { margin: 12px 0; }
  .markdown ol, .markdown ul { padding-left: 28px; }
  .markdown li { margin: 5px 0; }
  .markdown code { padding: 2px 6px; border-radius: 5px; background: #f1f5f9; color: #475569; font: .92em Consolas, monospace; }
  .markdown pre { margin: 16px 0; padding: 16px 18px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #334155; font: 13px/1.7 Consolas, monospace; }
  .markdown pre code { padding: 0; background: transparent; }
  .markdown table { width: 100%; margin: 16px 0; border-collapse: collapse; font-size: 14px; }
  .markdown th, .markdown td { padding: 10px 12px; border: 1px solid #dbe4ef; text-align: left; vertical-align: top; }
  .markdown th { background: #f1f5f9; color: #334155; font-weight: 700; }
  .markdown blockquote { margin: 16px 0; padding: 8px 16px; border-left: 4px solid #94a3b8; background: #f8fafc; color: #475569; }
  .error { color: #b91c1c; }
  @media (max-width: 720px) { body { padding: 12px; } .document { padding: 26px 20px 40px; } .toolbar { margin-top: 0; } .markdown h1 { font-size: 24px; } }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="title">
      <span class="badge">MD</span>
      <div><b>后端 JSON 映射说明</b><small>backend-json-mapping.md</small></div>
    </div>
    <button class="copy" id="copy" type="button">复制 MD</button>
  </div>
  <article class="document"><div class="markdown" id="markdown">正在读取 MD 文件…</div></article>
<script>
  let raw = '';
  const target = document.getElementById('markdown');
  const copy = document.getElementById('copy');

  function inline(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  }

  function renderMarkdown(markdown) {
    const lines = markdown.replace(/\r/g, '').split('\n');
    const html = [];
    let inCode = false;
    let codeLines = [];
    let listType = null;
    let table = false;
    const closeList = () => { if (listType) { html.push(`</${listType}>`); listType = null; } };
    const closeTable = () => { if (table) { html.push('</tbody></table>'); table = false; } };
    for (let i = 0; i < lines.length; i += 1) {
      const line = lines[i];
      if (line.startsWith('```')) {
        if (!inCode) { closeList(); closeTable(); inCode = true; codeLines = []; }
        else { html.push(`<pre><code>${codeLines.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`); inCode = false; }
        continue;
      }
      if (inCode) { codeLines.push(line); continue; }
      if (!line.trim()) { closeList(); closeTable(); continue; }
      if (/^\|.*\|$/.test(line)) {
        const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
        if (cells.every(cell => /^[-: ]+$/.test(cell))) continue;
        if (!table) { closeList(); html.push('<table><thead><tr>' + cells.map(cell => `<th>${inline(cell)}</th>`).join('') + '</tr></thead><tbody>'); table = true; }
        else html.push('<tr>' + cells.map(cell => `<td>${inline(cell)}</td>`).join('') + '</tr>');
        continue;
      }
      closeTable();
      const heading = line.match(/^(#{1,3})\s+(.+)$/);
      if (heading) { closeList(); const level = heading[1].length; html.push(`<h${level}>${inline(heading[2])}</h${level}>`); continue; }
      const ordered = line.match(/^\d+\.\s+(.+)$/);
      const unordered = line.match(/^[-*]\s+(.+)$/);
      if (ordered || unordered) { const type = ordered ? 'ol' : 'ul'; if (listType !== type) { closeList(); listType = type; html.push(`<${type}>`); } html.push(`<li>${inline((ordered || unordered)[1])}</li>`); continue; }
      if (line.startsWith('> ')) { closeList(); html.push(`<blockquote>${inline(line.slice(2))}</blockquote>`); continue; }
      closeList(); html.push(`<p>${inline(line)}</p>`);
    }
    if (inCode) html.push(`<pre><code>${codeLines.join('\n')}</code></pre>`);
    closeList(); closeTable();
    return html.join('\n');
  }

  fetch('backend-json-mapping.md').then(response => {
    if (!response.ok) throw new Error('读取失败');
    return response.text();
  }).then(markdown => { raw = markdown; target.innerHTML = renderMarkdown(markdown); })
    .catch(() => { target.textContent = 'MD 文件读取失败'; target.classList.add('error'); });

  copy.addEventListener('click', async () => {
    if (!raw) return;
    try { await navigator.clipboard.writeText(raw); copy.textContent = '已复制'; copy.classList.add('ok'); setTimeout(() => { copy.textContent = '复制 MD'; copy.classList.remove('ok'); }, 1600); }
    catch (error) { copy.textContent = '复制失败'; }
  });
</script>
</body>
</html>
