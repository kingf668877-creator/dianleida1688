<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 智能分析 - CSS</title>
  <link rel="icon" type="image/png" href="logo.png">
<style>body{margin:0;padding:24px;background:#111827;color:#dbe4f0;font-family:"PingFang SC",sans-serif}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.title{display:flex;align-items:center;gap:12px}.badge{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:#6236ff;color:#fff;font-weight:800}.title b{display:block;font-size:18px}.title small{color:#8390a5}.copy{padding:9px 18px;border:0;border-radius:8px;background:#6236ff;color:#fff;cursor:pointer}.copy.ok{background:#16a36a}.editor{overflow:hidden;border:1px solid #293548;border-radius:12px;background:#0b1220}.bar{height:38px;padding:0 16px;display:flex;align-items:center;border-bottom:1px solid #293548;color:#8290a5;font:12px Consolas,monospace}.code{height:calc(100vh - 134px);margin:0;padding:20px;overflow:auto;white-space:pre;tab-size:2;font:13px/1.7 Consolas,monospace;color:#d8dee9}</style></head><body><div class="head"><div class="title"><span class="badge">C</span><div><b>CSS 代码</b><small>ai-three-step-clean.css</small></div></div><button class="copy" id="copy">复制代码</button></div><div class="editor"><div class="bar">ai-three-step-clean.css</div><pre class="code" id="code">正在读取代码…</pre></div><script>let raw='';const code=document.getElementById('code'),btn=document.getElementById('copy');fetch('ai-three-step-clean.css').then(r=>r.text()).then(t=>{raw=t;code.textContent=t}).catch(()=>code.textContent='代码读取失败');btn.onclick=async()=>{try{await navigator.clipboard.writeText(raw);btn.textContent='已复制';btn.classList.add('ok');setTimeout(()=>{btn.textContent='复制代码';btn.classList.remove('ok')},1600)}catch(e){btn.textContent='复制失败'}};</script></body></html>
